<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f7f8">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141c1e">
<title>肺癌認定医試験 想定問題集</title>
<style>
:root{
  --bg:#f4f7f8; --card-bg:#ffffff; --card-back:#eef3f5; --text:#1c2b30; --sub:#5a6b70;
  --accent:#0f6b7a; --accent2:#2f8f9d; --border:#d7e0e2; --shadow:rgba(15,60,70,.12);
  --A:#c0392b; --B:#b8860b; --C:#4a7a8c;
  --dept-bg:#e4f0f2; --dept-text:#0f6b7a;
  --btn-bg:#0f6b7a; --btn-text:#fff;
  --mastered:#2e8b57; --review:#d17a22; --unseen:#8a99a0;
  --correct:#2e8b57; --wrong:#c0392b;
}
:root[data-theme="dark"]{
  --bg:#141c1e; --card-bg:#1d2a2d; --card-back:#223034; --text:#e6eef0; --sub:#a3b4b8;
  --accent:#4fb3c2; --accent2:#3f9aa8; --border:#2e4145; --shadow:rgba(0,0,0,.4);
  --A:#e57368; --B:#e0b34a; --C:#7fb4c4;
  --dept-bg:#20393d; --dept-text:#7fd4e0;
  --btn-bg:#2f8f9d; --btn-text:#0b1516;
  --mastered:#5cbf8a; --review:#e0a45c; --unseen:#7a8a90;
  --correct:#5cbf8a; --wrong:#e57368;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#141c1e; --card-bg:#1d2a2d; --card-back:#223034; --text:#e6eef0; --sub:#a3b4b8;
    --accent:#4fb3c2; --accent2:#3f9aa8; --border:#2e4145; --shadow:rgba(0,0,0,.4);
    --A:#e57368; --B:#e0b34a; --C:#7fb4c4;
    --dept-bg:#20393d; --dept-text:#7fd4e0;
    --btn-bg:#2f8f9d; --btn-text:#0b1516;
    --mastered:#5cbf8a; --review:#e0a45c; --unseen:#7a8a90;
    --correct:#5cbf8a; --wrong:#e57368;
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
}
header{
  padding:12px 16px; border-bottom:1px solid var(--border); background:var(--card-bg);
  display:flex; flex-wrap:wrap; align-items:center; gap:10px; position:sticky; top:0; z-index:20;
}
header h1{font-size:1.05rem; margin:0; color:var(--accent); flex:0 0 auto; white-space:nowrap;}
.stats{display:flex; gap:8px; flex-wrap:wrap; font-size:.8rem; margin-left:auto;}
.stat-pill{padding:3px 9px; border-radius:12px; background:var(--dept-bg); color:var(--text); border:1px solid var(--border);}
.stat-pill.correct{color:var(--correct); font-weight:600;}
.stat-pill.wrong{color:var(--wrong); font-weight:600;}
button{
  cursor:pointer; border:1px solid var(--border); background:var(--card-bg); color:var(--text);
  border-radius:8px; padding:6px 10px; font-size:.85rem; transition:all .15s;
}
@media (hover: hover){
  button:hover{border-color:var(--accent); color:var(--accent);}
  button.primary:hover{opacity:.88; color:var(--btn-text);}
}
button.primary{background:var(--btn-bg); color:var(--btn-text); border-color:var(--btn-bg); font-weight:600;}
button:disabled{opacity:.4; cursor:default;}
#themeToggle{font-size:1rem; padding:6px 9px;}

nav.tabs{
  display:flex; gap:0; background:var(--card-bg); border-bottom:1px solid var(--border);
  position:sticky; top:52px; z-index:19; overflow-x:auto;
}
nav.tabs button{
  flex:1 1 auto; border:none; border-radius:0; border-bottom:3px solid transparent;
  background:transparent; padding:10px 8px; font-size:.9rem; font-weight:600; color:var(--sub);
  white-space:nowrap;
}
nav.tabs button.active{color:var(--accent); border-bottom-color:var(--accent);}

.filters{
  background:var(--card-bg); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;
}
.filter-group{display:flex; flex-direction:column; gap:4px; font-size:.75rem; color:var(--sub);}
.filter-group .opts{display:flex; flex-wrap:wrap; gap:5px; max-width:520px;}
select{
  padding:5px 8px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg); color:var(--text); font-size:.85rem;
}
.chip{
  padding:4px 10px; border-radius:14px; border:1px solid var(--border); background:var(--bg);
  font-size:.78rem; color:var(--sub); cursor:pointer; user-select:none;
}
.chip.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.chip.level-A.active{background:var(--A); border-color:var(--A);}
.chip.level-B.active{background:var(--B); border-color:var(--B);}
.chip.level-C.active{background:var(--C); border-color:var(--C);}

main{
  flex:1; display:flex; flex-direction:column; align-items:center; padding:22px 14px 40px;
  gap:14px; width:100%;
}
.view{display:none; width:100%; flex-direction:column; align-items:center; gap:14px;}
.view.active{display:flex;}

.progress-nav{display:flex; align-items:center; gap:14px; font-size:.85rem; color:var(--sub);}

.q-card{
  width:100%; max-width:680px; background:var(--card-bg); border:1px solid var(--border);
  border-radius:16px; box-shadow:0 6px 22px var(--shadow); padding:22px 24px;
}
.q-meta{display:flex; flex-wrap:wrap; gap:6px; font-size:.72rem; color:var(--sub); margin-bottom:8px;}
.q-meta .tag{padding:2px 8px; border-radius:10px; background:var(--dept-bg); color:var(--dept-text);}
.q-meta .tag.level-A{background:var(--A); color:#fff;}
.q-meta .tag.level-B{background:var(--B); color:#fff;}
.q-meta .tag.level-C{background:var(--C); color:#fff;}
.q-text{font-size:1.02rem; line-height:1.6; margin:6px 0 16px; white-space:pre-wrap;}
.choices{display:flex; flex-direction:column; gap:8px;}
.choice-btn{
  display:flex; gap:10px; align-items:flex-start; text-align:left; width:100%;
  padding:10px 12px; border-radius:10px; border:1px solid var(--border); background:var(--bg);
  color:var(--text); font-size:.92rem; line-height:1.5;
}
.choice-btn .lab{flex:0 0 auto; font-weight:700; color:var(--accent);}
.choice-btn.selected{border-color:var(--accent); background:var(--dept-bg);}
.choice-btn.correct{border-color:var(--correct); background:rgba(46,139,87,.12); color:var(--text);}
.choice-btn.wrong{border-color:var(--wrong); background:rgba(192,57,43,.12); color:var(--text);}
.choice-btn:disabled{cursor:default;}
.actions{display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;}
.result-box{margin-top:16px; padding:14px; border-radius:10px; background:var(--card-back); display:none;}
.result-box.show{display:block;}
.result-box .verdict{font-weight:700; margin-bottom:6px;}
.result-box .verdict.ok{color:var(--correct);}
.result-box .verdict.ng{color:var(--wrong);}
.explanation{font-size:.88rem; line-height:1.6; margin-top:6px; white-space:pre-wrap;}
.sources{font-size:.78rem; color:var(--sub); margin-top:10px; display:flex; flex-direction:column; gap:2px;}
.sources a{color:var(--accent);}
.linked-cards{font-size:.75rem; color:var(--sub); margin-top:8px;}

.empty-state{
  width:100%; max-width:680px; text-align:center; padding:40px 20px; color:var(--sub);
  background:var(--card-bg); border:1px dashed var(--border); border-radius:16px;
}

.exam-setup{width:100%; max-width:680px; background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:22px 24px; display:flex; flex-direction:column; gap:14px;}
.exam-setup label{font-size:.85rem; color:var(--sub);}
.result-summary{width:100%; max-width:680px; background:var(--card-bg); border:1px solid var(--border); border-radius:16px; padding:22px 24px; display:flex; flex-direction:column; gap:12px;}
.result-summary h2{margin:0; color:var(--accent); font-size:1.1rem;}
.score-big{font-size:1.8rem; font-weight:700; color:var(--accent);}
table.breakdown{width:100%; border-collapse:collapse; font-size:.82rem;}
table.breakdown th,table.breakdown td{padding:6px 8px; border-bottom:1px solid var(--border); text-align:left;}
table.breakdown th{color:var(--sub); font-weight:600;}
.wrong-list{display:flex; flex-direction:column; gap:6px; font-size:.82rem;}
.wrong-list .wi{padding:8px; border-radius:8px; background:var(--card-back);}

footer{padding:14px; text-align:center; font-size:.72rem; color:var(--sub);}
</style>
</head>
<body>

<header>
  <h1>肺癌想定問題集</h1>
  <div class="stats" id="statsBar"></div>
  <button id="themeToggle" title="テーマ切替">🌓</button>
</header>

<nav class="tabs">
  <button id="tabBtnPractice" class="active" data-view="practice">演習</button>
  <button id="tabBtnReview" data-view="review">復習</button>
  <button id="tabBtnExam" data-view="exam">模試</button>
</nav>

<main>

  <!-- 演習ビュー -->
  <section id="view-practice" class="view active">
    <div class="filters" id="practiceFilters"></div>
    <div class="progress-nav" id="practiceNavInfo"></div>
    <div id="practiceArea"></div>
  </section>

  <!-- 復習ビュー -->
  <section id="view-review" class="view">
    <div class="progress-nav" id="reviewNavInfo"></div>
    <div id="reviewArea"></div>
  </section>

  <!-- 模試ビュー -->
  <section id="view-exam" class="view">
    <div id="examArea"></div>
  </section>

</main>

<footer>肺癌診療ガイドライン・e-セミナー・認定医試験カリキュラムに基づく想定問題集(非公式・学習用)</footer>

/* ---------- テーマ (haigan_theme は既存アプリと共有) ---------- */
const root = document.documentElement;
function applyTheme(t){
  if(t) root.setAttribute("data-theme", t); else root.removeAttribute("data-theme");
}
applyTheme(localStorage.getItem("haigan_theme"));
document.getElementById("themeToggle").addEventListener("click", ()=>{
  const cur = root.getAttribute("data-theme");
  const sysDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  let next;
  if(!cur){ next = sysDark ? "light" : "dark"; }
  else if(cur === "dark"){ next = "light"; }
  else { next = "dark"; }
  applyTheme(next);
  localStorage.setItem("haigan_theme", next);
});

/* ---------- 進捗 localStorage (haigan_quiz_progress) ---------- */
const QUIZ_PROGRESS_KEY = "haigan_quiz_progress";
function loadQuizProgress(){
  try{
    const p = JSON.parse(localStorage.getItem(QUIZ_PROGRESS_KEY));
    if(p && typeof p === "object"){
      if(!p.answered) p.answered = {};
      if(!Array.isArray(p.wrongIds)) p.wrongIds = [];
      return p;
    }
  }catch(e){}
  return { answered:{}, wrongIds:[] };
}
function saveQuizProgress(p){
  localStorage.setItem(QUIZ_PROGRESS_KEY, JSON.stringify(p));
}
let quizProgress = loadQuizProgress();

function recordAnswer(id, chosenIndex, correct){
  quizProgress.answered[id] = { chosen: chosenIndex, correct: correct, ts: Date.now() };
  const idx = quizProgress.wrongIds.indexOf(id);
  if(correct){
    if(idx !== -1) quizProgress.wrongIds.splice(idx, 1);
  }else{
    if(idx === -1) quizProgress.wrongIds.push(id);
  }
  saveQuizProgress(quizProgress);
  renderStats();
}

/* ---------- 共通ヘルパー ---------- */
const LABELS = ["A","B","C","D","E"];

function renderStats(){
  const bar = document.getElementById("statsBar");
  const answeredCount = Object.keys(quizProgress.answered).length;
  const correctCount = Object.values(quizProgress.answered).filter(a=>a.correct).length;
  const wrongCount = quizProgress.wrongIds.length;
  bar.innerHTML =
    '<span class="stat-pill">全'+QUESTIONS.length+'問</span>'+
    '<span class="stat-pill">解答済 '+answeredCount+'</span>'+
    '<span class="stat-pill correct">正答 '+correctCount+'</span>'+
    '<span class="stat-pill wrong">要復習 '+wrongCount+'</span>';
}

function renderChoiceButtons(q, container, onSelect, disabled){
  container.innerHTML = "";
  q.choices.forEach((c, i)=>{
    const b = document.createElement("button");
    b.className = "choice-btn";
    b.type = "button";
    b.disabled = !!disabled;
    b.innerHTML = '<span class="lab">'+LABELS[i]+'</span><span>'+escapeHtml(c)+'</span>';
    b.addEventListener("click", ()=> onSelect(i, b));
    container.appendChild(b);
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[m]));
}

function renderSources(q){
  if(!q.sources || !q.sources.length) return "";
  let html = '<div class="sources">';
  q.sources.forEach(s=>{
    if(s.url){
      html += '<div><a href="'+escapeHtml(s.url)+'" target="_blank" rel="noopener">'+escapeHtml(s.label)+'</a></div>';
    }else{
      html += '<div>'+escapeHtml(s.label)+'</div>';
    }
  });
  html += '</div>';
  return html;
}

function renderLinkedCards(q){
  if(!q.linkedCardIds || !q.linkedCardIds.length) return "";
  return '<div class="linked-cards">関連カード: '+q.linkedCardIds.map(escapeHtml).join(", ")+'</div>';
}

function questionMetaHtml(q){
  let html = '<div class="q-meta">';
  html += '<span class="tag level-'+escapeHtml(q.level||"")+'">Lv.'+escapeHtml(q.level||"?")+'</span>';
  if(q.part) html += '<span class="tag">'+escapeHtml(q.part)+'</span>';
  if(q.seminar) html += '<span class="tag">'+escapeHtml(q.seminar)+'</span>';
  else if(q.glItem) html += '<span class="tag">'+escapeHtml(q.glItem)+'</span>';
  html += '</div>';
  return html;
}

function switchView(view){
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  document.getElementById("view-"+view).classList.add("active");
  tabButtons.forEach(b=> b.classList.toggle("active", b.dataset.view === view));
  if(view === "practice") renderPracticeFilters();
  if(view === "review") renderReview();
  if(view === "exam") renderExamSetup();
}

/* ================= 演習ビュー ================= */
const practiceState = { seminars:new Set(), levels:new Set(), parts:new Set(), list:[], idx:0 };

function groupKey(q){
  return (q.seminar && q.seminar.trim()) ? q.seminar : (q.glItem || "分類なし");
}

function renderPracticeFilters(){
  const el = document.getElementById("practiceFilters");
  if(QUESTIONS.length === 0){
    el.innerHTML = "";
    renderPracticeArea();
    return;
  }
  const groups = [...new Set(QUESTIONS.map(groupKey))].sort();
  const parts = [...new Set(QUESTIONS.map(q=>q.part).filter(Boolean))].sort();
  const levels = ["A","B","C"];

  el.innerHTML =
    '<div class="filter-group"><span>分野</span><div class="opts" id="groupChips"></div></div>'+
    '<div class="filter-group"><span>レベル</span><div class="opts" id="levelChips"></div></div>'+
    '<div class="filter-group"><span>Part</span><div class="opts" id="partChips"></div></div>'+
    '<div class="filter-group"><span> </span><button class="primary" id="applyFilterBtn">この条件で出題</button></div>';

  const groupChips = document.getElementById("groupChips");
  groups.forEach(g=>{
    const c = document.createElement("span");
    c.className = "chip" + (practiceState.seminars.has(g) ? " active" : "");
    c.textContent = g;
    c.addEventListener("click", ()=>{
      if(practiceState.seminars.has(g)) practiceState.seminars.delete(g); else practiceState.seminars.add(g);
      c.classList.toggle("active");
    });
    groupChips.appendChild(c);
  });
  const levelChips = document.getElementById("levelChips");
  levels.forEach(l=>{
    const c = document.createElement("span");
    c.className = "chip level-"+l + (practiceState.levels.has(l) ? " active" : "");
    c.textContent = l;
    c.addEventListener("click", ()=>{
      if(practiceState.levels.has(l)) practiceState.levels.delete(l); else practiceState.levels.add(l);
      c.classList.toggle("active");
    });
    levelChips.appendChild(c);
  });
  const partChips = document.getElementById("partChips");
  parts.forEach(p=>{
    const c = document.createElement("span");
    c.className = "chip" + (practiceState.parts.has(p) ? " active" : "");
    c.textContent = p;
    c.addEventListener("click", ()=>{
      if(practiceState.parts.has(p)) practiceState.parts.delete(p); else practiceState.parts.add(p);
      c.classList.toggle("active");
    });
    partChips.appendChild(c);
  });

  document.getElementById("applyFilterBtn").addEventListener("click", applyPracticeFilter);

  if(practiceState.list.length === 0) applyPracticeFilter();
  else renderPracticeArea();
}

function applyPracticeFilter(){
  let list = QUESTIONS.slice();
  if(practiceState.seminars.size) list = list.filter(q=> practiceState.seminars.has(groupKey(q)));
  if(practiceState.levels.size) list = list.filter(q=> practiceState.levels.has(q.level));
  if(practiceState.parts.size) list = list.filter(q=> practiceState.parts.has(q.part));
  practiceState.list = list;
  practiceState.idx = 0;
  renderPracticeArea();
}

function renderPracticeArea(){
  const area = document.getElementById("practiceArea");
  const navInfo = document.getElementById("practiceNavInfo");
  if(QUESTIONS.length === 0){
    area.innerHTML = '<div class="empty-state">問題データが未登録です。近日中に追加されます。</div>';
    navInfo.textContent = "";
    return;
  }
  const list = practiceState.list;
  if(list.length === 0){
    area.innerHTML = '<div class="empty-state">条件に一致する問題がありません。フィルタを見直してください。</div>';
    navInfo.textContent = "";
    return;
  }
  const idx = practiceState.idx;
  const q = list[idx];
  navInfo.textContent = (idx+1)+" / "+list.length+"問";

  const prevAnswer = quizProgress.answered[q.id];

  area.innerHTML =
    '<div class="q-card">' +
      questionMetaHtml(q) +
      '<div class="q-text">'+escapeHtml(q.question)+'</div>' +
      '<div class="choices" id="pChoices"></div>' +
      '<div class="actions">' +
        '<button id="pPrev">← 前へ</button>' +
        '<button id="pAnswer" class="primary">解答する</button>' +
        '<button id="pNext">次へ →</button>' +
      '</div>' +
      '<div class="result-box" id="pResult"></div>' +
    '</div>';

  const choicesEl = document.getElementById("pChoices");
  let selected = -1;
  let answered = false;
  const answerBtn = document.getElementById("pAnswer");

  renderChoiceButtons(q, choicesEl, (i, btn)=>{
    if(answered) return;
    [...choicesEl.children].forEach(c=>c.classList.remove("selected"));
    btn.classList.add("selected");
    selected = i;
  }, false);

  function showResult(chosen){
    answered = true;
    const correct = chosen === q.answerIndex;
    [...choicesEl.children].forEach((c,i)=>{
      c.disabled = true;
      if(i === q.answerIndex) c.classList.add("correct");
      if(i === chosen && !correct) c.classList.add("wrong");
    });
    const box = document.getElementById("pResult");
    box.classList.add("show");
    box.innerHTML =
      '<div class="verdict '+(correct?"ok":"ng")+'">'+(correct?"正解":"不正解")+"（正解: "+LABELS[q.answerIndex]+"）"+'</div>' +
      '<div class="explanation">'+escapeHtml(q.explanation||"")+'</div>' +
      renderSources(q) + renderLinkedCards(q);
    recordAnswer(q.id, chosen, correct);
  }

  document.getElementById("pAnswer").addEventListener("click", ()=>{
    if(answered) return;
    if(selected === -1){ alert("選択肢を選んでください"); return; }
    showResult(selected);
  });
  document.getElementById("pPrev").addEventListener("click", ()=>{
    if(practiceState.idx > 0){ practiceState.idx--; renderPracticeArea(); }
  });
  document.getElementById("pNext").addEventListener("click", ()=>{
    if(practiceState.idx < list.length-1){ practiceState.idx++; renderPracticeArea(); }
  });

  // 既に解答済みなら即座に結果表示
  if(prevAnswer){
    showResult(prevAnswer.chosen);
    [...choicesEl.children].forEach((c,i)=>{ if(i===prevAnswer.chosen) c.classList.add("selected"); });
  }
}

/* ================= 復習ビュー ================= */
const reviewState = { idx:0 };

function renderReview(){
  const area = document.getElementById("reviewArea");
  const navInfo = document.getElementById("reviewNavInfo");
  const wrongList = quizProgress.wrongIds
    .map(id=> QUESTIONS.find(q=>q.id===id))
    .filter(Boolean);

  if(wrongList.length === 0){
    area.innerHTML = '<div class="empty-state">復習する問題はありません。演習でがんばりましょう。</div>';
    navInfo.textContent = "";
    return;
  }
  if(reviewState.idx >= wrongList.length) reviewState.idx = 0;
  const idx = reviewState.idx;
  const q = wrongList[idx];
  navInfo.textContent = (idx+1)+" / "+wrongList.length+"問（誤答のみ）";

  area.innerHTML =
    '<div class="q-card">' +
      questionMetaHtml(q) +
      '<div class="q-text">'+escapeHtml(q.question)+'</div>' +
      '<div class="choices" id="rChoices"></div>' +
      '<div class="actions">' +
        '<button id="rPrev">← 前へ</button>' +
        '<button id="rAnswer" class="primary">解答する</button>' +
        '<button id="rNext">次へ →</button>' +
      '</div>' +
      '<div class="result-box" id="rResult"></div>' +
    '</div>';

  const choicesEl = document.getElementById("rChoices");
  let selected = -1;
  let answered = false;

  renderChoiceButtons(q, choicesEl, (i, btn)=>{
    if(answered) return;
    [...choicesEl.children].forEach(c=>c.classList.remove("selected"));
    btn.classList.add("selected");
    selected = i;
  }, false);

  document.getElementById("rAnswer").addEventListener("click", ()=>{
    if(answered) return;
    if(selected === -1){ alert("選択肢を選んでください"); return; }
    answered = true;
    const correct = selected === q.answerIndex;
    [...choicesEl.children].forEach((c,i)=>{
      c.disabled = true;
      if(i === q.answerIndex) c.classList.add("correct");
      if(i === selected && !correct) c.classList.add("wrong");
    });
    const box = document.getElementById("rResult");
    box.classList.add("show");
    box.innerHTML =
      '<div class="verdict '+(correct?"ok":"ng")+'">'+(correct?"正解（復習リストから除外されます）":"不正解")+"（正解: "+LABELS[q.answerIndex]+"）"+'</div>' +
      '<div class="explanation">'+escapeHtml(q.explanation||"")+'</div>' +
      renderSources(q) + renderLinkedCards(q);
    recordAnswer(q.id, selected, correct);
  });
  document.getElementById("rPrev").addEventListener("click", ()=>{
    if(reviewState.idx > 0){ reviewState.idx--; renderReview(); }
  });
  document.getElementById("rNext").addEventListener("click", ()=>{
    reviewState.idx++;
    renderReview();
  });
}

/* ================= 模試ビュー ================= */
const examState = { list:[], idx:0, chosen:{}, started:false, finished:false };

function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1; i>0; i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function renderExamSetup(){
  if(QUESTIONS.length === 0){
    document.getElementById("examArea").innerHTML = '<div class="empty-state">問題データが未登録です。近日中に追加されます。</div>';
    return;
  }
  if(examState.started && !examState.finished){ renderExamQuestion(); return; }
  if(examState.finished){ renderExamResult(); return; }

  const area = document.getElementById("examArea");
  const max = QUESTIONS.length;
  area.innerHTML =
    '<div class="exam-setup">' +
      '<h2 style="margin:0;color:var(--accent);">模試モード</h2>' +
      '<label>出題数を選択してください（全'+max+'問）</label>' +
      '<div class="opts" id="examCountOpts"></div>' +
      '<button class="primary" id="examStartBtn">開始</button>' +
    '</div>';

  const counts = [20, 50, max].filter((v,i,arr)=> v>0 && v<=max && arr.indexOf(v)===i);
  let selectedCount = counts[0];
  const opts = document.getElementById("examCountOpts");
  counts.forEach(c=>{
    const chip = document.createElement("span");
    chip.className = "chip" + (c===selectedCount ? " active" : "");
    chip.textContent = (c===max ? "全"+max+"問" : c+"問");
    chip.addEventListener("click", ()=>{
      selectedCount = c;
      [...opts.children].forEach(o=>o.classList.remove("active"));
      chip.classList.add("active");
    });
    opts.appendChild(chip);
  });
  document.getElementById("examStartBtn").addEventListener("click", ()=>{
    examState.list = shuffle(QUESTIONS).slice(0, selectedCount);
    examState.idx = 0;
    examState.chosen = {};
    examState.started = true;
    examState.finished = false;
    renderExamQuestion();
  });
}

function renderExamQuestion(){
  const area = document.getElementById("examArea");
  const list = examState.list;
  const idx = examState.idx;
  const q = list[idx];

  area.innerHTML =
    '<div class="progress-nav">'+(idx+1)+' / '+list.length+'問（模試中断可）　<button id="examAbortBtn">中断してリセット</button></div>' +
    '<div class="q-card">' +
      questionMetaHtml(q) +
      '<div class="q-text">'+escapeHtml(q.question)+'</div>' +
      '<div class="choices" id="eChoices"></div>' +
      '<div class="actions">' +
        '<button id="ePrev">← 前へ</button>' +
        '<button id="eNext" class="primary">'+(idx===list.length-1 ? "採点する" : "次へ →")+'</button>' +
      '</div>' +
    '</div>';

  const choicesEl = document.getElementById("eChoices");
  const already = examState.chosen[q.id];
  renderChoiceButtons(q, choicesEl, (i, btn)=>{
    [...choicesEl.children].forEach(c=>c.classList.remove("selected"));
    btn.classList.add("selected");
    examState.chosen[q.id] = i;
  }, false);
  if(already !== undefined){
    [...choicesEl.children].forEach((c,i)=>{ if(i===already) c.classList.add("selected"); });
  }

  document.getElementById("ePrev").addEventListener("click", ()=>{
    if(examState.idx > 0){ examState.idx--; renderExamQuestion(); }
  });
  document.getElementById("eNext").addEventListener("click", ()=>{
    if(idx === list.length-1){
      examState.finished = true;
      renderExamResult();
    }else{
      examState.idx++;
      renderExamQuestion();
    }
  });
  document.getElementById("examAbortBtn").addEventListener("click", ()=>{
    if(confirm("模試を中断してリセットしますか？")){
      examState.started = false; examState.finished = false;
      examState.list = []; examState.chosen = {}; examState.idx = 0;
      renderExamSetup();
    }
  });
}

function renderExamResult(){
  const area = document.getElementById("examArea");
  const list = examState.list;
  const chosen = examState.chosen;
  let correctCount = 0;
  const wrongItems = [];
  const byPart = {};
  const bySeminar = {};

  list.forEach(q=>{
    const c = chosen[q.id];
    const ok = c === q.answerIndex;
    if(ok) correctCount++;
    else wrongItems.push(q);

    const partKey = q.part || "不明";
    if(!byPart[partKey]) byPart[partKey] = {total:0, correct:0};
    byPart[partKey].total++;
    if(ok) byPart[partKey].correct++;

    const semKey = groupKey(q);
    if(!bySeminar[semKey]) bySeminar[semKey] = {total:0, correct:0};
    bySeminar[semKey].total++;
    if(ok) bySeminar[semKey].correct++;
  });

  const rate = list.length ? Math.round((correctCount/list.length)*1000)/10 : 0;

  function breakdownRows(obj){
    return Object.entries(obj)
      .map(([k,v])=>({ key:k, total:v.total, correct:v.correct, rate: v.total ? v.correct/v.total : 0 }))
      .sort((a,b)=> a.rate - b.rate)
      .map(r=> '<tr><td>'+escapeHtml(r.key)+'</td><td>'+r.correct+' / '+r.total+'</td><td>'+Math.round(r.rate*1000)/10+'%</td></tr>')
      .join("");
  }

  area.innerHTML =
    '<div class="result-summary">' +
      '<h2>模試結果</h2>' +
      '<div class="score-big">'+correctCount+' / '+list.length+'（'+rate+'%）</div>' +
      '<h3 style="margin:6px 0 0;color:var(--sub);font-size:.9rem;">Part別正答率</h3>' +
      '<table class="breakdown"><thead><tr><th>Part</th><th>正答数</th><th>正答率</th></tr></thead><tbody>'+breakdownRows(byPart)+'</tbody></table>' +
      '<h3 style="margin:6px 0 0;color:var(--sub);font-size:.9rem;">分野別正答率（弱点＝正答率が低い順）</h3>' +
      '<table class="breakdown"><thead><tr><th>分野</th><th>正答数</th><th>正答率</th></tr></thead><tbody>'+breakdownRows(bySeminar)+'</tbody></table>' +
      '<h3 style="margin:6px 0 0;color:var(--sub);font-size:.9rem;">誤答一覧（'+wrongItems.length+'問）</h3>' +
      '<div class="wrong-list" id="wrongListArea"></div>' +
      '<div class="actions">' +
        '<button class="primary" id="addWrongBtn">誤答を復習リストへ追加</button>' +
        '<button id="restartExamBtn">リスタート</button>' +
      '</div>' +
    '</div>';

  const wrongArea = document.getElementById("wrongListArea");
  if(wrongItems.length === 0){
    wrongArea.innerHTML = '<div>誤答はありません。素晴らしい成績です。</div>';
  }else{
    wrongItems.forEach(q=>{
      const c = chosen[q.id];
      const div = document.createElement("div");
      div.className = "wi";
      div.innerHTML =
        '<div><strong>'+escapeHtml(q.question)+'</strong></div>' +
        '<div>あなたの解答: '+(c!==undefined?LABELS[c]:"未回答")+' / 正解: '+LABELS[q.answerIndex]+'</div>' +
        '<div class="explanation">'+escapeHtml(q.explanation||"")+'</div>';
      wrongArea.appendChild(div);
    });
  }

  document.getElementById("addWrongBtn").addEventListener("click", ()=>{
    wrongItems.forEach(q=>{
      if(quizProgress.wrongIds.indexOf(q.id) === -1) quizProgress.wrongIds.push(q.id);
      const c = chosen[q.id];
      quizProgress.answered[q.id] = { chosen: c===undefined?-1:c, correct:false, ts: Date.now() };
    });
    // 正答した問題は正答記録として残す(誤答リストには入れない)
    list.forEach(q=>{
      const c = chosen[q.id];
      if(c === q.answerIndex){
        quizProgress.answered[q.id] = { chosen:c, correct:true, ts: Date.now() };
        const wi = quizProgress.wrongIds.indexOf(q.id);
        if(wi !== -1) quizProgress.wrongIds.splice(wi,1);
      }
    });
    saveQuizProgress(quizProgress);
    renderStats();
    alert("誤答を復習リストへ追加しました。");
  });
  document.getElementById("restartExamBtn").addEventListener("click", ()=>{
    examState.started = false; examState.finished = false;
    examState.list = []; examState.chosen = {}; examState.idx = 0;
    renderExamSetup();
  });
}

/* ---------- 初期化 ---------- */
renderStats();
switchView("practice");
</script>
