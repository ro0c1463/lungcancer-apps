<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>肺癌学会認定医 学習アプリ</title>
<style>
:root{
  --bg:#f4f7f8; --card-bg:#ffffff; --text:#1c2b30; --sub:#5a6b70;
  --accent:#0f6b7a; --border:#d7e0e2; --shadow:rgba(15,60,70,.12);
}
:root[data-theme="dark"]{
  --bg:#141c1e; --card-bg:#1d2a2d; --text:#e6eef0; --sub:#a3b4b8;
  --accent:#4fb3c2; --border:#2e4145; --shadow:rgba(0,0,0,.4);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#141c1e; --card-bg:#1d2a2d; --text:#e6eef0; --sub:#a3b4b8;
    --accent:#4fb3c2; --border:#2e4145; --shadow:rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:32px 16px 48px;
}
h1{
  font-size:1.4rem;
  text-align:center;
  margin:8px 0 4px;
}
p.lead{
  color:var(--sub);
  text-align:center;
  margin:0 0 28px;
  font-size:.95rem;
}
.links{
  width:100%;
  max-width:480px;
  display:flex;
  flex-direction:column;
  gap:16px;
}
.card{
  display:flex;
  align-items:center;
  min-height:56px;
  padding:20px 22px;
  border-radius:14px;
  background:var(--card-bg);
  border:1px solid var(--border);
  box-shadow:0 2px 10px var(--shadow);
  color:var(--text);
  text-decoration:none;
  font-size:1.05rem;
  font-weight:600;
  transition:transform .15s ease, box-shadow .15s ease;
}
.card:active{
  transform:scale(.98);
}
.card .arrow{
  margin-left:auto;
  color:var(--accent);
  font-size:1.3rem;
}
footer{
  margin-top:36px;
  color:var(--sub);
  font-size:.8rem;
  text-align:center;
}
</style>
</head>
<body>
<h1>肺癌学会認定医 学習アプリ</h1>
<p class="lead">学習したいアプリを選択してください</p>
<!-- Note: link hrefs below use the deployed (GitHub Pages) filenames (curriculum.html, flashcards-2025.html, flashcards-2024.html). When index.html is opened directly from the repo root (file://), these links will not resolve locally — that is expected; they only work on the deployed GitHub Pages site. -->
<div class="links">
  <a class="card" href="curriculum.html">
    カリキュラム学習アプリ
    <span class="arrow">›</span>
  </a>
  <a class="card" href="lectures.html">eセミナー講義ノート<span class="arrow">›</span></a>
  <a class="card" href="flashcards-2025.html">
    ガイドライン2025 フラッシュカード
    <span class="arrow">›</span>
  </a>
  <a class="card" href="flashcards-2024.html">
    ガイドライン2024 フラッシュカード
    <span class="arrow">›</span>
  </a>
  <a class="card" href="quiz.html">
    想定問題集(演習)
    <span class="arrow">›</span>
  </a>
</div>
<footer>肺癌学会認定医試験 学習支援ツール</footer>
</body>
</html>
