療終了まで30日以内で5年OS率有意改善」。食道炎・肺臓炎・骨髄抑制増加注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq5"}, {"id": "sclc-ld-cq6", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ6", "question": "限局型小細胞肺癌（PS 0-2）に対する放射線照射法は，通常分割照射法と加速過分割照射法のどちらが勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）に対する放射線照射法は，加速過分割照射法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "強く推奨100％（35/35）", "keyPoints": "加速過分割45 Gy/30回/3週が従来標準。CONVERT試験で通常分割66 Gy/33回/6.5週と比較、OS有意差なし（30vs 25ヶ月）。CALGB30610/RTOG0538試験で70 Gy/35回/7週と比較、有意差なし（28.5vs 30.1ヶ月）。毒性も同等。加速過分割法困難時は通常分割50～70 Gy/25～35回/5～7週が選択肢。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq6"}, {"id": "sclc-ld-cq7", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ7", "question": "限局型小細胞肺癌（PS 0-2）に対する化学放射線療法に併用する最適な薬物療法は何か？", "recommendation": "a. 限局型小細胞肺癌（PS 0-2）に対する放射線治療と同時併用する際の薬物療法は，シスプラチン＋エトポシド療法を行うよう強く推奨する。（推奨の強さ：1，エビデンスの強さ：C）\nb. シスプラチン＋エトポシド療法の投与が困難な場合，カルボプラチン＋エトポシド療法後に逐次放射線療法を行うよう弱く推奨する。（推奨の強さ：2，エビデンスの強さ：D）", "strength": null, "evidence": null, "consensus": "a: 強く推奨100％（35/35） / b: 弱く推奨100％（35/35）", "keyPoints": "レジメン比較の臨床試験なし。CDDP+ETP療法が複数試験で多用。JCOG0202試験でPE療法（1サイクル）+過分割照射後PI療法（3サイクル）vs PE療法継続（3サイクル）で「PI群のOS延長効果なし」。高齢者・PS不良例では毒性考慮し薬物療法+逐次放射線。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq7"}, {"id": "sclc-ld-newcq", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "新CQ", "question": "限局型小細胞肺癌に対する同時化学放射線療法後（PS 0-1）に，免疫チェックポイント阻害薬による地固め療法を行うよう勧められるか？", "recommendation": "同時化学放射線療法後に，デュルバルマブによる地固め療法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "強く推奨84％（38/45）、弱く推奨16％（7/45）", "keyPoints": "ADRIATIC試験で「デュルバルマブ vs プラセボ」のPFS（HR 0.76、16.6vs 9.2ヶ月）およびOS（HR 0.73、55.9vs 33.4ヶ月）ともに有意延長。Grade 3/4有害事象ほぼ同等（24.4% vs 24.2%）。免疫関連有害事象5.3% vs 1.5%。放射線肺臓炎Grade 3/4は3.1% vs 2.6%、Grade 5が0.4%（デュルバルマブ群）。PCI有無で層別化、PFSとOSのHRはPCI実施の有無にかかわらず同等。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#newcq"}, {"id": "sclc-ld-cq8", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ8", "question": "PS 3-4の限局型小細胞肺癌に対して，薬物療法は勧められるか？", "recommendation": "a. PS 3の限局型小細胞肺癌に対して，薬物療法を行うよう弱く推奨する。（推奨の強さ：2，エビデンスの強さ：C）\nb. PS 4の限局型小細胞肺癌に対して，薬物療法を行うよう勧めるだけの根拠が明確ではない。（推奨に至る根拠が明確ではない）", "strength": null, "evidence": null, "consensus": "a: 弱く推奨100％（35/35） / b: 明確でない80％（28/35）、弱く推奨17％（6/35）、強く推奨しない3％（1/35）", "keyPoints": "PS 3のLDに対する化学放射線療法データなし。小細胞肺癌によるPS悪化で治療効果によるPS改善可能なら薬物療法対象。薬物療法後PS改善時は放射線治療追加でOS延長可能性。PS 4は有効性・安全性データ極めて少ない。小細胞肺癌治療有効性は高いが毒性考慮必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq8"}, {"id": "sclc-ed-cq9", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "sectionCode": "1/3/020100", "cqNo": "CQ9", "question": "全身状態良好（PS 0-1）な進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "プラチナ製剤/エトポシド併用療法＋PD-L1阻害薬の併用治療を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "行うことを強く推奨100％（26/26）", "keyPoints": "IMpower133試験とCASPIAN試験の結果に基づき、アテゾリズマブまたはデュルバルマブとの併用でOS延長が確認された。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103020100.html#cq9"}, {"id": "sclc-ed-cq10", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "sectionCode": "1/3/020100", "cqNo": "CQ10", "question": "PS 2の進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "プラチナ製剤＋エトポシドまたはイリノテカン併用療法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "行うことを強く推奨92％（24/26）、弱く推奨8％（2/26）", "keyPoints": "複数の第Ⅲ相試験でPS 2患者も組み入れられ、有効性と安全性が示されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103020100.html#cq10"}, {"id": "sclc-ed-cq11", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "sectionCode": "1/3/020100", "cqNo": "CQ11", "question": "PS 3の進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "カルボプラチン＋エトポシド療法あるいはsplit PE療法を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "弱く推奨91％（21/23）、根拠が明確でない9％（2/23）", "keyPoints": "JCOG9702試験でPS 3患者の治療効果が示されているが、登録数が限定的である。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103020100.html#cq11"}, {"id": "sclc-ed-cq12", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "sectionCode": "1/3/020100", "cqNo": "CQ12", "question": "PS 4の進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "薬物療法は行わないよう弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "行わないことを弱く推奨70％（16/23）、根拠が明確でない26％（6/23）、強く推奨しない4％（1/23）", "keyPoints": "PS 4に特化したエビデンスが欠落しており、毒性リスクが懸念される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103020100.html#cq12"}, {"id": "sclc-ed-bq1", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "sectionCode": "1/3/020100", "cqNo": "BQ1", "question": "70歳以下の進展型小細胞肺癌に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "プラチナ製剤併用療法は有効性のエビデンスが確立している。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "JCOG9511試験でPI療法がPE療法より優越性を示す等、複数試験でプラチナ製剤併用の有効性が確認されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103020100.html#bq1"}, {"id": "sclc-ed-bq2", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "sectionCode": "1/3/020100", "cqNo": "BQ2", "question": "71歳以上の進展型小細胞肺癌に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "プラチナ製剤併用療法は有効性のエビデンスが確立している。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "JCOG9702試験とJCOG1201/TORG1528試験で高齢者を対象にプラチナ製剤併用の有効性が立証されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103020100.html#bq2"}, {"id": "sclc-pci-cq13", "part": "第1部 肺癌", "section": "小細胞肺癌 / 予防的全脳照射", "sectionCode": "1/3/030100", "cqNo": "CQ13", "question": "限局型小細胞肺癌の初回治療で完全寛解が得られた症例に対して，予防的全脳照射は勧められるか？", "recommendation": "予防的全脳照射を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "行うことを強く推奨83％（29/35）、行うことを弱く推奨17％（6/35）、根拠が明確ではない0％、行わないことを弱く推奨0％、行わないことを強く推奨0％", "keyPoints": "メタアナリシスでは「3年脳転移再発率を58.6％から33.3％へと有意に低下させ、3年生存率を15.3％から20.7％へと有意に向上させる」ことが報告されている。限局型例ではPCI標準治療として強く推奨される。毒性評価試験ではPCIによる精神症状や脳萎縮の有意な増強は認められていない。海馬回避全脳照射の有効性検討は結果が相反しており、さらなる検証が必要とされている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103030100.html#cq13"}, {"id": "sclc-pci-cq14", "part": "第1部 肺癌", "section": "小細胞肺癌 / 予防的全脳照射", "sectionCode": "1/3/030100", "cqNo": "CQ14", "question": "予防的全脳照射の勧められる線量は何か？", "recommendation": "25 Gy/10回相当を行うよう弱く推奨する。", "strength": 2, "evidence": "B", "consensus": "行うことを強く推奨15％（5/34）、行うことを弱く推奨82％（28/34）、根拠が明確ではない3％（1/34）、行わないことを弱く推奨0％、行わないことを強く推奨0％", "keyPoints": "第Ⅲ相試験で、25 Gy/10回と36 Gy/18回の比較において、2年脳転移発生率に有意差なく、2年OS率は高線量群で劣るとの結果が報告された。認知機能障害が高線量群に多いとの報告もある。1回線量は2.5 Gyを超えないことが望ましい。「化学放射線療法終了後6カ月以上経ってからのPCIは有意に脳転移を抑制しない」ため、早期施行が推奨される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103030100.html#cq14"}, {"id": "sclc-pci-cq15", "part": "第1部 肺癌", "section": "小細胞肺癌 / 予防的全脳照射", "sectionCode": "1/3/030100", "cqNo": "CQ15", "question": "進展型小細胞肺癌における薬物療法後の予防的全脳照射は勧められるか？", "recommendation": "予防的全脳照射を行わないよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "行うことを強く推奨0％、行うことを弱く推奨0％、根拠が明確ではない3％（1/35）、行わないことを弱く推奨9％（3/35）、行わないことを強く推奨89％（31/35）", "keyPoints": "進展型での第Ⅲ相試験ではOS延長を報告したが、試験デザインの問題が指摘されている。本邦の試験では、脳転移出現頻度は「PCI施行により有意に減少」したものの、OSはPCI施行群で劣る傾向を示し早期無効中止となった。定期的脳MRI検査実施が試験前提であることに留意すべきである。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103030100.html#cq15"}, {"id": "sclc-rec-cq16", "part": "第1部 肺癌", "section": "小細胞肺癌 / 再発", "sectionCode": "1/3/040100", "cqNo": "CQ16", "question": "PS 0-2の再発小細胞肺癌（sensitive relapse）に対して薬物療法は勧められるか？", "recommendation": "ノギテカン単剤療法、シスプラチン＋エトポシド＋イリノテカン（PEI）療法、アムルビシン単剤療法、カルボプラチン＋エトポシド療法を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "行うことを強く推奨100%（25/25）", "keyPoints": "ノギテカン単剤療法が標準治療と位置付けられている。PEI療法はノギテカンより優れたOSを示すが、発熱性好中球減少症の頻度が高い。アムルビシンはノギテカンと同等のOS。カルボプラチン＋エトポシド療法は同等のOS。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103040100.html#cq16"}, {"id": "sclc-rec-cq17", "part": "第1部 肺癌", "section": "小細胞肺癌 / 再発", "sectionCode": "1/3/040100", "cqNo": "CQ17", "question": "PS 0-2の再発小細胞肺癌（refractory relapse）に対して薬物療法は勧められるか？", "recommendation": "アムルビシン単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "行うことを強く推奨96%（24/25）、行うことを弱く推奨4%（1/25）", "keyPoints": "「refractory relapseに対する薬物療法の意義は確立されていない」。アムルビシンのORR 38%、1年OS率34%がBSC群の6ヶ月OS率26%より優れている。JCOG0901試験でORR 32.9%、OS中央値8.9ヶ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103040100.html#cq17"}, {"id": "sclc-rec-cq18", "part": "第1部 肺癌", "section": "小細胞肺癌 / 再発", "sectionCode": "1/3/040100", "cqNo": "CQ18", "question": "全身状態良好（PS 0-1）な再発小細胞肺癌に対してタルラタマブ療法は勧められるか？", "recommendation": "三次治療以降にタルラタマブ療法を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "行うことを強く推奨31%（8/26）、行うことを弱く推奨65%（17/26）、根拠が明確ではない4%（1/26）", "keyPoints": "Dellphi-301試験で「ORR 40%、PFS中央値4.9ヶ月、OS中央値14.3ヶ月」。CRSが51%、ICANSが8%で発生。「厳密な副作用モニタリングと管理が出来る医療環境のもとで治療を行うことが望ましい」。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103040100.html#cq18"}, {"id": "meta-bone-cq1", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "sectionCode": "1/4/010100", "cqNo": "CQ1", "question": "症状を有する骨転移に対して，放射線治療が勧められるか？", "recommendation": "放射線治療を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "強く推奨100％（35/35）", "keyPoints": "肺癌の骨転移は30～50％に生じる。メタアナリシスで放射線治療による痛みの改善は50～80％と高率で、有害事象も少ない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104010100.html#cq1"}, {"id": "meta-bone-cq2", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "sectionCode": "1/4/010100", "cqNo": "CQ2", "question": "症状を有する骨転移に対する適切な照射法は何か？", "recommendation": "a. 通常照射（20 Gy/5回，30 Gy/10回など）を行うよう強く推奨する。（推奨の強さ：1，エビデンスの強さ：A）\nb. 通常照射（8 Gy単回）を行うよう弱く推奨する。（推奨の強さ：2，エビデンスの強さ：A）\nc. 脊椎転移に対して，体幹部定位放射線治療を行うよう弱く推奨する。（推奨の強さ：2，エビデンスの強さ：C）", "strength": null, "evidence": null, "consensus": "a: 強く推奨100％（35/35） / b: 弱く推奨97％（34/35） / c: 弱く推奨91％（52/57）", "keyPoints": "a・b：「痛みの改善は単回照射群58％ vs 分割照射群59％と同等」だが、再照射率は単回で有意に高い（20% vs 8%）。分割照射が標準的。c：SBRTは「疼痛消失率は35％ vs 14％」で通常照射より優れているが、メタアナリシスでは疼痛緩和率に有意差なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104010100.html#cq2"}, {"id": "meta-bone-cq3", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "sectionCode": "1/4/010100", "cqNo": "CQ3", "question": "病的骨折の危険性が高い骨転移，または脊椎転移が脊髄圧迫を生じている骨転移に対して，放射線治療が勧められるか？", "recommendation": "放射線治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨100％（35/35）", "keyPoints": "「病変が2.5 cm以上，もしくは荷重骨で皮質の50％以上に破壊」で骨折リスク高。脊髄圧迫では「82％で除痛が得られ、76％で歩行機能が回復または維持」。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104010100.html#cq3"}, {"id": "meta-bone-cq4", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "sectionCode": "1/4/010100", "cqNo": "CQ4", "question": "病的骨折の危険性の高い骨転移，または脊椎転移が脊髄圧迫を生じている骨転移に対して，外科治療が勧められるか？", "recommendation": "外科治療を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "弱く推奨100％（35/35）", "keyPoints": "脊髄圧迫のランダム化比較試験では手術群が「84％ vs 57％」で歩行可能性が高いが、ペアマッチ解析では「69％ vs 68％」と有意差なし。バイアス指摘あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104010100.html#cq4"}, {"id": "meta-bone-cq5", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "sectionCode": "1/4/010100", "cqNo": "CQ5", "question": "骨転移を有する症例に対して，骨関連事象の抑制（発現率を軽減し，発現までの時期を延長させる）に骨修飾薬（ゾレドロン酸またはデノスマブ）は勧められるか？", "recommendation": "骨修飾薬（ゾレドロン酸またはデノスマブ）による治療を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "強く推奨100％（42/42）", "keyPoints": "ゾレドロン酸でSRE発現率は「38.9％ vs 48.0％」と有意に低く、発症時期を「236日 vs 155日」延長。デノスマブとの比較では「非劣性が証明」。重要有害事象は顎骨壊死と低カルシウム血症。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104010100.html#cq5"}, {"id": "meta-brain-cq6", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ6", "question": "遠隔転移が単発の脳転移のみのⅣ期症例に対して，定位放射線照射や外科治療は勧められるか？", "recommendation": "脳以外の病巣がコントロールされており，かつ単発の脳転移に対して，定位放射線照射や外科治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨85%（33/39）、弱く推奨15%（6/39）、その他0%", "keyPoints": "全身コントロール良好な単発性脳転移患者のSRS単独群OS中央値約10ヶ月。肺癌患者は対象の3～6割。非小細胞肺癌対象の観察研究SRSや手術施行例のOS中央値19.7ヶ月（範囲6.8-52ヶ月）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq6"}, {"id": "meta-brain-cq7", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ7", "question": "症状を有する脳転移に対して，放射線治療は勧められるか？", "recommendation": "症状を有する脳転移に対して，放射線治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨100%（11/11）、その他0%", "keyPoints": "肺癌は脳転移頻度高く、症状はQOL低下招く。放射線治療で70～90%患者に症状寛解。全脳照射・SRS共に良好な頭蓋内無増悪期間・OS報告。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq7"}, {"id": "meta-brain-cq8", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ8", "question": "症状を有する脳転移に対して，外科治療は勧められるか？", "recommendation": "症状を有する単発性脳転移に対して，腫瘍摘出術を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "弱く推奨100%（11/11）、その他0%", "keyPoints": "単発性脳転移手術単独群OS中央値約10ヶ月、頭蓋内無増悪期間中央値約6ヶ月。定位照射有効性期待時は優先。治療選択肢として提案可能。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq8"}, {"id": "meta-brain-cq9", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ9", "question": "多発性脳転移に対して，放射線治療は勧められるか？", "recommendation": "非小細胞肺癌：a.「多発性脳転移に対して，全脳照射を行うよう強く推奨する。」b.「4個以下で腫瘍径3 cm程度までであれば定位放射線照射を行うよう強く推奨する。」c.「5～10個の脳転移に対して，定位放射線照射を行うよう弱く推奨する。」\n小細胞肺癌：d.「多発性脳転移に対して，全脳照射を行うよう強く推奨する。」e.「10個までの脳転移に対して，定位放射線照射を行うよう弱く推奨する。」", "strength": null, "evidence": null, "consensus": "非小細胞肺癌 a: 強く推奨84%（32/38）、弱く推奨16%（6/38） / b: 強く推奨97%（37/38）、弱く推奨3%（1/38） / c: 弱く推奨63%（20/32）、明確でない38%（12/32）。小細胞肺癌 d: 強く推奨75%（41/55）、弱く推奨25%（14/55） / e: 弱く推奨75%（41/55）、明確でない13%（7/55）、行わない弱く5%（3/55）、行わない強く0%（推奨の強さ：a,b,d=1／c,e=2。エビデンスの強さ：a,b,c=C／e=D）", "keyPoints": "全脳照射OS中央値3.5～7.5ヶ月、頭蓋内無増悪期間中央値約6ヶ月。4個以下3 cm程度SRS：OS中央値約8～15ヶ月、照射1年後局所コントロール率6～9割。全脳照射後認知機能低下報告ある一方、全脳照射省略で脳内再発認知機能悪化可能性。5～10個：生存率差なし報告、適応患者限定的。定位照射選択時後発転移対策に定期画像診断継続必要。小細胞肺癌STI観察研究：1個11ヶ月、2～4個8.7ヶ月、5～10個8.0ヶ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq9"}, {"id": "meta-brain-cq10", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ10", "question": "手術や定位放射線照射に，全脳照射の追加は勧められるか？", "recommendation": "手術や定位放射線照射に，全脳照射の併用を行わないよう弱く推奨する。", "strength": 2, "evidence": "A", "consensus": "行わない弱く推奨100%（11/11）", "keyPoints": "手術vs手術+全脳照射：OS中央値43週vs48週有意差なし（RR 0.91，P=0.39）、局所再発有意減少（46% vs 10%，P<0.001）。SRS vs SRS+全脳照射メタアナリシス：局所制御率併用群有利（HR 2.61，P<0.0001）だがOS有意差なし（HR 0.98，P=0.88）。認知機能：HVLT-Rで記載学習能力併用群有意低下。健康関連QOL：全脳照射併用群が悪い傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq10"}, {"id": "meta-brain-cq11", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ11", "question": "髄膜癌腫症に対する適切な治療法は何か？", "recommendation": "髄膜癌腫症に対して，薬物療法・放射線治療を行うよう勧めるだけの根拠が明確ではない。", "strength": null, "evidence": null, "consensus": "弱く推奨16%（4/25）、明確でない64%（16/25）、行わない弱く20%（5/25）", "keyPoints": "EGFR T790M変異陽性オシメルチニブ症例：頭蓋内病変ORR 55%、PFS中央値11.0ヶ月。T790M変異陽性髄膜癌腫症小規模研究：PFS中央値7.2ヶ月。限定的小数例。全脳照射有用性をBSC比較前向き試験なし。後向き研究で有用性認められず、症状緩和得られる症例経験あり。固形癌髄膜癌腫症前向き試験：OS中央値6.0ヶ月、PFS中央値2.3ヶ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq11"}, {"id": "meta-brain-cq12", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "sectionCode": "1/4/020100", "cqNo": "CQ12", "question": "無症候性脳転移に対して，薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨100%（42/42）", "keyPoints": "無症候性脳転移において薬物療法が全身治療中心。放射線治療も高い局所制御示す。新規薬物療法登場で予後延長。神経学的予後配慮重要。薬物療法・放射線治療先行判断は脳転移サイズ・個数・部位、医療状況に基づき放射線腫瘍医と検討。TKI未治療脳転移患者各TKI：ORR 53-83%、PFS中央値6.6ヶ月-未到達。細胞傷害性抗癌薬・免疫チェックポイント阻害薬についても複数試験で検討。ほとんどが単群第Ⅱ相試験またはサブグループ解析。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104020100.html#cq12"}, {"id": "meta-thorax-cq13", "part": "第1部 肺癌", "section": "各病態 / 胸部緩和照射", "sectionCode": "1/4/030100", "cqNo": "CQ13", "question": "縦隔・肺門病変による気道狭窄，上大静脈狭窄など胸郭内の腫瘍増大に伴う症状の緩和を目的とした胸部放射線治療は，行うよう勧められるか？", "recommendation": "放射線治療を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "行うことを強く推奨94％（33/35）、行うことを弱く推奨6％（2/35）、根拠が明確ではない0％、行わないことを弱く推奨0％、行わないことを強く推奨0％", "keyPoints": "根治治療困難な場合でも「緩和的胸部放射線治療の役割は大きい」。高線量分割照射は低線量より症状緩和効果が優れるが、食道炎頻度が高い。メタアナリシスでは30Gy/10回以上と低線量照射で生存率に差なし。PROACTIVE試験ではIMRT食道保護照射で有症状食道炎が有意に減少。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104030100.html#cq13"}, {"id": "meta-pleura-cq14", "part": "第1部 肺癌", "section": "各病態 / 癌性胸膜炎", "sectionCode": "1/4/040100", "cqNo": "CQ14", "question": "胸腔穿刺・ドレナージを行った癌性胸膜炎に対して、どのような治療が勧められるか?", "recommendation": "a. 胸腔ドレナージ後の症例には、胸膜癒着術を行うよう強く推奨する。（推奨の強さ：1，エビデンスの強さ：A）\nb. 薬物療法未治療例には、胸膜癒着術の代わりに薬物療法を行うよう弱く推奨する。（推奨の強さ：2，エビデンスの強さ：C）", "strength": null, "evidence": null, "consensus": "a: 強く推奨92%、弱く推奨8% / b: 強く推奨4%、弱く推奨88%、根拠が明確ではない8%", "keyPoints": "胸膜癒着術の薬剤（Talc、BLM、OK-432等）比較では、「Talc噴霧法による胸水制御が良好」とされている。薬物療法未治療例では、分子標的治療薬やベバシズマブ併用化学療法で胸水制御率が高い報告があるが、限定的なエビデンスである。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104040100.html#cq14"}, {"id": "meta-pericard-cq15", "part": "第1部 肺癌", "section": "各病態 / 癌性心膜炎", "sectionCode": "1/4/050100", "cqNo": "CQ15", "question": "心嚢穿刺・ドレナージを要する癌性心膜炎に対して，どのような治療が勧められるか？", "recommendation": "心膜癒着術を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "行うことを強く推奨4%（1/24）、行うことを弱く推奨79%（19/24）、根拠が明確ではない17%（4/24）、行わないことを弱く推奨0%、行わないことを強く推奨0%", "keyPoints": "単回穿刺では再貯留率が高く長期制御にはドレナージが推奨される。JCOG9811試験では「BLM群でよい傾向」が見られ、複数薬剤での制御率報告あり。ただし対象集団が少なく前向き検討文献不足のため、短期症状緩和の益害バランスから弱く推奨判定。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104050100.html#cq15"}, {"id": "meta-oligo-cq16", "part": "第1部 肺癌", "section": "各病態 / オリゴ転移", "sectionCode": "1/4/060100", "cqNo": "CQ16", "question": "Ⅳ期非小細胞肺癌に対し，局所治療を追加することは勧められるか？", "recommendation": "転移臓器・転移個数が限られているsynchronous oligometastatic diseaseで，薬物療法により病勢が安定している場合，局所治療の追加を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "行うことを強く推奨2％（1/56）、行うことを弱く推奨66％（37/56）、根拠が明確ではない32％（18/56）、行わないことを弱く推奨0％、行わないことを強く推奨0％", "keyPoints": "少数の転移病変を持つⅣ期非小細胞肺癌患者を対象とした複数のランダム化比較第Ⅱ相試験により、薬物療法で安定が得られている場合に局所治療追加で「予後延長の可能性が示唆された」。ただし、実際の患者選択に偏り（転移病変2個以内が9割）、治療関連死の報告、アクセス問題、および明確な治療法が示されていないことから、集学的治療検討チームでの慎重な検討が必須とされている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/4/240104060100.html#cq16"}, {"id": "palliative-cq1", "part": "第1部 肺癌", "section": "緩和ケア", "sectionCode": "1/5/010100", "cqNo": "CQ1", "question": "進行・再発肺癌患者に対して，診断早期からの専門的な緩和ケアの提供は勧められるか？", "recommendation": "進行・再発肺癌患者に対して，診断から治療開始後の早期に，専門的な緩和ケアの提供を行うことを推奨する。", "strength": 1, "evidence": "B", "consensus": "行うことを強く推奨100％（9/9）", "keyPoints": "複数のランダム化比較試験で診断早期の専門的緩和ケアが有用であることを示唆。ENABLEⅡ試験では「死亡前1～3週間のQOL，抑うつが対照群に比し有意に改善」。Temel試験で「early PC併用群では12週後のQOL，抑うつが対照群に比較し有意に良好」。ENABLEⅢ試験で「1年生存率は有意に早期介入群で良好」。欧米ガイドライン（ESMO，ASCO）でも推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/5/240105010100.html#cq1"}, {"id": "palliative-cq2", "part": "第1部 肺癌", "section": "緩和ケア", "sectionCode": "1/5/010100", "cqNo": "CQ2", "question": "進行・再発肺癌患者に対して，提供すべき診断早期の専門的な緩和ケアはどのようなものか？", "recommendation": "Interdisciplinary PC（協働包括的緩和ケア）チームにより，以下の内容が実践されることを強く推奨する。患者および家族を含む患者の生活支援者と医療スタッフとの間の意思疎通をはかり信頼関係を構築する／患者の身体的苦痛，心理・社会的苦痛などトータルペインを評価し緩和する／疾患と予後についての理解度を評価し，正確な理解を促す／治療の目標を明確にする／患者のコーピングを評価し，支援・強化する／医学的な意思決定をする際の支援を行う／他の医療・ケア提供者との協調が保てるようにする／必要時は他の医療・ケア提供者に紹介を行う", "strength": 1, "evidence": "C", "consensus": "行うことを強く推奨78％（7/9）、行うことを弱く推奨22％（2/9）", "keyPoints": "複数の第Ⅲ相試験から提供すべき緩和ケアは8項目に集約。協働包括的緩和ケアチームメンバー：専門医，専門看護師，ソーシャルワーカー，リハビリ専門家，精神科医，心理士，宗教家など。ほぼすべてが欧米での臨床研究に基づくもの。本邦での医療環境の違い（医療者と患者家族の関係性，保険制度など）の認識が必要。本邦における協働包括的緩和ケアチームの具体的メンバー構成や内容については今後の検証が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/5/240105010100.html#cq2"}, {"id": "palliative-cq3", "part": "第1部 肺癌", "section": "緩和ケア", "sectionCode": "1/5/010100", "cqNo": "CQ3", "question": "悪液質を呈する切除不能・進行非小細胞肺癌患者に選択的グレリン受容体刺激薬投与は勧められるか？", "recommendation": "選択的グレリン受容体刺激薬（アナモレリン）投与を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "行うことを弱く推奨100％（14/14）", "keyPoints": "悪液質は「従来の栄養補助だけでは十分に回復できない，進行性の機能障害をもたらす持続的な骨格筋量の減少」。グレリンは「胃から分泌される摂食亢進ペプチド」で「成長ホルモン，インスリン様成長因子-1分泌促進作用により筋蛋白質合成を促進」。ROMANA試験：「アナモレリン群はプラセボ群と比較し除脂肪体重を有意に増加させ，食欲不振-悪液質症状スケールも有意に改善」。本邦研究でも「除脂肪体重を有意に増加させた（1.38 kg vs −0.17 kg）」。握力や歩行などの身体機能改善効果は証明されていない。PS 2患者では除脂肪体重，体重，食欲いずれも有意な改善がなかった。有害事象：房室ブロック6％，糖尿病3.6％，皮疹6％。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/5/240105010100.html#cq3"}, {"id": "2-meso-img-cq1a", "part": "第2部 胸膜中皮腫", "section": "画像診断", "sectionCode": "2/1/010100", "cqNo": "CQ1", "question": "胸膜中皮腫の存在診断に、a.胸部造影CT b.胸部単純/造影CT＋胸部MRI c.胸部単純/造影CT＋FDG-PET/CTは勧められるか？(a.胸部造影CT)", "recommendation": "胸膜中皮腫の存在診断に、胸部造影CTを行うことを強く推奨する", "strength": 1, "evidence": "C", "consensus": "100%（20/20）が「行うことを強く推奨」", "keyPoints": "造影剤により胸膜不整像の詳細描出が可能。血性胸水との鑑別も容易になり、胸膜プラークとの区別も可能", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201010100.html#cq1"}, {"id": "2-meso-img-cq1b", "part": "第2部 胸膜中皮腫", "section": "画像診断", "sectionCode": "2/1/010100", "cqNo": "CQ1", "question": "胸膜中皮腫の存在診断に、b.胸部単純/造影CT＋胸部MRIは勧められるか？", "recommendation": "胸膜中皮腫の存在診断に、胸部単純/造影CTに加え胸部MRIを行わないことを強く推奨する", "strength": 1, "evidence": "D", "consensus": "85%（17/20）が「行わないことを強く推奨」", "keyPoints": "MRIは常にCTに付加情報をもたらすわけではなく、多くの施設で存在診断にルーチン使用されていない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201010100.html#cq1"}, {"id": "2-meso-img-cq1c", "part": "第2部 胸膜中皮腫", "section": "画像診断", "sectionCode": "2/1/010100", "cqNo": "CQ1", "question": "胸膜中皮腫の存在診断に、c.胸部単純/造影CT＋FDG-PET/CTは勧められるか？", "recommendation": "胸膜中皮腫の存在診断に、胸部単純/造影CTに加えFDG-PET/CTを行わないことを強く推奨する", "strength": 1, "evidence": "C", "consensus": "65%（13/20）が「行わないことを強く推奨」", "keyPoints": "FDG-PETは局所浸潤評価には向かないが、胸郭外遠隔転移検出に優れている。存在診断での有用性を示す比較試験は不足", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201010100.html#cq1"}, {"id": "2-meso-img-cq2a", "part": "第2部 胸膜中皮腫", "section": "画像診断", "sectionCode": "2/1/010100", "cqNo": "CQ2", "question": "胸膜病変の良悪性の鑑別に、a.胸部造影CTは勧められるか？", "recommendation": "胸膜病変の良悪性の鑑別に、胸部造影CTを行うことを強く推奨する", "strength": 1, "evidence": "C", "consensus": "70%（14/20）が「行うことを強く推奨」", "keyPoints": "全周性胸膜肥厚、結節状肥厚、厚さ1cm超の所見、縦隔胸膜肥厚が重要。これらの所見が悪性を示唆するが、中皮腫と転移性腫瘍の画像所見はオーバーラップあり", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201010100.html#cq2"}, {"id": "2-meso-img-cq2b", "part": "第2部 胸膜中皮腫", "section": "画像診断", "sectionCode": "2/1/010100", "cqNo": "CQ2", "question": "胸膜病変の良悪性の鑑別に、b.胸部単純/造影CT＋胸部MRIは勧められるか？", "recommendation": "胸膜病変の良悪性の鑑別に、胸部単純/造影CTに加えMRIを行わないことを強く推奨する", "strength": 1, "evidence": "D", "consensus": "60%（12/20）が「行わないことを強く推奨」", "keyPoints": "MRIの信号強度やT1強調画像、拡散強調画像に有用性報告あるも、常にCTに付加情報がもたらされるわけではない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201010100.html#cq2"}, {"id": "2-meso-img-cq2c", "part": "第2部 胸膜中皮腫", "section": "画像診断", "sectionCode": "2/1/010100", "cqNo": "CQ2", "question": "胸膜病変の良悪性の鑑別に、c.胸部単純/造影CT＋FDG-PET/CTは勧められるか？", "recommendation": "胸膜病変の良悪性の鑑別に、胸部単純/造影CTに加えFDG-PET/CTを行わないことを強く推奨する", "strength": 1, "evidence": "C", "consensus": "75%（15/20）が「行わないことを強く推奨」", "keyPoints": "FDG-PETの遅延相での集積増加が報告されているが、メタアナリシスでは診断能が中等度であり、ルーチン検査として推奨されない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201010100.html#cq2"}, {"id": "2-meso-dx-cq3", "part": "第2部 胸膜中皮腫", "section": "確定診断", "sectionCode": "2/1/020100", "cqNo": "CQ3", "question": "末梢血中のマーカーによる中皮腫の確定診断は勧められるか？", "recommendation": "末梢血中のマーカーにより中皮腫の確定診断を行わないことを強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨しない89%（17/19）", "keyPoints": "メタアナリシス結果で感度が低い（19～68%）ため早期診断の有用性は限定的。陽性でも病理診断に進むことが推奨される", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201020100.html#cq3"}, {"id": "2-meso-dx-cq4", "part": "第2部 胸膜中皮腫", "section": "確定診断", "sectionCode": "2/1/020100", "cqNo": "CQ4", "question": "胸水中の腫瘍マーカーやヒアルロン酸の測定は、中皮腫の確定診断に勧められるか？", "recommendation": "胸水中の腫瘍マーカーやヒアルロン酸の測定で、中皮腫の確定診断を行わないことを強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨しない89%（17/19）", "keyPoints": "ヒアルロン酸の感度は44%で有用性は限定的。高値でも病理診断進行が推奨される", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201020100.html#cq4"}, {"id": "2-meso-dx-cq5a", "part": "第2部 胸膜中皮腫", "section": "確定診断", "sectionCode": "2/1/020100", "cqNo": "CQ5", "question": "確定診断のための胸膜採取法として、何が勧められるか？(a.外科的胸膜生検)", "recommendation": "全身麻酔下での外科的胸膜生検により、十分な量の生検を行うよう強く推奨する", "strength": 1, "evidence": "C", "consensus": "強く推奨100%（19/19）", "keyPoints": "診断率は開胸生検91%。亜型診断困難な内科的胸腔鏡と異なり、組織亜型診断が可能。生検切開創は播種リスク（外科的生検57%）があり、後の切除手術の皮膚切開線上に設定することを推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201020100.html#cq5"}, {"id": "2-meso-dx-cq5b", "part": "第2部 胸膜中皮腫", "section": "確定診断", "sectionCode": "2/1/020100", "cqNo": "CQ5", "question": "確定診断のための胸膜採取法として、何が勧められるか？(b.CTガイド下針生検)", "recommendation": "外科的胸膜生検の適応がない腫瘤形成症例では、CTガイド下針生検をまず行うよう強く推奨する", "strength": 1, "evidence": "C", "consensus": "強く推奨100%（19/19）", "keyPoints": "ランダム化試験で盲目的針生検（感度47%）より感度87%で有意に良好。播種リスク低い（4%）", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201020100.html#cq5"}, {"id": "2-meso-path-cq6", "part": "第2部 胸膜中皮腫", "section": "病理", "sectionCode": "2/1/030100", "cqNo": "CQ6", "question": "中皮腫の病理診断を行ううえで、どのような検体と処理が推奨されるか？", "recommendation": "組織の挫滅に注意しつつ十分な量の組織量を複数採取し、速やかに10倍量の固定液を用いて10％中性緩衝ホルマリン固定する", "strength": 1, "evidence": "C", "consensus": "95%(18/19)が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201030100.html#cq6"}, {"id": "2-meso-path-cq7", "part": "第2部 胸膜中皮腫", "section": "病理", "sectionCode": "2/1/030100", "cqNo": "CQ7", "question": "上皮様中皮腫と肺腺癌との鑑別診断に何が勧められるか？", "recommendation": "複数の抗体パネル(少なくとも2つの陽性マーカーと2つの陰性マーカー)を用いた免疫組織化学", "strength": 1, "evidence": "B", "consensus": "95%(18/19)が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201030100.html#cq7"}, {"id": "2-meso-path-cq8", "part": "第2部 胸膜中皮腫", "section": "病理", "sectionCode": "2/1/030100", "cqNo": "CQ8", "question": "胸膜中皮腫の病理診断にグレード分類の記載は勧められるか？", "recommendation": "上皮様中皮腫の病理診断では、グレード分類の記載を行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "47%(9/19)強く推奨、53%(10/19)弱く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201030100.html#cq8"}, {"id": "2-meso-path-cq9", "part": "第2部 胸膜中皮腫", "section": "病理", "sectionCode": "2/1/030100", "cqNo": "CQ9", "question": "胸水・心嚢水貯留時に、体腔液細胞診にBAP1、MTAP免疫染色を併用することは勧められるか？", "recommendation": "BAP1、MTAP免疫染色を行うことを強く推奨する", "strength": 1, "evidence": "B", "consensus": "70%(14/20)が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201030100.html#cq9"}, {"id": "2-meso-path-cq10", "part": "第2部 胸膜中皮腫", "section": "病理", "sectionCode": "2/1/030100", "cqNo": "CQ10", "question": "上皮様中皮腫と反応性中皮過形成の鑑別診断にBAP1免疫染色、MTAP免疫染色、CDKN2A FISHは勧められるか？", "recommendation": "BAP1免疫染色、MTAP免疫染色、CDKN2A FISHを行うことを強く推奨する", "strength": 1, "evidence": "B", "consensus": "80%(16/20)が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/1/240201030100.html#cq10"}, {"id": "2-meso-path-cq11", "part": "第2部 胸膜中皮腫", "section": "病理", "sectionCode": "2/1/030100", "cqNo": "CQ11", "question": "前浸潤性中皮腫(mesothelioma in situ)の診断にBAP1、MTAP免疫染  "sectionCode": "2/2/010100", "cqNo": "CQ5", "question": "切除可能な胸膜中皮腫に対し，周術期化学療法のレジメンは何が勧められるか？(b.レジメン)", "recommendation": "化学療法レジメンとしてはシスプラチン＋ペメトレキセド併用療法を行うよう強く推奨する", "strength": 1, "evidence": "C", "consensus": "強く推奨85%（17/20）、弱く推奨10%（2/20）、推奨根拠不明確5%（1/20）", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202010100.html#cq5"}, {"id": "2-meso-rt-cq6", "part": "第2部 胸膜中皮腫", "section": "放射線治療", "sectionCode": "2/2/020100", "cqNo": "CQ6", "question": "胸膜肺全摘術（EPP）の術後に片側胸郭照射を行うことは勧められるか？", "recommendation": "EPPの術後に片側胸郭照射を行うよう弱く推奨する", "strength": 2, "evidence": "D", "consensus": "強く推奨10%（2/20）、弱く推奨70%（14/20）、根拠が明確でない15%（3/20）、弱く非推奨0%、強く非推奨5%（1/20）", "keyPoints": "局所領域制御は約60%に上るが、全生存期間への寄与は様々。完遂率の低さが課題。第Ⅲ相試験は現在存在しない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202020100.html#cq6"}, {"id": "2-meso-rt-cq7", "part": "第2部 胸膜中皮腫", "section": "放射線治療", "sectionCode": "2/2/020100", "cqNo": "CQ7", "question": "胸膜切除/肺剝皮術（P/D）の術後または手術非適応症例に放射線治療は勧められるか？", "recommendation": "P/Dの術後または手術非適応症例に放射線治療を行わないよう弱く推奨する", "strength": 2, "evidence": "D", "consensus": "強く推奨5%（1/20）、弱く推奨5%（1/20）、根拠が明確でない5%（1/20）、弱く非推奨60%（12/20）、強く非推奨25%（5/20）", "keyPoints": "IMPRINT導入で有害事象低減期待。ただし十分な経験を有する施設で行うか、臨床試験として実施すべき", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202020100.html#cq7"}, {"id": "2-meso-rt-cq8", "part": "第2部 胸膜中皮腫", "section": "放射線治療", "sectionCode": "2/2/020100", "cqNo": "CQ8", "question": "EPP後放射線治療として3次元原体照射（3D-CRT）や強度変調放射線治療（IMRT）は勧められるか？", "recommendation": "EPP後放射線治療として、3D-CRTやIMRTを行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "強く推奨15%（3/20）、弱く推奨75%（15/20）、根拠が明確でない5%（1/20）、弱く非推奨5%（1/20）、強く非推奨0%", "keyPoints": "IMRTは3D-CRTより局所再発が有意に低い。ただし放射線肺臓炎に留意し、経験のある施設またはプロトコール確立状態での実施が必須", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202020100.html#cq8"}, {"id": "2-meso-med-cq9a", "part": "第2部 胸膜中皮腫", "section": Q11", "question": "PS 3-4への薬物療法は勧められるか？", "recommendation": "PS 3-4に対し薬物療法を行わないよう強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨70％(14/20)、弱く推奨20％(4/20)、根拠不明確10％(2/20)", "keyPoints": "PS不良例専門の臨床試験なし。PS3-4へのエビデンス欠如。安全性不明", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq11"}, {"id": "2-meso-med-cq12a", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ12", "question": "プラチナ+PEM後の維持療法は勧められるか？(a.PEM維持療法)", "recommendation": "PEM維持療法を行わないことを弱く推奨する", "strength": 2, "evidence": "C", "consensus": "行わないことを弱く推奨68％(13/19)、行うことを弱く推奨21％(4/19)", "keyPoints": "PEM維持は「PFS延長なし」", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq12"}, {"id": "2-meso-med-cq12b", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ12", "question": "プラチナ+PEM後の維持療法は勧められるか？(b.ゲムシタビン維持療法)", "recommendation": "ゲムシタビン維持療法を行うことを弱く推奨する", "strength": 2, "evidence": "C", "consensus": "行うことを弱く推奨84％(16/19)、根拠不明確5％(1/19)", "keyPoints": "ゲムシタビン維持は「PFS延長(6.2vs3.2ヶ月)」だがOS差なし", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq12"}, {"id": "2-meso-med-cq13a", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ13", "question": "PS 0-2の二次治療以降の薬物療法は勧められるか？(a.ニボルマブ単剤療法)", "recommendation": "ニボルマブ単剤療法を行うよう強く推奨する", "strength": 1, "evidence": "B", "consensus": "強く推奨89％(17/19)、弱く推奨11％(2/19)", "keyPoints": "CONFIRM試験でニボルマブはOS延長(10.2vs6.9ヶ月)、PFS延長", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq13"}, {"id": "2-meso-med-cq13b", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ13", "question": "PS 0-2の二次治療以降の薬物療法は勧められるか？(b.PEM単剤療法)", "recommendation": "PEM単剤療法を行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "弱く推奨63％(12/19)、強く推奨37％(7/19)", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq13"}, {"id": "2-meso-med-cq13c", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ13", "question": "PS 0-2の二次治療以降の薬物療法は勧められるか？(c.ビノレルビン、ゲムシタビン単剤またはビノレルビン+ゲムシタビン併用)", "recommendation": "ビノレルビン、ゲムシタビン単剤またはビノレルビン+ゲムシタビン併用を行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "弱く推奨89％(17/19)、行わないことを弱く推奨11％(2/19)", "keyPoints": "PEM、VNR、GEMは限定的エビデンス", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq13"}, {"id": "2-meso-med-cq14", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ14", "question": "一次治療シスプラチン+PEM併用療法に血管新生阻害薬(ベバシズマブ)の追加は勧められるか？", "recommendation": "一次治療シスプラチン+PEM併用療法にベバシズマブ追加を弱く推奨する", "strength": 2, "evidence": "B", "consensus": "弱く推奨89％(17/19)、強く推奨11％(2/19)", "keyPoints": "MAPS試験でベバシズマブ追加でOS延長(18.8vs16.1ヶ月)、PFS延長(9.2vs7.3ヶ月)。高血圧・血栓リスク増加。QOL悪化遅延", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq14"}, {"id": "2-meso-med-cq15", "part": "第2部 胸膜中皮腫", "section": "内科治療", "sectionCode": "2/2/030100", "cqNo": "CQ15", "question": "胸水コントロール目的の胸膜癒着術は勧められるか？", "recommendation": "胸水ドレナージ後に胸水コントロール目的の胸膜癒着術を行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "強く推奨58％(11/19)、弱く推奨42％(8/19)", "keyPoints": "タルク癒着で3ヶ月胸水コントロール率49％、1年生存者では93％。OS/PFS改善なし。合併症低い。QOL損害なし", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202030100.html#cq15"}, {"id": "2-meso-pall-cq16", "part": "第2部 胸膜中皮腫", "section": "緩和ケア", "sectionCode": "2/2/040100", "cqNo": "CQ16", "question": "疼痛緩和目的の放射線治療は勧められるか？", "recommendation": "疼痛緩和目的の放射線治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "行うことを強く推奨：85％（17/20）、行うことを弱く推奨：10％（2/20）、根拠が明確ではない：0％、行わないことを弱く推奨：5％（1/20）、行わないことを強く推奨：0％", "keyPoints": "進行胸膜中皮腫では圧迫・浸潤による疼痛が一般的。先行研究では約60％で疼痛緩和が得られた。主として「40 Gy/20回または36 Gy/13回」が使用。1回線量4 Gyが低線量より有効（50％ vs 39％）。高線量では重篤有害事象が高率（3D-CRTで53％、IMRTで78％）のため低線量で小さな範囲での照射が有用。最適な分割方法・至適線量は未確定", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/2/2/240202040100.html#cq16"}, {"id": "3-thym-clin-cq1", "part": "第3部 胸腺腫瘍", "section": "臨床症状・血液検査", "sectionCode": "3/1/010100", "cqNo": "CQ1", "question": "胸腺上皮性腫瘍が疑われる場合、血清抗アセチルコリン受容体抗体の測定は勧められるか？", "recommendation": "血清抗アセチルコリン受容体抗体の測定を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "強く推奨100%（17/17）、弱く推奨0%、不明確0%、弱く反対0%、強く反対0%", "keyPoints": "本邦では胸腺腫の約23～25%に重症筋無力症が合併。欧米報告では32.8%に合併。術前無症状でも術後発症する場合が多く、術前抗体検査が重要", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301010100.html#cq1"}, {"id": "3-thym-clin-cq2", "part": "第3部 胸腺腫瘍", "section": "臨床症状・血液検査", "sectionCode": "3/1/010100", "cqNo": "CQ2", "question": "胸腺上皮性腫瘍が疑われる場合、血球算定は勧められるか？", "recommendation": "赤芽球癆の存在の確認のため、血球算定を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "強く推奨100%（17/17）、弱く推奨0%、不明確0%、弱く反対0%、強く反対0%", "keyPoints": "赤芽球癆は胸腺上皮性腫瘍の0.7～2.6%に合併。貧血症状がある場合は精査が必要。予後不良の可能性あり", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301010100.html#cq2"}, {"id": "3-thym-clin-cq3", "part": "第3部 胸腺腫瘍", "section": "臨床症状・血液検査", "sectionCode": "3/1/010100", "cqNo": "CQ3", "question": "胸腺上皮性腫瘍が疑われる場合、血清γグロブリンの測定は勧められるか？", "recommendation": "血清γグロブリンの測定を行うよう弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "強く推奨12%（2/17）、弱く推奨88%（15/17）、不明確0%、弱く反対0%、強く反対0%", "keyPoints": "低γグロブリン血症は0.4～0.7%に合併（頻度は低い）。易感染性がある患者で測定を検討", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301010100.html#cq3"}, {"id": "3-thym-img-cq4", "part": "第3部 胸腺腫瘍", "section": "存在診断・画像", "sectionCode": "3/1/020100", "cqNo": "CQ4", "question": "胸腺上皮性腫瘍の検出に，胸部CTは勧められるか？", "recommendation": "胸腺上皮性腫瘍の検出に，胸部CTを行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%（17/17）が「行うことを強く推奨」", "keyPoints": "単純X線写真（検出率58%）よりCTの方が優れている（検出率85%）。低線量CT検診での縦隔病変発見率：0.77～1.68%。小胸腺病変の検出率が高い。CT装置の性能向上により検出率がさらに向上", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301020100.html#cq4"}, {"id": "3-thym-img-cq5", "part": "第3部 胸腺腫瘍", "section": "存在診断・画像", "sectionCode": "3/1/020100", "cqNo": "CQ5", "question": "縦隔病変の鑑別診断に，造影CTは勧められるか？", "recommendation": "縦隔病変の鑑別診断に，造影CTを行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%（15/15）が「行うことを強く推奨」", "keyPoints": "造影CTは血管異常との区別に有効。CT値上昇：腫瘍18.7HU vs 嚢胞4.3HU。造影後60HU以上で胸腺上皮性腫瘍を示唆。腫瘍内壊死描出により悪性度評価が可能。細胞外容積比で前縦隔腫瘍の鑑別が可能", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301020100.html#cq5"}, {"id": "3-thym-img-cq6", "part": "第3部 胸腺腫瘍", "section": "存在診断・画像", "sectionCode": "3/1/020100", "cqNo": "CQ6", "question": "胸腺上皮性腫瘍の検出や鑑別診断に，MRIは勧められるか？", "recommendation": "造影剤投与不能例，胸腺過形成，嚢胞性病変，その他の腫瘍との鑑別に、MRIを行うことを弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "93%（14/15）が「行うことを弱く推奨」、7%（1/15）が「強く推奨」", "keyPoints": "CT診断で確定しない症例に有用（274例中61例=22%）。Chemical shift MRIで胸腺過形成と腫瘍を識別可能。MRIの描出能がCTより優れている（被膜75% vs 18%、隔壁43% vs 13%）。大血管浸潤評価：非造影MRI正診率88%、陰性反応的中率97%。ADC値で悪性度評価が可能。現時点では役割は限定的だが付加情報が得られる場合あり", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301020100.html#cq6"}, {"id": "3-thym-dx-cq7a", "part": "第3部 胸腺腫瘍", "section": "確定診断", "sectionCode": "3/1/030100", "cqNo": "CQ7", "question": "胸腺上皮性腫瘍が疑われる場合，経皮針生検は勧められるか？(a.切除不能・術前治療計画・他疾患鑑別が必要な場合)", "recommendation": "切除不能と判断される，術前治療を計画する，および他疾患との鑑別が必要な場合，経皮針生検を行うよう強く推奨する", "strength": 1, "evidence": "C", "consensus": "強く推奨93%（14/15）、弱く推奨7%（1/15）", "keyPoints": "切除不能例や術前治療計画時は確定診断が重要（薬物療法レジメンが異なる）。CTガイド下経皮針生検が多用されるが、合併症（気胸など）や検体量の制限がある", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301030100.html#cq7"}, {"id": "3-thym-dx-cq7b", "part": "第3部 胸腺腫瘍", "section": "確定診断", "sectionCode": "3/1/030100", "cqNo": "CQ7", "question": "胸腺上皮性腫瘍が疑われる場合，経皮針生検は勧められるか？(b.切除可能と判断される場合)", "recommendation": "切除可能と判断される場合は，経皮針生検は行わないよう強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨67%（10/15）、弱く推奨33%（5/15）", "keyPoints": "切除可能例では、画像と臨床情報で診断可能であり、穿刺経路への腫瘍再発リスク回避のため生検を省略し直接手術することが妥当", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301030100.html#cq7"}, {"id": "3-thym-stage-cq8", "part": "第3部 胸腺腫瘍", "section": "病期", "sectionCode": "3/1/040100", "cqNo": "CQ8", "question": "胸腺上皮性腫瘍が疑われる場合，病期診断のために勧められる診断法は何か？", "recommendation": "上腹部を含めた胸部造影CTを行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%（16/16）が「行うことを強く推奨」", "keyPoints": "造影CTは複数の指標（辺縁性状、内部性状、リンパ節腫大、血管浸潤など）で病期推定に有用。TNM病期分類および正岡-古賀病期分類との相関が確認されている。胸腺腫の腹腔内進展リスクがあるため上腹部を含めることが重要。MRIはヨードアレルギーなど造影剤使用不可の場合に弱く推奨。FDG-PETは転移発見の可能性はあるが、リンパ節・遠隔転移評価の根拠が不十分", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/1/240301040100.html#cq8"}, {"id": "3-thym-surg-cq1", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ1", "question": "臨床病期Ⅰ-Ⅱ期胸腺上皮性腫瘍に対して、外科切除は勧められるか？", "recommendation": "外科切除を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（16/16）が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq1"}, {"id": "3-thym-surg-cq2", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ2", "question": "臨床病期Ⅰ-Ⅱ期胸腺上皮性腫瘍切除手術において、腫瘍の完全切除および胸腺摘出術が勧められるか？", "recommendation": "腫瘍の完全切除および胸腺摘出術を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（17/17）が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq2"}, {"id": "3-thym-surg-cq3", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ3", "question": "臨床病期Ⅰ-Ⅱ期胸腺上皮性腫瘍切除手術において、アプローチの選択肢として胸腔鏡下あるいはロボット支援の切除は勧められるか？", "recommendation": "胸腔鏡下あるいはロボット支援の切除をアプローチ法の1つとして行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "12%強く推奨、88％弱く推奨（14/16）", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq3"}, {"id": "3-thym-surg-cq4", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ4", "question": "臨床病期Ⅲ期胸腺上皮性腫瘍に対して、腫瘍の完全切除を伴う胸腺摘出術は勧められるか？", "recommendation": "腫瘍の完全切除を伴う胸腺摘出術を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "94％強く推奨、6％弱く推奨（16/17）", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq4"}, {"id": "3-thym-surg-cq5", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ5", "question": "完全切除が困難な臨床病期Ⅲ期胸腺上皮性腫瘍に対して、集学的治療は勧められるか？", "recommendation": "集学的治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（17/17）が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq5"}, {"id": "3-thym-surg-cq6", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ6", "question": "臨床病期Ⅲ期胸腺腫に横隔神経浸潤が認められる場合、横隔神経を温存することは勧められるか？", "recommendation": "重症筋無力症などの合併症を有する症例では、横隔神経を合併切除せずに温存を考慮してよい。両側浸潤では片側温存を推奨する。", "strength": 2, "evidence": "D", "consensus": "100％（19/19）が弱く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq6"}, {"id": "3-thym-surg-cq7", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ7", "question": "臨床病期Ⅳ期胸腺上皮性腫瘍に対して、集学的治療は勧められるか？", "recommendation": "集学的治療を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "100％（18/18）が強く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq7"}, {"id": "3-thym-surg-cq8", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ8", "question": "肉眼的完全切除が可能な臨床病期Ⅳ期胸腺上皮性腫瘍に対して、外科切除は勧められるか？", "recommendation": "外科切除を行うよう弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "100％（17/17）が弱く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq8"}, {"id": "3-thym-surg-cq9", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ9", "question": "肉眼的完全切除が困難な臨床病期Ⅳ期胸腺上皮性腫瘍に対して、減量手術は勧められるか？", "recommendation": "胸腺腫に対しては減量手術を行うことを弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "100％（17/17）が弱く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq9"}, {"id": "3-thym-surg-cq10", "part": "第3部 胸腺腫瘍", "section": "外科治療", "sectionCode": "3/2/010100", "cqNo": "CQ10", "question": "胸腺上皮性腫瘍の切除に際してリンパ節郭清は勧められるか？", "recommendation": "高悪性度症例や進行症例において正しい病期診断の目的にリンパ節郭清・サンプリングを弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "100％（17/17）が弱く推奨", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302010100.html#cq10"}, {"id": "3-thym-rt-cq11a", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "sectionCode": "3/2/020100", "cqNo": "CQ11", "question": "完全切除された胸腺腫に対して，術後放射線療法は勧められるか？(a.完全切除されたⅠ，Ⅱ期)", "recommendation": "完全切除されたⅠ，Ⅱ期胸腺腫に対しては，術後放射線療法を行わないよう強く推奨する", "strength": 1, "evidence": "C", "consensus": "強く推奨しない83%（15/18）、弱く推奨しない17%（3/18）", "keyPoints": "Ⅰ期の局所再発率は極めて低く、良好な長期成績を示す。複数の大規模解析で術後照射の有用性が認められない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302020100.html#cq11"}, {"id": "3-thym-rt-cq11b", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "sectionCode": "3/2/020100", "cqNo": "CQ11", "question": "完全切除された胸腺腫に対して，術後放射線療法は勧められるか？(b.完全切除されたⅢ期)", "recommendation": "完全切除されたⅢ期胸腺腫に対しては，術後放射線療法を行うよう勧められるだけの根拠が明確ではない", "strength": null, "evidence": null, "consensus": "根拠明確でない78%（14/18）、弱く推奨6%（1/18）、弱く推奨しない11%（2/18）、強く推奨しない6%（1/18）", "keyPoints": "Ⅲ期については報告が一定していないが、現状では有効性を示すエビデンスが乏しい", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302020100.html#cq11"}, {"id": "3-thym-rt-cq12a", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "sectionCode": "3/2/020100", "cqNo": "CQ12", "question": "完全切除された胸腺癌に対して，術後放射線療法は勧められるか？(a.完全切除されたⅠ期)", "recommendation": "完全切除されたⅠ期胸腺癌に対しては，術後放射線療法を行わないよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "弱く推奨しない67%（12/18）、強く推奨しない22%（4/18）、弱く推奨6%（1/18）、根拠明確でない6%（1/18）", "keyPoints": "Ⅰ期では良好な長期成績が得られ術後照射の生存への影響は乏しい", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302020100.html#cq12"}, {"id": "3-thym-rt-cq12b", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "sectionCode": "3/2/020100", "cqNo": "CQ12", "question": "完全切除された胸腺癌に対して，術後放射線療法は勧められるか？(b.完全切除されたⅡ-Ⅲ期)", "recommendation": "完全切除されたⅡ-Ⅲ期胸腺癌に対しては，術後放射線療法を行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "弱く推奨100%（18/18）", "keyPoints": "Ⅱ-Ⅲ期では複数の検討で全生存率および無病生存率の改善が報告されている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302020100.html#cq12"}, {"id": "3-thym-rt-cq13", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "sectionCode": "3/2/020100", "cqNo": "CQ13", "question": "顕微鏡的または肉眼的不完全切除となった胸腺上皮性腫瘍に対して，術後放射線療法は勧められるか？", "recommendation": "術後放射線療法または術後化学放射線療法を行うよう強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨94%（17/18）、弱く推奨6%（1/18）", "keyPoints": "不完全切除は重要な予後不良因子。前方視的比較試験はないが、後向き解析で術後照射が生存に寄与する可能性が示唆されている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302020100.html#cq13"}, {"id": "3-thym-rt-cq14", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "sectionCode": "3/2/020100", "cqNo": "CQ14", "question": "切除不能胸腺上皮性腫瘍に対して，放射線治療は勧められるか？", "recommendation": "根治照射可能な切除不能胸腺上皮性腫瘍に対しては，放射線治療または化学放射線療法を行うよう強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨100%（17/17）", "keyPoints": "複数の第Ⅱ相試験で同時化学放射線療法の有効性が確認されている。ORRは43.8～87.5%、5年全生存率は30～61.9%。同時化学放射線療法が放射線治療単独より優れている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302020100.html#cq14"}, {"id": "3-thym-med-cq15", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ15", "question": "臨床病期Ⅳ期または再発胸腺腫に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう強く推奨する", "strength": 1, "evidence": "D", "consensus": "行うことを強く推奨94%（17/18）、弱く推奨6%（1/18）", "keyPoints": "ランダム化比較試験がなく少数例報告のみだが、高いORR（奏効率）が示されており症状緩和効果が期待できる", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq15"}, {"id": "3-thym-med-cq16", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ16", "question": "臨床病期Ⅳ期または再発胸腺腫に対して、シスプラチンとアンスラサイクリン系抗癌薬の併用療法は勧められるか？", "recommendation": "シスプラチンとアンスラサイクリン系抗癌薬の併用療法を行うことを強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨94%（17/18）、弱く推奨6%（1/18）", "keyPoints": "アンスラサイクリン系を基軸とした療法のORRは70～92％（平均75％）であり、非アンスラサイクリン系（35～52％）より優れている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq16"}, {"id": "3-thym-med-cq17", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ17", "question": "一次治療に不応となった胸腺腫に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう弱く推奨する", "strength": 2, "evidence": "D", "consensus": "弱く推奨83%（15/18）、強く推奨11%（2/18）、明確ではない6%（1/18）", "keyPoints": "ペメトレキセドやアムルビシンで有用性が報告されている。免疫チェックポイント阻害薬は毒性（irAE71.4%）が高く非推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq17"}, {"id": "3-thym-med-cq18", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ18", "question": "局所進行胸腺腫に対して、術前化学療法は勧められるか？", "recommendation": "術前化学療法を行うよう弱く推奨する", "strength": 2, "evidence": "D", "consensus": "弱く推奨94%（17/18）、明確ではない6%（1/18）", "keyPoints": "CAMP療法で22例中17例（77％）で奏効、21例が手術を受け16例で完全切除と報告されている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq18"}, {"id": "3-thym-med-cq19", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ19", "question": "臨床病期Ⅳ期または再発胸腺癌に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう強く推奨する", "strength": 1, "evidence": "D", "consensus": "強く推奨100%（18/18）", "keyPoints": "ORRは約22～36%。ペムブロリズマブは胸腺癌のキードラッグ（ORR22.5～19.2%、5年生存率18.2%）", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq19"}, {"id": "3-thym-med-cq20", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ20", "question": "臨床病期Ⅳ期または再発胸腺癌に対して、カルボプラチンとパクリタキセルまたはアムルビシンの併用療法は勧められるか？", "recommendation": "カルボプラチンとパクリタキセルまたはアムルビシンの併用療法を行うよう弱く推奨する", "strength": 2, "evidence": "D", "consensus": "弱く推奨60%（9/15）、強く推奨40%（6/15）", "keyPoints": "カルボプラチン+パクリタキセルのORRは22～36％。プラチナ製剤がキードラッグ", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq20"}, {"id": "3-thym-med-cq21", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ21", "question": "一次治療に不応となった胸腺癌に対して、レンバチニブは勧められるか？", "recommendation": "レンバチニブを行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "弱く推奨88%（14/16）、強く推奨12%（2/16）", "keyPoints": "REMORA試験でORR38.1%、病勢制御率95.2%。高血圧64.3%で全例減量必要", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq21"}, {"id": "3-thym-med-cq22", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ22", "question": "一次治療に不応となった胸腺癌に対して、細胞傷害性抗癌薬は勧められるか？", "recommendation": "細胞傷害性抗癌薬（S-1、アムルビシン、ペメトレキセド）を行うよう弱く推奨する", "strength": 2, "evidence": "C", "consensus": "弱く推奨75%（12/16）、強く推奨25%（4/16）", "keyPoints": "S-1のORR30.8%、ペメトレキセド9%、アムルビシン11%が報告されている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq22"}, {"id": "3-thym-med-cq23", "part": "第3部 胸腺腫瘍", "section": "内科治療", "sectionCode": "3/2/030100", "cqNo": "CQ23", "question": "局所進行胸腺癌に対して、術前化学療法は勧められるか？", "recommendation": "薬物療法または化学放射線療法を術前治療として行うよう弱く推奨する", "strength": 2, "evidence": "D", "consensus": "弱く推奨69%（11/16）、強く推奨19%（3/16）、明確ではない13%（2/16）", "keyPoints": "化学放射線療法で22例中21例が完遂、17例（77％）で完全切除。シスプラチン+ドセタキセルで完全切除率79%", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302030100.html#cq23"}, {"id": "3-thym-fu-cq24", "part": "第3部 胸腺腫瘍", "section": "経過観察", "sectionCode": "3/2/040100", "cqNo": "CQ24", "question": "胸腺上皮性腫瘍に対し根治的治療が行われた場合，定期的な経過観察は行うべきか？", "recommendation": "胸腺腫の場合10年以上，胸腺癌の場合5年以上の経過観察を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "行うことを強く推奨：22%（4/18）、行うことを弱く推奨：78%（14/18）、その他：0%", "keyPoints": "根治治療後の再発は病期・組織型に関連し、再発までの期間が長期（20年以上の例も存在）。胸腺腫の再発中央値は61ヶ月、胸腺癌は10ヶ月。経過観察は通常外来診療に加えCT画像診断を含める。術後重症筋無力症の発症や二次癌の早期発見も重要。経過観察間隔は6～12ヶ月ごとを考慮", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302040100.html#cq24"}, {"id": "3-thym-rec-cq25", "part": "第3部 胸腺腫瘍", "section": "再発", "sectionCode": "3/2/050100", "cqNo": "CQ25", "question": "切除可能な再発胸腺上皮性腫瘍に対して、外科切除は勧められるか？", "recommendation": "胸腺癌を除いた切除可能な再発巣に対する外科切除を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "強く推奨17%（3/18）、弱く推奨83%（15/18）、その他0%", "keyPoints": "前向き研究は存在せず、後ろ向き比較研究で外科治療の優位性が示唆される。外科治療の5年生存率は70.2～92.0%、非外科治療は0～67.3%。完全切除が生命予後改善に寄与するが、胸腺癌は化学療法を主体とした集学治療が望ましい", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302050100.html#cq25"}, {"id": "3-thym-rec-cq26", "part": "第3部 胸腺腫瘍", "section": "再発", "sectionCode": "3/2/050100", "cqNo": "CQ26", "question": "切除可能な再発胸腺上皮性腫瘍に対して、外科切除を含めた集学的治療は勧められるか？", "recommendation": "外科切除を含めた集学的治療を行うよう弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "強く推奨0%、弱く推奨100%（17/17）、その他0%", "keyPoints": "前向き研究は存在しない。胸腔内温熱化学療法併用外科治療は安全で実現可能だが、投与薬剤や方法が標準化されておらず、十分な評価に至っていない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302050100.html#cq26"}, {"id": "3-thym-incidental-cq27a", "part": "第3部 胸腺腫瘍", "section": "前縦隔病変(偶発的発見)", "sectionCode": "3/2/060100", "cqNo": "CQ27", "question": "偶発的に発見された小さな前縦隔病変に対して，外科的切除は勧められるか？(a.充実性病変)", "recommendation": "充実性病変が疑われる場合，外科的切除を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "88%（15/17）が「行うことを強く推奨」", "keyPoints": "前縦隔病変の偶発的発見頻度は0.7～0.9%。充実性病変の92%以上が胸腺腫などの腫瘍性病変", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302060100.html#cq27"}, {"id": "3-thym-incidental-cq27b", "part": "第3部 胸腺腫瘍", "section": "前縦隔病変(偶発的発見)", "sectionCode": "3/2/060100", "cqNo": "CQ27", "question": "偶発的に発見された小さな前縦隔病変に対して，外科的切除は勧められるか？(b.嚢胞)", "recommendation": "嚢胞（胸腺嚢胞や心膜嚢胞など）が疑われる場合，外科的切除を行わないよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "71%（12/17）が「行わないことを強く推奨」", "keyPoints": "嚢胞は「CT値が液体成分を示し分葉や壁肥厚のない」特徴で診断。画像診断では鑑別困難な場合が80%存在。MRI併用で良性嚢胞の診断精度向上", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/3/2/240302060100.html#cq27"}];
</script>
<script>
(function(){
  const STORAGE_KEY = "haigan_progress";
  const THEME_KEY = "haigan_theme";
  let progress = {};
  try{ progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }catch(e){ progress = {}; }

  function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }

  const partSelect = document.getElementById("partSelect");
  const sectionSelect = document.getElementById("sectionSelect");
  const reviewOnly = document.getElementById("reviewOnly");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const resetProgressBtn = document.getElementById("resetProgressBtn");
  const cardFlip = document.getElementById("cardFlip");
  const cardFront = document.getElementById("cardFront");
  const cardBack = document.getElementById("cardBack");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const flipBtn = document.getElementById("flipBtn");
  const masteredBtn = document.getElementById("masteredBtn");
  const reviewBtn = document.getElementById("reviewBtn");
  const progressLine = document.getElementById("progressLine");
  const statsBar = document.getElementById("statsBar");
  const themeToggle = document.getElementById("themeToggle");
  const cardScene = document.getElementById("cardScene");

  let deck = [];
  let idx = 0;
  let flipped = false;

  const parts = Array.from(new Set(CARDS.map(c => c.part)));
  const partOpt = document.createElement("option");
  partOpt.value = "__ALL__"; partOpt.textContent = "すべての部";
  partSelect.appendChild(partOpt);
  parts.forEach(p => {
    const o = document.createElement("option");
    o.value = p; o.textContent = p;
    partSelect.appendChild(o);
  });

  function updateSectionOptions(){
    const p = partSelect.value;
    sectionSelect.innerHTML = "";
    const allOpt = document.createElement("option");
    allOpt.value = "__ALL__"; allOpt.textContent = "すべてのセクション";
    sectionSelect.appendChild(allOpt);
    let pool = CARDS;
    if(p !== "__ALL__") pool = pool.filter(c => c.part === p);
    const sections = Array.from(new Set(pool.map(c => c.section)));
    sections.forEach(s => {
      const o = document.createElement("option");
      o.value = s; o.textContent = s;
      sectionSelect.appendChild(o);
    });
  }
  updateSectionOptions();

  function stateOf(id){ return progress[id] || "none"; }

  function buildDeck(){
    const p = partSelect.value;
    const s = sectionSelect.value;
    let pool = CARDS.slice();
    if(p !== "__ALL__") pool = pool.filter(c => c.part === p);
    if(s !== "__ALL__") pool = pool.filter(c => c.section === s);
    if(reviewOnly.checked) pool = pool.filter(c => stateOf(c.id) === "review");
    deck = pool;
    idx = 0;
    flipped = false;
    render();
  }

  function shuffleDeck(){
    for(let i = deck.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    idx = 0;
    flipped = false;
    render();
  }

  function escapeHtml(str){
    if(str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function labelStrength(v){
    if(v === null || v === undefined || v === "" || v === "なし") return "記載なし";
    let s = String(v);
    s = s.replace(/(^|[^0-9])1([^0-9]|$)/g, function(m,a,b){ return a + "1(強い推奨)" + b; });
    s = s.replace(/(^|[^0-9(])2([^0-9)]|$)/g, function(m,a,b){ return a + "2(弱い推奨)" + b; });
    return s;
  }

  function statsCount(){
    let m=0, r=0, n=0;
    CARDS.forEach(c => {
      const st = stateOf(c.id);
      if(st === "mastered") m++; else if(st === "review") r++; else n++;
    });
    return {m,r,n};
  }

  function renderStats(){
    const {m,r,n} = statsCount();
    statsBar.innerHTML =
      '<span class="stat-pill stat-mastered">習得済み ' + m + '</span>' +
      '<span class="stat-pill stat-review">要復習 ' + r + '</span>' +
      '<span class="stat-pill">未学習 ' + n + '</span>';
  }

  function render(){
    renderStats();
    if(deck.length === 0){
      progressLine.textContent = "0 / 0";
      cardFront.innerHTML = '<div class="empty-msg">該当するカードがありません。フィルタを見直してください。</div>';
      cardBack.innerHTML = "";
      cardFlip.classList.remove("flipped");
      return;
    }
    const c = deck[idx];
    progressLine.textContent = (idx + 1) + " / " + deck.length;
    const st = stateOf(c.id);
    const stLabel = st === "mastered" ? "習得済み" : (st === "review" ? "要復習" : "未学習");

    cardFront.innerHTML =
      '<div class="badge-row">' +
        '<span class="badge">' + escapeHtml(c.part) + '</span>' +
        '<span class="badge badge-section">' + escapeHtml(c.section) + '</span>' +
        '<span class="badge">' + escapeHtml(c.cqNo) + '</span>' +
        '<span class="badge-state ' + st + '">' + stLabel + '</span>' +
      '</div>' +
      '<div class="question-text">' + escapeHtml(c.question) + '</div>' +
      '<div class="hint">クリックまたはSpaceキーでめくる</div>';

    cardBack.innerHTML =
      '<div class="badge-row">' +
        '<span class="badge">' + escapeHtml(c.part) + '</span>' +
        '<span class="badge badge-section">' + escapeHtml(c.section) + '</span>' +
        '<span class="badge">' + escapeHtml(c.cqNo) + '</span>' +
        '<span class="badge-state ' + st + '">' + stLabel + '</span>' +
      '</div>' +
      '<div class="rec-text">' + escapeHtml(c.recommendation) + '</div>' +
      '<div class="meta-grid">' +
        '<div class="meta-label">推奨の強さ</div><div>' + escapeHtml(labelStrength(c.strength)) + '</div>' +
        '<div class="meta-label">エビデンスの強さ</div><div>' + escapeHtml(c.evidence || "記載なし") + '</div>' +
        '<div class="meta-label">合意率</div><div>' + escapeHtml(c.consensus || "記載なし") + '</div>' +
      '</div>' +
      (c.keyPoints ? '<div class="keypoints">' + escapeHtml(c.keyPoints) + '</div>' : '') +
      (c.sourceUrl ? '<a class="source-link" href="' + escapeHtml(c.sourceUrl) + '" target="_blank" rel="noopener">出典を開く ↗</a>' : '');

    cardFlip.classList.toggle("flipped", flipped);
  }

  function flip(){
    if(deck.length === 0) return;
    flipped = !flipped;
    cardFlip.classList.toggle("flipped", flipped);
  }

  function go(delta){
    if(deck.length === 0) return;
    idx = (idx + delta + deck.length) % deck.length;
    flipped = false;
    render();
  }

  function setState(state){
    if(deck.length === 0) return;
    const c = deck[idx];
    progress[c.id] = state;
    saveProgress();
    render();
  }

  partSelect.addEventListener("change", function(){
    updateSectionOptions();
    buildDeck();
  });
  sectionSelect.addEventListener("change", buildDeck);
  reviewOnly.addEventListener("change", buildDeck);
  shuffleBtn.addEventListener("click", shuffleDeck);
  resetProgressBtn.addEventListener("click", function(){
    if(confirm("学習進捗をすべてリセットしますか？この操作は取り消せません。")){
      progress = {};
      saveProgress();
      render();
    }
  });
  cardScene.addEventListener("click", flip);
  flipBtn.addEventListener("click", flip);
  prevBtn.addEventListener("click", function(){ go(-1); });
  nextBtn.addEventListener("click", function(){ go(1); });
  masteredBtn.addEventListener("click", function(){ setState("mastered"); });
  reviewBtn.addEventListener("click", function(){ setState("review"); });

  document.addEventListener("keydown", function(e){
    if(e.code === "Space"){ e.preventDefault(); flip(); }
    else if(e.code === "ArrowLeft"){ go(-1); }
    else if(e.code === "ArrowRight"){ go(1); }
    else if(e.key === "1"){ setState("mastered"); }
    else if(e.key === "2"){ setState("review"); }
  });

  function applyTheme(t){
    if(t === "dark" || t === "light"){
      document.documentElement.setAttribute("data-theme", t);
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
  }
  let savedTheme = localStorage.getItem(THEME_KEY);
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", function(){
    const cur = document.documentElement.getAttribute("data-theme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    let next;
    if(!cur){ next = prefersDark ? "light" : "dark"; }
    else if(cur === "dark"){ next = "light"; }
    else { next = "dark"; }
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  });

  buildDeck();
})();
</script>
</body></html>
