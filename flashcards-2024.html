<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#151a1e">
<title>肺癌診療GL2024 フラッシュカード</title>
<style>
  :root{
    --bg:#f4f6f7; --fg:#1f2937; --card-bg:#ffffff; --card-border:#d7dde1;
    --accent:#2563a8; --accent2:#1a7a5e; --muted:#6b7280; --badge:#e8f0f7;
    --danger:#b3452c; --shadow:0 2px 10px rgba(0,0,0,0.08);
    --btn-bg:#eef2f5; --btn-fg:#1f2937; --btn-border:#cbd3d9;
  }
  :root[data-theme="dark"]{
    --bg:#151a1e; --fg:#e7ebee; --card-bg:#1f262c; --card-border:#333d45;
    --accent:#6fa8dc; --accent2:#5fbf9a; --muted:#9aa5ad; --badge:#26333d;
    --danger:#e08a6f; --shadow:0 2px 10px rgba(0,0,0,0.4);
    --btn-bg:#242c32; --btn-fg:#e7ebee; --btn-border:#3a444c;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#151a1e; --fg:#e7ebee; --card-bg:#1f262c; --card-border:#333d45;
      --accent:#6fa8dc; --accent2:#5fbf9a; --muted:#9aa5ad; --badge:#26333d;
      --danger:#e08a6f; --shadow:0 2px 10px rgba(0,0,0,0.4);
      --btn-bg:#242c32; --btn-fg:#e7ebee; --btn-border:#3a444c;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--fg); min-height:100vh; display:flex; flex-direction:column;
  }
  header{
    padding:12px 16px; border-bottom:1px solid var(--card-border); background:var(--card-bg);
    position:sticky; top:0; z-index:10;
  }
  .header-row{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;}
  h1{font-size:1.05rem; margin:0; color:var(--accent); font-weight:700;}
  .stats{display:flex; gap:10px; font-size:0.8rem; color:var(--muted); flex-wrap:wrap;}
  .stat-pill{padding:2px 8px; border-radius:10px; background:var(--badge);}
  .stat-mastered{color:var(--accent2);}
  .stat-review{color:var(--danger);}
  .theme-toggle{
    background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-border);
    border-radius:8px; padding:6px 10px; cursor:pointer; font-size:0.85rem;
  }
  .filters{
    display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; align-items:center;
  }
  select, .btn{
    background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-border);
    border-radius:8px; padding:7px 10px; font-size:0.85rem; cursor:pointer;
  }
  label.check{display:flex; align-items:center; gap:5px; font-size:0.85rem; color:var(--fg); cursor:pointer;}
  main{
    flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 14px 40px;
    gap:16px;
  }
  .progress-line{font-size:0.9rem; color:var(--muted);}
  .card-scene{
    width:100%; max-width:640px; min-height:360px; perspective:1400px; cursor:pointer;
  }
  .card-flip{
    position:relative; width:100%; min-height:360px; transition:transform 0.5s;
    transform-style:preserve-3d;
  }
  .card-flip.flipped{transform:rotateY(180deg);}
  .card-face{
    position:absolute; inset:0; backface-visibility:hidden;
    background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px;
    box-shadow:var(--shadow); padding:22px; display:flex; flex-direction:column; gap:12px;
    overflow-y:auto;
  }
  .card-back{transform:rotateY(180deg);}
  .badge-row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .badge{
    background:var(--badge); color:var(--accent); font-size:0.75rem; padding:4px 10px;
    border-radius:12px; font-weight:600;
  }
  .badge-section{color:var(--accent2);}
  .badge-state{
    margin-left:auto; font-size:0.75rem; padding:4px 10px; border-radius:12px; font-weight:600;
  }
  .badge-state.mastered{background:#dff3e8; color:#1a7a5e;}
  .badge-state.review{background:#fbe4dd; color:#b3452c;}
  .badge-state.none{background:var(--badge); color:var(--muted);}
  :root[data-theme="dark"] .badge-state.mastered{background:#173a2c; color:#7ee0b0;}
  :root[data-theme="dark"] .badge-state.review{background:#3e2620; color:#f0a48c;}
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]) .badge-state.mastered{background:#173a2c; color:#7ee0b0;}
    :root:not([data-theme="light"]) .badge-state.review{background:#3e2620; color:#f0a48c;}
  }
  .question-text{font-size:1.15rem; line-height:1.6; font-weight:600;}
  .hint{margin-top:auto; font-size:0.78rem; color:var(--muted); text-align:center;}
  .rec-text{font-size:1.02rem; line-height:1.65;}
  .meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 10px; font-size:0.85rem;}
  .meta-label{color:var(--muted); white-space:nowrap;}
  .keypoints{font-size:0.88rem; line-height:1.6; background:var(--badge); padding:10px 12px; border-radius:10px;}
  .source-link{font-size:0.82rem; color:var(--accent);}
  .nav-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;}
  .nav-btn{
    background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:12px 22px; font-size:0.95rem; cursor:pointer; min-width:90px;
  }
  .nav-btn.secondary{background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-border);}
  .learn-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .learn-btn{
    border:none; border-radius:10px; padding:11px 18px; font-size:0.9rem; cursor:pointer; color:#fff;
  }
  .learn-btn.mastered{background:var(--accent2);}
  .learn-btn.review{background:var(--danger);}
  .learn-btn.reset{background:transparent; color:var(--muted); border:1px solid var(--btn-border);}
  footer{
    padding:14px 16px; font-size:0.75rem; color:var(--muted); text-align:center;
    border-top:1px solid var(--card-border); background:var(--card-bg);
  }
  .empty-msg{padding:40px; text-align:center; color:var(--muted);}
  @media (pointer: coarse){
    button,.btn,.nav-btn,.learn-btn,.theme-toggle{min-height:44px;padding:10px 14px;font-size:.95rem}
    select{min-height:44px;font-size:16px}
  }
  input[type="checkbox"]{min-width:18px;min-height:18px}
  @media (max-width:480px){
    .card-face{padding:16px;}
    h1{font-size:0.95rem;}
    .nav-btn{padding:11px 16px;}
    header{padding-top:calc(12px + env(safe-area-inset-top));}
    footer{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
  }
</style>
</head><body>
<header>
  <div class="header-row">
    <h1>肺癌診療GL2024 フラッシュカード</h1>
    <div class="stats" id="statsBar"></div>
    <button class="theme-toggle" id="themeToggle">☀/☾ テーマ切替</button>
  </div>
  <div class="filters">
    <select id="partSelect"></select>
    <select id="sectionSelect"></select>
    <label class="check"><input type="checkbox" id="reviewOnly"> 要復習のみ</label>
    <button class="btn" id="shuffleBtn">シャッフル</button>
    <button class="btn" id="resetProgressBtn">進捗リセット</button>
  </div>
</header>
<main>
  <div class="progress-line" id="progressLine"></div>
  <div class="card-scene" id="cardScene">
    <div class="card-flip" id="cardFlip">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn secondary" id="prevBtn">← 前 (←)</button>
    <button class="nav-btn secondary" id="flipBtn">めくる (Space)</button>
    <button class="nav-btn secondary" id="nextBtn">次 → (→)</button>
  </div>
  <div class="learn-row">
    <button class="learn-btn mastered" id="masteredBtn">習得済み (1)</button>
    <button class="learn-btn review" id="reviewBtn">要復習 (2)</button>
  </div>
</main>
<footer>
  日本肺癌学会『肺癌診療ガイドライン2024年版』に基づく個人の試験対策用。本文の再配布はしないこと。内容は原典を必ず確認。
</footer>
<script>
const CARDS = [{"id": "1-diag-cq1", "part": "第1部 肺癌", "section": "診断/検出方法", "sectionCode": "1/1/010100", "cqNo": "CQ1", "question": "肺癌の検出に胸部X線と胸部CTは有用か？", "recommendation": "肺癌の検出に胸部X線と胸部CTを行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "合意率100％（19/19人）", "keyPoints": "胸部X線は初期検査だが、読影者や部位により検出力にばらつきがある。胸部X線は病変の部位や読影者により検出力にばらつきがあり、実臨床でも19％の見落としが報告されている。胸部CTは現時点で最も有力な検査。早期肺癌やすりガラス陰影ではCTが最も有用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101010100.html#cq1"}, {"id": "1-diag-cq2", "part": "第1部 肺癌", "section": "診断/検出方法", "sectionCode": "1/1/010100", "cqNo": "CQ2", "question": "ハイリスク群を対象とした肺門部肺癌の検出に、喀痰細胞診は有用か？", "recommendation": "ハイリスク群では肺門部肺癌の検出に喀痰細胞診を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "合意率83％（15/18人）、弱い推奨17％（3/18人）", "keyPoints": "非侵襲的で簡便な肺門部早期肺癌唯一のスクリーニング法。検出感度は約40%。Johns Hopkins StudyとMemorial Sloan-Kettering Studyで、喀痰細胞診追加により早期癌割合と切除率が上昇。ハイリスク群の定義：50歳以上で喫煙指数600以上。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101010100.html#cq2"}, {"id": "1-diag-cq3", "part": "第1部 肺癌", "section": "診断/検出方法", "sectionCode": "1/1/010100", "cqNo": "CQ3", "question": "肺癌の検出に、PET/CT検査は有用か？", "recommendation": "肺癌の検出にPET/CT検査は行わないよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "合意率94％（17/18人）、強く推奨しない6％（1/18人）", "keyPoints": "検出感度83～96%、特異度78～91%だが、Ⅰ期では感度低下。腫瘍径10 mm未満の小病変や組織学的に低悪性度の病変に対して、PET/CTは偽陰性を呈しやすい。非腫瘍性疾患でも偽陽性を示す。検出目的ではなく、質的診断や病期診断補助として使用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101010100.html#cq3"}, {"id": "1-diag-cq4", "part": "第1部 肺癌", "section": "診断/検出方法", "sectionCode": "1/1/010100", "cqNo": "CQ4", "question": "肺癌の検出に、腫瘍マーカーは有用か？", "recommendation": "肺癌の検出に腫瘍マーカーは行わないよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "合意率67％（12/18人）、強く推奨しない33％（6/18人）", "keyPoints": "腫瘍マーカーは、偽陰性や偽陽性になることもあり、腫瘍マーカーのみでは肺癌検出率の向上は得られない。CYFRA21-1検出感度41～65%、その他マーカーはさらに低い。複数マーカー組み合わせで感度向上の報告あり。検出目的ではなく、質的診断補助や治療効果モニタリング等に使用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101010100.html#cq4"}, {"id": "1-diag-cq5", "part": "第1部 肺癌", "section": "診断/質的画像診断", "sectionCode": "1/1/020100", "cqNo": "CQ5", "question": "高分解能CTで肺癌かどうか判断できない結節に，造影CTやMRI，FDG-PET/CTを行うことは有用か？", "recommendation": "a. 造影CTを行うよう弱く推奨する。 b. MRIを行うよう弱く推奨する。 c. FDG-PET/CTを行うよう強く推奨する。", "strength": "a:2 / b:2 / c:1", "evidence": "a:C / b:C / c:C", "consensus": "造影CT（a）: 強く推奨0％、弱く推奨100％（18/18）、根拠明確でない0％、行わないことを弱く推奨0％、行わないことを強く推奨0％。MRI（b）[1回目]: 強く推奨0％、弱く推奨50％（9/18）、根拠明確でない50％（9/18）。MRI（b）[2回目]: 強く推奨0％、弱く推奨78％（14/18）、根拠明確でない22％（4/18）。FDG-PET/CT（c）: 強く推奨67％（12/18）、弱く推奨33％（6/18）。", "keyPoints": "造影CTについて、「悪性の結節は高い造合効果をもつ」という仮説に基づき、15 HUを超える造影効果で判定した場合の感度は98％、特異度は58％との結果が報告されている。造影効果がない場合は良性を示唆するが、造影された場合は質的診断が困難。本邦での実施が少ないことから弱く推奨。MRIについて、多時相撮像やDWI（拡散強調画像）を用いた方法が孤立性肺結節の良悪性鑑別に有用との報告がある。被曝がない利点があるが、本邦での実施施設が限定されていることを考慮し弱く推奨。2回目投票で海外の最近の研究成績を追記して推奨度が確定した。FDG-PET/CTについて、多くの研究によってCTより良悪性鑑別に対して良好な成績が報告されている。ただし、SUVの定量評価の問題、1 cm以下結節のデータ不足、低悪性度腫瘍の偽陰性、肉芽腫の偽陽性が課題。高い正診率と低侵襲性から強く推奨された。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101020100.html#cq5"}, {"id": "1-diag-cq6", "part": "第1部 肺癌", "section": "診断/質的画像診断", "sectionCode": "1/1/020100", "cqNo": "CQ6", "question": "画像診断で肺癌を否定できない結節に，経過観察を行うことは有用か？", "recommendation": "高分解能CTを用いて結節の性状や肺癌の危険因子の有無に基づいて，適切な観察期間で経過観察を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨94％（17/18）、弱く推奨6％（1/18）、根拠明確でない0％、行わないことを弱く推奨0％、行わないことを強く推奨0％", "keyPoints": "CT技術の進歩により肺癌を否定しきれない結節が多く検出されるようになり、適切な対応が課題となっている。日本CT検診学会は「低線量CTによる肺がん検診の肺結節の判定基準と経過観察の考え方」を提案しており、結節を充実型と部分充実型あるいはすりガラス型に分けて観察間隔を設定している。欧米でもFleishner Societyが同様のガイドラインを提案している。結節の大きさ測定に誤差があり慎重な対応が必要だが、肺癌を否定しきれない小さい結節に対しては，広く行われている高分解能CTで低侵襲に良悪性診断が可能となるため強く推奨された。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101020100.html#cq6"}, {"id": "1-diag-cq7", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ7", "question": "中枢気道病変が疑われる症例に、気管支鏡検査は勧められるか？", "recommendation": "中枢気道病変が疑われる症例に、気管支鏡検査を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%（18/18）が「行うことを強く推奨」", "keyPoints": "中心型肺癌への気管支鏡診断感度は88%。合併症頻度は1.32%（出血0.89%）で許容範囲内。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq7"}, {"id": "1-diag-cq8", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ8", "question": "中枢気道の前浸潤性病変や早期癌が疑われる症例に、自家蛍光観察/狭帯域光観察は勧められるか？", "recommendation": "a. 白色光気管支鏡に自家蛍光観察を併用するよう弱く推奨する。 b. 白色光気管支鏡に狭帯域光観察を併用するよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "a. 100%（18/18）「弱く推奨」　b. 89%（16/18）「弱く推奨」", "keyPoints": "自家蛍光観察で前浸潤性病変検出感度が50%→88%に向上。狭帯域光観察でも感度62%→100%に改善。ただし特異度は低下傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq8"}, {"id": "1-diag-cq9", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ9", "question": "肺癌を疑う肺末梢病変に、経気管支生検は勧められるか？", "recommendation": "経気管支生検を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%（18/18）が「強く推奨」", "keyPoints": "末梢型肺癌への気管支鏡感度は78%。合併症率は1.55%(出血0.63%、気胸0.44%)で経皮針生検より低い。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq9"}, {"id": "1-diag-cq10", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ10", "question": "肺末梢病変の経気管支生検に、ラジアル型EBUSは勧められるか？", "recommendation": "ラジアル型EBUSを行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "67%（12/18）「強く推奨」、33%（6/18）「弱く推奨」", "keyPoints": "標準気管支鏡との比較で診断率64.7% vs 46.5%に向上。メタアナリシスで感度72～73%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq10"}, {"id": "1-diag-cq11", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ11", "question": "肺門・縦隔リンパ節および気管・中枢気管支に接する病変に対して、コンベックス型EBUS-TBNAは勧められるか？", "recommendation": "コンベックス型EBUS-TBNAを行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "86%（12/14）「強く推奨」、14%（2/4）「弱く推奨」", "keyPoints": "メタアナリシスで診断感度90%、特異度99%。気管・中枢気管支に接する病変では平均診断率89%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq11"}, {"id": "1-diag-cq12", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ12", "question": "肺末梢小型病変の経気管支生検に、仮想気管支鏡ナビゲーションは勧められるか？", "recommendation": "仮想気管支鏡ナビゲーションを行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "79%（15/19）「強く推奨」、21%（4/19）「弱く推奨」", "keyPoints": "メタアナリシスで3cm以下小型病変の診断率VBN群75.4% vs 非VBN群67.5%。到達率は91.8% vs 82.2%に改善。合併症に差なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq12"}, {"id": "1-diag-cq13", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ13", "question": "肺癌を疑う病変にクライオ生検は勧められるか？ a.中枢気道病変 b.末梢肺病変", "recommendation": "a. 中枢気道病変に対して弱く推奨する。 b. 末梢肺病変は推奨に至る根拠が明確ではない。", "strength": "a:2 / b:根拠が明確ではない", "evidence": "a:B / b:D", "consensus": "a. 14%「強く推奨」、71%「弱く推奨」、14%「根拠不明」 b. 36%「弱く推奨」、64%「根拠不明」", "keyPoints": "a.多施設ランダム化試験で診断率95.0% vs 85.1%(鉗子)に改善。止血処置を要する出血は同等。 b.ラジアル型EBUS併用時の診断率77%は鉗子生検72%と大差なし。気胸などの合併症評価が不十分。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq13"}, {"id": "1-diag-cq14", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ14", "question": "肺癌を疑う肺末梢病変に、経皮針生検は勧められるか？", "recommendation": "小型病変で経気管支生検が困難な症例に対し、空気塞栓や胸膜播種などの重篤な合併症の可能性を考慮のうえで、CTガイド経皮針生検を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "16%「強く推奨」、84%「弱く推奨」", "keyPoints": "気管支鏡との比較でメタアナリシスによる診断精度オッズ比0.43で優れている。気胸1～52%、喀血0.23～23%。重篤合併症は稀だが可能性あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq14"}, {"id": "1-diag-cq15", "part": "第1部 肺癌", "section": "診断/確定診断", "sectionCode": "1/1/030100", "cqNo": "CQ15", "question": "肺癌を疑う肺末梢病変に、外科的生検は勧められるか？", "recommendation": "胸腔鏡・開胸生検は侵襲が大きいため、その必要性を十分に考慮したうえで行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "5%「強く推奨」、95%「弱く推奨」", "keyPoints": "診断精度はほぼ100%。全身麻酔が必要。死亡率0～0.5%、合併症頻度3～9.6%（無気肺・肺炎など）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101030100.html#cq15"}, {"id": "1-diag-cq16", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ16", "question": "肺癌の組織診断およびバイオマーカー診断を行ううえで，望ましい組織検体はどのようなものか？", "recommendation": "適切な標本を用いることを強く推奨する（規定どおりに固定され，腫瘍細胞を含む組織量と腫瘍細胞含有率が十分で，かつ腫瘍細胞が挫滅していない検体を用い，古い検体を用いる際は保存状態を確認したうえで用いる）。", "strength": "1", "evidence": "C", "consensus": "100%（30/30）が「強く推奨」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq16"}, {"id": "1-diag-cq17", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ17", "question": "原発性肺癌のバイオマーカー検索に，細胞診検体は有用か？", "recommendation": "原発性肺癌のバイオマーカー検索に適した検体として，細胞診検体を使用することを弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "13%（4/30）が「強く推奨」、87%（26/30）が「弱く推奨」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq17"}, {"id": "1-diag-cq18", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ18", "question": "原発性肺癌の組織型診断に，免疫組織化学染色（免疫染色）は有用か？", "recommendation": "形態学的評価もしくは組織型同定が困難，あるいは分化傾向の不明瞭な非小細胞癌は免疫染色を強く推奨する。", "strength": "1", "evidence": "D", "consensus": "100%（30/30）が「強く推奨」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq18"}, {"id": "1-diag-cq19", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ19", "question": "臨床的，形態学的に転移性の可能性がある場合には，免疫染色が有用か？", "recommendation": "形態学的に鑑別が困難な場合は免疫染色を行うことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "90%（27/30）が「強く推奨」、10%（3/30）が「弱く推奨」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq19"}, {"id": "1-diag-cq20", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ20", "question": "術前未診断の主病巣に対して，術中迅速診断は有用か？", "recommendation": "腫瘍型や診断の目的によって正診率が異なるが，良悪性の判定等には一般に有用であり，強く推奨する。", "strength": "1", "evidence": "D", "consensus": "67%（20/30）が「強く推奨」、30%（9/30）が「弱く推奨」、3%（1/30）が「根拠が明確ではない」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq20"}, {"id": "1-diag-cq21", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ21", "question": "手術中に採取された胸腔内洗浄細胞診は予後の推測等に有用か？", "recommendation": "手術中に採取された胸腔内洗浄細胞診を行うことを弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "17%（5/30）が「強く推奨」、77%（23/30）が「弱く推奨」、7%（2/30）が「根拠が明確ではない」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq21"}, {"id": "1-diag-cq22", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "sectionCode": "1/1/040100", "cqNo": "CQ22", "question": "術前治療後の病理組織標本に対して病理学的評価を施行すべきか？", "recommendation": "術前治療を施した切除標本に対して統一した基準による評価を弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "57%（17/30）が「強く推奨」、40%（12/30）が「弱く推奨」、3%（1/30）が「根拠が明確ではない」", "keyPoints": null, "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101040100.html#cq22"}, {"id": "1-diag-cq23", "part": "第1部 肺癌", "section": "診断/病期診断", "sectionCode": "1/1/050100", "cqNo": "CQ23", "question": "T因子診断のために、必要な検査は何か？", "recommendation": "a. 胸部造影CTを行うよう強く推奨する。 b. 縦隔浸潤、胸壁浸潤、腫瘍周囲の無気肺の鑑別が必要な場合、FDG-PET/CTを行うよう強く推奨する。 c. 縦隔浸潤、胸壁浸潤、腫瘍周囲の無気肺の鑑別が必要な場合、胸部MRIを行うよう強く推奨する。", "strength": "a:1 / b:1 / c:1", "evidence": "a:C / b:C / c:C", "consensus": "a. 強く推奨100%（19/19） b. 強く推奨100%（19/19） c. 強く推奨79%（15/19）、弱く推奨21%（4/19）", "keyPoints": "CTは病変の存在・大きさ・広がりを正確に捉え、無気肺や浸潤診断に有用。FDG-PET/CTはT3・T4の正診率82%でCT単独68%より優れる。MRIはT3診断率80%（CT60%）、T4で100%（CT33.3%）と有用だが、GGNやT1-T2診断ではCTが優位。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101050100.html#cq23"}, {"id": "1-diag-cq24", "part": "第1部 肺癌", "section": "診断/病期診断", "sectionCode": "1/1/050100", "cqNo": "CQ24", "question": "N因子診断のために、必要な検査は何か？", "recommendation": "a. 胸部造影CT、FDG-PET/CTを行うよう強く推奨する。 b. MRIを行うよう弱く推奨する。 c. 縦隔リンパ節転移の有無で治療法が異なる症例において、画像検査で縦隔リンパ節転移を疑う場合、超音波内視鏡検査（EBUS-TBNA、EUS-FNA）による病理学的診断を行うよう強く推奨する。 d. 術前の画像検査で縦隔リンパ節転移が疑われ、超音波内視鏡検査では転移を認めなかった場合、縦隔鏡検査などの外科的生検を行うよう勧めるだけの根拠が明確ではない。", "strength": "a:1 / b:2 / c:1 / d:根拠不明確", "evidence": "a:A / b:C / c:A / d:該当なし", "consensus": "a. 強く推奨100%（19/19） b. 弱く推奨95%（18/19）、強く推奨5%（1/19） c. 強く推奨95%（18/19）、弱く推奨5%（1/19）", "keyPoints": "CTは感度59%・特異度78%。FDG-PET/CTは感度77.4%・特異度90.1%でA証拠。EBUS-TBNA感度90%・特異度99%、EUS-FNA感度90%・特異度97%と高い診断精度を示す。超音波内視鏡での系統的生検推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101050100.html#cq24"}, {"id": "1-diag-cq25", "part": "第1部 肺癌", "section": "診断/病期診断", "sectionCode": "1/1/050100", "cqNo": "CQ25", "question": "M因子診断のために、必要な検査は何か？", "recommendation": "a. FDG-PET/CT、頭部造影MRIを行うよう強く推奨する。 b. FDG-PET/CTで、単発の遠隔転移が疑われた場合は、可能なかぎり他の画像診断や病理学的診断で転移であることを確認するよう弱く推奨する。", "strength": "a:1 / b:2", "evidence": "a:A / b:B", "consensus": "a. 強く推奨100%（19/19） b. 弱く推奨100%（19/19）", "keyPoints": "FDG-PET/CTは感度77-100%・特異度93-100%、肝肺副腎の陰性的中率95%、骨90%。頭部転移はMRI造影が最高感度。副腎腺腫との鑑別困難時はMRI脂肪抑制画像やダイナミックMRI追加検査推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101050100.html#cq25"}, {"id": "1-diag-cq26", "part": "第1部 肺癌", "section": "診断/分子診断", "sectionCode": "1/1/060100", "cqNo": "CQ26", "question": "治療方針を決めるための，分子診断の項目は何か？", "recommendation": "a. 非小細胞肺癌手術例は周術期治療検討時にEGFR、ALKの遺伝子検査およびPD-L1免疫組織化学検査を行うよう強く推奨する。 b. 進行・再発非小細胞肺癌ではEGFR、ALK、ROS1、BRAF、MET、RET、KRAS、HER2の遺伝子検査およびPD-L1免疫組織化学検査を行うよう強く推奨する。 c. 第一・二世代EGFR-TKI治療抵抗性進行・再発非小細胞肺癌ではEGFR遺伝子変異検査を行うよう強く推奨する。 d. NTRK融合遺伝子検査、MSI検査、TMB検査は肺癌の場合においても行うよう強く推奨する。", "strength": "1（全項目）", "evidence": "B（全項目）", "consensus": "a. 強く推奨100%（16/16） b. 強く推奨100%（17/17） c. 強く推奨94%（16/17）、弱く推奨6%（1/17） d. 強く推奨95%（18/19）、弱く推奨5%（1/19）", "keyPoints": "項目aについて、ADAURA試験はEGFR変異陽性IB-IIIA期患者682例を対象。オシメルチニブ3年投与はプラセボと比較してII-IIIA期患者のDFS有意延長を示した。ALINA試験ではALK融合遺伝子陽性患者においてアレクチニブ2年投与が術後補助化学療法と比較してII-IIIA期のDFS有意改善を示した。IMpower010試験ではアテゾリズマブ1年投与がPD-L1 TC 1%以上のII-IIIA期患者でDFS有意延長を示した。CheckMate816試験ではニボルマブ併用化学療法がEFS有意延長を示し、PD-L1発現が高いほど効果が得られた。KEYNOTE-671試験ではペムブロリズマブ使用群がEFS有意延長を示した。項目bについて、EGFR遺伝子変異は肺腺癌の約半数に存在。ALK融合遺伝子、ROS1融合遺伝子、BRAF遺伝子V600E変異、MET遺伝子エクソン14スキッピング、RET融合遺伝子、KRAS遺伝子G12C変異、HER2遺伝子変異は非小細胞肺癌の約2～3%と低頻度である。各遺伝子に対する承認薬が存在する。PD-L1検査はPD-1/PD-L1阻害薬単剤治療適応判定および化学療法併用効果予測に有用。項目cについて、第一・二世代EGFR-TKI治療後にT790M変異陽性となった患者を対象とした試験でオシメルチニブが化学療法と比較してPFS有意延長をもたらす。項目dについて、NTRK融合遺伝子陽性固形がん対象試験でエヌトレクチニブはORR 57%(95% CI 43-71%)、ラロトレクチニブはORR 79%(95% CI 72-85%)を示した。肺癌患者のみを対象とした標準治療比較試験は実施されていないが、治療効果が期待される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101060100.html#cq26"}, {"id": "1-diag-cq27", "part": "第1部 肺癌", "section": "診断/分子診断", "sectionCode": "1/1/060100", "cqNo": "CQ27", "question": "非小細胞肺癌の治療方針決定のために行う分子診断は，検査項目に優先順位をつけるか？", "recommendation": "検査項目に優先順位をつけず，同時に行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "行うことを強く推奨82%（14/17）、行うことを弱く推奨12%（2/17）、推奨に至る根拠が明確ではない6%（1/17）、行わないことを弱く推奨0%、行わないことを強く推奨0%", "keyPoints": "ドライバー遺伝子変異/転座は相互排他的に存在していることから、これらの遺伝子検査を順次個別に行う方法も考えられるが、治療開始までの時間短縮および最適な治療薬投与機会確保のために、初回診断時に全遺伝子検査とPD-L1免疫組織化学検査を同時実施が推奨される。マルチ遺伝子検査やがんゲノムプロファイリング検査が利用可能。海外単施設後ろ向き検討では次世代シークエンサーを用いた遺伝子パネル検査は単一遺伝子を対象としたコンパニオン診断薬を順次行った場合と比較して低コストで信頼性が高く必要とする組織量も少なくて済むとの報告がある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/1/240101060100.html#cq27"}, {"id": "1-nsclc-surg-cq1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ1", "question": "手術適応決定には，呼吸機能評価や循環機能評価をはじめ，血液・生化学所見や年齢などを総合的に評価・検討することが必要か？", "recommendation": "術前呼吸機能・循環機能をはじめ総合的に評価・検討を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（9/9）強く推奨", "keyPoints": "spirometryは拘束性・閉塞性障害評価として確立／術前肺機能と術後死亡率・合併症の関連性が検討されている／術後予測肺機能（ppoFEV1.0）≧800 mLなどが参考値／術前呼吸訓練は術後合併症を有意に減少／安静時心電図は基本的機能評価として一般的／血液・生化学所見と年齢の総合的評価は手術適応決定に必須", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq1"}, {"id": "1-nsclc-surg-cq2", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ2", "question": "臨床病期Ⅰ-Ⅱ期非小細胞肺癌で標準手術可能な患者には，外科切除が勧められるか？", "recommendation": "臨床病期Ⅰ-Ⅱ期非小細胞肺癌で標準手術可能な患者には，外科切除を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（9/9）強く推奨", "keyPoints": "ランダム化比較試験は症例集積不良のため中止／定位放射線治療との比較メタアナリシスで手術が優位／手術メタアナリシスで全生存・癌特異的生存が手術良好／高齢者でも手術群が長期的自立維持／18,973例報告：5年生存率74.7%（臨床病期別：91.6～58.1%）／部分充実型結節は3カ月後のCT確認後に診断決定／すりガラス型結節は最大径15mm以上で確定診断推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq2"}, {"id": "1-nsclc-surg-cq3", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ3", "question": "臨床病期ⅠA1-2期非小細胞肺癌で外科切除可能な患者に対する適切な術式は何か？", "recommendation": "a．CTR≦0.25で縮小手術（区域切除または楔状切除）を行うよう強く推奨。b．0.25＜CTR≦0.5で区域切除を行うよう強く推奨。c．CTR＞0.5で区域切除または肺葉切除を行うよう強く推奨。", "strength": 1, "evidence": "B", "consensus": "100％（9/9）強く推奨（全項目共通）", "keyPoints": "JCOG0804/WJOG4507L試験（縮小手術）：333例登録，5年無再発生存率99.7%／JCOG1211試験（区域切除）：357例登録，5年無再発生存率98.0%／JCOG0802/WJOG4607L試験（ⅠA1-2 CTR>0.5）：5年生存率肺葉切除91.1% vs 区域切除94.3%／区域切除で局所再発率2倍，切除マージン確保が重要／CALGB140503試験：5年無病生存率肺葉切除64.1% vs 縮小手術63.6%（非劣性）／すりガラス濃度を呈する肺癌は術後5年以降再発例あり，十分経過観察必要", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq3"}, {"id": "1-nsclc-surg-cq4", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ4", "question": "臨床病期ⅠA3-Ⅱ期非小細胞肺癌で外科切除可能な患者に対する適切な術式は何か？", "recommendation": "臨床病期ⅠA3-Ⅱ期非小細胞肺癌で外科切除可能な患者に対して，肺葉以上の切除を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "100％（9/9）強く推奨", "keyPoints": "米国Lung Cancer Study Group試験：腫瘍最大径3cm以下，リンパ節転移なし／肺葉切除と縮小切除の比較で肺葉切除が優位／縮小切除で局所再発3倍，予後不良傾向／重症合併症は肺葉切除に多いが結論として肺葉切除を推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq4"}, {"id": "1-nsclc-surg-cq5", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ5", "question": "臨床病期Ⅰ期非小細胞肺癌で外科治療が可能であるが，標準手術が不可能な患者に，縮小手術を行ってもよいか？", "recommendation": "臨床病期Ⅰ期非小細胞肺癌で外科治療が可能であるが，標準手術が不可能な患者に，縮小手術を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（9/9）強く推奨", "keyPoints": "肺葉切除不能例95例：3年生存率縮小手術65% vs 放射線治療60%／米国NCDB解析：縮小手術30,451例がOS良好／楔状切除10,032例vs定位放射線治療4,296例：完全切除例が放射線治療に優位／昨今の放射線治療技術的進歩も認めるが手術有効性高い", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq5"}, {"id": "1-nsclc-surg-cq6", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ6", "question": "cN2非小細胞肺癌の治療方針は，呼吸器外科医，内科医，放射線治療医を含めた集学的治療グループで検討すべきか？", "recommendation": "cN2非小細胞肺癌の治療方針は，呼吸器外科医，内科医，放射線治療医を含めた集学的治療グループでの検討を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（10/10）強く推奨", "keyPoints": "N2症例の治療方法は多様化／SEER database解析：単独治療より複合治療が良好／縦隔リンパ節転移の臨床診断は困難：43%が病理学的N0-1／Multiple station N2やBulky N2除き組織学的N2診断推奨／臨床試験ではN2対象が組織学的に診断された症例", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq6"}, {"id": "1-nsclc-surg-cq7", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ7", "question": "臨床病期ⅢA期T4N0-1非小細胞肺癌に対して，外科切除を行うよう勧められるか？", "recommendation": "臨床病期ⅢA期T4N0-1非小細胞肺癌に対して，外科切除を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "80％（8/10）強く推奨，20％（2/10）弱く推奨", "keyPoints": "ランダム化比較試験なく症例対照研究のみ／1,000例以上コホート研究：導入治療群が切除断端陽性少なく全生存良好／大動脈合併切除：致命的合併症0～12%，5年生存率37～48%／左房合併切除：致命的合併症0～10%，5年生存率16～46%／上大静脈合併切除：致命的合併症4～10%，5年生存率24～31%／分岐部合併切除：致命的合併症3～20%，pN0で5年70%，pN1で35%，pN2で9%／横隔膜合併切除：致命的合併症1.6～4.4%，5年生存率19～42.6%／本邦報告：T4N0で70歳未満なら5年生存率50%超", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq7"}, {"id": "1-nsclc-surg-cq8", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ8", "question": "切除可能な非小細胞肺癌に対して，リンパ節郭清もしくはサンプリングを行い，病理学的評価を行うべきか？", "recommendation": "リンパ節郭清もしくはサンプリングを行い，病理学的評価を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "100％（10/10）強く推奨", "keyPoints": "ACOSOG Z0030試験（最大規模ランダム化）：郭清とサンプリング非劣性／OS中央値郭清8.5年 vs サンプリング8.1年／5年無再発生存率郭清68% vs サンプリング69%／サンプリング群でpN2の4%が見落とされ／郭清は手術時間15分延長のみで合併症差なし／選択的リンパ節郭清（lobe-specific）：ランダム化比較試験は96例で質担保されず／選択的郭清で再発増加報告あり，JCOG1413試験実施中／すりガラス優位末梢小型肺癌：リンパ節転移頻度極めて低い／CTR≦0.5で121例中115例（95%）が非浸潤性腺癌／CTR≦0.25で35例中34例（97%）が非浸潤性腺癌", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq8"}, {"id": "1-nsclc-surg-cq9", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ9", "question": "臨床病期T3N0-1M0の胸壁浸潤非小細胞肺癌には，胸壁合併切除を行うよう勧められるか？", "recommendation": "臨床病期T3N0-1M0の胸壁浸潤非小細胞肺癌には，胸壁合併切除を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（10/10）強く推奨", "keyPoints": "手術死亡率0～7.8%，合併症発生率19～44%／完全切除例5年生存率32% vs 非完全切除例4%／IASLCデータベース解析：pT3N0M0胸壁浸潤で完全切除例5年50%／壁側胸膜のみ浸潤 vs 骨性胸壁浸潤：予後差なし／pN0で5年生存率25～67%，pN1で20～100%，pN2で6.2～20.5%／本邦報告：pN0が49.1%，pN1が36.5%，pN2が20.5%（有意差あり）／pN0症例では胸壁浸潤の程度は予後に影響しない／肋骨浸潤がpN0症例で予後不良因子の報告あり／N2の手術単独療法は不推奨／導入化学放射線療法後手術：3年全生存77%，5年63%／補助化学療法：NCDB824例でHR 0.74で生存改善", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq9"}, {"id": "1-nsclc-surg-cq10", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ10", "question": "心膜に浸潤した臨床病期T3N0-1M0の非小細胞肺癌には，合併切除を行うよう勧められるか？", "recommendation": "心膜に浸潤した臨床病期T3N0-1M0非小細胞肺癌には合併切除を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（10/10）強く推奨", "keyPoints": "心膜合併切除例5年生存率15.1～54.2%／フランス報告91例：全体5年生存率15.1%で予後不良／T3：32例，T4：59例で予後の有意差なし／リンパ節転移頻度極めて高い：N0（13.2%），N1（34.1%），N2（52.8%）／肺全摘の頻度も高い／N2症例で予後不良のため手術単独療法は不推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq10"}, {"id": "1-nsclc-surg-cq11", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ11", "question": "肺全摘を避けて，気管支・肺動脈形成を行うべきか？", "recommendation": "肺全摘を避けて，気管支・肺動脈形成を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%（9/9）", "keyPoints": "気管支・肺動脈形成術後の局所制御は肺全摘と同等以上／手術死亡率0.9～5.9%／気管支楔状切除は管状切除と同等の成績／肺動脈形成は単独施行時も併施時も安全性・有効性が報告されている／導入療法後の形成術でも術死亡・合併症に差がない報告と影響を示す報告が存在", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq11"}, {"id": "1-nsclc-surg-cq12", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ12", "question": "同一肺葉内結節で転移（PM1）もしくは多発肺癌を疑うcN0症例において，手術を行うべきか？", "recommendation": "同一肺葉内結節で転移（PM1）もしくは多発肺癌を疑うcN0症例において，手術を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "100%（10/10）", "keyPoints": "PM1症例の5年生存率30～58%で，リンパ節転移陰性例は概ね50%以上／IASLC登録症例でcN0，M0症例は切除例68%に対し非切除例0%／pN0M0R0例で良好予後／術前検査でPM1が疑われても結節が転移でない場合も認められ診断価値がある／リンパ節転移を有する症例，特にN2確定例は手術単独療法は推奨されない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq12"}, {"id": "1-nsclc-surg-cq13", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ13", "question": "同時性他肺葉内結節で，多発原発性肺癌を疑う症例において，手術を行うべきか？", "recommendation": "同時性他肺葉内結節で，多発原発性肺癌を疑う症例においては，手術を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "強く推奨70%（7/10）、弱く推奨30%（3/10）", "keyPoints": "多発原発性肺癌と肺内転移の鑑別診断にMartini and Melamedの基準が使用される／縦隔リンパ節転移がない症例の5年生存率53～97.2%で外科治療が良好／すりガラス影を伴った多発肺癌は特に予後良好／縦隔リンパ節転移がある場合は予後不良／同一組織型での鑑別は必ずしも容易でなく，分子生物学的診断が進行中", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq13"}, {"id": "1-nsclc-surg-cq14", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ14", "question": "同時性他肺葉内結節で，肺内転移（PM2，3）を疑う症例において，手術を行うべきか？", "recommendation": "同時性肺内転移（PM2，3）を疑う症例においては，手術を行わないよう弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "行わないことを弱く推奨90%（9/10）、強く推奨10%（1/10）", "keyPoints": "PM2症例の5年生存率22.5%，M1a症例20.5%で有意差なし／PM2，3の予後はPM1と比較して不良／手術を推奨する科学的根拠は明確でない／局所治療希望時は手術以外の治療（ラジオ波焼灼療法等）も考慮対象", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq14"}, {"id": "1-nsclc-surg-cq15", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ15", "question": "異時性多発肺癌に対して，耐術能があれば外科治療を行ってもよいか？", "recommendation": "異時性多発肺癌に対しては，耐術能があれば外科治療を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "強く推奨90%（9/10）、弱く推奨10%（1/10）", "keyPoints": "5年生存率は一次癌から76～83.9%，二次癌から42～71.7%／手術関連死1.4～7.0%／肺機能が許せば肺葉切除が良好，縮小手術でも同等成績の報告あり／肺全摘に関しては予後に関して報告に差あり／遺伝子分析で再発肺内転移との鑑別が可能／耐術能がない患者にはSBRTで手術と同等成績（5年生存率38～65.8%）", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq15"}, {"id": "1-nsclc-surg-cq16", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ16", "question": "臨床病期Ⅰ期非小細胞肺癌に対して，胸腔鏡下肺切除を行ってもよいか？", "recommendation": "胸腔鏡下肺切除を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "強く推奨60%（6/10）、弱く推奨40%（4/10）", "keyPoints": "3つのランダム化比較試験で安全性，予後，リンパ節郭清に差なし／メタアナリシスでVATSと開胸で周術期成績に有意差なし，局所再発頻度同等／VATS群で遠隔転移が少なく5年生存率が良好な報告もある／術後疼痛・QOLでVATS群が有意に優れた報告あり／周術期死亡HR 0.64，長期生存HR 0.88でVATS群が優位（大規模メタアナリシス）／VATSと開胸で系統的リンパ節郭清の精度に差なし／単孔式（U-VATS）と多孔式（M-VATS）で周術期成績差なし，術後疼痛ではU-VATS優位／実地臨床では肺葉切除の約70%がVATS化／症例によっては開胸へのconversion躊躇は禁物", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq16"}, {"id": "1-nsclc-surg-cq17", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ17", "question": "臨床病期Ⅰ期非小細胞肺癌に対して，ロボット支援下肺切除を行ってもよいか？", "recommendation": "臨床病期Ⅰ期非小細胞肺癌に対して，ロボット支援下肺切除を行うことを弱く推奨する。", "strength": 2, "evidence": "B", "consensus": "弱く推奨100%（10/10）", "keyPoints": "RATSとVATSの周術期成績，根治性，安全性，長期予後は同等／RATSはリンパ節郭清でVATSより優位（複数の後方視的研究）／前方視的ランダム化試験でもRATS群で有意にリンパ節サンプリング可能／ROMAN study，RVlob trialでRATSとVATS周術期成績同等，リンパ節郭清ではRATS優位／cN2肺癌でRATSと開胸のランダム化試験では周術期管理でRATSが優位，予後同等／複雑な手技（区域切除，気管支形成，術前治療後手術）への応用も報告／欠点：術中医原性合併症発生率が高い報告，手術時間が長い，コスト／本邦での十分な症例解析未実施／緊急時対処法をチーム内で事前協議が重要", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq17"}, {"id": "1-nsclc-surg-cq18", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ18", "question": "外科切除後の非小細胞肺癌に対しては，定期的な経過観察を行うべきか？", "recommendation": "外科切除後の非小細胞肺癌に対しては定期的な経過観察を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨100%（9/9）", "keyPoints": "ランダム化比較試験が少なく科学的根拠に乏しい／IntensiveかLessな観察間隔で予後改善なし（大規模データベース解析）／ランダム化比較試験では定期的フォローアップと症状出現時フォローで生存率差なし／日常臨床に十分浸透している／再発検出により積極的治療の機会が生まれる可能性／CT頻度や観察期間に関する明確な根拠はない", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq18"}, {"id": "1-nsclc-surg-cq19", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ19", "question": "非小細胞肺癌術後の患者に対しては禁煙を行うよう勧められるか？", "recommendation": "非小細胞肺癌術後の患者に対しては禁煙を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨100%（10/10）", "keyPoints": "喫煙継続は術後合併症，特に呼吸器合併症を増加させる／禁煙は術後呼吸機能改善に寄与／肺癌再発リスク低下が報告されている／禁煙支援で禁煙率向上（複合的支援で75%）／術後禁煙による全生存率改善の報告あり／禁煙は喫煙継続に比べ有意に予後良好", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq19"}, {"id": "1-nsclc-surg-cq20", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "sectionCode": "1/2/010100", "cqNo": "CQ20", "question": "切除可能な低悪性度腫瘍に対しては，非小細胞肺癌に準じた外科治療を行うべきか？", "recommendation": "切除可能な低悪性度腫瘍（カルチノイド，粘表皮癌，腺様嚢胞癌）に対しては，非小細胞肺癌に準じた外科治療を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "強く推奨100%（10/10）", "keyPoints": "典型的カルチノイドは低悪性度で長期生存期待できる／非定型カルチノイドは典型的カルチノイドより悪性度高く転移リスク存在／粘表皮癌・腺様嚢胞癌は比較的まれで予後情報限定的／これらの腫瘍でも完全切除が予後良好の必須要件／リンパ節郭清の意義は明確でないが転移例では予後不良／低悪性度腫瘍でも縮小手術の科学的根拠は不十分", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102010100.html#cq20"}, {"id": "1-nsclc-pdt-cq21", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 光線力学的治療", "sectionCode": "1/2/020100", "cqNo": "CQ21", "question": "中心型早期肺癌に光線力学的治療法（PDT）は勧められるか？", "recommendation": "中心型早期肺癌の中で、腫瘍全体にレーザー照射が可能な長径1.0 cm以下の病巣を対象に行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨64%（9/14）、弱く推奨36%（5/14）、合意率100%", "keyPoints": "PDTは中心型早期肺癌に対する有効な治療法であり，特に腫瘍径1.0 cm以下での完全寛解率は83～100%と良好／局所再発率は8.5～33.3%／日光過敏症などの副作用管理が必要／5年生存率は72～81%／手術困難例のQOL向上に貢献／ランダム化比較試験は早期癌の性質上困難だが，多くの観察研究で有効性が示されている", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102020100.html#cq21"}, {"id": "1-nsclc-rtbase-cq22-1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 放射線治療基本的事項", "sectionCode": "1/2/030100", "cqNo": "CQ22-1", "question": "肺癌胸部放射線治療計画はCTを用いた3次元治療計画を行うことが勧められるか？", "recommendation": "少なくともCTを用いた3次元治療計画を行い，3次元的な線量分布図およびDVHを常に検討するよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "94%（17/18）が「行うことを強く推奨」", "keyPoints": "CTシミュレーション利用により，標的体積線量維持で正常肺・心臓平均線量が有意に減少／放射線肺臓炎リスク低下にはV20Gyが40%超過回避が重要／化学療法併用時はV20Gy 25～30%以下で低リスク／DVHによる標的体積およびリスク臓器の線量評価を推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102030100.html#cq22-1"}, {"id": "1-nsclc-rtbase-cq22-2", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 放射線治療基本的事項", "sectionCode": "1/2/030100", "cqNo": "CQ22-2", "question": "肺癌胸部放射線治療計画において，呼吸性移動対策を講じることが勧められるか？", "recommendation": "胸部放射線治療計画において，腫瘍の呼吸による動きを評価し，その程度に応じた呼吸性移動対策を講じることを強く推奨する。", "strength": 1, "evidence": "C", "consensus": "61%（11/18）が「行うことを強く推奨」，39%（7/18）が「弱く推奨」", "keyPoints": "呼吸性移動未評価時，腫瘍線量不足またはリスク臓器過照射のリスク存在／4D-CT同期治療で標的体積有意減少，リスク臓器線量有意低下／透視確認・4D-CT・息止め・腹部圧迫・追尾・同期など複数対策方法有効／IGRT利用で局所制御率向上，合併症低減の可能性報告", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102030100.html#cq22-2"}, {"id": "1-nsclc-rtbase-cq23", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 放射線治療基本的事項", "sectionCode": "1/2/030100", "cqNo": "CQ23", "question": "放射線治療の品質管理は勧められるか？", "recommendation": "放射線治療では，品質管理を適切に行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%（18/18）が「行うことを強く推奨」", "keyPoints": "2000年前後に品質管理不十分による過剰・過少照射事例相次ぎ重要性再認識／肺癌臨床試験でプロトコール違反症例は生存率有意に不良／品質管理モニター不足施設で成績不良，重大逸脱症例で局所制御率・全生存率有意悪化／装置保守管理，照射野設定，線量計算の品質管理実施推奨", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102030100.html#cq23"}, {"id": "1-nsclc-periop-cq24", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ24", "question": "臨床病期Ⅰ-ⅢB期（第9版）に対して，術前および術前＋術後治療は勧められるか？", "recommendation": "a．臨床病期Ⅰ-ⅡA期（第9版）に対して，術前プラチナ製剤併用療法を行わないよう弱く推奨する（強さ2・エビデンスC）。b．臨床病期Ⅱ-ⅢB期（第9版）*，EGFR遺伝子変異/ALK融合遺伝子陰性もしくは不明例に対して，術前にプラチナ製剤併用療法とニボルマブを併用した治療を行うよう弱く推奨する（強さ2・エビデンスB）。c．臨床病期Ⅱ-ⅢB期（第9版）**に対して，術前にプラチナ製剤併用療法とペムブロリズマブを併用し，術後にペムブロリズマブの追加を行うよう弱く推奨する（強さ2・エビデンスB）。d．切除可能な臨床病期ⅢA-B期（第9版）*に対して，術前化学放射線療法を行うよう弱く推奨する（強さ2・エビデンスC）。", "strength": 2, "evidence": "C/B/B/C（a=C, b=B, c=B, d=C）", "consensus": "a: 弱く推奨51%(27/53)，弱く推奨しない42%(22/53)，根拠不明確8%(4/53)。b: 強く推奨8%(4/50)，弱く推奨92%(46/50)。c: 強く推奨4%(2/52)，弱く推奨96%(50/52)。d: 弱く推奨68%(25/37)，根拠不明確27%(10/37)，弱く推奨しない5%(2/37)", "keyPoints": "術前補助薬物療法のメタアナリシスでは臨床病期によらず有効性が示唆されるが，早期症例では過剰治療や手術機会喪失の可能性／CheckMate816試験でニボルマブ併用群はプラチナ併用単独群と比べEFS改善（HR 0.63）／KEYNOTE-671試験でペムブロリズマブ併用群はEFS改善（HR 0.58），OS改善も示された（HR 0.72）／術前化学放射線療法は局所領域再発減少が示唆されるが全生存率改善は未確認", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq24"}, {"id": "1-nsclc-periop-cq25", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ25", "question": "病変全体径＞2 cmの術後病理病期ⅠA3-ⅢA期（N0）（第9版）完全切除，腺癌症例に対して，テガフール・ウラシル配合剤療法は勧められるか？", "recommendation": "行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "強く推奨85%(34/40)，弱く推奨13%(5/40)，根拠不明確3%(1/40)", "keyPoints": "メタアナリシス（2,003症例）で全体的に5%の5年生存率改善／腺癌においてHR 0.69（95%CI 0.56-0.85）で有効性確認／腫瘍径>2cm且つ≤3cmで6%の改善率（82%→88%），HR 0.62", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq25"}, {"id": "1-nsclc-periop-cq26", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ26", "question": "病変全体径＞2 cmの術後病理病期ⅠA3-ⅢA期（N0）（第9版）完全切除，非腺癌症例に対して，テガフール・ウラシル配合剤療法は勧められるか？", "recommendation": "行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "弱く推奨100%(40/40)", "keyPoints": "メタアナリシスで非腺癌（扁平上皮癌）に限定すると有効性証拠が限定的／扁平上皮癌患者の解析ではHR 0.93（95%CI 0.38-2.27）で有意差なし／非腺癌の完全切除例は57.1%が無再発であり，薬物療法の安全性を十分考慮が必要", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq26"}, {"id": "1-nsclc-periop-cq27", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ27", "question": "術後病理病期Ⅱ-ⅢB期（第9版）完全切除例に対して，シスプラチン併用化学療法は勧められるか？", "recommendation": "行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "強く推奨95%(38/40)，弱く推奨5%(2/40)", "keyPoints": "IALT，JBR.10，ANITA試験でCDDP併用療法によるDFSおよび5年生存率向上を示唆／メタアナリシス（4,584症例，5試験）でHR 0.89（95%CI 0.82-0.96）による有意な延命効果／CDDP+VNR療法に限ったメタアナリシスでHR 0.80，Ⅲ期で25%→40%への生存率向上／Ⅱ期で43%→54%への生存率向上", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq27"}, {"id": "1-nsclc-periop-cq28", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ28", "question": "EGFR遺伝子変異陽性の術後病理病期Ⅱ-ⅢB期（第9版）完全切除例に対して，EGFRチロシンキナーゼ阻害薬は勧められるか？", "recommendation": "a．従来の術後補助薬物療法後に，オシメルチニブによる治療の追加を行うよう弱く推奨する（強さ2・エビデンスB）。b．プラチナ製剤併用療法の代わりとしてEGFR-TKIによる治療を行うよう勧めるだけの根拠が明確ではない。", "strength": 2, "evidence": "B（bは推奨の強さ・エビデンスの強さ設定なし）", "consensus": "a: 強く推奨52%(29/56)，弱く推奨48%(27/56)。b: 弱く推奨4%(2/49)，根拠不明確53%(26/49)，弱く推奨しない31%(15/49)，強く推奨しない12%(6/49)", "keyPoints": "ADAURA試験：プラセボ群に対してオシメルチニブ群でⅡ-ⅢA期のDFS延長（HR 0.17），OS改善（HR 0.49，5年OS：85%対73%），CNS-DFS延長（HR 0.24）／対照がプラセボであり術後補助薬物療法省略の可否は不明確／ADJUVANT試験：ゲフィチニブがCDDP+VNR療法と比べDFS改善（HR 0.60）だがOS改善なし／IMPACT試験：ゲフィチニブはCDDP+VNR療法と比べDFS改善なし（HR 0.92），OS延長なし", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq28"}, {"id": "1-nsclc-periop-cq29", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ29", "question": "ALK融合遺伝子陽性の術後病理病期Ⅱ-ⅢB期（第9版）完全切除例に対して，ALKチロシンキナーゼ阻害薬は勧められるか？", "recommendation": "従来の術後補助薬物療法の代わりとしてアレクチニブによる治療を行うよう弱く推奨する。", "strength": 2, "evidence": "B", "consensus": "強く推奨25%(13/53)，弱く推奨70%(37/53)，根拠不明確6%(3/53)", "keyPoints": "ALINA試験：アレクチニブ（1,200mg/日，2年間）はプラチナ併用療法と比べDFS延長（HR 0.24）／CNS転移を含むCNSイベント減少（HR 0.22）／Grade 3以上有害事象は両群で同等（29.7%対30.8%）／OSの統計学的評価はまだ不十分", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq29"}, {"id": "1-nsclc-periop-cq30", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ30", "question": "術後病理病期ⅡA-ⅢB期（第9版）完全切除例に対して，アテゾリズマブ単剤療法は勧められるか？", "recommendation": "a．PD-L1発現50%以上例に対して，CDDP併用化学療法後にアテゾリズマブの追加を行うよう弱く推奨する（強さ2・エビデンスC）。b．PD-L1発現1%以上50%未満例に対して，アテゾリズマブの追加を行うよう勧めるだけの根拠が明確ではない。", "strength": 2, "evidence": "C（bは根拠不明確）", "consensus": "a: 強く推奨54%(30/56)，弱く推奨46%(26/56)。b: 弱く推奨34%(19/56)，根拠不明確41%(23/56)，弱く推奨しない25%(14/56)", "keyPoints": "IMpower010試験：PD-L1 TC 1%以上のⅡ-ⅢA期でDFS延長（HR 0.66，中央値未到達対35.3カ月）／PD-L1 TC 50%以上でHR 0.43，TC 1～49%でHR 0.87と異なる効果／更新OS報告でPD-L1 TC 50%以上でHR 0.43，TC 1～49%でHR 0.95／Grade 3以上有害事象：22%対12%，治療関連死亡2%対1%", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq30"}, {"id": "1-nsclc-periop-cq31", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ31", "question": "術後病理病期Ⅰ-Ⅱ期完全切除例に対して，術後放射線療法は勧められるか？", "recommendation": "行わないよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "強く推奨しない100%(40/40)", "keyPoints": "PORT Meta-analysis 2016年版：術後放射線療法でむしろ予後悪化（HR 1.18，95%CI 1.07-1.31）／2年生存率を58%から53%に5%低下させる／早期症例（Ⅰ-Ⅱ期）で予後増悪効果が顕著", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq31"}, {"id": "1-nsclc-periop-cq32", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "CQ32", "question": "術後病理病期Ⅲ期（N2）完全切除例に対して，術後放射線療法は勧められるか？", "recommendation": "行うよう勧めるだけの根拠が明確ではない。", "strength": null, "evidence": null, "consensus": "弱く推奨4%(2/51)，根拠不明確63%(32/51)，弱く推奨しない31%(16/51)，強く推奨しない2%(1/51)", "keyPoints": "PORT Meta-analysisではⅢ期N2で明確な予後増悪効果示されず／ANITA試験サブグループ解析でpN2症例の予後改善可能性示唆／PORT-C試験：DFSは改善なし（HR 0.84），OSも有意差なし（HR 1.02），局所領域無増悪生存延長（HR 0.71）／Lung ART試験：DFSで有意差なし（HR 0.86），OSなし，Grade 3/4心肺有害事象増加（11%対5%）／メタアナリシス：局所領域無増悪生存延長（HR 0.64）確認されるも，DFS改善（HR 0.83），OS改善なし（HR 0.87）／国内JCOG1916試験進行中で結果待機", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#cq32"}, {"id": "1-nsclc-periop-bq1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "sectionCode": "1/2/040100", "cqNo": "BQ1", "question": "臨床病期Ⅱ-ⅢB期（第9版）に対して，術前薬物療法は勧められるか？", "recommendation": "臨床病期Ⅱ-ⅢB期（第9版）に対して，術前プラチナ製剤併用療法は手術療法単独と比べて全生存期間の延長が示されている。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "術前補助薬物療法のメタアナリシスで臨床病期によらず有効性を示唆／ChEST試験：CDDP+GEM療法でOS延長（HR 0.63）を示唆，より進行症例（ⅡB-ⅢA期）で効果高まる傾向／CBDCA+PTX療法試験：DFS有意延長なし（HR 0.92）だが臨床病期Ⅱ期以上でDFS-HR 0.81と傾向／治療関連死亡1%程度と手術施行率低下に注意", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102040100.html#bq1"}, {"id": "1-nsclc-rt12-cq33", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "sectionCode": "1/2/050100", "cqNo": "CQ33", "question": "医学的な理由で手術ができないⅠ-Ⅱ期非小細胞肺癌に対して、根治的放射線治療は勧められるか？", "recommendation": "医学的な理由で手術ができないⅠ-Ⅱ期非小細胞肺癌には，根治的放射線治療の適応があり，行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100％（40/40）が「行うことを強く推奨」", "keyPoints": "手術不能Ⅰ-Ⅱ期の経過観察と根治的放射線治療の比較ランダム化試験はないが，複数報告がありエビデンスレベルはC／いずれのレビューでも経過観察より根治的放射線療法が推奨される", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102050100.html#cq33"}, {"id": "1-nsclc-rt12-cq34", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "sectionCode": "1/2/050100", "cqNo": "CQ34", "question": "切除可能なⅠ-Ⅱ期非小細胞肺癌に対して、根治的放射線治療は勧められるか？", "recommendation": "a．肺葉切除可能なⅠ-Ⅱ期非小細胞肺癌で手術を希望しない場合は，根治的放射線治療を行うよう強く推奨する（強さ1・エビデンスC）。b．外科切除が可能であるが肺葉以上の切除が不可能なⅠ-Ⅱ期非小細胞肺癌患者には，根治的放射線治療を行うことを弱く推奨する（強さ2・エビデンスC）。", "strength": 1, "evidence": "C（a=C, b=C）", "consensus": "a: 83％（33/40）が「強く推奨」，18％（7/40）が「弱く推奨」。b: 91％（32/35）が「弱く推奨」，6％（2/35）が「強く推奨しない」", "keyPoints": "ランダム化比較試験なし。標準治療は肺葉切除だが，手術を希望しない場合の根治療法として放射線治療が選択肢となり得る／肺葉切除不能時，縮小手術とSBRTの成績に有意差なし。両者で治療成績に有意な差を認めなかった報告あり", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102050100.html#cq34"}, {"id": "1-nsclc-rt12-cq35", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "sectionCode": "1/2/050100", "cqNo": "CQ35", "question": "医学的な理由で組織診（もしくは細胞診）および手術ができない臨床的に原発性肺癌と診断された孤立性肺腫瘍（組織未確定）に対して、根治的放射線治療は勧められるか？", "recommendation": "臨床的に原発性肺癌と診断された孤立性肺腫瘍（組織未確定）に対して，根治的放射線治療を行うよう勧めるだけの根拠が明確ではない。", "strength": null, "evidence": null, "consensus": "53％（25/47）が「推奨に至る根拠が明確ではない」，34％（16/47）が「弱く推奨」", "keyPoints": "組織未確定例へのSBRTの成績は良好（3年生存率79-83％）だが，標準治療との比較試験なし／勧めるだけの根拠が明確ではないと判断／組織診断を得ることが望ましく，悪性例を除外することが重要", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102050100.html#cq35"}, {"id": "1-nsclc-rt12-cq36", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "sectionCode": "1/2/050100", "cqNo": "CQ36", "question": "Ⅰ期非小細胞肺癌の根治的放射線治療における適切な照射法は何か？", "recommendation": "線量の集中性を高める高精度放射線照射技術を用いることを強く推奨する。", "strength": 1, "evidence": "B", "consensus": "100％（8/8）が「行うことを強く推奨」", "keyPoints": "SBRTが通常分割照射より局所制御に優れ，毒性が低い／SPACE試験とCHISEL試験で「SBRTのほうが良好な局所無再発率」を示す／粒子線治療もSBRTと同等の成績だが，X線治療に対する優位性のエビデンスは乏しい", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102050100.html#cq36"}, {"id": "1-nsclc-rt3-cq37", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ37", "question": "切除不能局所進行非小細胞肺癌、全身状態良好（PS 0-1）の患者に対して、化学放射線療法は勧められるか？", "recommendation": "化学放射線療法を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "100%（40/40）", "keyPoints": "メタアナリシス：HR 0.87，P=0.0052，2年死亡リスク15～30%減少／JCOG0301試験：HR 0.68，中央値22.4カ月 vs 16.9カ月／CBDCA 30 mg/m²/日，60 Gy照射", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq37"}, {"id": "1-nsclc-rt3-cq38", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ38", "question": "化学療法と放射線療法の併用時期は、同時併用が勧められるか？", "recommendation": "同時併用を行うことを強く推奨する。", "strength": 1, "evidence": "A", "consensus": "100%（40/40）", "keyPoints": "MVP療法：中央値16.5カ月 vs 13.3カ月，P=0.03998／RTOG9410試験：HR 0.812，中央値17.0 vs 14.6カ月／急性期Grade 3以上好中球減少88% vs 77%／メタアナリシス：HR 0.84，P=0.004", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq38"}, {"id": "1-nsclc-rt3-cq39", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ39", "question": "プラチナ製剤と第三世代以降の細胞傷害性抗癌薬併用を勧められるか？", "recommendation": "プラチナ製剤と第三世代以降の細胞傷害性抗癌薬を併用した治療を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "94%（33/35）", "keyPoints": "WJTOG0105試験：CP療法22.0カ月，MVP療法20.5カ月／OLCSG0007試験：CD療法60.3% vs MVP 48.1%（2年OS率）／10年OS率：MVP 13.6%，CP療法15.2%／PROCLAIM試験：HR 0.98，中央値PE 26.8 vs PP 25.0カ月", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq39"}, {"id": "1-nsclc-rt3-cq40", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ40", "question": "シスプラチン一括投与が不適な高齢者に対して、連日カルボプラチン投与による化学放射線療法は勧められるか？", "recommendation": "連日カルボプラチン投与による化学放射線療法を行うよう弱く推奨する。", "strength": 2, "evidence": "B", "consensus": "38%強く推奨（13/34），62%弱く推奨（21/34）", "keyPoints": "JCOG0301試験：HR 0.68，中央値22.4 vs 16.9カ月／Grade 3/4好中球減少：57.3% vs 0%／Grade 3/4血小板減少：22.9% vs 2.0%／Grade 3/4感染症：12.5% vs 4.1%", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq40"}, {"id": "1-nsclc-rt3-cq41-1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ41-1", "question": "同時化学放射線療法後に、異なる細胞傷害性抗癌薬に変更して地固め化学療法を行うよう勧められるか？", "recommendation": "地固め化学療法は行わないよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "行わないことを強く推奨100%（29/29）", "keyPoints": "CDDP＋ETP＋放射線後のDTX地固め試験／OS中央値：21.2カ月 vs 23.2カ月，P=0.883／発熱性好中球減少症10.9%，感染症11.0%，肺臓炎9.6%／治療関連死亡5.5%で試験早期無効中止", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq41-1"}, {"id": "1-nsclc-rt3-cq41-2", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ41-2", "question": "同時化学放射線療法後に，免疫チェックポイント阻害薬による地固め療法を行うよう勧められるか？", "recommendation": "同時化学放射線療法後に，デュルバルマブによる地固め療法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "75%（33/44）が強く推奨", "keyPoints": "PACIFIC試験／PFS: HR 0.52（95% CI 0.42-0.65），中央値16.8カ月 vs 5.6カ月／OS: HR 0.68，5年OS率42.9% vs 33.4%／放射線肺臓炎（日本人）: デュルバルマブ群73.6% vs プラセボ群60.0%／Grade 3/4放射線肺臓炎（日本人）: 5.6% vs 2.5%", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq41-2"}, {"id": "1-nsclc-rt3-cq42", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ42", "question": "化学療法併用時の適切な照射法は何か？", "recommendation": "a．総線量は通常分割で少なくとも60 Gyを用いるよう強く推奨（エビデンスA）。b．74 Gyの高線量照射は行わないよう強く推奨（エビデンスB）。c．標的病変に十分な線量を投与し，かつ正常臓器の毒性を低減するような照射野を設定するよう強く推奨（エビデンスB）。", "strength": 1, "evidence": "A/B/B（a=A, b=B, c=B）", "consensus": "a: 100%（36/36）。b: 100%（34/34）。c: 100%（43/43）", "keyPoints": "RTOG0617試験／60 Gy vs 74 Gy: OS HR 1.35（95% CI 1.08-1.69），中央値28.7カ月 vs 20.3カ月／標準分割：1回1.8～2 Gy，週5回，計60 Gy／IMRT vs 3D-CRT／肺V5 Gy と Grade 2以上放射線肺臓炎の関連", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq42"}, {"id": "1-nsclc-rt3-cq43", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ43", "question": "切除不能局所進行期非小細胞肺癌で化学療法併用不能なものに対して，放射線単独療法は勧められるか？", "recommendation": "放射線単独療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%（13/13）", "keyPoints": "240人対象のランダム化比較試験／A群（通常照射50 Gy/25回）: 2年OS率18%／B群（小分割照射40 Gy/10回）: 2年OS率6%／C群（無治療/症状出現後姑息照射）: 2年OS率0%", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq43"}, {"id": "1-nsclc-rt3-cq44", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ44", "question": "放射線治療単独時の適切な照射法は何か？", "recommendation": "通常分割照射で少なくとも60 Gyを用いるよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "100%（13/13）", "keyPoints": "英国4つの臨床試験とUS第III相試験の検討／60 Gy照射例で低線量例より照射野内再発が低率／70 Gy以上では改善なく有害事象増加傾向／CHART試験（過分割照射）／IMRTについてはCQ42参照", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq44"}, {"id": "1-nsclc-rt3-cq45", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期放射線治療・肺尖部", "sectionCode": "1/2/060100", "cqNo": "CQ45", "question": "切除可能な肺尖部胸壁浸潤癌（臨床病期T3-4N0-1）に対して，どのような治療が勧められるか？", "recommendation": "術前化学放射線療法後に外科治療を実施する集学的治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "92%（36/39）", "keyPoints": "SWOG 9416試験: ORR 86%，完全切除率75%，OS中央値36カ月，5年OS率44%／JCOG9806試験: ORR 61%，完全切除率68%，5年OS率56%／CJLSG0801試験: ORR 51%，完全切除率92%，5年OS率62.6%／術前放射線量: 45 Gy/25回（原発巣と同側鎖骨上窩）", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102060100.html#cq45"}, {"id": "1-nsclc-4-cq46", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の一次治療（エクソン19欠失またはL858R変異）", "sectionCode": "1/2/070100", "cqNo": "CQ46", "question": "PS 0-1の場合，一次治療として薬物療法が勧められるか？", "recommendation": "a．オシメルチニブ単剤療法を行うよう強く推奨する。 b．エルロチニブに血管新生阻害薬を併用した治療を行うよう弱く推奨する。 c．ゲフィチニブ＋カルボプラチン＋ペメトレキセド併用療法を行うよう弱く推奨する。 d．オシメルチニブ＋プラチナ製剤＋ペメトレキセド併用療法を行うよう弱く推奨する。", "strength": "a:1, b:2, c:2, d:2", "evidence": "a:A, b:A, c:A, d:B", "consensus": "a:96%(25/26)強く推奨/4%(1/26)弱く推奨; b:12%(3/26)強く推奨/88%(23/26)弱く推奨; c:0%強く推奨/100%(26/26)弱く推奨; d:41%(11/27)強く推奨/56%(15/27)弱く推奨/4%(1/27)根拠不明確（60%未満の賛同だが方向性一致のため弱く推奨とした）", "keyPoints": "FLAURA試験でオシメルチニブ単剤がPFS(HR0.46)・OS(HR0.80)ともに第一世代EGFR-TKIより有意に延長。JO25567/NEJ026/RELAY等でエルロチニブ+血管新生阻害薬(ベバシズマブ/ラムシルマブ)がPFS延長。NEJ009試験でゲフィチニブ+CBDCA+PEMがPFS延長もPFS2やOSは限定的、血液毒性増加。FLAURA2試験でオシメルチニブ+プラチナ+PEMがPFS延長(HR0.62)、OSはHR0.90で有意差なし、血液毒性増加。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq46"}, {"id": "1-nsclc-4-cq47", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ47", "question": "PS 2の場合，一次治療として薬物療法が勧められるか？", "recommendation": "a．EGFR-TKI単剤療法を行うよう強く推奨する。 b．ゲフィチニブ＋カルボプラチン＋ペメトレキセド併用療法を行うよう勧めるだけの根拠が明確ではない。", "strength": "a:1, b:根拠不明確", "evidence": "a:C, b:-", "consensus": "a:86%(24/28)強く推奨/14%(4/28)弱く推奨; b:46%(13/28)弱く推奨/39%(11/28)根拠不明確/14%(4/28)弱く行わない推奨", "keyPoints": "エルロチニブ・プラチナ製剤併用の第III相試験にPS2が7-14%含まれPS0-1と同等の有効性。ゲフィチニブ単剤もPS不良例への有効性報告あり。ゲフィチニブ+CBDCA+PEM併用は海外単施設試験でPFS改善傾向もGrade3以上毒性が高頻度で、日常診療への外挿にバイアスリスクの懸念あり判断保留。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq47"}, {"id": "1-nsclc-4-cq48", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ48", "question": "PS 3-4の場合，一次治療としてEGFR-TKIが勧められるか？", "recommendation": "ゲフィチニブ単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "75%(18/24)強く推奨/25%(6/24)弱く推奨", "keyPoints": "NEJ001試験（PS3-4大多数）でゲフィチニブによりPS改善約80%、ORR66%、OS中央値17.8ヶ月、PFS中央値6.5ヶ月。間質性肺疾患リスク因子（PS不良・男性・喫煙・既存間質性肺炎・正常肺領域減少・心疾患合併等）に注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq48"}, {"id": "1-nsclc-4-cq49", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の一次治療（エクソン18-21 uncommon mutation）", "sectionCode": "1/2/070100", "cqNo": "CQ49", "question": "エクソン18-21変異：Uncommon mutation（エクソン20の挿入変異を除く）に対して，一次治療でEGFR-TKIは勧められるか？", "recommendation": "a．エクソン18-21の遺伝子変異（E709X，G719X，S768I，P848L，L861Q，エクソン19の挿入変異など）にはアファチニブ単剤療法を行うよう強く推奨する。 b．同変異にはオシメルチニブ単剤療法を行うよう弱く推奨する。 c．EGFR-TKI未治療のT790M変異にオシメルチニブ単剤療法を行うよう弱く推奨する。", "strength": "a:1, b:2, c:2", "evidence": "a:B, b:C, c:D", "consensus": "a:74%(20/27)強く推奨/26%(7/27)弱く推奨; b:0%/96%(26/27)弱く推奨/4%(1/27)根拠不明確; c:4%(1/27)強く推奨/67%(18/27)弱く推奨/30%(8/27)根拠不明確", "keyPoints": "ACHILLES/TORG1834試験でアファチニブがプラチナ製剤併用療法に対しPFS延長(HR0.42)。KCSG-LU15-09試験でオシメルチニブのORR50%,PFS中央値8.2ヶ月。T790M変異は未治療例データ少ないが第I相試験で高い奏効。Uncommon mutationがある場合、19欠失/L858Rが併存してもuncommonに分類。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq49"}, {"id": "1-nsclc-4-cq50", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の一次治療（エクソン20挿入変異）", "sectionCode": "1/2/070100", "cqNo": "CQ50", "question": "エクソン20の挿入変異に対して，一次治療で標的療法が勧められるか？", "recommendation": "a．エクソン20の挿入変異にはカルボプラチン＋ペメトレキセド＋アミバンタマブ併用療法を行うよう強く推奨する。 b．エクソン20の挿入変異にはEGFR-TKI単剤療法を行わないよう強く推奨する。", "strength": "a:1, b:1", "evidence": "a:B, b:C", "consensus": "a:63%(17/27)強く推奨/37%(10/27)弱く推奨; b:0%/4%(1/27)弱く推奨/0%/26%(7/27)弱く行わない/70%(19/27)強く行わない推奨", "keyPoints": "PAPILLON試験でCBDCA+PEM+アミバンタマブがPFS延長(HR0.40)、ORR73% vs 47%、血液毒性・皮疹・インフュージョンリアクション・静脈血栓塞栓症に注意。エクソン20挿入変異は従来型EGFR-TKIへの感受性が乏しくORR10%弱。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq50"}, {"id": "1-nsclc-4-cq51", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の二次治療以降", "sectionCode": "1/2/070100", "cqNo": "CQ51", "question": "一次治療EGFR-TKI耐性または増悪後のT790M変異陽性例に対してEGFR-TKIは勧められるか？", "recommendation": "オシメルチニブ単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "100%(26/26)強く推奨", "keyPoints": "AURA3試験でオシメルチニブがプラチナ製剤併用療法に対しPFS延長(HR0.30)。OSはHR0.87で有意差なし。Grade3以上毒性はオシメルチニブ群で低い(6% vs 34%)。PS不良患者対象の単群第II相試験でも有効性示唆。T790M陰性/不明例はドライバー遺伝子陰性に準じCQ64-67参照。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq51"}, {"id": "1-nsclc-4-cq52", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の二次治療以降", "sectionCode": "1/2/070100", "cqNo": "CQ52", "question": "一次治療EGFR-TKI耐性または増悪後例に二次治療で細胞傷害性抗癌薬と免疫チェックポイント阻害薬を併用した治療は勧められるか？", "recommendation": "一次治療EGFR-TKI耐性または増悪後例に二次治療でカルボプラチン＋パクリタキセル＋ベバシズマブ＋アテゾリズマブ療法を行うよう弱く推奨する。", "strength": 2, "evidence": "B", "consensus": "4%(1/26)強く推奨/69%(18/26)弱く推奨/23%(6/26)根拠不明確/4%(1/26)弱く行わない推奨", "keyPoints": "ATTLAS試験でCBDCA+PTX+ベバシズマブ+アテゾリズマブがプラチナ製剤+PEM併用に対しPFS延長(HR0.62)、OSは延長認めず(HR1.01)。IMpower150/130試験のEGFR陽性サブグループ解析でも良好傾向だが事前計画外解析で解釈に注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq52"}, {"id": "1-nsclc-4-cq53", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / EGFR遺伝子変異陽性の二次治療以降", "sectionCode": "1/2/070100", "cqNo": "CQ53", "question": "EGFR遺伝子変異陽性例に免疫チェックポイント阻害薬単独療法は勧められるか？", "recommendation": "EGFR遺伝子変異陽性例に免疫チェックポイント阻害薬単独療法を行うよう勧めるだけの根拠が明確ではない。", "strength": "根拠不明確", "evidence": null, "consensus": "0%/14%(4/29)弱く推奨/48%(14/29)根拠不明確/31%(9/29)弱く行わない/7%(2/29)強く行わない推奨", "keyPoints": "EGFR陽性・PD-L1陽性対象のペムブロリズマブ一次治療第II相試験でORR0%と無効。二次治療の統合解析でもEGFR陽性例でのICI vs DTXのOS-HR 1.11と優位性示せず。EGFR陽性ではICI単独の効果は陰性例より低い可能性。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq53"}, {"id": "1-nsclc-4-cq54", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ALK融合遺伝子陽性の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ54", "question": "PS 0-1の場合，一次治療としてALK-TKIが勧められるか？", "recommendation": "a．アレクチニブ単剤療法を行うよう強く推奨する。 b．ロルラチニブ単剤療法を行うよう強く推奨する。 c．ブリグチニブ単剤療法を行うよう弱く推奨する。", "strength": "a:1, b:1, c:2", "evidence": "a:A, b:B, c:B", "consensus": "a:100%(28/28)強く推奨; b:79%(22/28)強く推奨/21%(6/28)弱く推奨; c:7%(2/28)強く推奨/93%(26/28)弱く推奨", "keyPoints": "J-ALEX/ALEX/ALESIA試験でアレクチニブがクリゾチニブに対しPFS有意延長、毒性も低頻度。CROWN試験でロルラチニブがPFS延長(HR0.28)、認知機能障害等特徴的毒性。ALTA-1L試験でブリグチニブがPFS延長(HR0.49)。BQ3参照。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq54"}, {"id": "1-nsclc-4-cq55", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ALK融合遺伝子陽性の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ55", "question": "PS 2-4の場合，一次治療としてALK-TKIが勧められるか？", "recommendation": "アレクチニブ単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%(27/27)強く推奨", "keyPoints": "LOGiK1401試験（PS不良患者、PS2:12例, PS3:5例, PS4:1例）でORR72.2%、PFS中央値10.1ヶ月、83.3%でPS改善。更新報告でPFS中央値16.2ヶ月、OS中央値30.3ヶ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq55"}, {"id": "1-nsclc-4-cq56", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ALK融合遺伝子陽性の二次治療以降", "sectionCode": "1/2/070100", "cqNo": "CQ56", "question": "アレクチニブ耐性または増悪後の症例に対して，ALK-TKIは勧められるか？", "recommendation": "ALK-TKI単剤療法（ブリグチニブ，ロルラチニブ，セリチニブ）を行うよう弱く推奨する。", "strength": 2, "evidence": "C", "consensus": "24%(7/29)強く推奨/72%(21/29)弱く推奨/3%(1/29)根拠不明確", "keyPoints": "プラチナ製剤併用療法との比較試験は存在しない。J-ALTA試験（ブリグチニブ、アレクチニブ既治療47例）でORR34%、PFS中央値7.3ヶ月。ロルラチニブ第II相試験でアレクチニブ既治療例ORR37.1%。ASCEND-9試験（セリチニブ、本邦、アレクチニブ既治療20例）でORR25%、PFS中央値3.7ヶ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq56"}, {"id": "1-nsclc-4-cq57", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ROS1融合遺伝子陽性", "sectionCode": "1/2/070100", "cqNo": "CQ57", "question": "ROS1融合遺伝子陽性にROS1-TKIは勧められるか？", "recommendation": "ROS1-TKI単剤療法（クリゾチニブ，エヌトレクチニブ，レポトレクチニブのいずれか）を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%(25/25)強く推奨", "keyPoints": "クリゾチニブ：米国試験ORR72%,PFS19.2ヶ月、東アジア試験ORR71.7%,PFS15.9ヶ月。エヌトレクチニブ統合解析ORR77%→更新67.1%、無症候性脳転移にも有効。レポトレクチニブ(TRIDENT-1試験)未治療例ORR79%,PFS35.7ヶ月、既治療例ORR38%,PFS9.0ヶ月。クリゾチニブ既治療例へのエヌトレクチニブ効果は不明。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq57"}, {"id": "1-nsclc-4-cq58", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / BRAF遺伝子V600E変異陽性", "sectionCode": "1/2/070100", "cqNo": "CQ58", "question": "BRAF遺伝子V600E変異陽性にダブラフェニブ＋トラメチニブは勧められるか？", "recommendation": "ダブラフェニブ＋トラメチニブ併用療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "93%(27/29)強く推奨/7%(2/29)弱く推奨", "keyPoints": "既治療例第II相試験でORR66.7%,PFS中央値9.7ヶ月。未治療例第II相試験でORR64%,PFS中央値10.9ヶ月。5年更新報告：既治療OS中央値18.2ヶ月(5年OS率19%)、未治療OS中央値17.3ヶ月(5年OS率22%)。日本人症例数は限られる。主な毒性は発熱・肝機能障害・心駆出率減少。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq58"}, {"id": "1-nsclc-4-cq59", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / MET遺伝子変異陽性", "sectionCode": "1/2/070100", "cqNo": "CQ59", "question": "MET遺伝子変異陽性にMET-TKIは勧められるか？", "recommendation": "MET-TKI単剤療法（テポチニブ，カプマチニブ，グマロンチニブのいずれか）を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "100%(25/25)強く推奨", "keyPoints": "テポチニブ(VISION試験)ORR44.5-46%,PFS8.5ヶ月,OS17.1ヶ月、QOL改善示唆。カプマチニブ(GEOMETRY mono-1試験)既治療ORR41%,PFS5.4ヶ月／未治療ORR68%,PFS12.4ヶ月。グマロンチニブ(GLORY試験)未治療ORR71%,PFS11.7ヶ月／既治療ORR60%,PFS7.6ヶ月。いずれもMET外顕14スキッピング変異対象。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq59"}, {"id": "1-nsclc-4-cq60", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / RET融合遺伝子陽性", "sectionCode": "1/2/070100", "cqNo": "CQ60", "question": "RET融合遺伝子陽性にセルペルカチニブは勧められるか？", "recommendation": "セルペルカチニブ単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "100%(25/25)強く推奨", "keyPoints": "LIBRETTO-431試験でセルペルカチニブがプラチナ製剤併用（±ペムブロリズマブ）に対しPFS有意延長(対ペムブロリズマブ併用HR0.46、対照群全体HR0.48)、ORR84% vs 65%。OSは有意差なし。主な毒性は肝機能障害・高血圧・下痢・浮腫・過敏症。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq60"}, {"id": "1-nsclc-4-cq61", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / NTRK融合遺伝子陽性", "sectionCode": "1/2/070100", "cqNo": "CQ61", "question": "NTRK融合遺伝子陽性にTRK-TKIは勧められるか？", "recommendation": "TRK-TKI単剤療法（エヌトレクチニブ，ラロトレクチニブのいずれか）を行うよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "71%(20/28)強く推奨/25%(7/28)弱く推奨/4%(1/28)根拠不明確", "keyPoints": "がんゲノムプロファイリング検査でのみ検索されるため実施可能施設は限られる（2024年6月時点）。エヌトレクチニブ癌腫横断統合解析（NSCLC22例含む121例）ORR74%,PFS13.8ヶ月。ラロトレクチニブ癌腫横断統合解析（肺癌20例含む159例）ORR79%,PFS28.3ヶ月、肺癌のみでORR73%,PFS35.4ヶ月。一次治療はドライバー遺伝子陰性CQ64-67参照。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq61"}, {"id": "1-nsclc-4-cq62", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / KRAS遺伝子G12C変異陽性", "sectionCode": "1/2/070100", "cqNo": "CQ62", "question": "KRAS遺伝子G12C変異陽性にソトラシブは勧められるか？", "recommendation": "二次治療以降でソトラシブ単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "71%(20/28)強く推奨/29%(8/28)弱く推奨", "keyPoints": "CodeBreaK200試験でソトラシブがDTX単剤に対しPFS有意延長(HR0.66)、ORR28.1% vs 13.2%。OSは有意差なし(HR1.01)。主な毒性は下痢・悪心・倦怠感・肝機能障害。一次治療はドライバー遺伝子陰性CQ64-67参照。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq62"}, {"id": "1-nsclc-4-cq63", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / HER2遺伝子変異陽性", "sectionCode": "1/2/070100", "cqNo": "CQ63", "question": "HER2遺伝子変異陽性にトラスツズマブ デルクステカンは勧められるか？", "recommendation": "二次治療以降でトラスツズマブ デルクステカン単剤療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "61%(17/28)強く推奨/39%(11/28)弱く推奨", "keyPoints": "DESTINY-Lung01試験(6.4mg/kg)ORR55%,PFS8.2ヶ月,OS17.8ヶ月、間質性肺炎26%(Grade5が2例)。DESTINY-Lung02試験で5.4mg/kg群ORR49.0%/6.4mg/kg群56.0%、5.4mg/kg群の方が毒性軽減（投与中止に至った間質性肺炎5.9% vs 8.0%）。一次治療はドライバー遺伝子陰性CQ64-67参照。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq63"}, {"id": "1-nsclc-4-cq64", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ドライバー遺伝子変異転座陰性 PD-L1 TPS 50%以上の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ64", "question": "全身状態良好（PS 0-1）なPD-L1 TPS 50％以上に対する一次治療において薬物療法は勧められるか？", "recommendation": "a．ペムブロリズマブ単剤療法もしくはアテゾリズマブ単剤療法（PD-L1(SP142)TC3/IC3に限る）を行うよう強く推奨する。 b．プラチナ製剤併用療法にPD-1/PD-L1阻害薬を併用した治療を行うよう強く推奨する。 c．ニボルマブ＋イピリムマブ併用療法を行うよう推奨するだけの根拠が明確ではない。 d．PD-1/PD-L1阻害薬＋CTLA-4阻害薬にプラチナ製剤併用療法を併用した治療を行うよう推奨するだけの根拠が明確ではない。", "strength": "a:1, b:1, c:根拠不明確, d:根拠不明確", "evidence": "a:A, b:B, c:-, d:-", "consensus": "a:93%(27/29)強く推奨/7%(2/29)弱く推奨; b:69%(20/29)強く推奨/31%(9/29)弱く推奨; c:0%/55%(16/29)弱く推奨/3%(1/29)根拠不明確/34%(10/29)弱く行わない/7%(2/29)強く行わない; d:0%/55%(16/29)弱く推奨/7%(2/29)根拠不明確/24%(7/29)弱く行わない/14%(4/29)強く行わない", "keyPoints": "KEYNOTE-024試験：ペムブロリズマブ単剤がプラチナ製剤に対しPFS(HR0.50)・OS(HR0.62)延長。KEYNOTE-042試験TPS50%以上サブグループでもOS延長。IMpower110試験でアテゾリズマブ(TC3/IC3限定)がOS(HR0.59)延長。KEYNOTE-189/407, IMpower150/130, TASUKI-52試験でプラチナ製剤+PD-1/PD-L1阻害薬併用が有効。CheckMate227試験でニボルマブ+イピリムマブがOS延長も、KEYNOTE-598試験でペムブロリズマブ+イピリムマブは優越性示せず、判断保留。CheckMate9LA/POSEIDON試験もあるが化学療法+免疫チェックポイント阻害薬2剤併用は根拠不明確。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq64"}, {"id": "1-nsclc-4-cq65", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ドライバー遺伝子変異転座陰性 PD-L1 TPS 1-49%の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ65", "question": "全身状態良好（PS 0-1）なPD-L1 TPS 1～49％に対する一次治療において薬物療法は勧められるか？", "recommendation": "a．プラチナ製剤併用療法にPD-1/PD-L1阻害薬を併用した治療を行うよう強く推奨する。 b．ニボルマブ＋イピリムマブ併用療法を行うよう弱く推奨する。 c．PD-1/PD-L1阻害薬＋CTLA-4阻害薬にプラチナ製剤併用療法を併用した治療を行うよう弱く推奨する。 d．ペムブロリズマブ単剤療法を行うよう推奨するだけの根拠が明確ではない。", "strength": "a:1, b:2, c:2, d:根拠不明確", "evidence": "a:B, b:C, c:C, d:-", "consensus": "a:89%(25/28)強く推奨/7%(2/28)弱く推奨/4%(1/28)根拠不明確; b:0%/68%(19/28)弱く推奨/11%(3/28)根拠不明確/21%(6/28)弱く行わない; c:4%(1/28)強く推奨/61%(17/28)弱く推奨/7%(2/28)根拠不明確/29%(8/28)弱く行わない; d:0%/43%(12/28)弱く推奨/25%(7/28)根拠不明確/32%(9/28)弱く行わない", "keyPoints": "KEYNOTE-189/407, IMpower150/130, TASUKI-52試験のTPS1-49%サブグループでプラチナ製剤+PD-1/PD-L1阻害薬併用が有効。CheckMate227試験のTPS1-49%サブグループではニボルマブ+イピリムマブのOS-HR0.90と優位性明確でない。CheckMate9LA/POSEIDON試験のサブグループは良好。KEYNOTE-042試験のTPS1-49%サブグループでペムブロリズマブ単剤はOS-HR0.88で生存曲線交差、根拠不明確と判断。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq65"}, {"id": "1-nsclc-4-cq66", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ドライバー遺伝子変異転座陰性 PD-L1 TPS 1%未満の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ66", "question": "全身状態良好（PS 0-1）なPD-L1 TPS 1％未満に対する一次治療において薬物療法は勧められるか？", "recommendation": "a．プラチナ製剤併用療法にPD-1/PD-L1阻害薬を併用した治療を行うよう強く推奨する。 b．ニボルマブ＋イピリムマブ併用療法を行うよう弱く推奨する。 c．PD-1/PD-L1阻害薬＋CTLA-4阻害薬にプラチナ製剤併用療法を併用した治療を行うよう弱く推奨する。", "strength": "a:1, b:2, c:2", "evidence": "a:B, b:C, c:C", "consensus": "a:75%(21/28)強く推奨/21%(6/28)弱く推奨/4%(1/28)強く行わない; b:18%(5/28)強く推奨/75%(21/28)弱く推奨/0%/4%(1/28)弱く行わない/4%(1/28)強く行わない; c:0%/75%(21/28)弱く推奨/4%(1/28)根拠不明確/18%(5/28)弱く行わない/4%(1/28)強く行わない", "keyPoints": "KEYNOTE-189/407, IMpower150/130, TASUKI-52試験のTPS1%未満サブグループでもプラチナ製剤+PD-1/PD-L1阻害薬併用有効。CheckMate227試験のTPS1%未満サブグループでニボルマブ+イピリムマブがプラチナ製剤に対しOS延長(HR0.65)、PFS延長(HR0.75)。CheckMate9LA試験(HR0.67)、POSEIDON試験(デュルバルマブ+トレメリムマブ+化学療法, HR0.77)も良好。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq66"}, {"id": "1-nsclc-4-cq67", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / ドライバー遺伝子変異転座陰性 PS2の一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ67", "question": "PS 2に対する一次治療において薬物療法は勧められるか？", "recommendation": "a．PD-1/PD-L1阻害薬単剤療法を行うよう弱く推奨する。 b．カルボプラチン併用療法を行うよう弱く推奨する。 c．細胞傷害性抗癌薬単剤療法を行うよう弱く推奨する。", "strength": "a:2, b:2, c:2", "evidence": "a:B, b:B, c:A", "consensus": "a:44%(12/27)強く推奨/56%(15/27)弱く推奨（60%未満の賛同だが方向性一致のため弱く推奨とした）; b:15%(4/27)強く推奨/85%(23/27)弱く推奨; c:22%(6/27)強く推奨/67%(18/27)弱く推奨/11%(3/27)根拠不明確", "keyPoints": "PS2は多様な集団で標準治療は未確立。IPSOS試験でPS2-3対象アテゾリズマブ単剤が細胞傷害性抗癌薬に対しOS延長(HR0.78)、サブグループHR0.86。PePS2試験(ペムブロリズマブ、PS2の60例)は限られた症例数。CALGB9730/ECOG1599/PEM対PEM単剤試験等でプラチナ製剤併用がPS2でも有用性示唆。第三世代細胞傷害性抗癌薬単剤も緩和治療比で1年生存率改善。合併症・PS低下原因を踏まえ症例毎に判断。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq67"}, {"id": "1-nsclc-4-cq68", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / PS不良例に対する一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ68", "question": "PS不良のドライバー遺伝子変異/転座陽性例に，各々のドライバー遺伝子に対する標的療法は勧められるか？", "recommendation": "a．ドライバー遺伝子変異/転座を有するPS 2の患者に，それぞれの遺伝子変異/転座を標的とする治療を行うよう強く推奨する。 b．ドライバー遺伝子変異/転座を有するPS 3-4の患者に，それぞれの遺伝子変異/転座を標的とする治療を行うよう弱く推奨する。", "strength": "a:1, b:2", "evidence": "a:C, b:C", "consensus": "a:96%(27/28)強く推奨/4%(1/28)弱く推奨; b:7%(2/28)強く推奨/93%(26/28)弱く推奨", "keyPoints": "対象ドライバー遺伝子：EGFR,ALK,ROS1,BRAF,MET,RET,KRAS,NTRK,HER2。EGFR/ALK陽性患者の比較試験にPS2が5-10%含まれPS0-1同等の有効性。ゲフィチニブ(PS3-4,22例,ORR66%)・アレクチニブ(PS3-4,6例,全例PS改善)のPS不良例へのデータあり。その他遺伝子はデータ限定的だが同様の有効性が期待される。PS3-4はより一層の休薬・減量への注意が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq68"}, {"id": "1-nsclc-4-cq69", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / PS不良例に対する一次治療", "sectionCode": "1/2/070100", "cqNo": "CQ69", "question": "PS 3-4の患者（ドライバー遺伝子変異/転座陰性，PD-L1発現は問わない）に薬物療法は勧められるか？", "recommendation": "薬物療法を行わないよう強く推奨する。", "strength": 1, "evidence": "D", "consensus": "0%/0%/0%/0%/100%(25/25)強く行わない推奨", "keyPoints": "細胞傷害性抗癌薬は一般に適応なし。PD-1/PD-L1阻害薬もPS良好例中心の試験でエビデンス乏しく安全性不明のため推奨されない。TOPICAL試験（エルロチニブ vs 緩和治療、PS3が30%含む）でOS延長認めず(HR0.94)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq69"}, {"id": "1-nsclc-4-cq70", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / 二次治療以降", "sectionCode": "1/2/070100", "cqNo": "CQ70", "question": "PS 0-2に対して二次治療以降で細胞傷害性抗癌薬は勧められるか？", "recommendation": "ドセタキセル±ラムシルマブ療法，ペメトレキセド単剤療法，S-1単剤療法，ナブパクリタキセル単剤療法を行うよう強く推奨する。（PEMは非扁平上皮癌への投与に限定）", "strength": 1, "evidence": "A", "consensus": "100%(23/23)強く推奨", "keyPoints": "DTX単剤療法(75mg/m2)の有用性が確立(TAX320試験等)。本邦推奨用量60mg/m2でも同等効果。JMEI試験でPEM単剤がDTX単剤と同等効果(非扁平上皮癌でOS有意差)。EAST-LC試験でS-1単剤がDTX単剤に対し非劣性(OS HR0.945)。J-AXEL試験でnab-PTX単剤がDTX単剤に対し非劣性(OS HR0.85)。DTX+ラムシルマブはCQ71参照。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq70"}, {"id": "1-nsclc-4-cq71", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / 二次治療以降", "sectionCode": "1/2/070100", "cqNo": "CQ71", "question": "二次治療でドセタキセルを用いる場合にラムシルマブの併用は勧められるか？", "recommendation": "a．ラムシルマブの適応となるPS 0-1症例に対して，ドセタキセルにラムシルマブを併用した治療を行うよう弱く推奨する。 b．75歳以上の症例に対して，ドセタキセルにラムシルマブを併用した治療を行わないよう弱く推奨する。 c．PS 2症例に対して，ドセタキセルにラムシルマブを併用した治療を行わないよう弱く推奨する。", "strength": "a:2, b:2, c:2", "evidence": "a:B, b:D, c:D", "consensus": "a:26%(6/23)強く推奨/74%(17/23)弱く推奨; b:0%/9%(2/23)強く推奨側/9%(2/23)弱く推奨/78%(18/23)弱く行わない/4%(1/23)強く行わない; c:0%/0%/9%(2/23)根拠不明確/87%(20/23)弱く行わない/4%(1/23)強く行わない", "keyPoints": "REVEL試験でDTX+ラムシルマブがDTX単剤に対しOS延長(HR0.86)、PFS延長(HR0.76)。本邦JVCG試験でも良好傾向。75歳以上・PS2に関する安全性・有効性データは限られ懸念があるため併用は推奨されない。出血リスクへの注意が必要（ベバシズマブと同様）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#cq71"}, {"id": "1-nsclc-4-bq2", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / ドライバー遺伝子変異転座陽性 / EGFR遺伝子変異陽性の一次治療", "sectionCode": "1/2/070100", "cqNo": "BQ2", "question": "PS 0-1の場合，一次治療としてEGFR-TKIが勧められるか？", "recommendation": "a．EGFR-TKI単剤療法はプラチナ製剤併用療法と比較して無増悪生存期間の延長が示されている。 b．第二世代のEGFR-TKI単剤療法は第一世代のEGFR-TKI単剤療法と比較して無増悪生存期間の延長が示されている。", "strength": null, "evidence": "a:A, b:A", "consensus": null, "keyPoints": "第一世代(ゲフィチニブ・エルロチニブ)単剤がプラチナ製剤併用療法に対し一貫してPFS有意延長（WJTOG3405, OPTIMAL, EURTAC, NEJ002等）。第二世代（アファチニブ・ダコミチニブ）がゲフィチニブに対してもPFS延長（LUX-Lung7, ARCHER1050）示すが毒性はより高度。第一世代同士の直接比較で優越性を示したものはない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq2"}, {"id": "1-nsclc-4-bq3", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / ドライバー遺伝子変異転座陽性 / ALK融合遺伝子陽性の一次治療", "sectionCode": "1/2/070100", "cqNo": "BQ3", "question": "PS 0-1の場合，一次治療としてALK-TKIが勧められるか？", "recommendation": "ALK-TKI単剤療法はプラチナ製剤併用療法と比較して無増悪生存期間の延長が示されている。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "PROFILE1014/1029試験でクリゾチニブ単剤がプラチナ製剤併用療法に対しPFS有意延長。ASCEND-4試験でセリチニブ単剤も同様。QOL指標もALK-TKI単剤療法の方が優れる傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq3"}, {"id": "1-nsclc-4-bq4", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / 一次治療レジメン", "sectionCode": "1/2/070100", "cqNo": "BQ4", "question": "75歳未満に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "プラチナ製剤と第三世代以降の細胞傷害性抗癌薬を併用した治療は有効性のエビデンスが確立している。（PEMは非扁平上皮癌、ネダプラチンは扁平上皮癌への投与が推奨される）", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "メタアナリシスでプラチナ製剤併用が緩和治療よりOS延長。第三世代薬(PEM,DTX,PTX,VNR,GEM等)が第二世代よりORR/1年OS率で優る。JMDB試験：CDDP+PEMが非扁平上皮癌でOS延長も扁平上皮癌では劣る。WJOG5208L試験：扁平上皮癌でNDP+DTXがCDDP+DTXよりOS延長。FACS試験で4種の第三世代薬同等。LETS/CATS試験でS-1併用も非劣性。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq4"}, {"id": "1-nsclc-4-bq5", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / 一次治療レジメン", "sectionCode": "1/2/070100", "cqNo": "BQ5", "question": "75歳以上に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "75歳以上に対するプラチナ製剤併用療法は有効性のエビデンスが確立している。（PEMは非扁平上皮癌への投与が推奨される）", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "暦年齢のみで対象外とすべきではない（80歳以上でもPS良好ならOSに有意差なし）。IFCT0501試験でCBDCA+weekly PTXが単剤療法よりPFS/OS延長だが治療関連死高い。JCOG1210/WJOG7813L試験(75歳以上非扁平上皮癌)でCBDCA+PEMがDTX単剤に対し非劣性。CAPITAL試験(70歳以上扁平上皮癌)でCBDCA+nab-PTXがDTX単剤に対しOS優越性(HR0.52)、75歳以上サブグループでも良好。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq5"}, {"id": "1-nsclc-4-bq6", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / 一次治療レジメン", "sectionCode": "1/2/070100", "cqNo": "BQ6", "question": "非扁平上皮癌においてプラチナ製剤併用療法を受ける場合にベバシズマブの上乗せは勧められるか？", "recommendation": "a．ベバシズマブの適応となる75歳未満，PS 0-1症例に対して，プラチナ製剤併用療法にベバシズマブを併用した治療は有効性のエビデンスが確立している。 b．75歳以上の症例に対して，ベバシズマブを併用した治療は有効性のエビデンスが限定的である。 c．PS 2症例に対して，ベバシズマブを併用した治療は有効性のエビデンスが明確ではない。（扁平上皮癌への投与は行わない）", "strength": null, "evidence": "a:A, b:C, c:D", "consensus": null, "keyPoints": "ECOG4599試験(CBDCA+PTX+ベバシズマブ)でORR上昇・PFS/OS延長(OS-HR0.79)。AVAiL試験はPFSのみ延長。JO19907/BEYOND試験も概ね良好。75歳以上ではECOG4599サブグループ・統合解析で上乗せ効果乏しい傾向、動脈血栓塞栓症・出血リスク増加。PS2データはほぼなし。扁平上皮癌は肺出血リスクのため禁忌。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq6"}, {"id": "1-nsclc-4-bq7", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / 一次治療レジメン", "sectionCode": "1/2/070100", "cqNo": "BQ7", "question": "扁平上皮癌においてプラチナ製剤併用療法を受ける場合にネシツムマブの上乗せは勧められるか？", "recommendation": "PS 0-1症例に対して，シスプラチン＋ゲムシタビンにネシツムマブを併用した治療は有効性のエビデンスが示されている。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "SQUIRE試験でCDDP+GEM+ネシツムマブがOS延長(HR0.84)・PFS延長(HR0.85)。本邦JFCM試験でもOS(HR0.66)・PFS(HR0.56)延長、ORR51.1% vs 20.9%。PS2の日本人投与経験はなく有効性・安全性不明。皮疹・低マグネシウム血症等特徴的毒性、本邦試験で発熱性好中球減少頻度高い。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq7"}, {"id": "1-nsclc-4-bq8", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / 一次治療レジメン", "sectionCode": "1/2/070100", "cqNo": "BQ8", "question": "非扁平上皮癌においてプラチナ製剤＋ペメトレキセド併用療法を受ける場合に，維持療法は勧められるか？", "recommendation": "非扁平上皮癌に対してプラチナ製剤＋ペメトレキセド併用療法4サイクル後，病勢進行を認めず毒性も忍容可能な症例に対してペメトレキセドによる維持療法は有効性のエビデンスが示されている。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "PARAMOUNT試験でCDDP+PEM後のPEM維持療法がPFS(HR0.62)・OS(HR0.78)延長、QOL低下なし。AVAPERL試験・本邦COMPASS/WJOG5610L試験（ベバシズマブ併用下）ではPFS延長もOS有意差なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq8"}, {"id": "1-nsclc-4-bq9", "part": "第1部 肺癌", "section": "Ⅳ期非小細胞肺癌 / Background Question / 二次治療以降レジメン", "sectionCode": "1/2/070100", "cqNo": "BQ9", "question": "一次治療耐性または進行例，PS 0-2，免疫チェックポイント阻害薬未使用例に対する二次治療において免疫チェックポイント阻害薬は勧められるか？", "recommendation": "PD-1阻害薬またはPD-L1阻害薬の単剤療法は有効性のエビデンスが確立している。（ペムブロリズマブの適応症はPD-L1陽性の切除不能な進行・再発の非小細胞肺癌に限る）", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "ニボルマブ：CheckMate017(扁平上皮癌,OS-HR0.59)・CheckMate057(非扁平上皮癌,OS-HR0.73)・CheckMate078でいずれもDTXに対しOS有意延長。ペムブロリズマブ：KEYNOTE-010試験(PD-L1TPS1%以上)でOS-HR0.67。アテゾリズマブ：POPLAR(OS-HR0.73)・OAK試験(OS-HR0.73)で有意延長。いずれもGrade3以上毒性はDTXより少ないが免疫関連有害事象に注意。PS2データは限定的（CheckMate153/171試験, PePS2試験等）でPS2は予後短い傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/2/240102070100.html#bq9"}, {"id": "sclc-ld-cq1", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ1", "question": "臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌に外科治療は勧められるか？", "recommendation": "臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌に対して，外科治療を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨90％（38/42）、弱く推奨10％（4/42）", "keyPoints": "cT1N0M0については外科治療により治癒や長期生存が期待でき、5年生存率40～70％。肺葉切除以上で部分切除より良好。外科治療＋薬物療法併用群が他治療群より予後良好。リンパ節転移例では有用性不明確。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq1"}, {"id": "sclc-ld-cq2", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ2", "question": "小細胞肺癌の完全切除例に対して，追加の治療は勧められるか？", "recommendation": "小細胞肺癌の完全切除例に対して，プラチナ製剤併用療法を行うよう強く推奨する。", "strength": 1, "evidence": "C", "consensus": "強く推奨100％（35/35）", "keyPoints": "術後薬物療法施行群で外科治療単独群より有意に良好なOS。JCOG9101試験ではPE療法で臨床病期Ⅰ期3年OS率68％、病理病期ⅠA期5年OS率73％。JCOG1205/1206試験ではPI療法とPE療法で有意差なく、3年OS率は各79.0％、84.1％。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq2"}, {"id": "sclc-ld-cq3", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ3", "question": "医学的な理由で手術ができない臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌の放射線照射法として，定位照射は勧められるか？", "recommendation": "医学的な理由で手術ができない臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌の放射線照射法として，定位照射を行うよう弱く推奨する。", "strength": 2, "evidence": "D", "consensus": "弱く推奨89％（32/36）、明確でない11％（4/36）", "keyPoints": "SBRT安全性と良好な局所制御を報告。本邦後方視的調査64例でOS中央値23.5ヶ月、2年OS率76.3％、局所制御率89.3％。米国多施設研究74例ではOS中央値17.8ヶ月。化学療法併用でOS良好。肺毒性軽減と利便性が利点。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq3"}, {"id": "sclc-ld-cq4", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ4", "question": "限局型小細胞肺癌（PS 0-2）において，化学放射線療法は勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）に対して，化学放射線療法を行うよう強く推奨する。", "strength": 1, "evidence": "A", "consensus": "強く推奨100％（35/35）", "keyPoints": "メタアナリシス13試験で薬物療法への放射線治療併用により「死亡絶対リスク14％減少、3年OS率5.4％改善」。メタアナリシス11試験で「2年OS率5.4％、局所制御率25.3％改善」。治療関連死1.2％増加注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2024/1/3/240103010100.html#cq4"}, {"id": "sclc-ld-cq5", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "sectionCode": "1/3/010100", "cqNo": "CQ5", "question": "限局型小細胞肺癌（PS 0-2）の化学放射線療法における放射線治療のタイミングは，早期同時併用が勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）の化学放射線療法における放射線治療は，早期同時併用を行うよう強く推奨する。", "strength": 1, "evidence": "B", "consensus": "強く推奨100％（35/35）", "keyPoints": "JCOG9104試験で同時併用が逐次併用より有意にOS改善（27.2ヶ月vs 19.7ヶ月）。複数試験で早期同時併用がOS改善。メタアナリシスで「治療開始から放射線治
