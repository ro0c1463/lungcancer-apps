<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f7f8">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#141c1e">
<title>肺癌認定医試験カリキュラム学習</title>
<style>
:root{
  --bg:#f4f7f8; --card-bg:#ffffff; --card-back:#eef3f5; --text:#1c2b30; --sub:#5a6b70;
  --accent:#0f6b7a; --accent2:#2f8f9d; --border:#d7e0e2; --shadow:rgba(15,60,70,.12);
  --A:#c0392b; --B:#b8860b; --C:#4a7a8c;
  --dept-bg:#e4f0f2; --dept-text:#0f6b7a;
  --btn-bg:#0f6b7a; --btn-text:#fff;
  --mastered:#2e8b57; --review:#d17a22; --unseen:#8a99a0;
}
:root[data-theme="dark"]{
  --bg:#141c1e; --card-bg:#1d2a2d; --card-back:#223034; --text:#e6eef0; --sub:#a3b4b8;
  --accent:#4fb3c2; --accent2:#3f9aa8; --border:#2e4145; --shadow:rgba(0,0,0,.4);
  --A:#e57368; --B:#e0b34a; --C:#7fb4c4;
  --dept-bg:#20393d; --dept-text:#7fd4e0;
  --btn-bg:#2f8f9d; --btn-text:#0b1516;
  --mastered:#5cbf8a; --review:#e0a45c; --unseen:#7a8a90;
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#141c1e; --card-bg:#1d2a2d; --card-back:#223034; --text:#e6eef0; --sub:#a3b4b8;
    --accent:#4fb3c2; --accent2:#3f9aa8; --border:#2e4145; --shadow:rgba(0,0,0,.4);
    --A:#e57368; --B:#e0b34a; --C:#7fb4c4;
    --dept-bg:#20393d; --dept-text:#7fd4e0;
    --btn-bg:#2f8f9d; --btn-text:#0b1516;
    --mastered:#5cbf8a; --review:#e0a45c; --unseen:#7a8a90;
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
}
header{
  padding:12px 16px; border-bottom:1px solid var(--border); background:var(--card-bg);
  display:flex; flex-wrap:wrap; align-items:center; gap:10px; position:sticky; top:0; z-index:20;
}
header h1{font-size:1.05rem; margin:0; color:var(--accent); flex:0 0 auto; white-space:nowrap;}
.stats{display:flex; gap:8px; flex-wrap:wrap; font-size:.8rem; margin-left:auto;}
.stat-pill{padding:3px 9px; border-radius:12px; background:var(--dept-bg); color:var(--text); border:1px solid var(--border);}
.stat-pill.mastered{color:var(--mastered); font-weight:600;}
.stat-pill.review{color:var(--review); font-weight:600;}
.stat-pill.unseen{color:var(--unseen);}
button{
  cursor:pointer; border:1px solid var(--border); background:var(--card-bg); color:var(--text);
  border-radius:8px; padding:6px 10px; font-size:.85rem; transition:all .15s;
}
@media (hover: hover){
  button:hover{border-color:var(--accent); color:var(--accent);}
  button.primary:hover{opacity:.88; color:var(--btn-text);}
}
button.primary{background:var(--btn-bg); color:var(--btn-text); border-color:var(--btn-bg); font-weight:600;}
button.toggle-on{background:var(--accent2); color:#fff; border-color:var(--accent2);}
#themeToggle{font-size:1rem; padding:6px 9px;}

.filters{
  background:var(--card-bg); border-bottom:1px solid var(--border);
  padding:10px 16px; display:flex; flex-wrap:wrap; gap:14px; align-items:flex-end;
}
.filter-group{display:flex; flex-direction:column; gap:4px; font-size:.75rem; color:var(--sub);}
.filter-group .opts{display:flex; flex-wrap:wrap; gap:5px;}
select{
  padding:5px 8px; border-radius:8px; border:1px solid var(--border); background:var(--card-bg); color:var(--text); font-size:.85rem;
}
.chip{
  padding:4px 10px; border-radius:14px; border:1px solid var(--border); background:var(--bg);
  font-size:.78rem; color:var(--sub); cursor:pointer; user-select:none;
}
.chip.active{background:var(--accent); color:#fff; border-color:var(--accent);}
.chip.level-A.active{background:var(--A); border-color:var(--A);}
.chip.level-B.active{background:var(--B); border-color:var(--B);}
.chip.level-C.active{background:var(--C); border-color:var(--C);}

main{
  flex:1; display:flex; flex-direction:column; align-items:center; padding:22px 14px 40px;
  gap:14px;
}
.progress-nav{display:flex; align-items:center; gap:14px; font-size:.85rem; color:var(--sub);}
.card-scene{
  width:100%; max-width:640px; min-height:380px; perspective:1600px;
}
.card-flip{
  position:relative; width:100%; height:100%; min-height:380px;
  transform-style:preserve-3d; transition:transform .5s;
  cursor:pointer;
}
.card-flip.flipped{transform:rotateY(180deg);}
.face{
  position:absolute; inset:0; backface-visibility:hidden; border-radius:16px;
  background:var(--card-bg); border:1px solid var(--border); box-shadow:0 6px 22px var(--shadow);
  padding:22px 24px; overflow-y:auto;
}
.face.back{transform:rotateY(180deg);}
.badges{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;}
.badge{padding:3px 10px; border-radius:12px; font-size:.72rem; font-weight:600; color:#fff;}
.badge.chapter{background:var(--accent2);}
.badge.lvA{background:var(--A);}
.badge.lvB{background:var(--B);}
.badge.lvC{background:var(--C);}
.badge.dept{background:var(--dept-bg); color:var(--dept-text); font-weight:500;}
.badge.state-mastered{background:var(--mastered);}
.badge.state-review{background:var(--review);}
.badge.no{background:var(--bg); color:var(--sub); border:1px solid var(--border);}
.content-text{font-size:1.28rem; line-height:1.65; font-weight:600; margin-top:6px;}
.face .hint{position:absolute; bottom:14px; right:18px; font-size:.7rem; color:var(--sub);}

.back h3{font-size:.85rem; color:var(--accent); margin:14px 0 4px; border-bottom:1px solid var(--border); padding-bottom:3px;}
.back h3:first-child{margin-top:0;}
.back p{margin:2px 0; font-size:.9rem; line-height:1.55;}
.cq-block{
  border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin:8px 0; background:var(--card-back);
}
.cq-block .cqno{font-weight:700; color:var(--accent);}
.cq-tag{display:inline-block; font-size:.7rem; padding:1px 7px; border-radius:8px; margin-right:5px; background:var(--dept-bg); color:var(--dept-text);}
.cq-block a{color:var(--accent2); font-size:.8rem;}
.no-cq{color:var(--sub); font-style:italic; font-size:.9rem;}

.actions{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
.footer{
  text-align:center; font-size:.72rem; color:var(--sub); padding:16px 20px 26px; line-height:1.7;
  border-top:1px solid var(--border); background:var(--card-bg);
}
@media (pointer: coarse){
  button{min-height:44px;padding:10px 14px;font-size:.95rem}
  select{min-height:44px;font-size:16px}
  .chip{min-height:40px;padding:8px 14px;font-size:.9rem;display:inline-flex;align-items:center}
}
@media (max-width:600px){
  header h1{font-size:.92rem;}
  .content-text{font-size:1.08rem;}
  .card-scene{min-height:420px;}
  .face{padding:16px;}
  header{padding-top:calc(12px + env(safe-area-inset-top));}
  .footer{padding-bottom:calc(26px + env(safe-area-inset-bottom));}
}
</style>
</head><body>

<header>
  <h1>肺癌認定医試験カリキュラム</h1>
  <div class="stats" id="statsBar"></div>
  <button id="themeToggle" title="テーマ切替">🌓</button>
</header>

<div class="filters">
  <div class="filter-group">
    <label>診療科</label>
    <div class="opts" id="deptOpts"></div>
  </div>
  <div class="filter-group">
    <label>重要度</label>
    <div class="opts" id="levelOpts"></div>
  </div>
  <div class="filter-group">
    <label>参照GL</label>
    <select id="refGLSelect"></select>
  </div>
  <div class="filter-group">
    <label>章 (glItem)</label>
    <select id="glItemSelect"></select>
  </div>
  <div class="filter-group">
    <label>&nbsp;</label>
    <button id="reviewOnlyBtn">要復習のみ</button>
  </div>
  <div class="filter-group">
    <label>&nbsp;</label>
    <button id="shuffleBtn">🔀 シャッフル</button>
  </div>
  <div class="filter-group">
    <label>&nbsp;</label>
    <button id="resetProgressBtn">進捗リセット</button>
  </div>
</div>

<main>
  <div class="progress-nav">
    <button id="prevBtn">← 前</button>
    <span id="counter">0 / 0</span>
    <button id="nextBtn">次 →</button>
  </div>

  <div class="card-scene">
    <div class="card-flip" id="cardFlip">
      <div class="face front" id="faceFront"></div>
      <div class="face back" id="faceBack"></div>
    </div>
  </div>

  <div class="actions">
    <button class="primary" id="masteredBtn">✅ 習得済み (1)</button>
    <button id="reviewBtn">🔁 要復習 (2)</button>
  </div>
</main>

<div class="footer">
  日本肺癌学会 認定医試験カリキュラム／肺癌診療ガイドライン2024年版に基づく個人の試験対策用。再配布しないこと。最新の公式カリキュラム・原典を必ず確認。CQ番号は2024年版準拠。
</div>

<script>
(function(){

const CARD_MAP = {};
CARDS.forEach(c=>{CARD_MAP[c.id]=c;});

function resolveSources(refGL){
  if(!refGL) return [];
  // refGL is a free-text label (e.g. "胸腺 GL2024", "肺癌診療GL・E-セミナー").
  // Match by whole-key containment; no SOURCES key is a substring of another,
  // so this avoids cross-matching keys that share a fragment like "GL2024".
  return SOURCES.filter(s=>refGL.includes(s.key));
}

const PROGRESS_KEY = "haigan_curriculum_progress";
function loadProgress(){
  try{ return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; }catch(e){ return {}; }
}
function saveProgress(p){ localStorage.setItem(PROGRESS_KEY, JSON.stringify(p)); }
let progress = loadProgress();

// ---- Theme ----
const root = document.documentElement;
function applyTheme(t){
  if(t) root.setAttribute("data-theme", t); else root.removeAttribute("data-theme");
}
applyTheme(localStorage.getItem("haigan_theme"));
document.getElementById("themeToggle").addEventListener("click", ()=>{
  const cur = root.getAttribute("data-theme");
  const sysDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  let next;
  if(!cur) next = sysDark ? "light" : "dark";
  else if(cur==="dark") next = "light";
  else next = "dark";
  applyTheme(next);
  localStorage.setItem("haigan_theme", next);
});

  idx: 0,

};

const deptOptsEl = document.getElementById("deptOpts");
function renderDeptChips(){
  deptOptsEl.innerHTML = "";
  const allChip = mkChip("全科", state.dept==="");
  allChip.addEventListener("click", ()=>{ state.dept=""; rebuild(); });
  deptOptsEl.appendChild(allChip);
  DEPTS.forEach(d=>{
    const c = mkChip(DEPT_SHORT[d], state.dept===d);
    c.addEventListener("click", ()=>{ state.dept = d; rebuild(); });
    deptOptsEl.appendChild(c);
  });
}
function mkChip(label, active, extraClass){
  const c = document.createElement("div");
  c.className = "chip" + (extraClass?(" "+extraClass):"") + (active?" active":"");
  c.textContent = label;
  return c;
}

const levelOptsEl = document.getElementById("levelOpts");
function renderLevelChips(){
  levelOptsEl.innerHTML = "";
  ["A","B","C"].forEach(l=>{
    const c = mkChip(l, state.levels.has(l), "level-"+l);
    c.addEventListener("click", ()=>{
      if(state.levels.has(l)) state.levels.delete(l); else state.levels.add(l);
      renderLevelChips();
      rebuild();
    });
    levelOptsEl.appendChild(c);
  });
}

const refGLSelect = document.getElementById("refGLSelect");

  const items = Array.from(new Set(CURRICULUM.map(x=>x.glItem))).sort();
  glItemSelect.innerHTML = '<option value="">すべて</option>' + items.map(r=>`<option value="${escapeHtml(r)}">${escapeHtml(r)}</option>`).join("");
}
refGLSelect.addEventListener("change", ()=>{ state.refGL = refGLSelect.value; rebuild(); });
glItemSelect.addEventListener("change", ()=>{ state.glItem = glItemSelect.value; rebuild(); });

reviewOnlyBtn.addEventListener("click", ()=>{
  state.reviewOnly = !state.reviewOnly;
  reviewOnlyBtn.classList.toggle("toggle-on", state.reviewOnly);
  rebuild();
});

document.getElementById("shuffleBtn").addEventListener("click", ()=>{
  shuffle(state.order);
  state.idx = 0;
  render();
});

document.getElementById("resetProgressBtn").addEventListener("click", ()=>{
  if(confirm("進捗（習得済み／要復習の記録）をすべてリセットします。よろしいですか？")){
    progress = {};
    saveProgress(progress);
    rebuild();
  }
});

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
}

function escapeHtml(s){
  if(s===null||s===undefined) return "";
  return String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
}

// ---- Build filtered set ----
function matchesFilter(item){
  if(state.dept && !item.dept[state.dept]) return false;
  if(state.levels.size>0 && !state.levels.has(item.level)) return false;
  if(state.refGL && item.refGL !== state.refGL) return false;
  if(state.glItem && item.glItem !== state.glItem) return false;
  if(state.reviewOnly){
    const st = progress[item.no];
    if(!st || st.status !== "review") return false;
  }
  return true;
}

function rebuild(){
  renderDeptChips();
  const filtered = CURRICULUM.filter(matchesFilter);
  state.order = filtered.map(x=>x.no);
  state.idx = 0;
  state.flipped = false;
  render();
}

// ---- Stats ----
function renderStats(){
  const total = CURRICULUM.length;
  let mastered=0, review=0;
  CURRICULUM.forEach(it=>{
    const st = progress[it.no];
    if(st && st.status==="mastered") mastered++;
    else if(st && st.status==="review") review++;
  });
  const unseen = total - mastered - review;
  document.getElementById("statsBar").innerHTML =
    `<span class="stat-pill mastered">習得 ${mastered}</span>` +
    `<span class="stat-pill review">要復習 ${review}</span>` +
    `<span class="stat-pill unseen">未学習 ${unseen}</span>` +
    `<span class="stat-pill">全 ${total}件</span>`;
}

// ---- Card rendering ----
const faceFront = document.getElementById("faceFront");
const faceBack = document.getElementById("faceBack");
const cardFlip = document.getElementById("cardFlip");
const counterEl = document.getElementById("counter");

function currentItem(){
  if(state.order.length===0) return null;
  const no = state.order[state.idx];
  return CURRICULUM.find(x=>x.no===no);
}

function deptBadgesHtml(item){
  return DEPTS.filter(d=>item.dept[d]).map(d=>`<span class="badge dept">${DEPT_SHORT[d]}</span>`).join("");
}

function stateBadgeHtml(item){
  const st = progress[item.no];
  if(st && st.status==="mastered") return '<span class="badge state-mastered">習得済み</span>';
  if(st && st.status==="review") return '<span class="badge state-review">要復習</span>';
  return "";
}

function render(){
  counterEl.textContent = state.order.length ? `${state.idx+1} / ${state.order.length}` : "0 / 0";
  renderStats();
  cardFlip.classList.remove("flipped");
  state.flipped = false;
  const item = currentItem();
  if(!item){
    faceFront.innerHTML = `<div class="badges"></div><div class="content-text">該当するカードがありません。フィルタ条件を変更してください。</div>`;
    faceBack.innerHTML = "";
    return;
  }
  faceFront.innerHTML = `
    <div class="badges">
      <span class="badge no">No.${item.no}</span>
      <span class="badge chapter">${escapeHtml(item.glItem)}</span>
      <span class="badge lv${item.level}">重要度 ${item.level}</span>
      ${deptBadgesHtml(item)}
      ${stateBadgeHtml(item)}
    </div>
    <div class="content-text">${escapeHtml(item.content)}</div>
    <div class="hint">クリック / Space でめくる</div>
  `;

  let cqHtml = "";
  if(item.linkedCardIds && item.linkedCardIds.length>0){
    cqHtml = item.linkedCardIds.map(id=>{
      const c = CARD_MAP[id];
      if(!c) return `<div class="cq-block"><span class="no-cq">カードID ${escapeHtml(id)} が見つかりません</span></div>`;
      const strengthText = c.strength==="1" ? "1（強い推奨）" : c.strength==="2" ? "2（弱い推奨）" : "記載なし";
      const evidenceText = c.evidence ? c.evidence : "記載なし";
      return `
        <div class="cq-block">
          <div><span class="cqno">${escapeHtml(c.cqNo)}</span>：${escapeHtml(c.question)}</div>
          <p><b>推奨：</b>${escapeHtml(c.recommendation)}</p>
          <p><span class="cq-tag">推奨の強さ ${strengthText}</span><span class="cq-tag">エビデンス ${evidenceText}</span>${c.consensus?`<span class="cq-tag">合意率 ${escapeHtml(c.consensus)}</span>`:""}</p>
          ${c.sourceUrl?`<a href="${escapeHtml(c.sourceUrl)}" target="_blank" rel="noopener">原典を見る ↗</a>`:""}
        </div>
      `;
    }).join("");
  } else {
    cqHtml = `<p class="no-cq">該当CQなし（E-セミナー/他ガイドライン項目）</p>`;
  }

  const sourceLinksHtml = resolveSources(item.refGL).map(src=>{
    if(src.type==="pdf"){
      const localLink = src.localPath ? `<a href="${escapeHtml(src.localPath)}" target="_blank" rel="noopener">📄 ${escapeHtml(src.key)} PDF ↗</a>` : "";
      const onlineLink = src.url ? ` <a href="${escapeHtml(src.url)}" target="_blank" rel="noopener">（オンライン版 ↗）</a>` : "";
      return `<div class="cq-block">${localLink}${onlineLink}</div>`;
    }
    if(src.url){
      return `<div class="cq-block"><a href="${escapeHtml(src.url)}" target="_blank" rel="noopener">${escapeHtml(src.key)} 公式ページ ↗</a></div>`;
    }
    return `<div class="cq-block"><span class="no-cq">${escapeHtml(src.key)}（書籍）</span></div>`;
  }).join("");

  faceBack.innerHTML = `
    <h3>参照GL</h3>
    <p>${escapeHtml(item.refGL)}</p>
    ${sourceLinksHtml}
    ${item.seminar ? `<h3>E-セミナー動画</h3><p>${escapeHtml(item.seminar)}</p>` : ""}
    ${item.glCq ? `<h3>肺癌診療GL該当項目</h3><p>${escapeHtml(item.glCq)}</p>` : ""}
    <h3>対象診療科</h3>
    <div class="badges">${deptBadgesHtml(item)}</div>
    <h3>関連CQ（肺癌診療GL2024）</h3>
    ${cqHtml}
    <div class="hint">クリック / Space で戻る</div>
  `;
}

cardFlip.addEventListener("click", ()=>{
  state.flipped = !state.flipped;
  cardFlip.classList.toggle("flipped", state.flipped);
});

document.getElementById("prevBtn").addEventListener("click", goPrev);
document.getElementById("nextBtn").addEventListener("click", goNext);
function goPrev(){
  if(state.order.length===0) return;
  state.idx = (state.idx - 1 + state.order.length) % state.order.length;
  render();
}
function goNext(){
  if(state.order.length===0) return;
  state.idx = (state.idx + 1) % state.order.length;
  render();
}

function setStatus(status){
  const item = currentItem();
  if(!item) return;
  progress[item.no] = { status: status, ts: Date.now() };
  saveProgress(progress);
  render();
}
document.getElementById("masteredBtn").addEventListener("click", ()=>setStatus("mastered"));
document.getElementById("reviewBtn").addEventListener("click", ()=>setStatus("review"));

document.addEventListener("keydown", (e)=>{
  const tag = (e.target && e.target.tagName) || "";
  if(tag==="SELECT" || tag==="INPUT" || tag==="TEXTAREA") return;
  if(e.code==="Space"){ e.preventDefault(); cardFlip.click(); }
  else if(e.key==="ArrowLeft"){ goPrev(); }
  else if(e.key==="ArrowRight"){ goNext(); }
  else if(e.key==="1"){ setStatus("mastered"); }
  else if(e.key==="2"){ setStatus("review"); }
});

// ---- init ----
populateSelects();
renderDeptChips();
renderLevelChips();
rebuild();
})();
</script>
</body></html>
