50104010100.html#cq5"}, {"id": "1-meta-brain-cq6", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ6", "question": "遠隔転移が単発の脳転移のみのⅣ期症例に対して、定位放射線照射や外科治療は勧められるか？", "recommendation": "脳以外の病巣がコントロールされており，かつ単発の脳転移に対して，定位放射線照射や外科治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨85％（33/39）、弱く推奨15％（6/39）", "keyPoints": "単発性脳転移でコントロール良好な症例のSRS単独群OS中央値は約10ヶ月。手術単独群も同様。非小細胞肺癌患者を対象とした観察研究では、原発巣コントロール下でのOS中央値19.7ヶ月と報告されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq6"}, {"id": "1-meta-brain-cq7", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ7", "question": "症状を有する脳転移に対して、放射線治療は勧められるか？", "recommendation": "症状を有する脳転移に対して，放射線治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨100％（11/11）", "keyPoints": "放射線治療により70～90％の患者で症状寛解。予後不良例ではステロイド単独治療も選択肢。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq7"}, {"id": "1-meta-brain-cq8", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ8", "question": "症状を有する脳転移に対して、外科治療は勧められるか？", "recommendation": "症状を有する単発性脳転移に対して，腫瘍摘出術を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "弱く推奨100％（11/11）", "keyPoints": "手術単独群OS中央値約10ヶ月、頭蓋内無増悪期間中央値約6ヶ月。定位照射の有効性が期待できる場合は手術より優先される可能性。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq8"}, {"id": "1-meta-brain-cq9", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ9", "question": "多発性脳転移に対して、放射線治療は勧められるか？", "recommendation": "a.（非小細胞肺癌）多発性脳転移に対して，全脳照射を行うよう強く推奨する。 b.（非小細胞肺癌）4個以下で腫瘍径3cm程度までであれば定位放射線照射を行うよう強く推奨する。 c.（非小細胞肺癌）5～10個の脳転移に対して，定位放射線照射を行うよう弱く推奨する。 d.（小細胞肺癌）多発性脳転移に対して，全脳照射を行うよう強く推奨する。 e.（小細胞肺癌）10個までの脳転移に対して，定位放射線照射を行うよう弱く推奨する。", "strength": "1（a,b,d）/ 2（c,e）", "evidence": "C（a,b,c,d）/ D（e）", "consensus": "a: 強く推奨84％（32/38）、弱く推奨16％（6/38）｜b: 強く推奨97％（37/38）、弱く推奨3％（1/38）｜c: 弱く推奨63％（20/32）、明確ではない38％（12/32）｜d: 強く推奨75％（41/55）、弱く推奨25％（14/55）｜e: 弱く推奨75％（41/55）、明確ではない13％（7/55）、行わないことを弱く推奨5％（3/55）", "keyPoints": "全脳照射のOS中央値3.5～7.5ヶ月、頭蓋内無増悪期間中央値約6ヶ月。4個以下3cm程度のSRSではOS中央値8～15ヶ月、局所コントロール率6～9割。全脳照射後の認知機能低下が問題。5～10個の脳転移では生存率に差なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq9"}, {"id": "1-meta-brain-cq10", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ10", "question": "手術や定位放射線照射に、全脳照射の追加は勧められるか？", "recommendation": "手術や定位放射線照射に，全脳照射の併用を行わないよう弱く推奨する。", "strength": "2", "evidence": "A", "consensus": "行わないことを弱く推奨100％（11/11）", "keyPoints": "手術との比較でOS延長なし。SRS比較試験のメタアナリシスでは局所制御向上するもOS差なし。認知機能低下と健康関連QOL悪化の懸念が複数のランダム化比較試験で示唆される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq10"}, {"id": "1-meta-brain-cq11", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ11", "question": "髄膜癌腫症に対する適切な治療法は何か？", "recommendation": "a. 髄膜癌腫症に対して，薬物療法・放射線治療を行うよう勧めるだけの根拠が明確ではない。 b. EGFR遺伝子変異陽性の非小細胞肺癌における髄膜癌腫症には，オシメルチニブを含む治療を弱く推奨する。", "strength": "明確ではない（a）/ 2（b）", "evidence": "なし（a）/ C（b）", "consensus": "a: 明確ではない64％（16/25）、弱く推奨16％（4/25）、行わないことを弱く推奨20％（5/25）｜b: 弱く推奨64％（18/28）、強く推奨32％（9/28）、明確ではない4％（1/28）", "keyPoints": "全脳照射の有用性を示す前向き試験なし。オシメルチニブではFLAURA2試験で頭蓋内ORR88～87％、OCEAN試験で66.7％、単群第II相試験でORR51.6％。T790M陰性例のオシメルチニブ二次治療は本邦未承認。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq11"}, {"id": "1-meta-brain-cq12", "part": "第1部 肺癌", "section": "各病態 / 脳転移", "cqNo": "CQ12", "question": "無症候性脳転移に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨100％（42/42）", "keyPoints": "近年の新規薬物療法により進行非小細胞肺癌の予後延長。TKI未治療脳転移症例のORR53～83％、PFS中央値6.6ヶ月～未到達。薬物療法と放射線治療の先行順序は明確なエビデンス乏しく、脳転移サイズ・個数・部位、医療状況を勘案して判断必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104020100.html#cq12"}, {"id": "1-meta-thorax-cq13", "part": "第1部 肺癌", "section": "各病態 / 胸部緩和照射", "cqNo": "CQ13", "question": "縦隔・肺門病変による気道狭窄，上大静脈狭窄など胸郭内の腫瘍増大に伴う症状の緩和を目的とした胸部放射線治療は，行うよう勧められるか？", "recommendation": "放射線治療を行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "合意率94%（33/35名）、内訳：強く推奨94%、弱く推奨6%", "keyPoints": "総合的な症状緩和効果は高線量分割照射のほうが低線量分割照射より優れ（77.1％ vs 65.4％）。メタアナリシスでは症状改善率（咳嗽約50%、胸痛50～86%、血痰75～97%）確認。PROACTIVE試験ではES-IMRT使用時に食道炎が有意に減少（24% vs 2%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104030100.html#cq13"}, {"id": "1-meta-pleura-cq14", "part": "第1部 肺癌", "section": "各病態 / 癌性胸膜炎", "cqNo": "CQ14", "question": "胸腔穿刺・ドレナージを行った癌性胸膜炎に対して、どのような治療が勧められるか？", "recommendation": "a. 胸腔ドレナージ後の症例には，胸膜癒着術を行うよう強く推奨する。 b. 薬物療法未治療例には，胸膜癒着術の代わりに薬物療法を行うよう弱く推奨する。", "strength": "1（a）/ 2（b）", "evidence": "A（a）/ C（b）", "consensus": "a: 92%（22/24人）が強く推奨｜b: 88%（21/24人）が弱く推奨", "keyPoints": "胸膜癒着薬としてTalc、ブレオマイシン、OK-432等が使用可能。メタアナリシスではTalc噴霧法が他薬剤より優れている。胸膜癒着術はドレナージ単独より胸水制御率で優位。薬物療法未治療例での化学療法単独使用時、長期ドレナージ回避の可能性がある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104040100.html#cq14"}, {"id": "1-meta-pericard-cq15", "part": "第1部 肺癌", "section": "各病態 / 癌性心膜炎", "cqNo": "CQ15", "question": "心嚢穿刺・ドレナージを要する癌性心膜炎に対して、どのような治療が勧められるか？", "recommendation": "心膜癒着術を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨4％（1/24名）、弱く推奨79％（19/24名）、根拠が明確でない17％（4/24名）", "keyPoints": "単回穿刺は再貯留率が高いため長期制御に不向き。JCOG9811試験（79例）でブレオマイシン（BLM）群が改善傾向を示唆。各薬剤の効果：BLM（46～95%）、マイトマイシンC（75%）、カルボプラチン（80%）。血行動態不安定時は心膜開窓術も選択肢だが前向き研究なし。対象患者少数のため十分なエビデンス不足も、短期的益害バランスで検討可能と判断。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104050100.html#cq15"}, {"id": "1-meta-oligo-cq16", "part": "第1部 肺癌", "section": "各病態 / オリゴ転移", "cqNo": "CQ16", "question": "Ⅳ期非小細胞肺癌に対し，局所治療を追加することは勧められるか？", "recommendation": "転移臓器・転移個数が限られているsynchronous oligometastatic diseaseで，薬物療法により病勢が安定している場合，局所治療の追加を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨2％（1/56）、弱く推奨66％（37/56）、根拠が明確ではない32％（18/56）", "keyPoints": "複数のランダム化第Ⅱ相試験で局所治療群で無増悪生存期間の延長を確認。実臨床では転移病変2個以内が約9割を占める。SABR-COMET試験で治療関連死が報告されており安全性検証が必要。集学的治療チームによる慎重な症例検討が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104060100.html#cq16"}, {"id": "1-palliative-cq1", "part": "第1部 肺癌", "section": "緩和ケア", "cqNo": "CQ1", "question": "進行・再発肺癌患者に対して，診断早期からの専門的な緩和ケアの提供は勧められるか？", "recommendation": "進行・再発肺癌患者に対して，診断早期からの専門的な緩和ケアの提供を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨100%（9/9）", "keyPoints": "複数のランダム化比較試験により，診断から治療開始後の早期における専門的な緩和ケア介入が，QOL改善，抑うつ改善，生存期間延長をもたらすことが実証されている。症状マネジメント、コーピング支援、予後認識の啓発が有用性の根拠とされている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/5/250105010100.html#cq1"}, {"id": "1-palliative-cq2", "part": "第1部 肺癌", "section": "緩和ケア", "cqNo": "CQ2", "question": "進行・再発肺癌患者に対して，提供すべき診断早期の専門的な緩和ケアはどのようなものか？", "recommendation": "Interdisciplinary PC（協働包括的緩和ケア）チームにより，以下の内容が実践されることを強く推奨する。患者および家族を含む患者の生活支援者と医療スタッフとの間の意思疎通をはかり信頼関係を構築する／患者の身体的苦痛，心理・社会的苦痛などトータルペインを評価し緩和する／疾患と予後についての理解度を評価し，正確な理解を促す／治療の目標を明確にする／患者のコーピングを評価し，支援・強化する／医学的な意思決定をする際の支援を行う／他の医療・ケア提供者との協調が保てるようにする／必要時は他の医療・ケア提供者に紹介を行う", "strength": "1", "evidence": "C", "consensus": "強く推奨78%（7/9）、弱く推奨22%（2/9）", "keyPoints": "QOL改善を実現した複数の臨床試験から、8項目の具体的な緩和ケア内容が抽出された。多職種チーム（緩和ケア専門医，専門看護師，ソーシャルワーカー，リハビリ専門家，精神科医，心理士など）による協働実施が理想的とされている。本邦での医療背景の違いに対応した今後の検証が必要とされている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/5/250105010100.html#cq2"}, {"id": "1-palliative-cq3", "part": "第1部 肺癌", "section": "緩和ケア", "cqNo": "CQ3", "question": "悪液質を呈する切除不能・進行非小細胞肺癌患者に選択的グレリン受容体刺激薬投与は勧められるか？", "recommendation": "選択的グレリン受容体刺激薬（アナモレリン）投与を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "弱く推奨100%（14/14）", "keyPoints": "複数の臨床試験においてアナモレリンは除脂肪体重増加と食欲亢進をもたらすことが示されたが，握力や身体機能改善は証明されていない。ECOG PS3以上の患者や，PS2患者では有意な改善が示されていない点が留意すべき点として指摘されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/5/250105010100.html#cq3"}, {"id": "2-meso-img-cq1a", "part": "第2部 胸膜中皮腫", "section": "画像診断", "cqNo": "CQ1-a", "question": "胸膜中皮腫の存在診断に、胸部造影CTは勧められるか？", "recommendation": "胸膜中皮腫の存在診断に、胸部造影CTを行うことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨100%(20/20)", "keyPoints": "造影剤使用により胸膜不整像がより詳細に描出される。血性胸水下で胸膜と胸水のコントラスト向上、造影効果を有する中皮腫と造影効果を認めない胸膜プラークの鑑別が容易になる。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201010100.html#cq1"}, {"id": "2-meso-img-cq1b", "part": "第2部 胸膜中皮腫", "section": "画像診断", "cqNo": "CQ1-b", "question": "胸膜中皮腫の存在診断に、胸部単純/造影CT＋胸部MRIは勧められるか？", "recommendation": "胸膜中皮腫の存在診断に、胸部単純/造影CTに加え胸部MRIを行わないことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨しない85%(17/20)、弱く推奨しない10%(2/20)、弱く推奨5%(1/20)", "keyPoints": "MRIは常にCTに付加する情報が得られるわけではなく、実臨床において多くの施設で存在診断のためにルーチンに用いられていない。比較試験も存在しない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201010100.html#cq1"}, {"id": "2-meso-img-cq1c", "part": "第2部 胸膜中皮腫", "section": "画像診断", "cqNo": "CQ1-c", "question": "胸膜中皮腫の存在診断に、胸部単純/造影CT＋FDG-PET/CTは勧められるか？", "recommendation": "胸膜中皮腫の存在診断に、胸部単純/造影CTに加えFDG-PET/CTを行わないことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨しない65%(13/20)、弱く推奨しない15%(3/20)、強く推奨20%(4/20)", "keyPoints": "FDG-PETは局所浸潤の評価には向かないが、無症状あるいは他の画像診断で発見されていない胸郭外遠隔転移の検出に優れている。存在診断に関する比較試験はない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201010100.html#cq1"}, {"id": "2-meso-img-cq2a", "part": "第2部 胸膜中皮腫", "section": "画像診断", "cqNo": "CQ2-a", "question": "胸膜病変の良悪性の鑑別に、胸部造影CTは勧められるか？", "recommendation": "胸膜病変の良悪性の鑑別に、胸部造影CTを行うことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨70%(14/20)、弱く推奨5%(1/20)、根拠不明確5%(1/20)、弱く推奨しない5%(1/20)、強く推奨しない15%(3/20)", "keyPoints": "典型所見：①全周性胸膜肥厚pleural rind（感度41%特異度100%）②結節状胸膜肥厚（感度51%特異度94%）③厚さ1cm超の胸膜肥厚（感度36%特異度94%）④縦隔胸膜肥厚（感度56%特異度88%）。中皮腫と転移性胸膜腫瘍の所見にオーバーラップあり鑑別困難な面もある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201010100.html#cq2"}, {"id": "2-meso-img-cq2b", "part": "第2部 胸膜中皮腫", "section": "画像診断", "cqNo": "CQ2-b", "question": "胸膜病変の良悪性の鑑別に、胸部単純/造影CT＋MRIは勧められるか？", "recommendation": "胸膜病変の良悪性の鑑別に、胸部単純/造影CTに加えMRIを行わないことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨しない60%(12/20)、弱く推奨しない10%(2/20)、根拠不明確10%(2/20)、弱く推奨15%(3/20)、強く推奨5%(1/20)", "keyPoints": "MRIの信号強度や拡散強調画像の報告はあるが、常にCTに付加する情報が得られるわけではなく実臨床でルーチンに用いられていない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201010100.html#cq2"}, {"id": "2-meso-img-cq2c", "part": "第2部 胸膜中皮腫", "section": "画像診断", "cqNo": "CQ2-c", "question": "胸膜病変の良悪性の鑑別に、胸部単純/造影CT＋FDG-PET/CTは勧められるか？", "recommendation": "胸膜病変の良悪性の鑑別に、胸部単純/造影CTに加えFDG-PET/CTを行わないことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨しない75%(15/20)、弱く推奨しない15%(3/20)、弱く推奨5%(1/20)、強く推奨5%(1/20)", "keyPoints": "多時相SUV定量評価で悪性病変は遅延相での集積増加が認められるとの報告あるが、半定量的評価によるFDG-PET/CTの診断能は中等度でルーチン検査として推奨できないとするメタアナリシスがある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201010100.html#cq2"}, {"id": "2-meso-dx-cq3", "part": "第2部 胸膜中皮腫", "section": "確定診断", "cqNo": "CQ3", "question": "末梢血中のマーカーによる中皮腫の確定診断は勧められるか？", "recommendation": "末梢血中のマーカーにより中皮腫の確定診断を行わないことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "89%(17/19)が行わないことを強く推奨", "keyPoints": "生検組織との前方視的比較試験は存在しない。感度が低い（SMRP：19～68%）ため早期診断での有用性は限定的。陽性でも病理学的診断手順への進行を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201020100.html#cq3"}, {"id": "2-meso-dx-cq4", "part": "第2部 胸膜中皮腫", "section": "確定診断", "cqNo": "CQ4", "question": "胸水中の腫瘍マーカーやヒアルロン酸の測定は、中皮腫の確定診断に勧められるか？", "recommendation": "胸水中の腫瘍マーカーやヒアルロン酸の測定で、中皮腫の確定診断を行わないことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "89%(17/19)が行わないことを強く推奨", "keyPoints": "生検組織との前方視的比較試験がない。ヒアルロン酸感度44%、SMRP感度68%と低率。高値でも病理学的診断手順への進行を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201020100.html#cq4"}, {"id": "2-meso-dx-cq5a", "part": "第2部 胸膜中皮腫", "section": "確定診断", "cqNo": "CQ5-a", "question": "確定診断のための胸膜採取法として、何が勧められるか？（外科的胸膜生検）", "recommendation": "全身麻酔下での外科的胸膜生検により、十分な量の生検を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(19/19)が行うことを強く推奨", "keyPoints": "診断率：開胸生検91%、胸腔鏡下生検95%以上。全身麻酔下胸腔鏡下は局所麻酔下より病理亜型診断に優れる。播種リスク存在（外科的生検22～57%）のため、生検切開創を後日切除手術皮膚切開線上に設定し合併切除することを推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201020100.html#cq5"}, {"id": "2-meso-dx-cq5b", "part": "第2部 胸膜中皮腫", "section": "確定診断", "cqNo": "CQ5-b", "question": "確定診断のための胸膜採取法として、何が勧められるか？（CTガイド下針生検）", "recommendation": "外科的胸膜生検の適応がない腫瘤形成のある症例においては、CTガイド下針生検をまず行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(19/19)が行うことを強く推奨", "keyPoints": "CTガイド下針生検がAbrams針生検より優れている（感度87% vs 47%）。合併症は少ない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201020100.html#cq5"}, {"id": "2-meso-path-cq6", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ6", "question": "中皮腫の病理診断を行ううえで、どのような検体と処理が推奨されるか？", "recommendation": "組織の挫滅に注意しつつ十分な量の組織量を複数採取し、速やかに10倍量の固定液を用いて10％中性緩衝ホルマリン固定する。固定時間6時間から48時間の固定が望ましい。細胞診用の体腔液検体の場合は可能なかぎりセルブロックを作製することを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "95%(18/19)が実施を強く推奨", "keyPoints": "胸膜組織は胸腔鏡で深く、脂肪組織を含めた十分な大きさを複数採取（推奨：3カ所以上）。標本10mm以上で75%の診断率、10mm未満で8%に低下。体腔液はセルブロック作製が診断精度向上に必須。50～100mL以上の体腔液提出が望ましい。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq6"}, {"id": "2-meso-path-cq7", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ7", "question": "上皮様中皮腫と肺腺癌との鑑別診断に何が勧められるか？", "recommendation": "複数の抗体パネル（少なくとも2つの陽性マーカーと2つの陰性マーカー）を用いた免疫組織化学を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "95%(18/19)が実施を強く推奨", "keyPoints": "中皮腫陽性マーカー：calretinin（感度88%特異度94%）、WT1（感度80%特異度100%）、podoplanin/D2-40（感度84%特異度87%）、HEG1（感度92%特異度100%）、keratin5/6（感度74%特異度68%）。腺癌陽性マーカー：claudin-4（感度98%特異度99%）、CEA（感度91%特異度100%）、TTF-1（感度68%特異度100%）、napsin A（感度82%特異度100%）、BER-EP4（感度96%特異度93%）。単独マーカーは100%の感度特異度を持たない。IMIG及びInternational Mesothelioma Panelは最低2つの陽性と2つの陰性マーカー併用を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq7"}, {"id": "2-meso-path-cq8", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ8", "question": "胸膜中皮腫の病理診断にグレード分類の記載は勧められるか？", "recommendation": "上皮様中皮腫の病理診断では、グレード分類の記載を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨47%(9/19)、弱く推奨53%(10/19)", "keyPoints": "上皮様中皮腫のグレード（GradeⅠ・Ⅱ・Ⅲ）は全生存期間と相関。GradeⅠ中央値24.7カ月＞GradeⅡ12.7カ月＞GradeⅢ7.2カ月。核異型・核分裂像スコアにより分類。肉腫様・二相性では観察者間一致率が低い。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq8"}, {"id": "2-meso-path-cq9", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ9", "question": "胸水・心嚢水が貯留している場合に、体腔液細胞診にBAP1、MTAP免疫染色を併用することは勧められるか？", "recommendation": "BAP1、MTAP免疫染色を行うことを強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨70%(14/20)、弱く推奨25%(5/20)", "keyPoints": "補助アッセイで診断率が1.5～2.4倍向上（74～89%）。BAP1 loss感度0.41-0.86特異度0.86-1.00。MTAP loss感度0.23-0.76特異度0.93-1.00。細胞診のみの診断と組織診の予後に差なし。化学療法予定時は生検が強く推奨される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq9"}, {"id": "2-meso-path-cq10", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ10", "question": "上皮様中皮腫と反応性中皮過形成の鑑別診断にBAP1免疫染色、MTAP免疫染色、CDKN2A FISHは勧められるか？", "recommendation": "BAP1免疫染色、MTAP免疫染色、CDKN2A FISHを行うことを強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨80%(16/20)、弱く推奨15%(3/20)", "keyPoints": "BAP1 loss・MTAP loss検出は特異度100%。CDKN2A FISHのホモ接合性欠失検出が有用。WHO2021分類でdesirable criteriaとして記載。従来の浸潤所見のみでは鑑別困難な症例に有効。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq10"}, {"id": "2-meso-path-cq11", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ11", "question": "前浸潤性中皮腫（mesothelioma in situ）の診断にBAP1、MTAP免疫染色は勧められるか？", "recommendation": "BAP1、MTAP免疫染色を行うことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨60%(12/20)、弱く推奨25%(5/20)", "keyPoints": "WHO2021分類で初めて良性・前浸潤性腫瘍として記載。診断必須項目：(i)繰り返す胸水貯留(ii)胸腔鏡/画像で腫瘤なし(iii)胸膜表面の一層中皮細胞(iv)組織学的に浸潤性増殖なし(v)BAP1 loss・MTAP loss・CDKN2Aホモ欠失のいずれか(vi)多職種合議診断。理想的には100～200mm²の大きな生検組織。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq11"}, {"id": "2-meso-path-cq12", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ12", "question": "線維形成性中皮腫と線維性胸膜炎の鑑別診断にCDKN2A FISHは勧められるか？", "recommendation": "CDKN2A FISHを行うことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨85%(17/20)、弱く推奨10%(2/20)", "keyPoints": "肉腫様中皮腫でCDKN2Aホモ接合性欠失が80～100%に認められ、線維性胸膜炎では認められない（特異度100%）。組織学的鑑別：胸膜炎はzonation（表面で細胞密度高→深部で線維化優勢）、毛細血管発達良好。線維形成性中皮腫：膠原線維間に疎な紡錘形中皮腫細胞、脂肪組織浸潤、expansile nodulesあり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq12"}, {"id": "2-meso-path-cq13", "part": "第2部 胸膜中皮腫", "section": "病理診断", "cqNo": "CQ13", "question": "肉腫様中皮腫と肺肉腫様癌との鑑別診断には補助診断のみならず画像情報も含めた総合的判断が勧められるか？", "recommendation": "補助診断を行うことを強く推奨する。画像情報を含めて総合的判断を行うことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨85%(17/20)、弱く推奨10%(2/20)", "keyPoints": "GATA3：中皮腫70.6～98%陽性 vs 肉腫様癌15～47%陽性。MUC4：中皮腫0～3%陽性 vs 肉腫様癌38～72%陽性。claudin-4・MOC-31・Ber-EP4：中皮腫陰性、肉腫様癌24～38%陽性。MTAP lossは両者同程度で鑑別に非有用。BAP1 lossは中皮腫で希少、肉腫様癌では認められず。画像所見：びまん性胸膜肥厚なら中皮腫、限局性腫瘤で肺内なら肉腫様癌の可能性。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201030100.html#cq13"}, {"id": "2-meso-stage-cq14a", "part": "第2部 胸膜中皮腫", "section": "病期診断", "cqNo": "CQ14-a", "question": "胸膜中皮腫の病期診断に、胸部造影CTは勧められるか？", "recommendation": "胸膜中皮腫の病期診断に、CT撮像時に造影剤を使用することを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨90%(18/20)、弱く推奨5%(1/20)、根拠不明確5%(1/20)", "keyPoints": "造影剤使用により中皮腫病変の造影効果が明らかになり、胸壁浸潤や横隔膜浸潤が鮮明化。縦隔構造が明瞭化しリンパ節評価が正確化。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201040100.html#cq14"}, {"id": "2-meso-stage-cq14b", "part": "第2部 胸膜中皮腫", "section": "病期診断", "cqNo": "CQ14-b", "question": "胸膜中皮腫の病期診断に、胸部単純/造影CT＋胸部MRIは勧められるか？", "recommendation": "胸膜中皮腫の病期診断に、胸部単純/造影CTに加えMRIを行わないことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨70%(14/20)、弱く推奨25%(5/20)、その他5%(1/20)", "keyPoints": "MRIは局所浸潤評価でCT優位性あるが、最新マルチディテクタCTで任意方向再構成が可能となり精度向上。実臨床でルーチン使用されていない実績。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201040100.html#cq14"}, {"id": "2-meso-stage-cq14c", "part": "第2部 胸膜中皮腫", "section": "病期診断", "cqNo": "CQ14-c", "question": "胸膜中皮腫の病期診断に、胸部単純/造影CT＋FDG-PET/CTは勧められるか？", "recommendation": "胸膜中皮腫の病期診断に、胸部単純/造影CTに加えFDG-PET/CTを行うことを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨65%(13/20)、弱く推奨25%(5/20)、根拠不明確5%(1/20)", "keyPoints": "FDG-PET/CTはStageⅡおよびⅢの正診率がCTやMRIより高い。胸郭外転移検出に優れるが局所浸潤評価は劣位。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/1/250201040100.html#cq14"}, {"id": "2-meso-surg-cq1", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ1", "question": "臨床病期Ⅰ-ⅢA期の切除可能中皮腫に対して手術は勧められるか？", "recommendation": "臨床病期Ⅰ-ⅢA期で術後に肉眼的完全切除を得られると考えられる症例に対して外科的切除を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨74%(14/19)、弱く推奨26%(5/19)", "keyPoints": "本邦の大規模前方視的観察研究では手術群のOS中央値32.2カ月に対し非手術群14.0カ月、BSC群3.8カ月。複数の後方視的データベース研究でも手術群の生存率改善確認。MARS2試験では化学療法単独群の方が予後良好とされたが患者選択基準に問題ありとの指摘あり。熟練外科医によるmultidisciplinaryなチーム判断が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq1"}, {"id": "2-meso-surg-cq2a", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ2-a", "question": "耐術能のある切除可能中皮腫には、術式として胸膜切除/肺剝皮術（P/D）が勧められるか？", "recommendation": "耐術能のある切除可能中皮腫には、術式として胸膜切除/肺剝皮術（P/D）を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨74%(14/19)、弱く推奨26%(5/19)", "keyPoints": "P/D後のOS中央値は13～41.8カ月と幅広い。術後30日死亡率1.2～5.4%、90日死亡率3.2～14.1%。メタアナリシスではEPPに対するP/Dの術後30日死亡の相対危険度0.49と有意に低い。QOL面でもP/DがEPPより良好との報告あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq2"}, {"id": "2-meso-surg-cq2b", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ2-b", "question": "耐術能のある切除可能中皮腫には、術式として胸膜肺全摘術（EPP）が勧められるか？", "recommendation": "耐術能のある切除可能中皮腫には、術式として胸膜肺全摘術（EPP）を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "弱く推奨74%(14/19)、弱く推奨しない21%(4/19)、強く推奨しない5%(1/19)", "keyPoints": "EPP後のOS中央値は12～29.1カ月で報告差あり。術後30日死亡率1.1～7%、術後合併症発生率21.6～63.6%と高い。生存率改善の可能性があるが有害事象がP/Dより高いため弱く推奨。厳格な手術適応決定が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq2"}, {"id": "2-meso-surg-cq3a", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ3-a", "question": "二相性中皮腫に外科治療は勧められるか？", "recommendation": "二相性中皮腫に外科治療を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "弱く推奨68%(13/19)、根拠不明確5%(1/19)、弱く推奨しない26%(5/19)", "keyPoints": "SEERデータベース検討では二相性の外科治療群OS12カ月に対し非手術群では統計的差がない。NCDBでは手術群15.8カ月対非手術群9.3カ月で有意差あり。北米多施設検討では集学的治療群17カ月対薬物療法単独群13カ月。肉腫様成分の割合が予後に影響する。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq3"}, {"id": "2-meso-surg-cq3b", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ3-b", "question": "肉腫様中皮腫に外科治療は勧められるか？", "recommendation": "肉腫様中皮腫に外科治療を行わないよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "弱く推奨しない63%(12/19)、強く推奨しない37%(7/19)", "keyPoints": "SEERデータベースでは外科治療群OS4カ月で手術群と非手術群に差なし。NCDBでは手術群7.6カ月対非手術群4.2カ月だが術後30日死亡率9.7%、90日死亡率29.8%と著しく高い。北米単施設ではOS9カ月と極めて不良で外科治療は推奨されない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq3"}, {"id": "2-meso-surg-cq4", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ4", "question": "局所治療が可能な再発に対して局所切除は勧められるか？", "recommendation": "切除可能な限局した局所再発に対して局所切除を行うことを弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "弱く推奨89%(17/19)、根拠不明確11%(2/19)", "keyPoints": "6つの後方視的研究のシステマティックレビューでは再発後生存期間14.5～23.5カ月。初回手術から再発までの期間が長い症例で予後延長。限局的な再発巣では局所療法が薬物療法より予後改善に寄与。術後死亡率および重篤合併症は0～12.5%と比較的安全。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq4"}, {"id": "2-meso-surg-cq5a", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ5-a", "question": "切除可能な胸膜中皮腫に対し、周術期化学療法は勧められるか？", "recommendation": "切除可能な胸膜中皮腫に対し、術前もしくは術後の化学療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨80%(16/20)、弱く推奨15%(3/20)、根拠不明確5%(1/20)", "keyPoints": "術前と術後化学療法でOS有意差なし（20.9対21.7カ月）。複数の第Ⅱ相試験でOS中央値16.8～19.9カ月。本邦第Ⅱ相試験ではP/D+術前化学療法群でOS41.4カ月。治療完遂率は38.1～75%。周術期合併症として膿胸やARDS報告あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq5"}, {"id": "2-meso-surg-cq5b", "part": "第2部 胸膜中皮腫", "section": "外科治療", "cqNo": "CQ5-b", "question": "化学療法レジメンとしてはいかなるものが勧められるか？", "recommendation": "化学療法レジメンとしてはシスプラチン＋ペメトレキセド併用療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨85%(17/20)、弱く推奨10%(2/20)、根拠不明確5%(1/20)", "keyPoints": "CDDP+PEM併用療法の客観的奏効率は26.0～40%。CDDP+GEM併用療法は26%。術前化学療法のGrade3以上有害事象として消化器毒性、血液毒性、発熱性好中球減少が報告。複数の第Ⅱ相試験と前方視的コホート研究がPEM+CDDP併用を支持。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202010100.html#cq5"}, {"id": "2-meso-rt-cq6", "part": "第2部 胸膜中皮腫", "section": "放射線治療", "cqNo": "CQ6", "question": "胸膜肺全摘術（EPP）の術後に片側胸郭照射を行うことは勧められるか？", "recommendation": "EPPの術後に片側胸郭照射を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "強く推奨10%(2/20)、弱く推奨70%(14/20)、根拠不明確15%(3/20)、弱く非推奨0%、強く非推奨5%(1/20)", "keyPoints": "局所領域制御は約60%に上るが全生存期間への寄与は不明確。線量増加により制御改善の可能性あり。完遂率が低く、第Ⅲ相試験が不在。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202020100.html#cq6"}, {"id": "2-meso-rt-cq7", "part": "第2部 胸膜中皮腫", "section": "放射線治療", "cqNo": "CQ7", "question": "胸膜切除/肺剝皮術（P/D）の術後または手術非適応症例に放射線治療は勧められるか？", "recommendation": "P/Dの術後または手術非適応症例に放射線治療を行わないよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "強く推奨5%(1/20)、弱く推奨5%(1/20)、根拠不明確5%(1/20)、弱く非推奨60%(12/20)、強く非推奨25%(5/20)", "keyPoints": "IMRTによる予後改善が報告される一方で放射線肺臓炎などの重篤な有害事象発生。経験豊富な施設での実施が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202020100.html#cq7"}, {"id": "2-meso-rt-cq8", "part": "第2部 胸膜中皮腫", "section": "放射線治療", "cqNo": "CQ8", "question": "EPP後放射線治療として3次元原体照射（3D-CRT）や強度変調放射線治療（IMRT）は勧められるか？", "recommendation": "EPP後放射線治療として、3D-CRTやIMRTを行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨15%(3/20)、弱く推奨75%(15/20)、根拠不明確5%(1/20)、弱く非推奨5%(1/20)、強く非推奨0%", "keyPoints": "IMRTは局所再発率改善（14.3%対41.7%）が期待できるが放射線肺臓炎リスク増加。肺のV20Gy<7%、MLD<8Gyといった厳格な制約が推奨される。第Ⅲ相試験不在。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202020100.html#cq8"}, {"id": "2-meso-med-cq9", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ9", "question": "PS 0-2の切除不能胸膜中皮腫に対する薬物療法は勧められるか？", "recommendation": "a. PS0-2の一次治療として免疫チェックポイント阻害薬併用療法を行うよう強く推奨する。b. プラチナ製剤併用療法にPD-1阻害薬を併用した治療を行うよう弱く推奨する。c. プラチナ製剤併用療法を行うよう弱く推奨する。", "strength": "a:1 b:2 c:2", "evidence": "a:B b:B c:B", "consensus": "a. 89%(17/19)が強く推奨。c. 58%(11/19)が強く推奨", "keyPoints": "CheckMate743試験：ニボルマブ+イピリムマブ併用療法がプラチナ製剤+PEM併用療法に比べOS延長（18.1 vs 14.1カ月、HR0.73）。非上皮様でHR0.48と特に有効。PFS延長効果なし（6.8 vs 7.2カ月、HR0.92）。ORR：40% vs 44%。有害事象Grade3-4：30% vs 31%。QOL改善傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq9"}, {"id": "2-meso-med-cq10", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ10", "question": "PS 0-2の高齢者の胸膜中皮腫に対する薬物療法は勧められるか？", "recommendation": "a. PS0-2の高齢者に免疫チェックポイント阻害薬併用療法を行うよう弱く推奨する。b. プラチナ製剤併用療法にPD-1阻害薬を併用した治療を行うよう弱く推奨する。c. プラチナ製剤併用療法を行うよう弱く推奨する。", "strength": "2（a,b,c共通）", "evidence": "D（a,b,c共通）", "consensus": "a. 84%(16/19)が弱く推奨。b. 63%(15/24)が弱く推奨、25%(6/24)が根拠不明確。c. 79%(15/19)が弱く推奨", "keyPoints": "CheckMate743試験の75歳以上サブグループ解析：OS有意差なし（16.9 vs 15.4カ月、HR1.02）。65-74歳ではOS有意に延長（20.3 vs 14.9カ月、HR0.63、P=0.0020）。高齢者限定の比較試験なし。CBDCA保険償還されていない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq10"}, {"id": "2-meso-med-cq11", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ11", "question": "PS 3-4に全身的な薬物療法は勧められるか？", "recommendation": "PS3-4に対し薬物療法を行わないよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "70%(14/20)が行わないことを強く推奨", "keyPoints": "PS不良例のみを対象とした臨床試験なし。全採用試験でPS0-2が対象。安全性が不明。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq11"}, {"id": "2-meso-med-cq12a", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ12-a", "question": "プラチナ製剤+ペメトレキセド投与後の維持療法は勧められるか？（ペメトレキセド維持）", "recommendation": "プラチナ製剤+ペメトレキセド投与後のペメトレキセドによる維持療法を行わないことを弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "68%(13/19)が行わないことを弱く推奨", "keyPoints": "CALGB30901試験：PEM維持療法 vs 経過観察。OS差なし（16.3 vs 11.8カ月、HR0.86、P=0.6737）。PFS差なし（3.4 vs 3カ月、HR0.99、P=0.9733）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq12"}, {"id": "2-meso-med-cq12b", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ12-b", "question": "プラチナ製剤+ペメトレキセド投与後の維持療法は勧められるか？（ゲムシタビン維持）", "recommendation": "プラチナ製剤+ペメトレキセド投与後のゲムシタビンによる維持療法を行うことを弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "84%(16/19)が行うことを弱く推奨", "keyPoints": "NVALT19試験：GEM維持療法 vs 経過観察。OS差なし（16.4 vs 13.4カ月、HR0.90、P=0.60）。PFS延長（6.2 vs 3.2カ月、HR0.48、P=0.0002）。Grade3-4有害事象52%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq12"}, {"id": "2-meso-med-cq13a", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ13-a", "question": "PS 0-2の胸膜中皮腫に対する二次治療以降の薬物療法は勧められるか？（ニボルマブ）", "recommendation": "ニボルマブ単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "89%(17/19)が行うことを強く推奨", "keyPoints": "CONFIRM試験：ニボルマブ vs プラセボ。OS延長（10.2 vs 6.9カ月、HR0.69、P=0.0090）。PFS延長（3.0 vs 1.8カ月、HR0.67、P=0.0012）。RR：11% vs 1%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq13"}, {"id": "2-meso-med-cq13b", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ13-b", "question": "PS 0-2の胸膜中皮腫に対する二次治療以降の薬物療法は勧められるか？（ペメトレキセド）", "recommendation": "ペメトレキセド単剤療法を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": null, "keyPoints": "一次治療でPEM未投与症例での有効性検証。PFS延長（3.6 vs 1.6カ月、P=0.0148）。OS差なし。PEM再投与：OS10.5～13.6カ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq13"}, {"id": "2-meso-med-cq13c", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ13-c", "question": "PS 0-2の胸膜中皮腫に対する二次治療以降の薬物療法は勧められるか？（VNR/GEM）", "recommendation": "ビノレルビン単剤療法、ゲムシタビン単剤療法もしくはビノレルビン+ゲムシタビン併用療法を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "89%(17/19)が行うことを弱く推奨", "keyPoints": "VNR単剤：OS9.6カ月、RR16%、Grade3-4好中球減少55%。GEM単剤：OS8.0カ月、RR7%、Grade3-4好中球減少30%。VNR+GEM併用：OS10.9カ月、RR10%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq13"}, {"id": "2-meso-med-cq14", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ14", "question": "薬物療法の対象となる胸膜中皮腫に血管新生阻害薬の併用は勧められるか？", "recommendation": "一次治療としてのシスプラチン+ペメトレキセド併用療法にベバシズマブを追加することを弱く推奨する。", "strength": "2", "evidence": "B", "consensus": "89%(17/19)が行うことを弱く推奨", "keyPoints": "MAPS試験：CDDP/PEM+ベバシズマブ vs CDDP/PEM。OS延長（18.8 vs 16.1カ月、P=0.0167）。PFS延長（9.2 vs 7.3カ月、P<0.0001）。Grade3以上有害事象：71% vs 62%。Grade3以上高血圧：23% vs 0%。QOL改善傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq14"}, {"id": "2-meso-med-cq15", "part": "第2部 胸膜中皮腫", "section": "内科治療", "cqNo": "CQ15", "question": "胸膜中皮腫に対する胸膜癒着術は勧められるか？", "recommendation": "胸水ドレナージ後に胸水コントロールを目的とした胸膜癒着術を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "58%(11/19)強く推奨、42%(8/19)弱く推奨", "keyPoints": "Talc胸膜癒着術前向き観察研究：3カ月コントロール率49%、1年生存者で93%。VATS胸膜部分切除とのRCT：1年生存者のコントロール率77% vs 70%。OS/PFS有意差なし。合併症率：Talc14% vs VATS31%。ARDS併発なし（85例中）。QOL損害なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202030100.html#cq15"}, {"id": "2-meso-pall-cq16", "part": "第2部 胸膜中皮腫", "section": "緩和治療", "cqNo": "CQ16", "question": "疼痛緩和目的の放射線治療は勧められるか？", "recommendation": "疼痛緩和目的の放射線治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨85%(17/20)、弱く推奨10%(2/20)、根拠不明確0%、行わないことを弱く推奨5%(1/20)", "keyPoints": "進行胸膜中皮腫の疼痛に対して約60%の症例に疼痛緩和が得られたとの報告。標準的には40Gy/20回または36Gy/13回が用いられ、1回線量4Gyの方が効果が高い傾向。ただし高線量照射では重篤な有害事象が高率のため低線量で小さな範囲での照射が有用。最適分割方法や至適線量は未だ不明。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/2/2/250202040100.html#cq16"}, {"id": "3-thym-clin-cq1", "part": "第3部 胸腺腫瘍", "section": "臨床症状・血液検査", "cqNo": "CQ1", "question": "胸腺上皮性腫瘍が疑われる場合、血清抗アセチルコリン受容体抗体の測定は勧められるか？", "recommendation": "血清抗アセチルコリン受容体抗体の測定を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "100%(17/17)が行うことを強く推奨", "keyPoints": "本邦の調査では胸腺腫症例の約23～25%に重症筋無力症が合併。欧米報告では32.8%。胸腺腫に合併した重症筋無力症ではほとんどが抗体陽性。無症状患者でも術後に重症筋無力症が0.9～20%発症。術前無症状でも術前の抗体が陽性であることが多い。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301010100.html#cq1"}, {"id": "3-thym-clin-cq2", "part": "第3部 胸腺腫瘍", "section": "臨床症状・血液検査", "cqNo": "CQ2", "question": "胸腺上皮性腫瘍が疑われる場合、血球算定は勧められるか？", "recommendation": "赤芽球癆の存在の確認のため、血球算定を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "100%(17/17)が行うことを強く推奨", "keyPoints": "赤芽球癆は胸腺上皮性腫瘍例の0.7～2.6%に合併。前縦隔腫瘍患者では血球数検査を実施し、貧血症状がある場合は精査が推奨される。胸腺腫患者における赤芽球癆の存在は予後不良となり得る。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301010100.html#cq2"}, {"id": "3-thym-clin-cq3", "part": "第3部 胸腺腫瘍", "section": "臨床症状・血液検査", "cqNo": "CQ3", "question": "胸腺上皮性腫瘍が疑われる場合、血清γグロブリンの測定は勧められるか？", "recommendation": "血清γグロブリンの測定を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "強く推奨12%(2/17)、弱く推奨88%(15/17)", "keyPoints": "低γグロブリン血症は胸腺上皮性腫瘍例の0.4～0.7%程度に合併。重症筋無力症や赤芽球癆と比べると頻度は低い。易感染性が認められる場合にγグロブリンの測定が勧められる。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301010100.html#cq3"}, {"id": "3-thym-img-cq4", "part": "第3部 胸腺腫瘍", "section": "存在診断・画像鑑別", "cqNo": "CQ4", "question": "胸腺上皮性腫瘍の検出に、胸部CTは勧められるか？", "recommendation": "胸腺上皮性腫瘍の検出に、胸部CTを行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(17/17)が行うことを強く推奨", "keyPoints": "重症筋無力症患者での検討で単純X線写真の検出率58%に対しCTは85%。低線量CT検診での縦隔病変発見率は0.77～1.68%。CT装置性能向上により検出率がさらに向上。胸腺上皮性腫瘍存在診断においてCTの有用性に十分なコンセンサス。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301020100.html#cq4"}, {"id": "3-thym-img-cq5", "part": "第3部 胸腺腫瘍", "section": "存在診断・画像鑑別", "cqNo": "CQ5", "question": "縦隔病変の鑑別診断に、造影CTは勧められるか？", "recommendation": "縦隔病変の鑑別診断に、造影CTを行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(15/15)が行うことを強く推奨", "keyPoints": "小胸腺腫での造影効果は平均18.7HU上昇、嚢胞は4.3HUでほぼ造影効果なし。造影後CT値60HU以上が嚢胞との鑑別に有用。腫瘍内の不均一造影は高悪性度腫瘍を示唆。血管異常との鑑別に有効。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301020100.html#cq5"}, {"id": "3-thym-img-cq6", "part": "第3部 胸腺腫瘍", "section": "存在診断・画像鑑別", "cqNo": "CQ6", "question": "胸腺上皮性腫瘍の検出や鑑別診断に、MRIは勧められるか？", "recommendation": "造影剤投与不能例、胸腺過形成、嚢胞性病変、その他の腫瘍との鑑別にMRIを実施するよう推奨する。", "strength": "2", "evidence": "C", "consensus": "93%(14/15)が弱く推奨、7%(1/15)が強く推奨", "keyPoints": "CT診断不確実例（22%）ではMRI評価が有用。Chemical shift MRIで胸腺過形成と腫瘍の鑑別可能。CTと比較してMRIは被膜描出率75%（CT18%）、隔壁43%（CT13%）で優れている。非造影MRIで大血管浸潤評価可能（正診率88%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301020100.html#cq6"}, {"id": "3-thym-dx-cq7a", "part": "第3部 胸腺腫瘍", "section": "確定診断", "cqNo": "CQ7-a", "question": "胸腺上皮性腫瘍が疑われる場合、経皮針生検は勧められるか？（切除不能例等）", "recommendation": "切除不能と判断される、術前治療を計画する、および他疾患との鑑別が必要な場合、経皮針生検を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨93%(14/15)、弱く推奨7%(1/15)", "keyPoints": "切除不能例や術前治療計画時は胸腺腫と胸腺癌で薬物療法レジメンが異なるため確定診断が必須。CTガイド下経皮針生検の診断正確度は報告により異なり、FNA（微小針）で77%、Tru-Cut針（太い針）で94%。穿刺通路への腫瘍再発リスク存在。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301030100.html#cq7"}, {"id": "3-thym-dx-cq7b", "part": "第3部 胸腺腫瘍", "section": "確定診断", "cqNo": "CQ7-b", "question": "胸腺上皮性腫瘍が疑われる場合、経皮針生検は勧められるか？（切除可能例）", "recommendation": "切除可能と判断される場合は、経皮針生検は行わないよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "行わないことを強く推奨67%(10/15)、弱く推奨33%(5/15)", "keyPoints": "切除可能例では91%の施設が術前生検をルーチン化していない実践例が根拠。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301030100.html#cq7"}, {"id": "3-thym-stage-cq8", "part": "第3部 胸腺腫瘍", "section": "病期診断", "cqNo": "CQ8", "question": "胸腺上皮性腫瘍が疑われる場合、病期診断のために勧められる診断法は何か？", "recommendation": "上腹部を含めた胸部造影CTを行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(16/16)が行うことを強く推奨", "keyPoints": "造影CTは腫瘍の浸潤性評価に有用で、辺縁が不整、内部性状が不均一、リンパ節腫大、血管浸潤を認める場合は有意に癌の可能性が高い。MRIはヨードアレルギーでCT造影が困難な場合に検討可能で弱く推奨。FDG-PETは予期せぬ転移発見の可能性があるものの術前のリンパ節転移・遠隔転移評価に用いるよう勧められるだけの根拠が明確ではない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/1/250301040100.html#cq8"}, {"id": "3-thym-surg-cq1", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ1", "question": "臨床病期Ⅰ-Ⅱ期胸腺上皮性腫瘍に対して、外科切除は勧められるか？", "recommendation": "外科切除を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(16/16)が行うことを強く推奨", "keyPoints": "正岡分類Ⅰ-Ⅱ期胸腺上皮性腫瘍は標準治療として外科切除が実施されており、5年全生存率95%程度、10年全生存率88%程度の良好な成績。近年のデータベース解析において腫瘍サイズが独立予後因子であることが確認され、TNM分類第9版での新規分類が予定されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq1"}, {"id": "3-thym-surg-cq2", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ2", "question": "臨床病期Ⅰ-Ⅱ期胸腺上皮性腫瘍切除手術において、腫瘍の完全切除および胸腺摘出術が勧められるか？", "recommendation": "腫瘍の完全切除および胸腺摘出術を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(17/17)が行うことを強く推奨", "keyPoints": "完全切除による治療成績は良好。胸腺組織を残した切除や部分切除との比較研究では予後に遜色がなかったという報告が多数だが、予後不良という報告も散見され根拠が明確ではない段階のため標準術式として推奨される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq2"}, {"id": "3-thym-surg-cq3", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ3", "question": "臨床病期Ⅰ-Ⅱ期胸腺上皮性腫瘍切除手術において、アプローチの選択肢として胸腔鏡下あるいはロボット支援下の切除は勧められるか？", "recommendation": "胸腔鏡下あるいはロボット支援下の切除をアプローチ法の1つとして行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "88%(14/16)が行うことを弱く推奨", "keyPoints": "低侵襲アプローチは出血量、手術時間、呼吸器合併症、術後入院期間などの周術期成績が良好だが長期成績は未確認。ロボット支援手術も遠隔成績で開胸と有意差なし。剣状突起下アプローチは術後疼痛で優れるが遠隔成績は今後の報告を待つ必要がある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq3"}, {"id": "3-thym-surg-cq4", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ4", "question": "臨床病期Ⅲ期胸腺上皮性腫瘍に対して、腫瘍の完全切除を伴う胸腺摘出術は勧められるか？", "recommendation": "腫瘍の完全切除を伴う胸腺摘出術を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "94%(16/17)が行うことを強く推奨", "keyPoints": "Ⅲ期は10年全生存率80.2%、無再発生存率51.6%と報告される。完全切除は有意な予後因子として同定されており、浸潤臓器の合併切除を含めた完全切除達成が推奨される。大血管浸潤例でも完全切除が推奨される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq4"}, {"id": "3-thym-surg-cq5", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ5", "question": "完全切除が困難な臨床病期Ⅲ期胸腺上皮性腫瘍に対して、集学的治療は勧められるか？", "recommendation": "集学的治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100%(17/17)が行うことを強く推奨", "keyPoints": "術前導入化学療法や化学放射線療法により高い完全切除率、良好な予後が報告されている。集学的治療（導入療法、手術、術後補助療法）が長期生存に寄与することが第Ⅱ相試験で示されている。治癒目的の不完全切除でも補助療法により良好な成績が得られる。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq5"}, {"id": "3-thym-surg-cq6", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ6", "question": "臨床病期Ⅲ期胸腺腫に横隔神経浸潤が認められる場合、横隔神経を温存することは勧められるか？", "recommendation": "重症筋無力症などの合併症を有する症例では、横隔神経を合併切除せずに温存することも考慮してよい。両側の横隔神経浸潤を伴う症例においては片側の横隔神経を温存するよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "100%(19/19)が弱く推奨に同意", "keyPoints": "温存例で局所再発率が高いが生存率は同等。術後呼吸機能は温存群で優れている。合併症や呼吸器疾患がある場合に検討する価値がある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq6"}, {"id": "3-thym-surg-cq7", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ7", "question": "臨床病期Ⅳ期胸腺上皮性腫瘍に対して、集学的治療は勧められるか？", "recommendation": "集学的治療を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "100%(18/18)が強く推奨に同意", "keyPoints": "Ⅳ期では胸腺腫の10年全生存率56～76%。胸腺癌はⅣa期42%、Ⅳb期30%程度。多様な転移形式に対応した集学的医療チームによる治療が推奨される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq7"}, {"id": "3-thym-surg-cq8", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ8", "question": "肉眼的完全切除が可能な臨床病期Ⅳ期胸腺上皮性腫瘍に対して、外科切除は勧められるか？", "recommendation": "外科切除を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "100%(17/17)が弱く推奨に同意", "keyPoints": "前向き試験はないが後方視的データで良好。胸腺腫Ⅳa期で70.6%、Ⅳb期で52.8%の5年生存率。術式や治療内容が多様で一義的な定義がない点に注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq8"}, {"id": "3-thym-surg-cq9", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ9", "question": "肉眼的完全切除が困難な臨床病期Ⅳ期胸腺上皮性腫瘍に対して、減量手術は勧められるか？", "recommendation": "胸腺腫に対しては減量手術を行うことを弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "100%(17/17)が弱く推奨に同意", "keyPoints": "胸腺腫では完全切除92.9%、不完全切除64.4%、非切除35.6%の5年生存率。胸腺癌では有用性の証拠が限定的。メタアナリシスでも確定的結論なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq9"}, {"id": "3-thym-surg-cq10", "part": "第3部 胸腺腫瘍", "section": "外科治療", "cqNo": "CQ10", "question": "胸腺上皮性腫瘍の切除に際してリンパ節郭清は勧められるか？", "recommendation": "高悪性度症例や進行症例において正しい病期診断の目的にリンパ節郭清・サンプリングを弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "100%(17/17)が弱く推奨に同意", "keyPoints": "胸腺腫のリンパ節転移は1.5～1.8%、胸腺癌は26.8～33.5%。郭清自体に予後改善効果は明確でないが、正確な病期診断と予後予測に有用。T因子が進行するほど転移率上昇。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302010100.html#cq10"}, {"id": "3-thym-rt-cq11a", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "cqNo": "CQ11-a", "question": "完全切除された胸腺腫に対して、術後放射線療法は勧められるか？（Ⅰ・Ⅱ期）", "recommendation": "完全切除されたⅠ，Ⅱ期胸腺腫に対しては、術後放射線療法を行わないよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "行わないことを強く推奨83%(15/18)、弱く推奨17%(3/18)", "keyPoints": "Ⅰ-Ⅱ期では局所再発率が低く長期成績が良好。複数の後ろ向き解析やSEER登録例でも術後照射の有用性は認められない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302020100.html#cq11"}, {"id": "3-thym-rt-cq11b", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "cqNo": "CQ11-b", "question": "完全切除された胸腺腫に対して、術後放射線療法は勧められるか？（Ⅲ期）", "recommendation": "完全切除されたⅢ期胸腺腫に対しては、術後放射線療法を行うよう勧められるだけの根拠が明確ではない。", "strength": null, "evidence": "C", "consensus": "78%(14/18)が根拠が明確ではないに投票", "keyPoints": "Ⅲ期については報告が一定していないが、現状ではエビデンスが乏しい。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302020100.html#cq11"}, {"id": "3-thym-rt-cq12a", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "cqNo": "CQ12-a", "question": "完全切除された胸腺癌に対して、術後放射線療法は勧められるか？（Ⅰ期）", "recommendation": "完全切除されたⅠ期胸腺癌に対しては、術後放射線療法を行わないよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "行わないことを強く推奨22%(4/18)、弱く推奨67%(12/18)", "keyPoints": "Ⅰ期は良好な長期成績で術後照射の利益が乏しい。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302020100.html#cq12"}, {"id": "3-thym-rt-cq12b", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "cqNo": "CQ12-b", "question": "完全切除された胸腺癌に対して、術後放射線療法は勧められるか？（Ⅱ-Ⅲ期）", "recommendation": "完全切除されたⅡ-Ⅲ期胸腺癌に対しては、術後放射線療法を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "行うことを弱く推奨100%(18/18)", "keyPoints": "Ⅱ-Ⅲ期では複数の後ろ向きコホート研究やメタアナリシスで全生存率や無病生存率の改善が報告されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302020100.html#cq12"}, {"id": "3-thym-rt-cq13", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "cqNo": "CQ13", "question": "顕微鏡的または肉眼的不完全切除となった胸腺上皮性腫瘍に対して、術後放射線療法は勧められるか？", "recommendation": "術後放射線療法または術後化学放射線療法を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "行うことを強く推奨94%(17/18)、弱く推奨6%(1/18)", "keyPoints": "不完全切除は重要な予後不良因子。追加補助療法の必要性が認識されている。前向き比較試験はないが、SEER登録例での検討で術後照射が生存に寄与する可能性が示唆されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302020100.html#cq13"}, {"id": "3-thym-rt-cq14", "part": "第3部 胸腺腫瘍", "section": "放射線治療", "cqNo": "CQ14", "question": "切除不能胸腺上皮性腫瘍に対して、放射線治療は勧められるか？", "recommendation": "根治照射可能な切除不能胸腺上皮性腫瘍に対しては、放射線治療または化学放射線療法を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "行うことを強く推奨100%(17/17)", "keyPoints": "複数の第Ⅱ相試験で同時化学放射線療法（IMRT使用）は放射線治療単独より有意に優れた成績を示す。5年生存率は56-62%と報告されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302020100.html#cq14"}, {"id": "3-thym-med-cq15", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ15", "question": "臨床病期Ⅳ期または再発胸腺腫に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨94%(17/18)、弱く推奨6%(1/18)", "keyPoints": "ランダム化比較試験がない希少癌のため第Ⅱ相試験や後方視的研究のみ。ORRは比較的高く、症状緩和効果が期待できる。PS0-2の全身状態良好例が対象。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq15"}, {"id": "3-thym-med-cq16", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ16", "question": "臨床病期Ⅳ期または再発胸腺腫に対して、シスプラチンとアンスラサイクリン系抗癌薬の併用療法は勧められるか？", "recommendation": "シスプラチンとアンスラサイクリン系抗癌薬の併用療法を行うことを強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨94%(17/18)、弱く推奨6%(1/18)", "keyPoints": "ADOC、PAC、CODE、CAMP療法のORRは70～92%（平均75%）。アンスラサイクリン系非使用レジメンはORR35～52%（平均40%）。アンスラサイクリン系の方が良好。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq16"}, {"id": "3-thym-med-cq17", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ17", "question": "一次治療に不応となった胸腺腫に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "弱く推奨83%(15/18)、強く推奨11%(2/18)、根拠不明6%(1/18)", "keyPoints": "PEMはORR27%、PFS中央値12.1ヶ月、OS中央値46.4ヶ月。ペムブロリズマブは胸腺腫でのコンセンサスで非推奨（毒性71.4%で治療中止）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq17"}, {"id": "3-thym-med-cq18", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ18", "question": "局所進行胸腺腫に対して、術前化学療法は勧められるか？", "recommendation": "術前化学療法を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "弱く推奨94%(17/18)、根拠不明6%(1/18)", "keyPoints": "CAMP療法で奏効77%（CR3例、PR14例）、完全切除率76%（16/21例）。少数例の第Ⅱ相試験だが比較的高い切除率。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq18"}, {"id": "3-thym-med-cq19", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ19", "question": "臨床病期Ⅳ期または再発胸腺癌に対して、薬物療法は勧められるか？", "recommendation": "薬物療法を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨100%(18/18)", "keyPoints": "ORR約22～36%。ペムブロリズマブは米国・韓国試験で奏効率22.5%、19.2%、5年生存率18.2%。胸腺癌ではペムブロリズマブがキードラッグと考えられている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq19"}, {"id": "3-thym-med-cq20", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ20", "question": "臨床病期Ⅳ期または再発胸腺癌に対して、カルボプラチンとパクリタキセルまたはアムルビシンの併用療法は勧められるか？", "recommendation": "カルボプラチンとパクリタキセルまたはアムルビシンの併用療法を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "強く推奨40%(6/15)、弱く推奨60%(9/15)", "keyPoints": "胸腺癌ではアンスラサイクリン系の有無で奏効率に大差なく、プラチナ製剤がキードラッグ。カルボプラチン・パクリタキセル併用で奏効率22～36%。カルボプラチン・アムルビシン併用で未治療例42%、既治療例30%の奏効率。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq20"}, {"id": "3-thym-med-cq21", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ21", "question": "一次治療に不応となった胸腺癌に対して、レンバチニブは勧められるか？", "recommendation": "レンバチニブを行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨12%(2/16)、弱く推奨88%(14/16)", "keyPoints": "REMORA試験で既治療胸腺癌42例に対し奏効率38.1%、病勢制御率95.2%を示唆。高血圧が有害事象の主要因で全例減量必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq21"}, {"id": "3-thym-med-cq22", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ22", "question": "一次治療に不応となった胸腺癌に対して、細胞傷害性抗癌薬は勧められるか？", "recommendation": "細胞傷害性抗癌薬（S-1、アムルビシン、ペメトレキセド）を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨25%(4/16)、弱く推奨75%(12/16)", "keyPoints": "ペメトレキセド9%、アムルビシン11%、テガフール・ギメラシル・オテラシルカリウム30.8%の奏効率を報告。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq22"}, {"id": "3-thym-med-cq23", "part": "第3部 胸腺腫瘍", "section": "内科治療", "cqNo": "CQ23", "question": "局所進行胸腺癌に対して、術前化学療法は勧められるか？", "recommendation": "薬物療法または化学放射線療法を術前治療として行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "強く推奨19%(3/16)、弱く推奨69%(11/16)、根拠不明確13%(2/16)", "keyPoints": "化学放射線療法で77%の完全切除率、シスプラチン・ドセタキセルで79%の完全切除率を報告。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302030100.html#cq23"}, {"id": "3-thym-fu-cq24", "part": "第3部 胸腺腫瘍", "section": "経過観察", "cqNo": "CQ24", "question": "胸腺上皮性腫瘍に対し根治的治療が行われた場合、定期的な経過観察は行うべきか？", "recommendation": "胸腺腫の場合10年以上、胸腺癌の場合5年以上の経過観察を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨22%(4/18)、弱く推奨78%(14/18)、合意率100%", "keyPoints": "根治治療後の再発は組織型や病期に関連して頻度が増加し、再発期間が長期化する傾向がある。再発巣は胸部に限局することが多く画像診断を含めた定期的な観察が必要。加えて術後重症筋無力症の発症リスクや二次癌の早期発見も重要な監視対象。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302040100.html#cq24"}, {"id": "3-thym-rec-cq25", "part": "第3部 胸腺腫瘍", "section": "再発", "cqNo": "CQ25", "question": "切除可能な再発胸腺上皮性腫瘍に対して、外科切除は勧められるか？", "recommendation": "胸腺癌を除いた切除可能な再発巣に対する外科切除を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨17%(3/18)、弱く推奨83%(15/18)、合意率100%", "keyPoints": "外科治療の5年・10年生存率は70.2～92.0%、29.9～72.5%で非外科治療を上回る。ただし胸腺癌では化学療法主体が推奨される。完全切除が予後改善に寄与する。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302050100.html#cq25"}, {"id": "3-thym-rec-cq26", "part": "第3部 胸腺腫瘍", "section": "再発", "cqNo": "CQ26", "question": "切除可能な再発胸腺上皮性腫瘍に対して、外科切除を含めた集学的治療は勧められるか？", "recommendation": "外科切除を含めた集学的治療を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "弱く推奨100%(17/17)、合意率100%", "keyPoints": "前向き研究が不在。胸膜再発にはHITOC併用外科治療が安全で有効性を示唆するが、投与薬剤や方法が標準化されていない。薬物療法追加が生存率改善の可能性がある。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302050100.html#cq26"}, {"id": "3-thym-incidental-cq27a", "part": "第3部 胸腺腫瘍", "section": "前縦隔病変（偶発発見）", "cqNo": "CQ27-a", "question": "偶発的に発見された小さな前縦隔病変に対して、外科的切除は勧められるか？（充実性病変）", "recommendation": "充実性病変が疑われる場合、外科的切除を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨88%(15/17)、弱く推奨12%(2/17)", "keyPoints": "胸部CT検査の普及に伴い偶発的に発見される小さな前縦隔腫瘤が増加（頻度0.7～0.9%）。充実性病変の多くは胸腺腫や胸腺癌で、早期ステージの完全切除に適している。小病変かつ浸潤傾向のない場合は経過観察を考慮してもよいが、胸腺癌の可能性を考慮した注意深い観察が必要。壁在結節や肥厚、分葉不整、増大傾向を認めた場合は手術を考慮。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302060100.html#cq27"}, {"id": "3-thym-incidental-cq27b", "part": "第3部 胸腺腫瘍", "section": "前縦隔病変（偶発発見）", "cqNo": "CQ27-b", "question": "偶発的に発見された小さな前縦隔病変に対して、外科的切除は勧められるか？（嚢胞）", "recommendation": "嚢胞（胸腺嚢胞や心膜嚢胞など）が疑われる場合、外科的切除を行わないよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "行わないことを強く推奨71%(12/17)、弱く推奨29%(5/17)", "keyPoints": "嚢胞は治療不要で、CT値やMRI併用で良性診断された場合は安全に経過観察可能。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/3/2/250302060100.html#cq27"}];
</script>
<script>
(function(){
  const STORAGE_KEY = "haigan_progress";
  const THEME_KEY = "haigan_theme";
  let progress = {};
  try{ progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); }catch(e){ progress = {}; }

  function saveProgress(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); }

  const partSelect = document.getElementById("partSelect");
  const sectionSelect = document.getElementById("sectionSelect");
  const reviewOnly = document.getElementById("reviewOnly");
  const shuffleBtn = document.getElementById("shuffleBtn");
  const resetProgressBtn = document.getElementById("resetProgressBtn");
  const cardFlip = document.getElementById("cardFlip");
  const cardFront = document.getElementById("cardFront");
  const cardBack = document.getElementById("cardBack");
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const flipBtn = document.getElementById("flipBtn");
  const masteredBtn = document.getElementById("masteredBtn");
  const reviewBtn = document.getElementById("reviewBtn");
  const progressLine = document.getElementById("progressLine");
  const statsBar = document.getElementById("statsBar");
  const themeToggle = document.getElementById("themeToggle");
  const cardScene = document.getElementById("cardScene");

  let deck = [];
  let idx = 0;
  let flipped = false;

  const parts = Array.from(new Set(CARDS.map(c => c.part)));
  const partOpt = document.createElement("option");
  partOpt.value = "__ALL__"; partOpt.textContent = "すべての部";
  partSelect.appendChild(partOpt);
  parts.forEach(p => {
    const o = document.createElement("option");
    o.value = p; o.textContent = p;
    partSelect.appendChild(o);
  });

  function updateSectionOptions(){
    const p = partSelect.value;
    sectionSelect.innerHTML = "";
    const allOpt = document.createElement("option");
    allOpt.value = "__ALL__"; allOpt.textContent = "すべてのセクション";
    sectionSelect.appendChild(allOpt);
    let pool = CARDS;
    if(p !== "__ALL__") pool = pool.filter(c => c.part === p);
    const sections = Array.from(new Set(pool.map(c => c.section)));
    sections.forEach(s => {
      const o = document.createElement("option");
      o.value = s; o.textContent = s;
      sectionSelect.appendChild(o);
    });
  }
  updateSectionOptions();

  function stateOf(id){ return progress[id] || "none"; }

  function buildDeck(){
    const p = partSelect.value;
    const s = sectionSelect.value;
    let pool = CARDS.slice();
    if(p !== "__ALL__") pool = pool.filter(c => c.part === p);
    if(s !== "__ALL__") pool = pool.filter(c => c.section === s);
    if(reviewOnly.checked) pool = pool.filter(c => stateOf(c.id) === "review");
    deck = pool;
    idx = 0;
    flipped = false;
    render();
  }

  function shuffleDeck(){
    for(let i = deck.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [deck[i], deck[j]] = [deck[j], deck[i]];
    }
    idx = 0;
    flipped = false;
    render();
  }

  function escapeHtml(str){
    if(str === null || str === undefined) return "";
    return String(str)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function labelStrength(v){
    if(v === null || v === undefined || v === "" || v === "なし") return "記載なし";
    let s = String(v);
    s = s.replace(/(^|[^0-9])1([^0-9]|$)/g, function(m,a,b){ return a + "1(強い推奨)" + b; });
    s = s.replace(/(^|[^0-9(])2([^0-9)]|$)/g, function(m,a,b){ return a + "2(弱い推奨)" + b; });
    return s;
  }

  function statsCount(){
    let m=0, r=0, n=0;
    CARDS.forEach(c => {
      const st = stateOf(c.id);
      if(st === "mastered") m++; else if(st === "review") r++; else n++;
    });
    return {m,r,n};
  }

  function renderStats(){
    const {m,r,n} = statsCount();
    statsBar.innerHTML =
      '<span class="stat-pill stat-mastered">習得済み ' + m + '</span>' +
      '<span class="stat-pill stat-review">要復習 ' + r + '</span>' +
      '<span class="stat-pill">未学習 ' + n + '</span>';
  }

  function render(){
    renderStats();
    if(deck.length === 0){
      progressLine.textContent = "0 / 0";
      cardFront.innerHTML = '<div class="empty-msg">該当するカードがありません。フィルタを見直してください。</div>';
      cardBack.innerHTML = "";
      cardFlip.classList.remove("flipped");
      return;
    }
    const c = deck[idx];
    progressLine.textContent = (idx + 1) + " / " + deck.length;
    const st = stateOf(c.id);
    const stLabel = st === "mastered" ? "習得済み" : (st === "review" ? "要復習" : "未学習");

    cardFront.innerHTML =
      '<div class="badge-row">' +
        '<span class="badge">' + escapeHtml(c.part) + '</span>' +
        '<span class="badge badge-section">' + escapeHtml(c.section) + '</span>' +
        '<span class="badge">' + escapeHtml(c.cqNo) + '</span>' +
        '<span class="badge-state ' + st + '">' + stLabel + '</span>' +
      '</div>' +
      '<div class="question-text">' + escapeHtml(c.question) + '</div>' +
      '<div class="hint">クリックまたはSpaceキーでめくる</div>';

    cardBack.innerHTML =
      '<div class="badge-row">' +
        '<span class="badge">' + escapeHtml(c.part) + '</span>' +
        '<span class="badge badge-section">' + escapeHtml(c.section) + '</span>' +
        '<span class="badge">' + escapeHtml(c.cqNo) + '</span>' +
        '<span class="badge-state ' + st + '">' + stLabel + '</span>' +
      '</div>' +
      '<div class="rec-text">' + escapeHtml(c.recommendation) + '</div>' +
      '<div class="meta-grid">' +
        '<div class="meta-label">推奨の強さ</div><div>' + escapeHtml(labelStrength(c.strength)) + '</div>' +
        '<div class="meta-label">エビデンスの強さ</div><div>' + escapeHtml(c.evidence || "記載なし") + '</div>' +
        '<div class="meta-label">合意率</div><div>' + escapeHtml(c.consensus || "記載なし") + '</div>' +
      '</div>' +
      (c.keyPoints ? '<div class="keypoints">' + escapeHtml(c.keyPoints) + '</div>' : '') +
      (c.sourceUrl ? '<a class="source-link" href="' + escapeHtml(c.sourceUrl) + '" target="_blank" rel="noopener">出典を開く ↗</a>' : '');

    cardFlip.classList.toggle("flipped", flipped);
  }

  function flip(){
    if(deck.length === 0) return;
    flipped = !flipped;
    cardFlip.classList.toggle("flipped", flipped);
  }

  function go(delta){
    if(deck.length === 0) return;
    idx = (idx + delta + deck.length) % deck.length;
    flipped = false;
    render();
  }

  function setState(state){
    if(deck.length === 0) return;
    const c = deck[idx];
    progress[c.id] = state;
    saveProgress();
    render();
  }

  partSelect.addEventListener("change", function(){
    updateSectionOptions();
    buildDeck();
  });
  sectionSelect.addEventListener("change", buildDeck);
  reviewOnly.addEventListener("change", buildDeck);
  shuffleBtn.addEventListener("click", shuffleDeck);
  resetProgressBtn.addEventListener("click", function(){
    if(confirm("学習進捗をすべてリセットしますか？この操作は取り消せません。")){
      progress = {};
      saveProgress();
      render();
    }
  });
  cardScene.addEventListener("click", flip);
  flipBtn.addEventListener("click", flip);
  prevBtn.addEventListener("click", function(){ go(-1); });
  nextBtn.addEventListener("click", function(){ go(1); });
  masteredBtn.addEventListener("click", function(){ setState("mastered"); });
  reviewBtn.addEventListener("click", function(){ setState("review"); });

  document.addEventListener("keydown", function(e){
    if(e.code === "Space"){ e.preventDefault(); flip(); }
    else if(e.code === "ArrowLeft"){ go(-1); }
    else if(e.code === "ArrowRight"){ go(1); }
    else if(e.key === "1"){ setState("mastered"); }
    else if(e.key === "2"){ setState("review"); }
  });

  function applyTheme(t){
    if(t === "dark" || t === "light"){
      document.documentElement.setAttribute("data-theme", t);
    } else {
      document.documentElement.removeAttribute("data-theme");
    }
  }
  let savedTheme = localStorage.getItem(THEME_KEY);
  applyTheme(savedTheme);
  themeToggle.addEventListener("click", function(){
    const cur = document.documentElement.getAttribute("data-theme");
    const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    let next;
    if(!cur){ next = prefersDark ? "light" : "dark"; }
    else if(cur === "dark"){ next = "light"; }
    else { next = "dark"; }
    localStorage.setItem(THEME_KEY, next);
    applyTheme(next);
  });

  buildDeck();
})();
</script>
</body></html>
