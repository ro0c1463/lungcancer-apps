<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f6f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#151a1e">
<title>肺癌認定医試験対策 フラッシュカード</title>
<style>
  :root{
    --bg:#f4f6f7; --fg:#1f2937; --card-bg:#ffffff; --card-border:#d7dde1;
    --accent:#2563a8; --accent2:#1a7a5e; --muted:#6b7280; --badge:#e8f0f7;
    --danger:#b3452c; --shadow:0 2px 10px rgba(0,0,0,0.08);
    --btn-bg:#eef2f5; --btn-fg:#1f2937; --btn-border:#cbd3d9;
  }
  :root[data-theme="dark"]{
    --bg:#151a1e; --fg:#e7ebee; --card-bg:#1f262c; --card-border:#333d45;
    --accent:#6fa8dc; --accent2:#5fbf9a; --muted:#9aa5ad; --badge:#26333d;
    --danger:#e08a6f; --shadow:0 2px 10px rgba(0,0,0,0.4);
    --btn-bg:#242c32; --btn-fg:#e7ebee; --btn-border:#3a444c;
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#151a1e; --fg:#e7ebee; --card-bg:#1f262c; --card-border:#333d45;
      --accent:#6fa8dc; --accent2:#5fbf9a; --muted:#9aa5ad; --badge:#26333d;
      --danger:#e08a6f; --shadow:0 2px 10px rgba(0,0,0,0.4);
      --btn-bg:#242c32; --btn-fg:#e7ebee; --btn-border:#3a444c;
    }
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--fg); min-height:100vh; display:flex; flex-direction:column;
  }
  header{
    padding:12px 16px; border-bottom:1px solid var(--card-border); background:var(--card-bg);
    position:sticky; top:0; z-index:10;
  }
  .header-row{display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap;}
  h1{font-size:1.05rem; margin:0; color:var(--accent); font-weight:700;}
  .stats{display:flex; gap:10px; font-size:0.8rem; color:var(--muted); flex-wrap:wrap;}
  .stat-pill{padding:2px 8px; border-radius:10px; background:var(--badge);}
  .stat-mastered{color:var(--accent2);}
  .stat-review{color:var(--danger);}
  .theme-toggle{
    background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-border);
    border-radius:8px; padding:6px 10px; cursor:pointer; font-size:0.85rem;
  }
  .filters{
    display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; align-items:center;
  }
  select, .btn{
    background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-border);
    border-radius:8px; padding:7px 10px; font-size:0.85rem; cursor:pointer;
  }
  label.check{display:flex; align-items:center; gap:5px; font-size:0.85rem; color:var(--fg); cursor:pointer;}
  main{
    flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 14px 40px;
    gap:16px;
  }
  .progress-line{font-size:0.9rem; color:var(--muted);}
  .card-scene{
    width:100%; max-width:640px; min-height:360px; perspective:1400px; cursor:pointer;
  }
  .card-flip{
    position:relative; width:100%; min-height:360px; transition:transform 0.5s;
    transform-style:preserve-3d;
  }
  .card-flip.flipped{transform:rotateY(180deg);}
  .card-face{
    position:absolute; inset:0; backface-visibility:hidden;
    background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px;
    box-shadow:var(--shadow); padding:22px; display:flex; flex-direction:column; gap:12px;
    overflow-y:auto;
  }
  .card-back{transform:rotateY(180deg);}
  .badge-row{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .badge{
    background:var(--badge); color:var(--accent); font-size:0.75rem; padding:4px 10px;
    border-radius:12px; font-weight:600;
  }
  .badge-section{color:var(--accent2);}
  .badge-state{
    margin-left:auto; font-size:0.75rem; padding:4px 10px; border-radius:12px; font-weight:600;
  }
  .badge-state.mastered{background:#dff3e8; color:#1a7a5e;}
  .badge-state.review{background:#fbe4dd; color:#b3452c;}
  .badge-state.none{background:var(--badge); color:var(--muted);}
  :root[data-theme="dark"] .badge-state.mastered{background:#173a2c; color:#7ee0b0;}
  :root[data-theme="dark"] .badge-state.review{background:#3e2620; color:#f0a48c;}
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]) .badge-state.mastered{background:#173a2c; color:#7ee0b0;}
    :root:not([data-theme="light"]) .badge-state.review{background:#3e2620; color:#f0a48c;}
  }
  .question-text{font-size:1.15rem; line-height:1.6; font-weight:600;}
  .hint{margin-top:auto; font-size:0.78rem; color:var(--muted); text-align:center;}
  .rec-text{font-size:1.02rem; line-height:1.65;}
  .meta-grid{display:grid; grid-template-columns:auto 1fr; gap:6px 10px; font-size:0.85rem;}
  .meta-label{color:var(--muted); white-space:nowrap;}
  .keypoints{font-size:0.88rem; line-height:1.6; background:var(--badge); padding:10px 12px; border-radius:10px;}
  .source-link{font-size:0.82rem; color:var(--accent);}
  .nav-row{display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;}
  .nav-btn{
    background:var(--accent); color:#fff; border:none; border-radius:10px;
    padding:12px 22px; font-size:0.95rem; cursor:pointer; min-width:90px;
  }
  .nav-btn.secondary{background:var(--btn-bg); color:var(--btn-fg); border:1px solid var(--btn-border);}
  .learn-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center;}
  .learn-btn{
    border:none; border-radius:10px; padding:11px 18px; font-size:0.9rem; cursor:pointer; color:#fff;
  }
  .learn-btn.mastered{background:var(--accent2);}
  .learn-btn.review{background:var(--danger);}
  .learn-btn.reset{background:transparent; color:var(--muted); border:1px solid var(--btn-border);}
  footer{
    padding:14px 16px; font-size:0.75rem; color:var(--muted); text-align:center;
    border-top:1px solid var(--card-border); background:var(--card-bg);
  }
  .empty-msg{padding:40px; text-align:center; color:var(--muted);}
  @media (pointer: coarse){
    button,.btn,.nav-btn,.learn-btn,.theme-toggle{min-height:44px;padding:10px 14px;font-size:.95rem}
    select{min-height:44px;font-size:16px}
  }
  input[type="checkbox"]{min-width:18px;min-height:18px}
  @media (max-width:480px){
    .card-face{padding:16px;}
    h1{font-size:0.95rem;}
    .nav-btn{padding:11px 16px;}
    header{padding-top:calc(12px + env(safe-area-inset-top));}
    footer{padding-bottom:calc(14px + env(safe-area-inset-bottom));}
  }
</style>
</head><body>
<header>
  <div class="header-row">
    <h1>肺癌認定医試験対策 フラッシュカード</h1>
    <div class="stats" id="statsBar"></div>
    <button class="theme-toggle" id="themeToggle">☀/☾ テーマ切替</button>
  </div>
  <div class="filters">
    <select id="partSelect"></select>
    <select id="sectionSelect"></select>
    <label class="check"><input type="checkbox" id="reviewOnly"> 要復習のみ</label>
    <button class="btn" id="shuffleBtn">シャッフル</button>
    <button class="btn" id="resetProgressBtn">進捗リセット</button>
  </div>
</header>
<main>
  <div class="progress-line" id="progressLine"></div>
  <div class="card-scene" id="cardScene">
    <div class="card-flip" id="cardFlip">
      <div class="card-face card-front" id="cardFront"></div>
      <div class="card-face card-back" id="cardBack"></div>
    </div>
  </div>
  <div class="nav-row">
    <button class="nav-btn secondary" id="prevBtn">← 前 (←)</button>
    <button class="nav-btn secondary" id="flipBtn">めくる (Space)</button>
    <button class="nav-btn secondary" id="nextBtn">次 → (→)</button>
  </div>
  <div class="learn-row">
    <button class="learn-btn mastered" id="masteredBtn">習得済み (1)</button>
    <button class="learn-btn review" id="reviewBtn">要復習 (2)</button>
  </div>
</main>
<footer>
  日本肺癌学会『肺癌診療ガイドライン2025年版』に基づく個人の試験対策用。本文の再配布はしないこと。内容は原典を必ず確認。
</footer>

行うよう弱く推奨する。 b. MRIを行うよう弱く推奨する。 c. FDG-PET/CTを行うよう強く推奨する。", "strength": "a:2 / b:2 / c:1", "evidence": "a:C / b:C / c:C", "consensus": "a. 弱く推奨100%（18/18）／b. 弱く推奨78%（14/18）・根拠明確でない22%（4/18）［2回目］／c. 強く推奨67%（12/18）・弱く推奨33%（6/18）", "keyPoints": "造影CTは15HU超の造影効果を悪性とすると感度98%特異度58%。MRIはDWI等が良悪性鑑別に有用で被曝なし。FDG-PET/CTはCTより良悪性鑑別が良好だが1cm以下や上皮内腺癌で偽陰性、肉芽腫で偽陽性に注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101020100.html#cq5"}, {"id": "1-diag-cq6", "part": "第1部 肺癌", "section": "診断/質的画像診断", "cqNo": "CQ6", "question": "画像診断で肺癌を否定できない結節に，経過観察を行うことは有用か？", "recommendation": "高分解能CTを用いて結節の性状や肺癌の危険因子の有無に基づいて，適切な観察期間で経過観察を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨 94%（17/18）、弱く推奨 6%（1/18）", "keyPoints": "日本CT検診学会GLでは充実型/部分充実型・すりガラス型に分類。10mm未満の充実型、15mm未満の部分充実型やすりガラス型で充実部5mm以下は高分解能CTで経過観察。Fleischner Societyも同様に提案。低侵襲で有効なため強く推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101020100.html#cq6"}, {"id": "1-diag-cq7", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ7", "question": "中枢気道病変が疑われる症例に，気管支鏡検査は勧められるか？", "recommendation": "中枢気道病変が疑われる症例に，気管支鏡検査を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨 100%（13/13）", "keyPoints": "中心型肺癌に対する気管支鏡診断感度88%。鉗子生検感度74%、洗浄細胞診48%、ブラシ細胞診59%。合併症頻度1.32%（出血0.89%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq7"}, {"id": "1-diag-cq8", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ8", "question": "中枢気道の前浸潤性病変や早期癌が疑われる症例に，自家蛍光観察/狭帯域光観察は勧められるか？", "recommendation": "a. 白色光による気管支鏡検査に自家蛍光観察を併用するよう弱く推奨する。 b. 白色光による気管支鏡検査に狭帯域光観察を併用するよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨8%、弱く推奨85%、根拠明確でない8%（13/13）", "keyPoints": "自家蛍光観察で感度50%→88%に向上。狭帯域光観察で感度62%→100%に向上。ただし特異度は低下傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq8"}, {"id": "1-diag-cq9", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ9", "question": "肺癌を疑う肺末梢病変に，経気管支生検は勧められるか？", "recommendation": "経気管支生検を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨 92%（12/13）", "keyPoints": "末梢型肺癌に対する気管支鏡の感度は78%。病変2cm以上で63%、2cm未満で34%。合併症率1.55%（気胸0.44%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq9"}, {"id": "1-diag-cq10", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ10", "question": "肺末梢病変の経気管支生検に，ラジアル型EBUSは勧められるか？", "recommendation": "ラジアル型EBUSを行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨 77%（10/13）", "keyPoints": "メタアナリシスで診断率72～76%。CTガイド経皮針生検と比較し診断率は低い（68.82% vs 83.45%）が合併症が少ない（8.62% vs 31.81%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq10"}, {"id": "1-diag-cq11", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ11", "question": "肺門・縦隔リンパ節および気管・中枢気管支に接する病変に対して，コンベックス型EBUS-TBNAは勧められるか？", "recommendation": "コンベックス型EBUS-TBNAを行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨 92%（12/13）", "keyPoints": "メタアナリシスで診断感度90%、特異度99%。気管・中枢気管支に接する病変で平均診断率89%、合併症率5.4%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq11"}, {"id": "1-diag-cq12", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ12", "question": "肺末梢小型病変の経気管支生検に，仮想気管支鏡ナビゲーションは勧められるか？", "recommendation": "仮想気管支鏡ナビゲーションを行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "強く推奨 62%（8/13）", "keyPoints": "3cm以下小型病変でVBN群診断率75.4%、非VBN群67.5%。到達率向上（91.8% vs 82.2%）。合併症に差なし（2.7% vs 2.8%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq12"}, {"id": "1-diag-cq13", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ13", "question": "a. 肺癌を疑う中枢気道病変にクライオ生検は勧められるか？ b. 肺癌を疑う末梢肺病変にクライオ生検は勧められるか？", "recommendation": "a. 肺癌を疑う中枢気道病変に対してクライオ生検を行うことを弱く推奨する。 b. 肺癌を疑う末梢肺病変に対してクライオ生検を行うよう推奨するだけの根拠が明確ではない。", "strength": "a:2 / b:なし", "evidence": "a:B / b:C", "consensus": "a. 強く推奨0%、弱く推奨77%、根拠明確でない23%（13/13）／b. 強く推奨8%、弱く推奨31%、根拠明確でない61%（13/13）", "keyPoints": "中枢病変で診断率95.0% vs 85.1%（鉗子）、検体サイズ15mm² vs 2mm²。末梢病変では診断率向上を示さず出血リスク高い（28.6% vs 3.6%）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq13"}, {"id": "1-diag-cq14", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ14", "question": "肺癌を疑う肺末梢病変に，経皮針生検は勧められるか？", "recommendation": "肺癌を疑う肺末梢病変，特に小型病変で経気管支生検による診断が困難な症例に対しては，空気塞栓や胸膜播種などの重篤な合併症の可能性を考慮のうえで，CTガイド下経皮針生検を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨16%、弱く推奨84%（19/19）", "keyPoints": "CTガイド経皮針生検が診断精度で優位。気胸1～52%、喀血0.23～23%。空気塞栓・胸膜播種は稀だが重篤。2cm以下小型病変で優位。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq14"}, {"id": "1-diag-cq15", "part": "第1部 肺癌", "section": "診断/確定診断", "cqNo": "CQ15", "question": "肺癌を疑う肺末梢病変に，外科的生検は勧められるか？", "recommendation": "胸腔鏡，開胸による生検は，気管支鏡や経皮針生検と比較して侵襲が大きいため，その必要性を十分に考慮したうえで行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "強く推奨5%、弱く推奨95%（19/19）", "keyPoints": "胸腔鏡は感度・特異度ほぼ100%。手術死亡率0～0.5%、合併症3～9.6%（無気肺・肺炎・エアリーク）。全身麻酔が必要で侵襲が大きい。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101030100.html#cq15"}, {"id": "1-diag-cq16", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ16", "question": "組織診断およびバイオマーカー診断に望ましい検体はどのようなものか？", "recommendation": "適切に固定され，腫瘍細胞量と含有率が十分で，挫滅していない検体を用いるよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨 100%（30/30）", "keyPoints": "マルチ遺伝子検査実施可能な組織量・質が重要。プレアナリシス段階での慎重な処理、10%中性緩衝ホルマリンでの適切な固定が必須。PD-L1検査では過固定回避が重要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq16"}, {"id": "1-diag-cq17", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ17", "question": "細胞診検体はバイオマーカー検索に有用か？", "recommendation": "細胞診検体を使用するよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "推奨 87%（26/30）", "keyPoints": "セルブロック標本はFFPE組織と同等の検査可能性。塗抹標本はPCRベース検査で有効。限定的検体での活用が有用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq17"}, {"id": "1-diag-cq18", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ18", "question": "免疫組織化学染色は組織型診断に有用か？", "recommendation": "形態学的評価が困難な非小細胞癌に対して免疫組織化学染色を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨 100%（30/30）", "keyPoints": "TTF-1とp40が最も有用。神経内分泌腫瘍ではchromogranin A、synaptophysin、CD56を併用。精度管理体制整備が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq18"}, {"id": "1-diag-cq19", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ19", "question": "転移性腫瘍の鑑別に免疫組織化学染色は有用か？", "recommendation": "形態学的に鑑別困難な場合，免疫組織化学染色を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "推奨 90%（27/30）", "keyPoints": "完璧なマーカーはなく、臓器特異的マーカーの複数組合せが有用。病歴・画像・組織型と総合判断が重要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq19"}, {"id": "1-diag-cq20", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ20", "question": "術中迅速診断は有用か？", "recommendation": "良悪性判定に術中迅速診断を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨 67%（20/30）", "keyPoints": "正診率は一般に高い（不一致率1-3%）。ただしAIS/MIAの診断正診率は低い。腺癌浸潤性評価やSTAS判定で課題あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq20"}, {"id": "1-diag-cq21", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ21", "question": "手術中の胸腔内洗浄細胞診は有用か？", "recommendation": "予後推定の観点から手術中胸腔内洗浄細胞診を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "推奨 77%（23/30）", "keyPoints": "PLC陽性率2.5-13.1%（肺切除後）。陽性例は有意な予後不良指標（5年生存率21.4-43.0%）。I期で特に有用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq21"}, {"id": "1-diag-cq22", "part": "第1部 肺癌", "section": "診断/病理細胞診断", "cqNo": "CQ22", "question": "術前治療後の病理学的評価はどのように行うか？", "recommendation": "統一基準による病理学的評価を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨57%、弱く推奨40%（30名中）", "keyPoints": "MPR（腫瘍床内RVT≦10%）やpCR達成が良好な予後指標。IASLC基準と従来のEf分類の整合性確保を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101040100.html#cq22"}, {"id": "1-diag-cq23", "part": "第1部 肺癌", "section": "診断/病期診断", "cqNo": "CQ23", "question": "T因子診断のために，必要な検査は何か？", "recommendation": "a. 胸部造影CTを行うよう強く推奨する。 b. 縦隔浸潤，胸壁浸潤，腫瘍周囲の無気肺の鑑別が必要な場合，FDG-PET/CTを行うよう強く推奨する。 c. 縦隔浸潤，胸壁浸潤，腫瘍周囲の無気肺の鑑別が必要な場合，胸部MRIを行うよう強く推奨する。", "strength": "a:1 / b:1 / c:1", "evidence": "a:C / b:C / c:C", "consensus": "a・b 強く推奨 100%（19/19）／c 強く推奨 79%（15/19）", "keyPoints": "CTは病変の大きさ・広がり・隣接臓器浸潤を評価でき基本検査だが、T3/T4診断の精度が低く、FDG-PET/CTやMRIが補助診断として有用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101050100.html#cq23"}, {"id": "1-diag-cq24", "part": "第1部 肺癌", "section": "診断/病期診断", "cqNo": "CQ24", "question": "N因子診断のために，必要な検査は何か？", "recommendation": "a. 胸部造影CT，FDG-PET/CTを行うよう強く推奨する。 b. MRIを行うよう弱く推奨する。 c. 縦隔リンパ節転移の有無で治療法が異なる症例において，画像検査で縦隔リンパ節転移を疑う場合，超音波内視鏡検査（EBUS-TBNA，EUS-FNA）による病理学的診断を行うよう強く推奨する。 d. 術前の画像検査で縦隔リンパ節転移が疑われ，超音波内視鏡検査では転移を認めなかった場合，縦隔鏡検査などの外科的生検を行うよう勧めるだけの根拠が明確ではない。", "strength": "a:1 / b:2 / c:1 / d:なし", "evidence": "a:A / b:C / c:A / d:記載なし", "consensus": "a 強く推奨100%（13/13）／c 強く推奨100%（19/19）／b 弱く推奨95%（18/19）／d 根拠が明確でない85%（11/13）", "keyPoints": "CT感度59%特異度78%に対しFDG-PET/CT感度77.4%特異度90.1%。超音波内視鏡（EBUS-TBNA感度90%特異度99%、EUS-FNA感度90%特異度97%）が画像診断の偽陽性補正に有用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101050100.html#cq24"}, {"id": "1-diag-cq25", "part": "第1部 肺癌", "section": "診断/病期診断", "cqNo": "CQ25", "question": "M因子診断のために，必要な検査は何か？", "recommendation": "a. FDG-PET/CT，頭部造影MRIを行うよう強く推奨する。 b. FDG-PET/CTで，単発の遠隔転移が疑われた場合は，可能なかぎり他の画像診断や病理学的診断で転移であることを確認するよう弱く推奨する。", "strength": "a:1 / b:2", "evidence": "a:A / b:B", "consensus": "a 強く推奨100%（19/19）／b 弱く推奨100%（19/19）", "keyPoints": "FDG-PET/CT遠隔転移感度77～100%特異度93～100%。脳転移検索では造影MRI感度がCTより高いがFDGは正常脳集積により感度24～27%と低い。副腎転移鑑別困難例ではMRI脂肪抑制画像やダイナミックMRI、経皮針生検が有用。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101050100.html#cq25"}, {"id": "1-diag-cq26", "part": "第1部 肺癌", "section": "診断/分子診断", "cqNo": "CQ26", "question": "治療方針を決めるための，分子診断の項目は何か？", "recommendation": "a. 薬物療法を考慮する非小細胞肺癌の場合は，EGFR，ALK，ROS1，BRAF，MET，RET，KRAS，HER2の遺伝子検査およびPD-L1 IHCを行うよう強く推奨する。 b. 第一・二世代EGFR-TKIに治療抵抗性となった進行・再発非小細胞肺癌の場合は，EGFR遺伝子変異検査を行うよう強く推奨する。 c. NTRK融合遺伝子検査，MSI検査，TMB検査は肺癌の場合においても行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "a 強く推奨93%（13/14）・弱く推奨7%（1/14）／b 強く推奨94%（16/17）・弱く推奨6%（1/17）／c 強く推奨95%（18/19）・弱く推奨5%（1/19）", "keyPoints": "周術期治療・根治的化学放射線治療・進行再発症例の各段階で標的療法や免疫チェックポイント阻害薬の適応判定に必要。ADAURA試験、ALINA試験、IMpower010試験等で有効性が実証。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101060100.html#cq26"}, {"id": "1-diag-cq27", "part": "第1部 肺癌", "section": "診断/分子診断", "cqNo": "CQ27", "question": "非小細胞肺癌の治療方針決定のために行う分子診断は，検査項目に優先順位をつけるか？", "recommendation": "検査項目に優先順位をつけず，同時に行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨82%（14/17）、弱く推奨12%（2/17）、根拠明確でない6%（1/17）", "keyPoints": "ドライバー遺伝子は相互排他的であり、複数項目の同時検査により治療開始までの時間短縮と最適治療機会の確保が実現。マルチ遺伝子検査や遺伝子パネル検査の活用を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101060100.html#cq27"}, {"id": "1-diag-cq28", "part": "第1部 肺癌", "section": "診断/分子診断", "cqNo": "CQ28", "question": "肺癌診療において包括的がんゲノムプロファイリング（CGP）検査は有用か？", "recommendation": "標準治療が終了となった肺癌患者に対してCGP検査を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "強く推奨29%（4/14）、弱く推奨57%（8/14）、根拠明確でない14%（2/14）", "keyPoints": "マルチ遺伝子検査における偽陰性の可能性が報告され、CGP検査でなければ検出できない検査項目もあるため、治療終了時の追加検査として位置付けられる。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/1/250101060100.html#cq28"}, {"id": "1-nsclc-surg-cq1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ1", "question": "手術適応決定には、呼吸機能評価や循環機能評価をはじめ、血液・生化学所見や年齢などを総合的に評価・検討することが必要か？", "recommendation": "術前呼吸機能・循環機能をはじめ総合的に評価・検討を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が強く推奨", "keyPoints": "術前の肺機能評価と循環機能評価は術後死亡率・合併症予測に重要。予測術後肺機能（ppoFEV1.0）と長期予後に相関あり。術前呼吸訓練は有用性が示されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq1"}, {"id": "1-nsclc-surg-cq2", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ2", "question": "臨床病期Ⅰ-Ⅱ（N0-1）期非小細胞肺癌で標準手術可能な患者には、外科切除が勧められるか？", "recommendation": "臨床病期Ⅰ-Ⅱ（N0-1）期非小細胞肺癌で標準手術可能な患者には、外科切除を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が強く推奨", "keyPoints": "ランダム化比較試験がないため証拠レベルはC。メタアナリシスで手術が放射線治療より優位性を示す。定位放射線治療との比較試験は症例不足で中止。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq2"}, {"id": "1-nsclc-surg-cq3a", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ3a", "question": "臨床病期ⅠA1-2期（腫瘍最大径2cm以下）で、最大充実成分径/腫瘍最大径比≦0.25の肺野末梢非小細胞肺癌に対する適切な術式は？", "recommendation": "縮小手術（区域切除または楔状切除）を行うよう強く推奨する", "strength": "1", "evidence": "B", "consensus": "100%（13/13）が強く推奨", "keyPoints": "JCOG0804試験で333例が登録。5年無再発生存率99.7%、10年無再発生存率98.6%と良好。十分な切除マージン（中央値15mm）の確保が重要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq3a"}, {"id": "1-nsclc-surg-cq3b", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ3b", "question": "臨床病期ⅠA1-2期で、0.25＜最大充実成分径/腫瘍最大径比≦0.5の場合、適切な術式は？", "recommendation": "区域切除を行うよう強く推奨する", "strength": "1", "evidence": "B", "consensus": "85%（11/13）が強く推奨、15%（2/13）が弱く推奨", "keyPoints": "JCOG1211試験で357例登録。5年無再発生存率98.0%。切除マージン中央値25mm（四分位範囲17～32mm）。再発は2例のみ。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq3b"}, {"id": "1-nsclc-surg-cq3c", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ3c", "question": "臨床病期ⅠA1-2期で、最大充実成分径/腫瘍最大径比＞0.5の場合、適切な術式は？", "recommendation": "区域切除または肺葉切除を行うよう強く推奨する", "strength": "1", "evidence": "B", "consensus": "92%（12/13）が強く推奨、8%（1/13）が弱く推奨", "keyPoints": "JCOG0802/WJOG4607L試験で区域切除が肺葉切除を上回る全生存を示すも、局所再発が約2倍（肺葉切除5.4%対区域切除10.5%）。慎重な症例選択と十分な切除マージンが必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq3c"}, {"id": "1-nsclc-surg-cq4", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ4", "question": "臨床病期ⅠA3-Ⅱ期非小細胞肺癌で外科切除可能な患者に対する適切な術式は？", "recommendation": "肺葉以上の切除を行うよう強く推奨する", "strength": "1", "evidence": "B", "consensus": "100%（13/13）が強く推奨", "keyPoints": "Lung Cancer Study Group試験（1995年）で、腫瘍径3cm以下のN0-1症例において、肺葉切除に比べ縮小切除は局所再発が3倍。その後この結論を覆す試験なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq4"}, {"id": "1-nsclc-surg-cq5", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ5", "question": "臨床病期Ⅰ期で外科治療可能だが、標準手術（肺葉切除もしくは区域切除）が不可能な患者に、縮小手術を行ってもよいか？", "recommendation": "縮小手術を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "92%（12/13）が強く推奨、8%（1/13）が弱く推奨", "keyPoints": "肺葉切除不能例での3年生存率は縮小手術65%対放射線治療60%。米国NCDBでは縮小手術が定位放射線治療と比較して全生存率で優位。完全切除の確保が重要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq5"}, {"id": "1-nsclc-surg-cq6", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ6", "question": "cN2非小細胞肺癌の治療方針は、呼吸器外科医、内科医、放射線治療医を含めた集学的治療グループで検討すべきか？", "recommendation": "呼吸器外科医を含めた集学的治療グループでの検討を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "92%（12/13）が強く推奨、8%（1/13）が弱く推奨", "keyPoints": "SEER databaseの17,954例解析で、単独治療より複合治療が有効。臨床診断N2の43%は病理的にはN0-1。組織学的診断の重要性と周術期治療の検討が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq6"}, {"id": "1-nsclc-surg-cq7", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ7", "question": "臨床病期ⅢA期T4N0-1非小細胞肺癌に対して、外科切除を行うよう勧められるか？", "recommendation": "外科切除を行うよう強く推奨する", "strength": "1", "evidence": "D", "consensus": "69%（9/13）が強く推奨、31%（4/13）が弱く推奨", "keyPoints": "ランダム化比較試験なし。大規模データベース報告では導入化学放射線療法後の手術が有効。浸潤臓器別に異なるが、pN0で50%超の5年生存期待。N2判明症例は手術単独は推奨されない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq7"}, {"id": "1-nsclc-surg-cq8", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ8", "question": "切除可能な非小細胞肺癌に対して、リンパ節郭清もしくはサンプリングを行い、病理学的評価を行うべきか？", "recommendation": "リンパ節郭清もしくはサンプリングを行い、病理学的評価を行うよう強く推奨する", "strength": "1", "evidence": "B", "consensus": "100%（13/13）が強く推奨", "keyPoints": "ACOSOG Z0030試験で系統的郭清は予後改善をもたらさないも、pN2の4%が見落とされた。正確な病期診断に資する。手術時間延長は15分程度。JCOG1413試験で選択的郭清と系統的郭清を比較中。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq8"}, {"id": "1-nsclc-surg-cq9", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ9", "question": "臨床病期T3N0-1M0の胸壁浸潤非小細胞肺癌には、胸壁合併切除を行うよう勧められるか？", "recommendation": "胸壁合併切除を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が強く推奨", "keyPoints": "手術死亡率0～7.8%、合併症発生率19～44%。完全切除例5年生存率32%対非完全切除例4%。pN0で49.1%、pN2で20.5%（肺癌登録合同委員会報告）。補助化学療法の有効性も報告。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq9"}, {"id": "1-nsclc-surg-cq10", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ10", "question": "心膜に浸潤した臨床病期T3N0-1M0の非小細胞肺癌には、合併切除を行うよう勧められるか？", "recommendation": "合併切除を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が強く推奨", "keyPoints": "5年生存率15.1～54.2%で報告により変動。フランス報告91例では全体15.1%と予後不良だが、心膜浸潤症例ではリンパ節転移頻度が極めて高い（52.8%がN2）。N2判明症例は手術単独推奨されない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq10"}, {"id": "1-nsclc-surg-cq11", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ11", "question": "肺全摘を避けて、気管支・肺動脈形成を行うべきか？", "recommendation": "肺全摘を避けて、気管支・肺動脈形成を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が「行うことを強く推奨」", "keyPoints": "ランダム化比較試験はないが、複数の後方視的研究で気管支・肺動脈形成術後の局所制御は肺全摘と同等ないしそれ以上。手術死亡率0.9～5.9%。導入療法後の形成術も安全性が報告されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq11"}, {"id": "1-nsclc-surg-cq12", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ12", "question": "同一肺葉内結節で転移（PM1）もしくは多発肺癌を疑うcN0症例において、手術を行うべきか？", "recommendation": "同一肺葉内結節で転移（PM1）もしくは多発肺癌を疑うcN0症例において、手術を行うよう強く推奨する", "strength": "1", "evidence": "D", "consensus": "92%（12/13）が「強く推奨」、8%（1/13）が「弱く推奨」", "keyPoints": "IASLC登録症例の検討では、cN0M0切除例の5年生存率59%。リンパ節転移陰性症例で予後良好。術前診断で転移と多発癌の鑑別困難時も手術で診断確定が可能。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq12"}, {"id": "1-nsclc-surg-cq13", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ13", "question": "同時性他肺葉内結節で、多発原発性肺癌を疑う症例において、手術を行うべきか？", "recommendation": "同時性他肺葉内結節で、多発原発性肺癌を疑う症例においては、手術を行うよう強く推奨する", "strength": "1", "evidence": "D", "consensus": "92%（12/13）が「強く推奨」、8%（1/13）が「弱く推奨」", "keyPoints": "複数の後方視的研究で、縦隔リンパ節転移のない多発原発性肺癌疑い症例の5年生存率が53～97.2%。すりガラス影を伴った多発肺癌は特に予後良好。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq13"}, {"id": "1-nsclc-surg-cq14", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ14", "question": "同時性他肺葉内結節で、肺内転移（PM2,3）を疑う症例において、手術を行うべきか？", "recommendation": "(a)同時性肺内転移（PM2）を疑う症例においては、手術療法を行うよう勧めるだけの根拠が明確ではない。(b)同時性肺内転移（PM3）を疑う症例においては、手術を行わないよう弱く推奨する。", "strength": "2（bのみ、aは根拠不明確）", "evidence": "D", "consensus": "(a)明確ではない55%（7/13）、強く推奨15%（2/13）、弱く推奨15%（2/13）、弱く推奨しない15%（2/13）／(b)弱く推奨しない85%（11/13）、弱く推奨15%（2/13）", "keyPoints": "肺癌登録合同委員会データではPM2とPM2除外M1症例で予後に有意差なし。PM2のcN0M0に限れば5年生存率切除52%vs非切除22%の報告あり。PM3は極めて予後不良。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq14"}, {"id": "1-nsclc-surg-cq15", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ15", "question": "異時性多発肺癌に対して、耐術能があれば外科治療を行ってもよいか？", "recommendation": "異時性多発肺癌に対しては、耐術能があれば外科治療を行うよう強く推奨する", "strength": "1", "evidence": "D", "consensus": "100%（13/13）が「強く推奨」", "keyPoints": "複数報告で良好成績。一次癌から5年生存率76～83.9%、二次癌から42～71.7%。手術関連死1.4～7.0%。肺葉切除と縮小手術で同等成績の報告も多い。耐術能なき場合はSBRTも選択肢。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq15"}, {"id": "1-nsclc-surg-cq16", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ16", "question": "臨床病期Ⅰ期非小細胞肺癌に対して、胸腔鏡下肺切除を行ってもよいか？", "recommendation": "胸腔鏡下肺切除を行うよう強く推奨する", "strength": "1", "evidence": "B", "consensus": "85%（11/13）が「強く推奨」、15%（2/13）が「弱く推奨」", "keyPoints": "複数のランダム化比較試験とメタアナリシスで、胸腔鏡手術は開胸と同等ないし優れた成績。術後疼痛・QOLに優位性。大規模ランダム化比較試験がなくエビデンスの質は高くないが、実地臨床では広く比較的安全に行われているため推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq16"}, {"id": "1-nsclc-surg-cq17", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ17", "question": "臨床病期Ⅰ期非小細胞肺癌に対して、ロボット支援下肺切除を行ってもよいか？", "recommendation": "臨床病期Ⅰ期非小細胞肺癌に対して、ロボット支援下肺切除を行うことを弱く推奨する", "strength": "2", "evidence": "B", "consensus": "100%（13/13）が「弱く推奨」", "keyPoints": "RATSはVATSと周術期成績・長期予後で同等。3次元視野と多関節操作によりVATSの弱点補完。ROMAN studyやRVlob trialで同等性確認。ただし医原性合併症が高いとの報告あり。本邦での症例解析が不十分との留意あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq17"}, {"id": "1-nsclc-surg-cq18", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ18", "question": "外科切除後に術後経過観察を行うことの意義に関して、十分なエビデンスはあるか？また、推奨されるか？", "recommendation": "外科切除後に術後経過観察を行うことを強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が「強く推奨」", "keyPoints": "十分なエビデンスがあるとは言い難いが日常臨床にすでに十分浸透しており推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq18"}, {"id": "1-nsclc-surg-cq19", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ19", "question": "非小細胞肺癌術後の患者に対しては禁煙を行うべきか？", "recommendation": "非小細胞肺癌術後の患者に対しては禁煙を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が「強く推奨」", "keyPoints": "術後の喫煙継続は予後悪化と関連。禁煙指導・支援を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq19"}, {"id": "1-nsclc-surg-cq20", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 外科治療", "cqNo": "CQ20", "question": "切除可能な低悪性度腫瘍（カルチノイド、粘表皮癌、腺様嚢胞癌）に対して、非小細胞肺癌に準じた外科治療を行うべきか？", "recommendation": "切除可能な低悪性度腫瘍（カルチノイド、粘表皮癌、腺様嚢胞癌）に対しては、非小細胞肺癌に準じた外科治療を行うよう強く推奨する", "strength": "1", "evidence": "C", "consensus": "100%（13/13）が「強く推奨」", "keyPoints": "これら低悪性度腫瘍も根治的切除により良好な予後が期待でき、非小細胞肺癌同様のリンパ節郭清を含む外科治療推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102010100.html#cq20"}, {"id": "1-nsclc-pdt-cq21", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 光線力学的治療", "cqNo": "CQ21", "question": "中心型早期肺癌に光線力学的治療法（PDT）は勧められるか？", "recommendation": "中心型早期肺癌の中で，腫瘍全体にレーザー照射が可能な長径1.0 cm以下の病巣を対象に行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "行うことを強く推奨：54％（7/13）、行うことを弱く推奨：46％（6/13）、その他：0％", "keyPoints": "腫瘍径1.0 cm以下で完全寛解率は83～100％と良好。局所再発率は8.5～33.3％で、腫瘍径が大きいほど増加。タラポルフィンナトリウムは日光過敏症が少ない利点あり。5年生存率は72～81％で侵襲性も低い。ランダム化比較試験が存在しないため観察研究でのエビデンス評価。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102020100.html#cq21"}, {"id": "1-nsclc-rt-cq22-1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 放射線治療基本", "cqNo": "CQ22-1", "question": "肺癌胸部放射線治療計画はCTを用いた3次元治療計画を行うことが勧められるか？", "recommendation": "少なくともCTを用いた3次元治療計画を行い，3次元的な線量分布図およびDVHを常に検討するよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "94％（17/18）が「行うことを強く推奨」", "keyPoints": "CTシミュレーションによる3次元治療計画により、標的体積の線量維持下で正常肺・心臓の平均線量を有意に減少させ、死亡リスク低減が報告されている。V20Gyなどのパラメーターと放射線肺臓炎発症リスクの相関が示されている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102030100.html#cq22-1"}, {"id": "1-nsclc-rt-cq22-2", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 放射線治療基本", "cqNo": "CQ22-2", "question": "肺癌胸部放射線治療計画において，呼吸性移動対策を講じることが勧められるか？", "recommendation": "胸部放射線治療計画において，腫瘍の呼吸による動きを評価し，その程度に応じた呼吸性移動対策を講じることを強く推奨する。", "strength": "1", "evidence": "C", "consensus": "61％（11/18）が「行うことを強く推奨」、39％（7/18）が「行うことを弱く推奨」", "keyPoints": "4D-CTを用いた同期治療は標的体積の有意な減少とリスク臓器線量の低下を実現。呼吸性移動対策により照射範囲の縮小と有害事象発生率の低減が期待される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102030100.html#cq22-2"}, {"id": "1-nsclc-rt-cq23", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 放射線治療基本", "cqNo": "CQ23", "question": "放射線治療の品質管理は勧められるか？", "recommendation": "放射線治療では，品質管理を適切に行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100％（18/18）が「行うことを強く推奨」", "keyPoints": "不十分な品質管理による過剰・過少照射の報告が存在。複数の肺癌臨床試験でプロトコール違反症例の成績不良が示されている。治療関連装置の保守管理、照射野設定、線量計算などの品質管理が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102030100.html#cq23"}, {"id": "1-nsclc-periop-cq24a", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ24a", "question": "臨床病期Ⅰ-ⅡA期(第9版)に対して術前プラチナ製剤併用療法は勧められるか?", "recommendation": "行わないよう弱く推奨する", "strength": "2", "evidence": "C", "consensus": "強く推奨0%/弱く推奨0%/根拠明確でない8%/弱く推奨されない51%/強く推奨されない42%（n=53）", "keyPoints": "メタアナリシスで臨床病期に関わらず有効性が示されているが、サブグループ解析で進行症例での効果が高い傾向。術後補助療法のエビデンスが優れており、早期症例では過剰治療のリスク考慮。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq24a"}, {"id": "1-nsclc-periop-cq24b", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ24b", "question": "臨床病期Ⅱ-ⅢB期(N3除く)、EGFR/ALK陰性または不明例に対して術前プラチナ製剤併用+ニボルマブは勧められるか?", "recommendation": "行うよう弱く推奨する", "strength": "2", "evidence": "B", "consensus": "強く推奨29%/弱く推奨71%/根拠明確でない0%（n=58）", "keyPoints": "CheckMate816試験でEFS延長(HR 0.63, P=0.005)。ただしⅡ-Ⅲ期でリスク軽減程度に差あり、15.6%が手術未施行。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq24b"}, {"id": "1-nsclc-periop-cq24c", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ24c", "question": "臨床病期Ⅱ-ⅢB期(N3除く)に対して術前プラチナ製剤併用+PD-1/PD-L1阻害薬+術後PD-1/PD-L1阻害薬は勧められるか?", "recommendation": "行うよう弱く推奨する", "strength": "2", "evidence": "A", "consensus": "強く推奨25%/弱く推奨74%/根拠明確でない2%（n=57）", "keyPoints": "KEYNOTE-671試験でペムブロリズマブ併用でEFS延長(HR 0.58, P<0.001)、OS延長(HR 0.72, P=0.0052)。AEGEAN試験でデュルバルマブ併用も同様傾向。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq24c"}, {"id": "1-nsclc-periop-cq24d", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ24d", "question": "切除可能な臨床病期ⅡB-ⅢB期(N2, 第9版)に対して術前化学放射線療法は勧められるか?", "recommendation": "推奨に至る根拠が明確ではない", "strength": null, "evidence": null, "consensus": "強く推奨3%/弱く推奨28%/根拠明確でない53%/弱く推奨されない17%（n=60）", "keyPoints": "INT0139試験で化学放射線療法+手術でOSベネフィット未確認。肺葉切除例でのみ有用性示唆(事後解析)。複数試験で術前化学療法との差なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq24d"}, {"id": "1-nsclc-periop-cq25", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ25", "question": "病変全体径>2cm、術後病理病期ⅠA3-ⅢA(N0)、腺癌の完全切除症例に対するテガフール・ウラシル配合剤療法は勧められるか?", "recommendation": "行うよう強く推奨する", "strength": "1", "evidence": "A", "consensus": "強く推奨85%/弱く推奨13%/根拠明確でない3%（n=40）", "keyPoints": "メタアナリシス(2,003例)で5年生存率77%→82%に改善(腺癌HR 0.69, 95% CI 0.56-0.85)。腺癌を中心に有効性確立。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq25"}, {"id": "1-nsclc-periop-cq26", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ26", "question": "病変全体径>2cm、術後病理病期ⅠA3-ⅢA(N0)、非腺癌の完全切除症例に対するテガフール・ウラシル配合剤療法は勧められるか?", "recommendation": "行うよう弱く推奨する", "strength": "2", "evidence": "C", "consensus": "強く推奨0%/弱く推奨100%（n=40）", "keyPoints": "同メタアナリシスで非腺癌は扁平上皮癌に限定するとHR 0.93(95% CI 0.38-2.27)で有意差なし。検討症例数少なく、エビデンス不十分。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq26"}, {"id": "1-nsclc-periop-cq27", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ27", "question": "術後病理病期Ⅱ-ⅢB(N3除く)、完全切除例に対するシスプラチン併用化学療法は勧められるか?", "recommendation": "行うよう強く推奨する", "strength": "1", "evidence": "A", "consensus": "強く推奨95%/弱く推奨5%（n=40）", "keyPoints": "メタアナリシス(4,584例)でOSに対するHR 0.89(95% CI 0.82-0.96)。Ⅱ期HR 0.83、Ⅲ期HR 0.83と病期別で有意な延長。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq27"}, {"id": "1-nsclc-periop-cq28a", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ28a", "question": "EGFR遺伝子変異陽性、術後病理病期Ⅱ-ⅢB(N3除く)、従来の術後補助薬物療法後のオシメルチニブ追加は勧められるか?", "recommendation": "弱く推奨する", "strength": "2", "evidence": "B", "consensus": "強く推奨52%/弱く推奨48%（n=56）", "keyPoints": "ADAURA試験でⅡ-ⅢA期DFS有意延長(HR 0.17, P<0.001)、OS有意延長(HR 0.49, P<0.001、5年OS率85% vs 73%)。ただし対照がプラセボで術後補助療法省略可否は未解明。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq28a"}, {"id": "1-nsclc-periop-cq28b", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ28b", "question": "EGFR遺伝子変異陽性、術後病理病期Ⅱ-ⅢB(N3除く)、プラチナ製剤併用療法代わりのEGFR-TKI単独は勧められるか?", "recommendation": "推奨に至る根拠が明確ではない", "strength": null, "evidence": null, "consensus": "強く推奨0%/弱く推奨4%/根拠明確でない53%/弱く推奨されない31%/強く推奨されない12%（n=49）", "keyPoints": "ADJUVANT試験(ゲフィチニブ vs CDDP+VNR)でDFS優位(HR 0.60, P=0.005)だがOS無し(HR 0.92, P=0.67)。IMPACT試験でもDFS無し(HR 0.92)、OS無し(78.0% vs 74.6%)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq28b"}, {"id": "1-nsclc-periop-cq29", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ29", "question": "ALK融合遺伝子陽性、術後病理病期Ⅱ-ⅢB(N3除く)、プラチナ製剤併用療法代わりのアレクチニブは勧められるか?", "recommendation": "弱く推奨する", "strength": "2", "evidence": "B", "consensus": "強く推奨25%/弱く推奨70%/根拠明確でない6%（n=53）", "keyPoints": "ALINA試験でⅡ-ⅢA期DFS有意延長(HR 0.24, P<0.0001)。OS未熟(イベント2.3%)。CNSイベントDFS延長(HR 0.22)。有害事象は同等。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq29"}, {"id": "1-nsclc-periop-cq30a", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ30a", "question": "術後病理病期ⅡA-ⅢB(N3除く)、完全切除例、PD-L1発現50%以上例へのアテゾリズマブ追加は勧められるか?", "recommendation": "弱く推奨する", "strength": "2", "evidence": "C", "consensus": "強く推奨54%/弱く推奨46%（n=56）", "keyPoints": "IMpower010試験でPD-L1 TC 50%以上のⅡ-ⅢA期DFS延長(HR 0.43, 95% CI 0.27-0.68)。OS中間解析HR 0.43。治療関連死8例(2%)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq30a"}, {"id": "1-nsclc-periop-cq30b", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ30b", "question": "術後病理病期ⅡA-ⅢB(N3除く)、完全切除例、PD-L1発現1-49%例へのアテゾリズマブ追加は勧められるか?", "recommendation": "推奨に至る根拠が明確ではない", "strength": null, "evidence": null, "consensus": "強く推奨0%/弱く推奨34%/根拠明確でない41%/弱く推奨されない25%（n=56）", "keyPoints": "同試験でPD-L1 TC 1-49%ではDFS HR 0.87(95% CI 0.60-1.26)で有意差なし。OS HR 0.95。益害バランスで根拠不十分。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq30b"}, {"id": "1-nsclc-periop-cq31", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ31", "question": "術後病理病期Ⅰ-Ⅱ期、完全切除例に対する術後放射線療法は勧められるか?", "recommendation": "行わないよう強く推奨する", "strength": "1", "evidence": "A", "consensus": "強く推奨されない100%（n=40）", "keyPoints": "PORT Meta-analysis 2016版でHR 1.18(P=0.001)と予後悪化。2年生存率58%→53%に低下。早期症例で害明確。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq31"}, {"id": "1-nsclc-periop-cq32", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "CQ32", "question": "術後病理病期ⅡB-ⅢB(N2、第9版)、完全切除例に対する術後放射線療法は勧められるか?", "recommendation": "推奨に至る根拠が明確ではない", "strength": null, "evidence": null, "consensus": "強く推奨0%/弱く推奨2%/根拠明確でない63%/弱く推奨されない32%/強く推奨されない3%（n=60）", "keyPoints": "PORT-C試験・Lung ART試験で局所領域無増悪生存改善(HR 0.64)だがDFS/OS改善なし。毒性懸念(Lung ART: Grade 3-4が11% vs 5%)。品質管理問題あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#cq32"}, {"id": "1-nsclc-periop-bq1", "part": "第1部 肺癌", "section": "非小細胞肺癌 / 周術期治療", "cqNo": "BQ1", "question": "臨床病期Ⅱ-ⅢB期(第9版、T4侵襲除く)の術前薬物療法は勧められるか?", "recommendation": "術前プラチナ製剤併用療法は手術単独比でOSの延長が示されている", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "メタアナリシスで有効性確認。ChEST試験でⅡB-ⅢA期でOS-HR 0.42(P<0.001)。進行症例ほど効果高い傾向だが治療関連死1%程度のリスク存在。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102040100.html#bq1"}, {"id": "1-nsclc-rt12-cq33", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "cqNo": "CQ33", "question": "医学的な理由で手術ができないⅠ-Ⅱ期非小細胞肺癌に対して，根治的放射線治療は勧められるか？", "recommendation": "医学的な理由で手術ができないⅠ-Ⅱ期非小細胞肺癌には，根治的放射線治療の適応があり，行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100％（40/40）が「行うことを強く推奨」", "keyPoints": "経過観察ではなく根治的放射線治療が推奨される。複数の非ランダム化試験における5年生存率は0～42％であり、8件のガイドラインレビューでも放射線治療の適応が認められている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102050100.html#cq33"}, {"id": "1-nsclc-rt12-cq34", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "cqNo": "CQ34", "question": "切除可能なⅠ-Ⅱ期非小細胞肺癌に対して，根治的放射線治療は勧められるか？", "recommendation": "a) 肺葉切除可能なⅠ-Ⅱ期非小細胞肺癌で手術を希望しない場合は，根治的放射線治療を行うよう強く推奨する。b) 外科切除が可能であるが肺葉以上の切除が不可能なⅠ-Ⅱ期非小細胞肺癌患者には，根治的放射線治療を行うことを弱く推奨する。", "strength": "a:1 / b:2", "evidence": "C", "consensus": "a) 83％（33/40）が「強く推奨」、18％（7/40）が「弱く推奨」／b) 91％（32/35）が「弱く推奨」、6％（2/35）が「強く推奨」", "keyPoints": "ランダム化比較試験はないが、複数の傾向スコア解析が存在。標準治療は肺葉切除であることを十分説明した上で、手術拒否例には放射線治療が選択肢となる。肺葉切除不能例は縮小手術とSBRTが同等の成績を示す。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102050100.html#cq34"}, {"id": "1-nsclc-rt12-cq35", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "cqNo": "CQ35", "question": "医学的な理由で組織診（もしくは細胞診）および手術ができない臨床的に原発性肺癌と診断された孤立性肺腫瘍（組織未確定）に対して，根治的放射線治療は勧められるか？", "recommendation": "臨床的に原発性肺癌と診断された孤立性肺腫瘍（組織未確定）に対して，根治的放射線治療を行うよう勧めるだけの根拠が明確ではない。", "strength": null, "evidence": null, "consensus": "53％（25/47）が「推奨に至る根拠が明確ではない」、34％（16/47）が「弱く推奨」、6％（3/47）が「強く推奨」、6％（3/47）が「弱く推奨しない」", "keyPoints": "SBRTの治療成績は良好（3年生存率79-83％）だが、可能な限り組織診断を得ることが望ましい。非悪性例を除外することが重要。良悪性の判断にはHRCT所見、FDG-PET、喫煙歴、腫瘤径を参考とする。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102050100.html#cq35"}, {"id": "1-nsclc-rt12-cq36", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅰ-Ⅱ期放射線治療", "cqNo": "CQ36", "question": "Ⅰ期非小細胞肺癌の根治的放射線治療における適切な照射法は何か？", "recommendation": "線量の集中性を高める高精度放射線照射技術を用いることを強く推奨する。", "strength": "1", "evidence": "B", "consensus": "100％（8/8）が「行うことを強く推奨」", "keyPoints": "SBRTと粒子線治療が推奨される。JCOG0403試験でSBRT 48 Gy/4分割の3年生存率は76.5-59.9％で治療関連死なし。SPACE試験とCHISEL試験ではSBRTが通常分割照射より局所制御に優れている。中枢型および超中枢型肺癌では治療関連死が4％と高いため慎重な適応判定が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102050100.html#cq36"}, {"id": "1-nsclc-rt3-cq37", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ37", "question": "切除不能局所進行非小細胞肺癌、全身状態良好（PS 0-1）の患者に対して、化学放射線療法は勧められるか？", "recommendation": "化学放射線療法を行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "100％（40/40）が強く推奨", "keyPoints": "CDDPを含む化学療法と放射線療法併用が放射線単独療法より生存率を有意に改善。高齢者対象試験（JCOG0301）でも同時併用療法群が有意にOSを延長。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq37"}, {"id": "1-nsclc-rt3-cq38", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ38", "question": "切除不能局所進行非小細胞肺癌、PS 0-1患者の化学放射線療法における放射線療法の最適なタイミングは？", "recommendation": "同時併用を行うことを強く推奨する。", "strength": "1", "evidence": "A", "consensus": "100％（40/40）が強く推奨", "keyPoints": "同時併用群で逐次併用群より有意なOS延長が認められるが、急性期有害事象頻度は高い。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq38"}, {"id": "1-nsclc-rt3-cq39", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ39", "question": "化学放射線療法においてプラチナ製剤と第三世代以降の細胞傷害性抗癌薬併用を勧められるか？", "recommendation": "プラチナ製剤と第三世代以降の細胞傷害性抗癌薬を併用した治療を行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "94％（33/35）が強く推奨、6％（2/35）が弱く推奨", "keyPoints": "CP療法、CD療法が標準治療として位置付けられている。10年フォローアップでもCP療法の有効性が確認。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq39"}, {"id": "1-nsclc-rt3-cq40", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ40", "question": "切除不能局所進行非小細胞肺癌、CDDP一括投与が不適な高齢者に対して、連日CBDCA投与による化学放射線療法は勧められるか？", "recommendation": "連日CBDCA投与による化学放射線療法を行うよう弱く推奨する。", "strength": "2", "evidence": "B", "consensus": "38％（13/34）が強く推奨、62％（21/34）が弱く推奨", "keyPoints": "JCOG0301試験でHR 0.68、中央値22.4カ月 vs 16.9カ月と有意なOS延長を示したが、血液学的毒性が高い。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq40"}, {"id": "1-nsclc-rt3-cq41", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ41", "question": "同時化学放射線療法後に、免疫チェックポイント阻害薬による地固め療法を行うよう勧められるか？", "recommendation": "デュルバルマブによる地固め療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "75％（33/44）が強く推奨、25％（11/44）が弱く推奨", "keyPoints": "PACIFIC試験でPFS HR 0.52、16.8カ月 vs 5.6カ月、OS HR 0.68の有意延長を確認。5年OS率42.9% vs 33.4%。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq41"}, {"id": "1-nsclc-rt3-cq42", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ42", "question": "EGFR遺伝子変異陽性切除不能Ⅲ期非小細胞肺癌に対して、同時化学放射線療法後にEGFRチロシンキナーゼ阻害薬は勧められるか？", "recommendation": "オシメルチニブを用いた維持療法を行うよう弱く推奨する。", "strength": "2", "evidence": "B", "consensus": "19％（11/58）が強く推奨、71％（41/58）が弱く推奨、9％（5/58）が根拠不明確、2％（1/58）が行わないことを弱く推奨", "keyPoints": "LAURA試験でPFS HR 0.16、39.1カ月 vs 5.6カ月を示したが、OS中間解析ではHR 0.81で統計的有意性なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq42"}, {"id": "1-nsclc-rt3-cq43", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ43", "question": "化学療法併用時の適切な照射法は何か？", "recommendation": "a) 総線量は通常分割で少なくとも60 Gyを用いるよう強く推奨。b) 74 Gyの高線量照射は行わないよう強く推奨。c) 標的病変に十分な線量を投与し、正常臓器毒性を低減する照射野を設定するよう強く推奨。", "strength": "1（a,b,c全て）", "evidence": "a:A / b:B / c:B", "consensus": "a) 100％（36/36）が強く推奨／b) 100％（34/34）が行わないことを強く推奨／c) 100％（43/43）が強く推奨", "keyPoints": "RTOG0617試験で高線量74 Gy群はOS悪化を報告。IMRTは有害事象低減効果が期待できるが品質管理が必須。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq43"}, {"id": "1-nsclc-rt3-cq44", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ44", "question": "切除不能局所進行非小細胞肺癌で化学療法併用不能なものに対して、放射線単独療法は勧められるか？", "recommendation": "放射線単独療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100％（13/13）が強く推奨", "keyPoints": "ランダム化比較試験で通常照射群の2年OS率18％が小分割照射群6%、無治療群0%より有意に良好。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq44"}, {"id": "1-nsclc-rt3-cq45", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ45", "question": "放射線治療単独時の適切な照射法は何か？", "recommendation": "通常分割照射で少なくとも60 Gyを用いるよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "100％（13/13）が強く推奨", "keyPoints": "60 Gy照射で低線量より照射野内再発が有意に低率。70 Gy以上では有害事象増加で改善認められず。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq45"}, {"id": "1-nsclc-rt3-cq46", "part": "第1部 肺癌", "section": "非小細胞肺癌 / Ⅲ期・肺尖部放射線治療", "cqNo": "CQ46", "question": "切除可能な肺尖部胸壁浸潤癌（臨床病期T3-4N0-1）に対して、どのような治療が勧められるか？", "recommendation": "術前化学放射線療法後に外科治療を実施する集学的治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "92％（36/39）が強く推奨、8％（3/39）が弱く推奨", "keyPoints": "複数の第Ⅱ相試験で完全切除率68-92%、5年OS率44-62.6%を報告。専門医施設での実施を推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102060100.html#cq46"}, {"id": "1-nsclc-4-cq47", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR", "cqNo": "CQ47", "question": "EGFR遺伝子変異陽性（エクソン19欠失またはL858R変異）,PS 0-1の場合，一次治療として薬物療法が勧められるか？", "recommendation": "a. ラゼルチニブ＋アミバンタマブ併用療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:B〕。b. オシメルチニブ＋プラチナ製剤＋ペメトレキセド併用療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:B〕。c. オシメルチニブ単剤療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:A〕。d. エルロチニブ＋血管新生阻害薬併用療法を行うよう弱く推奨する〔推奨の強さ:2,エビデンスの強さ:A〕。", "strength": "1(a,b,c)/2(d)", "evidence": "B(a,b)/A(c,d)", "consensus": "a:強く推奨67%,弱く推奨33%。b:強く推奨60%,弱く推奨40%。c:強く推奨60%,弱く推奨40%。d:弱く推奨87%,強く推奨3%。", "keyPoints": "MARIPOSA試験でラゼルチニブ＋アミバンタマブはオシメルチニブ単剤に対しPFS・OSで優越。FLAURA2試験でオシメルチニブ＋化学療法の上乗せ効果を確認。FLAURA試験でオシメルチニブが第一世代TKIより優越。エルロチニブ＋抗血管新生薬はPFS延長を示すもOS利益は限定的。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq47"}, {"id": "1-nsclc-4-cq48", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR", "cqNo": "CQ48", "question": "EGFR遺伝子変異陽性,PS 2-4の場合，一次治療として薬物療法が勧められるか？", "recommendation": "EGFR-TKI単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨90%,弱く推奨10%", "keyPoints": "NEJ001試験でゲフィチニブはPS不良例で約80%でPS改善,ORR 66%。TORG2040/OPEN試験でオシメルチニブはPS 2-4で63%PS改善,ORR 63%。間質性肺炎発症リスク(20-24%)に注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq48"}, {"id": "1-nsclc-4-cq49", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR", "cqNo": "CQ49", "question": "エクソン18-21変異:Uncommon mutation（エクソン20の挿入変異を除く）に対して，一次治療でEGFR-TKIは勧められるか？", "recommendation": "a. アファチニブ単剤療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:B〕。b. オシメルチニブ単剤療法を行うよう弱く推奨する〔推奨の強さ:2,エビデンスの強さ:C〕。c. EGFR-TKI未治療のT790M変異へのオシメルチニブを行うよう弱く推奨する〔推奨の強さ:2,エビデンスの強さ:C〕。", "strength": "1(a)/2(b,c)", "evidence": "B(a)/C(b,c)", "consensus": "a:強く推奨100%。b:弱く推奨89%,強く推奨11%。c:弱く推奨67%,推奨根拠不明確30%。", "keyPoints": "ACHILLES/TORG1834試験でアファチニブはプラチナ製剤併用より優位(PFS HR 0.42)。UNICORN試験でオシメルチニブはuncommon mutationでORR 55%。T790M未治療例の報告は限定的だが効果が期待される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq49"}, {"id": "1-nsclc-4-cq50", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR", "cqNo": "CQ50", "question": "エクソン20の挿入変異に対して，一次治療で分子標的療法が勧められるか？", "recommendation": "a. カルボプラチン＋ペメトレキセド＋アミバンタマブ併用療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:B〕。b. EGFR-TKI単剤療法を行わないよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:C〕。", "strength": "1", "evidence": "B(a)/C(b)", "consensus": "a:強く推奨63%,弱く推奨37%。b:行わないよう強く推奨70%,弱く推奨26%。", "keyPoints": "PAPILLON試験でCBDCA＋PEM＋アミバンタマブはCBDCA＋PEMより優位(PFS HR 0.40)。エクソン20挿入変異は従来のEGFR-TKIに感受性が低くORR約10%のため一次治療として非推奨。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq50"}, {"id": "1-nsclc-4-cq51", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR", "cqNo": "CQ51", "question": "一次治療EGFR-TKI耐性または増悪後のT790M変異陽性例に対してEGFR-TKIは勧められるか？", "recommendation": "オシメルチニブ単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨100%", "keyPoints": "AURA3試験でオシメルチニブはプラチナ製剤併用療法より優位(PFS HR 0.30)。PS不良例対象の第II相試験でもPFS中央値7-5.1カ月,PS改善率72-83%。間質性肺炎発症(16%)に注意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq51"}, {"id": "1-nsclc-4-cq52", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR", "cqNo": "CQ52", "question": "EGFR-TKI耐性または増悪後例に薬物療法は勧められるか？", "recommendation": "a. オシメルチニブ耐性後にカルボプラチン＋ペメトレキセド＋アミバンタマブ療法を行うよう弱く推奨する。b. 一次治療EGFR-TKI耐性後にカルボプラチン＋パクリタキセル＋ベバシズマブ＋アテゾリズマブ療法を行うよう弱く推奨する。", "strength": "2", "evidence": "B", "consensus": "a:強く推奨56%,弱く推奨44%。b:弱く推奨82%,推奨根拠不明確14%,強く推奨4%。", "keyPoints": "MARIPOSA-2試験でCBDCA＋PEM＋アミバンタマブはCBDCA＋PEMより優位(PFS HR 0.48)。ATTLAS試験でCBDCA＋PTX＋ベバシズマブ＋アテゾリズマブはプラチナ製剤＋PEMより優位(PFS HR 0.62)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq52"}, {"id": "1-nsclc-4-cq53", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / ALK", "cqNo": "CQ53", "question": "ALK融合遺伝子陽性,PS 0-1の場合，一次治療としてALK-TKIが勧められるか？", "recommendation": "a. アレクチニブ単剤療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:A〕。b. ロルラチニブ単剤療法を行うよう強く推奨する〔推奨の強さ:1,エビデンスの強さ:B〕。c. ブリグチニブ単剤療法を行うよう弱く推奨する〔推奨の強さ:2,エビデンスの強さ:B〕。", "strength": "1(a,b)/2(c)", "evidence": "A(a)/B(b,c)", "consensus": "a:強く推奨100%。b:強く推奨79%,弱く推奨21%。c:弱く推奨93%,強く推奨7%。", "keyPoints": "J-ALEX,ALEX,ALESIA試験でアレクチニブはクリゾチニブより優位(PFS HR 0.22-0.47)。CROWN試験でロルラチニブはクリゾチニブより優位(PFS HR 0.28)。ALTA-1L試験でブリグチニブはクリゾチニブより優位(PFS HR 0.49)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq53"}, {"id": "1-nsclc-4-cq54", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / ALK", "cqNo": "CQ54", "question": "ALK融合遺伝子陽性,PS 2-4の場合，一次治療としてALK-TKIが勧められるか？", "recommendation": "アレクチニブ単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨100%", "keyPoints": "LOGiK1401試験でアレクチニブはPS 2-4患者でORR 72.2%,PFS中央値16.2カ月。83.3%でPS改善を認め,安全性に大きな問題なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq54"}, {"id": "1-nsclc-4-cq55", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / ALK", "cqNo": "CQ55", "question": "アレクチニブ耐性または増悪後の症例に対して，ALK-TKIは勧められるか？", "recommendation": "ALK-TKI単剤療法（ブリグチニブ，ロルラチニブ，セリチニブ）を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "弱く推奨72%,強く推奨24%,推奨根拠不明確3%", "keyPoints": "J-ALTA試験でアレクチニブ既治療患者(47例)でブリグチニブはORR 34%,PFS 7.3カ月。ロルラチニブはアレクチニブ既治療患者でORR 37.1%。セリチニブはアレクチニブ既治療患者でORR 25%,PFS 3.7カ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq55"}, {"id": "1-nsclc-4-cq56", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / ROS1", "cqNo": "CQ56", "question": "ROS1融合遺伝子陽性にROS1-TKIは勧められるか？", "recommendation": "ROS1-TKI単剤療法（クリゾチニブ，エヌトレクチニブ，レポトレクチニブ，タレトレクチニブのいずれか）を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨100%", "keyPoints": "クリゾチニブはORR 67-72%,PFS 15.9-19.2カ月。エヌトレクチニブはORR 67.1-77%,PFS 15.7-19.0カ月。レポトレクチニブ未治療例はORR 79%,PFS 35.7カ月。タレトレクチニブ未治療例はORR 89%,PFS 45.6カ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq56"}, {"id": "1-nsclc-4-cq57", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / BRAF", "cqNo": "CQ57", "question": "BRAF遺伝子V600E変異陽性にダブラフェニブ＋トラメチニブは勧められるか？", "recommendation": "ダブラフェニブ＋トラメチニブ併用療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨93%(27/29),弱く推奨7%(2/29)", "keyPoints": "既治療例57例でORR 66.7%,PFS中央値9.7カ月。未治療例36例でORR 64%,PFS中央値10.9カ月。主な毒性は発熱,肝機能障害,心駆出率減少。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq57"}, {"id": "1-nsclc-4-cq58", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / MET", "cqNo": "CQ58", "question": "MET遺伝子変異陽性にMET-TKIは勧められるか？", "recommendation": "MET-TKI単剤療法（テポチニブ，カプマチニブ，グマロンチニブのいずれか）を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "強く推奨100%(25/25)", "keyPoints": "テポチニブはORR 51.4%,PFS中央値11.2カ月,OS中央値19.6カ月。カプマチニブは未治療例でORR 68%,PFS中央値12.5カ月。グマロンチニブは未治療例でORR 71%,PFS中央値11.7カ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq58"}, {"id": "1-nsclc-4-cq59", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / RET", "cqNo": "CQ59", "question": "RET融合遺伝子陽性にセルペルカチニブは勧められるか？", "recommendation": "セルペルカチニブ単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨100%(25/25)", "keyPoints": "LIBRETTO-431試験でペムブロリズマブ併用群比較時のPFS HR 0.46,中央値24.8カ月 vs 11.2カ月。ORR 84% vs 65%。主な毒性は肝機能障害,高血圧,下痢。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq59"}, {"id": "1-nsclc-4-cq60", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / NTRK", "cqNo": "CQ60", "question": "NTRK融合遺伝子陽性にTRK-TKIは勧められるか？", "recommendation": "TRK-TKI単剤療法（エヌトレクチニブ，ラロトレクチニブのいずれか）を行うよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "強く推奨71%(20/28),弱く推奨25%(7/28),明確ではない4%(1/28)", "keyPoints": "エヌトレクチニブの統合解析でNSCLC 22例中ORR 74%,PFS中央値13.8カ月。ラロトレクチニブでNSCLC 19例中ORR 73%,PFS中央値35.4カ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq60"}, {"id": "1-nsclc-4-cq61", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / KRAS", "cqNo": "CQ61", "question": "KRAS遺伝子G12C変異陽性にソトラシブは勧められるか？", "recommendation": "二次治療以降でソトラシブ単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨71%(20/28),弱く推奨29%(8/28)", "keyPoints": "CodeBreaK200試験でドセタキセル比較時のPFS HR 0.66,中央値5.6カ月 vs 4.5カ月。ORR 28.1% vs 13.2%。OS差なし(HR 1.01)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq61"}, {"id": "1-nsclc-4-cq62", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / HER2", "cqNo": "CQ62", "question": "HER2遺伝子変異陽性に抗HER2療法は勧められるか？", "recommendation": "a. 二次治療以降でトラスツズマブ デルクステカン単剤療法を行うよう強く推奨する。b. 二次治療以降でゾンゲルチニブ単剤療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "a:強く推奨79%(22/28),弱く推奨21%(6/28)。b:強く推奨71%(20/28),弱く推奨29%(8/28)。", "keyPoints": "トラスツズマブ デルクステカンはDESTINY-Lung01でORR 55%,PFS中央値8.2カ月,OS中央値17.8カ月。間質性肺炎26%。ゾンゲルチニブはBeamion LUNG-1試験のTKD変異群でORR 71%,PFS中央値12.4カ月。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq62"}, {"id": "1-nsclc-4-cq63", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / PD-L1", "cqNo": "CQ63", "question": "全身状態良好（PS 0-1）なPD-L1 TPS 50％以上に対する一次治療において薬物療法は勧められるか？", "recommendation": "a. ペムブロリズマブ単剤療法もしくはアテゾリズマブ単剤療法を行うよう強く推奨する〔1,A〕。b. プラチナ製剤併用療法にPD-1/PD-L1阻害薬を併用した治療を行うよう強く推奨する〔1,B〕。c. ニボルマブ＋イピリムマブ併用療法を行うよう推奨するだけの根拠が明確ではない。d. PD-1/PD-L1阻害薬＋CTLA-4阻害薬にプラチナ製剤併用療法を併用した治療を行うよう推奨するだけの根拠が明確ではない。", "strength": "a:1/b:1/c:null/d:null", "evidence": "a:A/b:B/c:null/d:null", "consensus": "a:強く推奨93%(27/29),弱く推奨7%(2/29)。b:強く推奨69%(20/29),弱く推奨31%(9/29)。c:弱く推奨55%(16/29),弱く推奨34%(10/29),強く推奨0%。d:弱く推奨55%(16/29),行わない推奨24%(7/29),強く推奨0%。", "keyPoints": "KEYNOTE-024試験でペムブロリズマブはプラチナ製剤比較時のOS HR 0.62。IMpower110試験でアテゾリズマブはTC3/IC3限定。KEYNOTE-189試験でペムブロリズマブ+化学療法はOS HR 0.60。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq63"}, {"id": "1-nsclc-4-cq64", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / PD-L1", "cqNo": "CQ64", "question": "全身状態良好（PS 0-1）なPD-L1 TPS 1～49％に対する一次治療において薬物療法は勧められるか？", "recommendation": "a. プラチナ製剤併用療法にPD-1/PD-L1阻害薬を併用した治療を行うよう強く推奨する〔1,B〕。b. ニボルマブ＋イピリムマブ併用療法を行うよう弱く推奨する〔2,C〕。c. PD-1/PD-L1阻害薬＋CTLA-4阻害薬にプラチナ製剤併用療法を併用した治療を行うよう弱く推奨する〔2,C〕。d. ペムブロリズマブ単剤療法を行うよう推奨するだけの根拠が明確ではない。", "strength": "a:1/b:2/c:2/d:null", "evidence": "a:B/b:C/c:C/d:null", "consensus": "a:強く推奨89%(25/28),弱く推奨7%(2/28),明確ではない4%(1/28)。b:弱く推奨68%(19/28),行わない推奨21%(6/28)。c:弱く推奨61%(17/28),行わない推奨29%(8/28)。d:弱く推奨43%(12/28),行わない推奨32%(9/28)。", "keyPoints": "KEYNOTE-189ではPD-L1 1～49%でペムブロリズマブ+化学療法がOS HR 0.65。CheckMate227ではニボルマブ+イピリムマブのOS HR 0.90(有意差なし)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq64"}, {"id": "1-nsclc-4-cq65", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / PD-L1", "cqNo": "CQ65", "question": "全身状態良好（PS 0-1）なPD-L1 TPS 1％未満に対する一次治療において薬物療法は勧められるか？", "recommendation": "a. プラチナ製剤併用療法にPD-1/PD-L1阻害薬を併用した治療を行うよう強く推奨する〔1,B〕。b. ニボルマブ＋イピリムマブ併用療法を行うよう弱く推奨する〔2,C〕。c. PD-1/PD-L1阻害薬＋CTLA-4阻害薬にプラチナ製剤併用療法を併用した治療を行うよう弱く推奨する〔2,C〕。", "strength": "a:1/b:2/c:2", "evidence": "a:B/b:C/c:C", "consensus": "a:強く推奨75%(21/28),弱く推奨21%(6/28)。b:弱く推奨75%(21/28),強く推奨18%(5/28)。c:弱く推奨75%(21/28),強く推奨0%。", "keyPoints": "KEYNOTE-189ではPD-L1<1%でペムブロリズマブ+化学療法がOS HR 0.55。CheckMate227ではニボルマブ+イピリムマブがOS HR 0.65。CheckMate9LAではニボルマブ+イピリムマブ+化学療法がOS HR 0.63。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq65"}, {"id": "1-nsclc-4-cq66", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / PS不良", "cqNo": "CQ66", "question": "PS 2に対する一次治療において薬物療法は勧められるか？", "recommendation": "a. PD-1/PD-L1阻害薬単剤療法を行うよう弱く推奨する〔2,B〕。b. カルボプラチン併用療法を行うよう弱く推奨する〔2,B〕。c. 細胞傷害性抗癌薬単剤療法を行うよう弱く推奨する〔2,A〕。", "strength": "2", "evidence": "a:B/b:B/c:A", "consensus": null, "keyPoints": "PS 2は多様な集団。メタアナリシスで薬物療法は1年OS率を6%改善(8%→14%)。PD-1/PD-L1阻害薬,カルボプラチン併用,単剤療法いずれも選択肢。合併症有無や年齢などPS低下原因を踏まえて判断。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq66"}, {"id": "1-nsclc-4-cq67", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / PS不良", "cqNo": "CQ67", "question": "PS不良のドライバー遺伝子変異/転座陽性例に，各々のドライバー遺伝子に対する分子標的療法は勧められるか？", "recommendation": "a. ドライバー遺伝子変異/転座を有するPS 2の患者に，それぞれの遺伝子変異/転座を標的とする治療を行うよう強く推奨する〔推奨の強さ:1，エビデンスの強さ:C〕。b. ドライバー遺伝子変異/転座を有するPS 3-4の患者に，それぞれの遺伝子変異/転座を標的とする治療を行うよう弱く推奨する〔推奨の強さ:2，エビデンスの強さ:C〕。", "strength": "1(a)/2(b)", "evidence": "C", "consensus": "a:強く推奨96%(27/28),弱く推奨4%(1/28)。b:強く推奨7%(2/28),弱く推奨93%(26/28)。", "keyPoints": "EGFR・ALK陽性患者対象試験にPS2患者が5-10%程度含まれ,PS0-1と同等の有効性。ゲフィチニブ・オシメルチニブ・アレクチニブはPS不良例への有効性報告あり。PS3-4例はデータ限られるが有効性期待,休薬・減量を要する薬剤もあり注意が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq67"}, {"id": "1-nsclc-4-cq68", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / PS不良", "cqNo": "CQ68", "question": "PS 3-4の患者（ドライバー遺伝子変異/転座陰性，PD-L1発現は問わない）に薬物療法は勧められるか？", "recommendation": "薬物療法を行わないよう強く推奨する。", "strength": "1", "evidence": "D", "consensus": "行わないことを強く推奨100%(25/25)", "keyPoints": "細胞傷害性抗癌薬は一般に適応なし。PD-1/PD-L1阻害薬もPS不良例のエビデンス乏しく非推奨。TOPICAL試験でエルロチニブ単剤療法は緩和治療に対しOS延長認めず(HR 0.94,中央値3.7 vs 3.6カ月)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq68"}, {"id": "1-nsclc-4-cq69", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 二次治療以降", "cqNo": "CQ69", "question": "PS 0-2に対して二次治療以降で細胞傷害性抗癌薬は勧められるか？", "recommendation": "ドセタキセル±ラムシルマブ療法，ペメトレキセド単剤療法，S-1単剤療法，ナブパクリタキセル単剤療法を行うよう強く推奨する。※PEMは非扁平上皮癌への投与に限定。", "strength": "1", "evidence": "A", "consensus": "強く推奨100%(23/23)", "keyPoints": "TAX320試験でDTX 75mg/m2はORR・26週PFS率・1年OS率で有意改善。JMEI試験でPEM単剤とDTX単剤は同等効果(HR0.99)。EAST-LC試験でS-1はDTXに非劣性(OS HR 0.945)。J-AXEL試験でnab-PTXはDTXに非劣性(OS HR 0.85)。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq69"}, {"id": "1-nsclc-4-cq70", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 二次治療以降", "cqNo": "CQ70", "question": "二次治療でドセタキセルを用いる場合にラムシルマブの併用は勧められるか？", "recommendation": "a. ラムシルマブの適応となるPS 0-1症例に対して，ドセタキセルにラムシルマブを併用した治療を行うよう弱く推奨する〔2,B〕。b. 75歳以上の症例に対して，ドセタキセルにラムシルマブを併用した治療を行わないよう弱く推奨する〔2,D〕。c. PS 2症例に対して，ドセタキセルにラムシルマブを併用した治療を行わないよう弱く推奨する〔2,D〕。", "strength": "2", "evidence": "a:B/b:D/c:D", "consensus": "a:強く推奨26%(6/23),弱く推奨74%(17/23)。b:弱く推奨9%(2/23),明確ではない9%(2/23),行わない弱く推奨78%(18/23),行わない強く推奨4%(1/23)。c:明確ではない9%(2/23),行わない弱く推奨87%(20/23),行わない強く推奨4%(1/23)。", "keyPoints": "REVEL試験でDTX+ラムシルマブはOS有意延長(HR 0.86,中央値10.5 vs 9.1カ月)。JVCG試験(本邦)でも良好な傾向。75歳以上・PS2でのデータは限定的で毒性増強懸念。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#cq70"}, {"id": "1-nsclc-4-bq2", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR (BQ)", "cqNo": "BQ2", "question": "PS 0-1の場合，一次治療としてEGFR-TKIが勧められるか？", "recommendation": "a. EGFR-TKI単剤療法はプラチナ製剤併用療法と比較して無増悪生存期間の延長が示されている〔エビデンスの強さ:A〕。b. 第二世代のEGFR-TKI単剤療法は第一世代のEGFR-TKI単剤療法と比較して無増悪生存期間の延長が示されている〔エビデンスの強さ:A〕。c. ゲフィチニブ＋カルボプラチン＋ペメトレキセド併用療法はゲフィチニブ単剤療法と比較して無増悪生存期間の延長が示されている〔エビデンスの強さ:A〕。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "第一世代EGFR-TKI(ゲフィチニブ,エルロチニブ)はプラチナ製剤併用療法よりPFS延長。LUX-Lung7試験でアファチニブがゲフィチニブよりPFS延長も毒性は高度。ARCHER1050試験でダコミチニブも同様。NEJ009試験でゲフィチニブ＋CBDCA＋PEMはゲフィチニブ単剤よりPFS・OS延長も毒性は高度。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq2"}, {"id": "1-nsclc-4-bq3", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / EGFR (BQ)", "cqNo": "BQ3", "question": "EGFR遺伝子変異陽性例に免疫チェックポイント阻害薬単剤療法は勧められるか？", "recommendation": "EGFR遺伝子変異陽性例に対して，一次/二次治療における免疫チェックポイント阻害薬単剤療法は標準治療を上回っていない。", "strength": null, "evidence": "C", "consensus": null, "keyPoints": "EGFR変異陽性・PD-L1陽性例対象の第II相試験でペムブロリズマブORR 0%(10例中)。免疫チェックポイント阻害薬統合解析でEGFR変異陽性例のOS HR 1.11(有効性示されず)。EGFR変異陰性例と比べ効果が劣る可能性。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq3"}, {"id": "1-nsclc-4-bq4", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / ALK (BQ)", "cqNo": "BQ4", "question": "PS 0-1の場合，一次治療としてALK-TKIが勧められるか？", "recommendation": "ALK-TKI単剤療法はプラチナ製剤併用療法と比較して無増悪生存期間の延長が示されている。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "PROFILE1014,PROFILE1029試験でクリゾチニブ単剤はプラチナ製剤併用療法よりPFS有意延長。ASCEND-4試験でセリチニブ単剤も同様。クリゾチニブの主な毒性は視覚障害,消化器毒性,肝機能障害。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq4"}, {"id": "1-nsclc-4-bq5", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 一次治療レジメン (BQ)", "cqNo": "BQ5", "question": "75歳未満に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "プラチナ製剤と第三世代以降の細胞傷害性抗癌薬を併用した治療は有効性のエビデンスが確立している。※PEMは非扁平上皮癌,ネダプラチン(NDP/CDGP)は扁平上皮癌への投与が推奨される。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "JMDB試験でCDDP+PEMは非扁平上皮癌でOS有意延長(HR0.81)も扁平上皮癌では劣る。WJOG5208L試験でNDP/CDGP+DTXは扁平上皮癌でCDDP+DTXよりOS有意延長(HR0.81)。LETS/CATS試験でS-1併用は非劣性。nab-PTX+CBDCAはORR上昇。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq5"}, {"id": "1-nsclc-4-bq6", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 一次治療レジメン (BQ)", "cqNo": "BQ6", "question": "75歳以上に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "75歳以上に対するプラチナ製剤併用療法は有効性のエビデンスが確立している。※PEMは非扁平上皮癌への投与が推奨される。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "JCOG1210/WJOG7813L試験(非扁平上皮癌,75歳以上)でCBDCA+PEMはDTX単剤にOS非劣性,PFS有意延長。CAPITAL試験(扁平上皮癌,70歳以上)でCBDCA+nab-PTXはDTX単剤にOS有意延長(HR0.52)。暦年齢のみで対象外とすべきでない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq6"}, {"id": "1-nsclc-4-bq7", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 一次治療レジメン (BQ)", "cqNo": "BQ7", "question": "非扁平上皮癌においてプラチナ製剤併用療法を受ける場合にベバシズマブの上乗せは勧められるか？", "recommendation": "a. ベバシズマブの適応となる75歳未満，PS 0-1症例に対して，プラチナ製剤併用療法にベバシズマブを併用した治療は有効性のエビデンスが確立している〔エビデンスの強さ:A〕。b. 75歳以上の症例に対して，ベバシズマブを併用した治療は有効性のエビデンスが限定的である〔エビデンスの強さ:C〕。c. PS 2症例に対して，ベバシズマブを併用した治療は有効性のエビデンスが明確ではない〔エビデンスの強さ:D〕。※扁平上皮癌への投与は行わない。", "strength": null, "evidence": "A(a)/C(b)/D(c)", "consensus": null, "keyPoints": "ECOG4599試験でCBDCA+PTX+ベバシズマブはOS有意延長(HR0.79)。BEYOND試験(中国)でもOS有意延長。高齢者ではECOG4599サブ解析等で上乗せ効果に乏しい傾向,毒性増加。扁平上皮癌では肺出血リスクのため非投与。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq7"}, {"id": "1-nsclc-4-bq8", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 一次治療レジメン (BQ)", "cqNo": "BQ8", "question": "扁平上皮癌においてプラチナ製剤併用療法を受ける場合にネシツムマブの上乗せは勧められるか？", "recommendation": "PS 0-1症例に対して，シスプラチン＋ゲムシタビンにネシツムマブを併用した治療は有効性のエビデンスが示されている。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "SQUIRE試験でCDDP+GEM+ネシツムマブはOS有意延長(HR0.84,中央値11.5 vs 9.9カ月)。日本人対象のJFCM試験でもOS(HR0.66),PFS(HR0.56)有意延長,ORR51.1% vs 20.9%。主な毒性は骨髄抑制,皮疹,低マグネシウム血症。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq8"}, {"id": "1-nsclc-4-bq9", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 一次治療レジメン (BQ)", "cqNo": "BQ9", "question": "非扁平上皮癌においてプラチナ製剤＋ペメトレキセド併用療法を受ける場合に，維持療法は勧められるか？", "recommendation": "非扁平上皮癌に対してプラチナ製剤＋ペメトレキセド併用療法4サイクル後，病勢進行を認めず毒性も忍容可能な症例に対してペメトレキセドによる維持療法は有効性のエビデンスが示されている。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "PARAMOUNT試験でCDDP+PEM後のPEM維持療法はPFS(HR0.62),OS(HR0.78)有意延長,QOL低下なし。AVAPERL試験,COMPASS/WJOG5610L試験ではPEM+ベバシズマブ維持でPFS延長もOS有意延長は認めず。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq9"}, {"id": "1-nsclc-4-bq10", "part": "第1部 肺癌", "section": "Ⅳ期NSCLC / 二次治療以降レジメン (BQ)", "cqNo": "BQ10", "question": "一次治療耐性または進行例，PS 0-2，免疫チェックポイント阻害薬未使用例に対する二次治療において免疫チェックポイント阻害薬は勧められるか？", "recommendation": "PD-1阻害薬またはPD-L1阻害薬の単剤療法は有効性のエビデンスが確立している。※ペムブロリズマブの適応症は，（腫瘍細胞上の）PD-L1陽性の切除不能な進行・再発の非小細胞肺癌に限られる。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "CheckMate017試験(扁平上皮癌)でニボルマブはOS有意延長(HR0.59)。CheckMate057試験(非扁平上皮癌)でもOS有意延長(HR0.73)。CheckMate078試験(海外)でも同様(HR0.68)。KEYNOTE-010試験でペムブロリズマブ(PD-L1 TPS1%以上)はOS HR0.67。POPLAR/OAK試験でアテゾリズマブも有効性示す。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/2/250102070100.html#bq10"}, {"id": "1-sclc-ld-cq1", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ1", "question": "臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌に外科治療は勧められるか？", "recommendation": "臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌に対して，外科治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "90％（38/42）が強く推奨", "keyPoints": "外科治療により5年生存率40～70％が期待でき、肺葉切除以上が部分切除より優良。術後薬物療法併用で局所制御率とOS中央値が有意に良好。リンパ節転移例では有用性不明確。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq1"}, {"id": "1-sclc-ld-cq2", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ2", "question": "小細胞肺癌の完全切除例に対して，追加の治療は勧められるか？", "recommendation": "小細胞肺癌の完全切除例に対して，プラチナ製剤併用療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100％（35/35）が強く推奨", "keyPoints": "術後薬物療法施行群でOS有意改善を認証。JCOG9101試験では3年OS率68％。JCOG1205/1206試験でPI療法とPE療法で同等の良好成績（3年OS率：PI 79.0％、PE 84.1％）。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq2"}, {"id": "1-sclc-ld-cq3", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ3", "question": "医学的な理由で手術ができない臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌の放射線照射法として，定位照射は勧められるか？", "recommendation": "医学的な理由で手術ができない臨床病期Ⅰ-ⅡA期（N0に限る）（第9版）の小細胞肺癌の放射線照射法として，定位照射を行うよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "89％（32/36）が弱く推奨", "keyPoints": "SBRT報告数少ないが安全で良好な局所制御を実証。本邦後方視的調査では64例でOS中央値23.5カ月、2年OS率76.3％、局所制御率89.3％。米国多施設研究74例でOS中央値17.8カ月、3年局所制御率96.1％。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq3"}, {"id": "1-sclc-ld-cq4", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ4", "question": "限局型小細胞肺癌（PS 0-2）において，化学放射線療法は勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）に対して，化学放射線療法を行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "100％（35/35）が強く推奨", "keyPoints": "2つのメタアナリシス確認。13試験メタでは3年OS率が5.4±1.4％改善。11試験メタでは2年OS率5.4％、局所制御率25.3％改善。治療関連死1.2％増加に注意必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq4"}, {"id": "1-sclc-ld-cq5", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ5", "question": "限局型小細胞肺癌（PS 0-2）の化学放射線療法における放射線治療のタイミングは，早期同時併用が勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）の化学放射線療法における放射線治療は，早期同時併用を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "100％（35/35）が強く推奨", "keyPoints": "JCOG9104試験で同時併用が優勢（OS中央値：27.2カ月 vs 19.7カ月）。複数試験で早期同時併用によるOS改善。メタアナリシスで早期同時併用2年OS率有意改善。食道炎・肺臓炎・骨髄抑制増加に留意。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq5"}, {"id": "1-sclc-ld-cq6", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ6", "question": "限局型小細胞肺癌（PS 0-2）に対する放射線照射法は，通常分割照射法と加速過分割照射法のどちらが勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）に対する放射線照射法は，加速過分割照射法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "100％（35/35）が強く推奨", "keyPoints": "加速過分割45 Gy/30回/3週が従来標準。CONVERT試験（通常分割66 Gy/33回との比較）でOS中央値30カ月 vs 25カ月、優越性未証明。CALGB30610/RTOG0538試験（70 Gy/35回との比較）でOS 28.5カ月 vs 30.1カ月、同等。加速過分割法が標準位置付け。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq6"}, {"id": "1-sclc-ld-cq7", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ7", "question": "限局型小細胞肺癌（PS 0-2）に対する化学放射線療法においてプラチナ製剤とエトポシドの併用療法は勧められるか？", "recommendation": "限局型小細胞肺癌（PS 0-2）に対する放射線治療と併用する際の薬物療法は，プラチナ製剤＋エトポシド療法を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "96％（27/28）が強く推奨", "keyPoints": "PE療法が多用され標準レジメン。JCOG0202試験でPI療法へ変更群がOS延長効果示さず。治療目標は治癒のため強度減弱不可。CE療法は骨髄抑制高く慎重に判断。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq7"}, {"id": "1-sclc-ld-cq8", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ8", "question": "限局型小細胞肺癌に対する同時化学放射線療法後（PS 0-1）に，免疫チェックポイント阻害薬による地固め療法を行うよう勧められるか？", "recommendation": "同時化学放射線療法後に，デュルバルマブによる地固め療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "84％（38/45）が強く推奨", "keyPoints": "ADRIATIC試験でデュルバルマブ群がプラセボ群比較でPFS中央値16.6カ月 vs 9.2カ月（HR 0.76）、OS中央値55.9カ月 vs 33.4カ月（HR 0.73）で優越。Grade 3-4有害事象24.4％で忍容可。PCI実施有無で効果同等。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq8"}, {"id": "1-sclc-ld-cq9", "part": "第1部 肺癌", "section": "小細胞肺癌 / 限局型", "cqNo": "CQ9", "question": "PS 3-4の限局型小細胞肺癌に対して，薬物療法は勧められるか？", "recommendation": "a. PS 3の限局型小細胞肺癌に対して，薬物療法を行うよう弱く推奨する。 b. PS 4の限局型小細胞肺癌に対して，薬物療法を行うよう勧めるだけの根拠が明確ではない。", "strength": "2（a）/ 明確ではない（b）", "evidence": "C（a）/ なし（b）", "consensus": "a) 100％（35/35）弱く推奨 | b) 80％（28/35）根拠不明確", "keyPoints": "PS 3でも小細胞肺癌が原因ならPS改善可能性あり、薬物療法後改善時は放射線治療追加検討。PS 4はデータ極めて少なく、毒性考慮で判断困難。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103010100.html#cq9"}, {"id": "1-sclc-ed-cq10", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "cqNo": "CQ10", "question": "全身状態良好（PS 0-1）な進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "プラチナ製剤/エトポシド併用療法＋PD-L1阻害薬の併用治療を行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "100%（26/26名が強く推奨）", "keyPoints": "IMpower133試験でアテゾリズマブ併用群がプラセボ群比でOS延長（HR 0.70、中央値12.3vs10.3カ月）を示した。CASPIAN試験でデュルバルマブ併用群も同様の有効性を確認。免疫関連毒性増加に留意が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103020100.html#cq10"}, {"id": "1-sclc-ed-cq11", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "cqNo": "CQ11", "question": "PS 2の進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "プラチナ製剤＋エトポシドまたはイリノテカン併用療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "92%（24/26名が強く推奨、2名が弱く推奨）", "keyPoints": "複数の第Ⅲ相試験でPS 2患者を対象に有効性と安全性を確認。JCOG1201/TORG1528試験ではCI療法がCE療法と同等のOS（13.2vs12.0カ月）を示した。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103020100.html#cq11"}, {"id": "1-sclc-ed-cq12", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "cqNo": "CQ12", "question": "PS 3の進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "カルボプラチン＋エトポシド療法あるいはsplit PE療法を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "91%（21/23名が弱く推奨、2名が根拠不明）", "keyPoints": "JCOG9702試験で、治療効果によるPS改善の可能性がある場合に薬物療法の対象になり得ると判断。ただしPS 3の登録は全体の8%（18/220例）のみ。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103020100.html#cq12"}, {"id": "1-sclc-ed-cq13", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "cqNo": "CQ13", "question": "PS 4の進展型小細胞肺癌に対する一次治療において薬物療法は勧められるか？", "recommendation": "薬物療法は行わないよう弱く推奨する。", "strength": "2", "evidence": "D", "consensus": "70%（16/23名が行わないことを弱く推奨）、26%（6名が根拠不明）、4%（1名が行わないことを強く推奨）", "keyPoints": "PS 4専門の前向き試験がなく、毒性リスクが高い。PS 4を含む試験でもPS 4の割合は3%（9/339例）のみ。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103020100.html#cq13"}, {"id": "1-sclc-ed-bq1", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "cqNo": "BQ1", "question": "70歳以下の進展型小細胞肺癌に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "プラチナ製剤併用療法は有効性のエビデンスが確立している。", "strength": null, "evidence": "A", "consensus": null, "keyPoints": "JCOG9511試験でPI療法がPE療法を上回るOS延長（12.8vs9.4カ月）を示した。メタアナリシスでもCPT-11併用療法の優位性を確認。PI療法は嘔吐・下痢が多く、間質性肺炎患者に禁忌。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103020100.html#bq1"}, {"id": "1-sclc-ed-bq2", "part": "第1部 肺癌", "section": "小細胞肺癌 / 進展型", "cqNo": "BQ2", "question": "71歳以上の進展型小細胞肺癌に対する一次治療においてプラチナ製剤併用療法は勧められるか？", "recommendation": "プラチナ製剤併用療法は有効性のエビデンスが確立している。", "strength": null, "evidence": "B", "consensus": null, "keyPoints": "JCOG9702試験でCE療法とSPE療法が同等のOS（70歳以上PS 0-2で10.8vs10.1カ月）。JCOG1201/TORG1528試験ではCI療法とCE療法が同等（13.2vs12.0カ月）。毒性プロファイルで選択を検討。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103020100.html#bq2"}, {"id": "1-sclc-pci-cq14", "part": "第1部 肺癌", "section": "小細胞肺癌 / 予防的全脳照射", "cqNo": "CQ14", "question": "限局型小細胞肺癌の初回治療で完全寛解が得られた症例に対して，予防的全脳照射は勧められるか？", "recommendation": "予防的全脳照射を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "強く推奨83％（29/35人）、弱く推奨17％（6/35人）", "keyPoints": "メタアナリシスで完全寛解例における3年脳転移再発率が58.6％から33.3％に低下し、3年生存率が15.3％から20.7％に向上することが報告された。毒性評価では有意な脳萎縮や精神症状の増強は認められていない。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103030100.html#cq14"}, {"id": "1-sclc-pci-cq15", "part": "第1部 肺癌", "section": "小細胞肺癌 / 予防的全脳照射", "cqNo": "CQ15", "question": "予防的全脳照射の勧められる線量は何か？", "recommendation": "25 Gy/10回相当を行うよう弱く推奨する。", "strength": "2", "evidence": "B", "consensus": "弱く推奨82％（28/34人）、強く推奨15％（5/34人）、根拠不明3％（1/34人）", "keyPoints": "第Ⅲ相試験で高線量群（36 Gy/18回または36 Gy/24回）は標準線量群（25 Gy/10回）と比べ、脳転移抑制では差なく、生存率で劣る結果が報告された。1回線量は2.5 Gy以下が望ましく、化学放射線療法終了後6カ月以内の施行が推奨される。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103030100.html#cq15"}, {"id": "1-sclc-pci-cq16", "part": "第1部 肺癌", "section": "小細胞肺癌 / 予防的全脳照射", "cqNo": "CQ16", "question": "進展型小細胞肺癌における薬物療法後の予防的全脳照射は勧められるか？", "recommendation": "予防的全脳照射を行わないよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "行わないことを強く推奨89％（31/35人）、弱く推奨9％（3/35人）、根拠不明3％（1/35人）", "keyPoints": "日本からの報告では脳転移出現頻度は有意に減少（32.4% vs 58.0%）したが、主要評価項目のOSはPCI施行群で劣る傾向を示し（中央値10.1カ月 vs 15.1カ月）、試験が早期中止となった。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103030100.html#cq16"}, {"id": "1-sclc-rec-cq17", "part": "第1部 肺癌", "section": "小細胞肺癌 / 再発", "cqNo": "CQ17", "question": "全身状態良好（PS 0-1）な再発小細胞肺癌に対してタルラタマブ療法は勧められるか？", "recommendation": "二次治療以降にタルラタマブ療法を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "行うことを強く推奨87％（26/30）、行うことを弱く推奨13％（4/30）", "keyPoints": "Dellphi-301試験でタルラタマブ10mg群のORRは40％、OS中央値14.3カ月。DeLLphi-304試験でタルラタマブはOS中央値13.6カ月対8.3カ月で細胞傷害性抗癌薬優越。CRSとICANSが特徴的有害事象で厳密な副作用監視が必要。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103040100.html#cq17"}, {"id": "1-sclc-rec-cq18", "part": "第1部 肺癌", "section": "小細胞肺癌 / 再発", "cqNo": "CQ18", "question": "PS 0-2の再発小細胞肺癌（sensitive relapse）に対して薬物療法は勧められるか？", "recommendation": "ノギテカン単剤療法、シスプラチン＋エトポシド＋イリノテカン（PEI）療法、アムルビシン単剤療法、カルボプラチン＋エトポシド療法を行うよう弱く推奨する。", "strength": "2", "evidence": "A", "consensus": "行うことを強く推奨24％（7/29）、行うことを弱く推奨76％（22/29）", "keyPoints": "NGT単剤療法がsensitive relapse標準治療。JCOG0605試験でPEI療法がOS中央値18.2カ月対12.5カ月で優越。AMR単剤療法のsensitive relapseに対するORR61％、1年OS率51％。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103040100.html#cq18"}, {"id": "1-sclc-rec-cq19", "part": "第1部 肺癌", "section": "小細胞肺癌 / 再発", "cqNo": "CQ19", "question": "PS 0-2の再発小細胞肺癌（refractory relapse）に対して薬物療法は勧められるか？", "recommendation": "アムルビシン単剤療法を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "行うことを強く推奨18％（5/28）、行うことを弱く推奨82％（23/28）", "keyPoints": "refractory relapseに対する確立した治療法は限定的。AMR単剤療法のrefractory relapseに対するORR38％、1年OS率34％。JCOG0901試験ではOS中央値8.9カ月を報告。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/3/250103040100.html#cq19"}, {"id": "1-meta-bone-cq1", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "cqNo": "CQ1", "question": "症状を有する骨転移に対して，放射線治療が勧められるか？", "recommendation": "放射線治療を行うよう強く推奨する。", "strength": "1", "evidence": "A", "consensus": "100％（35/35）が「行うことを強く推奨」", "keyPoints": "メタアナリシスにより痛みの改善は50～80％と高率で得られ、有害事象は少ない。肺癌の骨転移は約30～50％に生じ、本邦データでは30.4％に認められている。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104010100.html#cq1"}, {"id": "1-meta-bone-cq2", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "cqNo": "CQ2", "question": "症状を有する骨転移に対する適切な照射法は何か？", "recommendation": "a. 通常照射（20 Gy/5回，30 Gy/10回，8 Gy単回など）を行うよう強く推奨する。 b. 脊椎転移に対して，体幹部定位放射線治療を行うよう弱く推奨する。", "strength": "1（a）/ 2（b）", "evidence": "A（a）/ C（b）", "consensus": "a) 91％（51/56）が強く推奨 | b) 91％（52/57）が弱く推奨", "keyPoints": "a: 痛みの改善は単回照射群58％ vs 分割照射群59％と同等だが、再照射率は分割照射で低い。b: SBRT群で疼痛消失率が優れ（35% vs 14％）、局所制御率も高いが、有痛性脊椎転移での疼痛緩和率に有意差なし。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104010100.html#cq2"}, {"id": "1-meta-bone-cq3", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "cqNo": "CQ3", "question": "病的骨折の危険性が高い骨転移，または脊椎転移が脊髄圧迫を生じている骨転移に対して，放射線治療が勧められるか？", "recommendation": "放射線治療を行うよう強く推奨する。", "strength": "1", "evidence": "C", "consensus": "100％（35/35）が「行うことを強く推奨」", "keyPoints": "脊髄圧迫での放射線治療後、82％で除痛が得られ、76％で歩行機能が回復または維持。無症状でもリスク高い場合、予防的治療が有効。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104010100.html#cq3"}, {"id": "1-meta-bone-cq4", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "cqNo": "CQ4", "question": "病的骨折の危険性が高い骨転移，または脊椎転移が脊髄圧迫を生じている骨転移に対して，外科治療が勧められるか？", "recommendation": "外科治療を行うよう弱く推奨する。", "strength": "2", "evidence": "C", "consensus": "100％（35/35）が弱く推奨", "keyPoints": "疼痛・機能改善は示されるが、QOL改善は明確でない。脊髄圧迫に対する除圧術+放射線治療は有効性示唆も、相反する報告あり。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/250104010100.html#cq4"}, {"id": "1-meta-bone-cq5", "part": "第1部 肺癌", "section": "各病態 / 骨転移", "cqNo": "CQ5", "question": "骨転移を有する症例に対して，骨関連事象の抑制（発現率を軽減し，発現までの時期を延長させる）に骨修飾薬（ゾレドロン酸またはデノスマブ）は勧められるか？", "recommendation": "骨修飾薬（ゾレドロン酸またはデノスマブ）による治療を行うよう強く推奨する。", "strength": "1", "evidence": "B", "consensus": "100％（42/42）が強く推奨", "keyPoints": "ゾレドロン酸投与群でSRE発現率が有意に低く（38.9% vs 48.0%）、発症期間を2ヶ月延長。デノスマブはゾレドロン酸と非劣性。重要な有害事象は顎骨壊死、低カルシウム血症、腎機能障害。", "sourceUrl": "https://www.haigan.gr.jp/publication/guideline/examination/2025/1/4/2
