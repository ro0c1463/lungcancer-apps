<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>eセミナー講義ノート</title>
<style>
:root{
  --bg:#f4f7f8; --card-bg:#ffffff; --text:#1c2b30; --sub:#5a6b70;
  --accent:#0f6b7a; --border:#d7e0e2; --shadow:rgba(15,60,70,.12);
}
:root[data-theme="dark"]{
  --bg:#141c1e; --card-bg:#1d2a2d; --text:#e6eef0; --sub:#a3b4b8;
  --accent:#4fb3c2; --border:#2e4145; --shadow:rgba(0,0,0,.4);
}
@media (prefers-color-scheme: dark){
  :root:not([data-theme="light"]){
    --bg:#141c1e; --card-bg:#1d2a2d; --text:#e6eef0; --sub:#a3b4b8;
    --accent:#4fb3c2; --border:#2e4145; --shadow:rgba(0,0,0,.4);
  }
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  min-height:100vh;
  padding:0 0 48px;
}
header{
  position:sticky; top:0; z-index:10;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
}
.header-row{
  display:flex; align-items:center; justify-content:space-between;
  max-width:720px; margin:0 auto;
}
h1{ font-size:1.15rem; margin:0; }
.theme-btn{
  border:1px solid var(--border);
  background:var(--card-bg);
  color:var(--text);
  border-radius:20px;
  padding:6px 14px;
  font-size:.85rem;
  cursor:pointer;
}
.progress-wrap{ max-width:720px; margin:10px auto 0; }
.progress-label{ font-size:.8rem; color:var(--sub); margin-bottom:4px; }
.progress-bar-bg{
  background:var(--border);
  border-radius:8px;
  height:8px;
  overflow:hidden;
}
.progress-bar-fill{
  background:var(--accent);
  height:100%;
  border-radius:8px;
  transition:width .2s ease;
}
main{ max-width:720px; margin:0 auto; padding:16px; }

.lecture-list{
  display:flex; flex-direction:column; gap:14px;
}
.lecture-card{
  display:flex; align-items:center; gap:14px;
  padding:16px 18px;
  border-radius:14px;
  background:var(--card-bg);
  border:1px solid var(--border);
  box-shadow:0 2px 10px var(--shadow);
  cursor:pointer;
  transition:transform .15s ease;
}
.lecture-card:active{ transform:scale(.98); }
.lecture-card.disabled{
  opacity:.5;
  cursor:not-allowed;
  filter:grayscale(1);
}
.lecture-no{
  font-weight:700; color:var(--accent);
  font-size:1.3rem; min-width:2.4em; text-align:center;
}
.lecture-meta{ flex:1; min-width:0; }
.lecture-title{ font-weight:600; font-size:1rem; margin:0 0 2px; }
.lecture-sub{ color:var(--sub); font-size:.82rem; margin:0; }
.lecture-check{
  font-size:1.2rem; color:var(--accent); min-width:1.4em; text-align:center;
}

.detail-header{ margin-bottom:14px; }
.back-btn{
  border:1px solid var(--border);
  background:var(--card-bg);
  color:var(--text);
  border-radius:20px;
  padding:6px 14px;
  font-size:.85rem;
  cursor:pointer;
  margin-bottom:14px;
}
.detail-title{ font-size:1.3rem; margin:0 0 4px; }
.detail-lecturer{ color:var(--sub); font-size:.9rem; margin:0 0 10px; }
.badge-row{ display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }
.badge{
  font-size:.72rem;
  color:var(--sub);
  border:1px solid var(--border);
  border-radius:10px;
  padding:2px 8px;
}
.exam-points{
  background:color-mix(in srgb, var(--accent) 14%, var(--card-bg));
  border:1px solid var(--accent);
  border-radius:14px;
  padding:16px 18px;
  margin-bottom:20px;
}
.exam-points h3{
  margin:0 0 10px;
  color:var(--accent);
  font-size:1rem;
}
.exam-points ul{ margin:0; padding-left:1.2em; }
.exam-points li{ margin-bottom:6px; font-size:.92rem; }

.section-block{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 18px;
  margin-bottom:14px;
}
.section-heading{ margin:0 0 6px; font-size:1rem; color:var(--text); }
.section-summary{ margin:0 0 10px; font-size:.9rem; color:var(--sub); line-height:1.6; }
.section-block ul{ margin:0; padding-left:1.2em; }
.section-block li{ margin-bottom:5px; font-size:.9rem; line-height:1.5; }

.toggle-read-btn{
  display:block;
  width:100%;
  border:none;
  border-radius:14px;
  background:var(--accent);
  color:#fff;
  font-size:1rem;
  font-weight:600;
  padding:14px;
  margin:20px 0 8px;
  cursor:pointer;
}
.toggle-read-btn.done{
  background:var(--card-bg);
  color:var(--accent);
  border:1px solid var(--accent);
}

.hidden{ display:none !important; }

.nav-btn{
  border:1px solid var(--border);
  background:var(--card-bg);
  color:var(--text);
  border-radius:20px;
  padding:6px 14px;
  font-size:.85rem;
  cursor:pointer;
}
.nav-btn.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
}
.header-nav{
  display:flex; gap:8px; align-items:center;
}

.plan-section{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px 18px;
  margin-bottom:16px;
}
.plan-section h2{ margin:0 0 10px; font-size:1.1rem; color:var(--accent); }
.plan-section h3{ margin:16px 0 6px; font-size:1rem; }
.plan-section p{ margin:0 0 8px; font-size:.92rem; line-height:1.6; color:var(--text); }
.plan-section ul, .plan-section ol{ margin:0 0 8px; padding-left:1.2em; }
.plan-section li{ margin-bottom:6px; font-size:.9rem; line-height:1.6; }
.plan-highlight{
  background:color-mix(in srgb, var(--accent) 14%, var(--card-bg));
  border:1px solid var(--accent);
  border-radius:14px;
  padding:14px 16px;
  margin-bottom:16px;
  font-size:.92rem;
  line-height:1.7;
}
.plan-highlight strong{ color:var(--accent); }
.table-scroll{
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  margin-bottom:8px;
}
.plan-table{
  width:100%;
  border-collapse:collapse;
  min-width:520px;
  font-size:.88rem;
}
.plan-table th, .plan-table td{
  border:1px solid var(--border);
  padding:8px 10px;
  text-align:left;
  vertical-align:top;
  line-height:1.5;
}
.plan-table th{
  background:color-mix(in srgb, var(--accent) 12%, var(--card-bg));
  color:var(--accent);
  white-space:nowrap;
}
.plan-table td:first-child{ font-weight:600; white-space:nowrap; color:var(--accent); }
@media (max-width:480px){
  .plan-table{ min-width:0; display:block; }
  .plan-table thead{ display:none; }
  .plan-table tbody, .plan-table tr, .plan-table td{ display:block; width:100%; }
  .plan-table tr{
    border:1px solid var(--border);
    border-radius:10px;
    margin-bottom:10px;
    padding:8px 10px;
  }
  .plan-table td{
    border:none;
    padding:4px 0;
  }
  .plan-table td:first-child{ font-size:.95rem; margin-bottom:2px; }
  .plan-table td:not(:first-child)::before{
    content: attr(data-label) "：";
    display:block;
    font-size:.75rem;
    color:var(--sub);
    font-weight:600;
  }
}
</style>
</head>
<body>
<header>
  <div class="header-row">
    <h1>eセミナー講義ノート</h1>
    <div class="header-nav">
      <button class="nav-btn active" id="navListBtn">講義一覧</button>
      <button class="nav-btn" id="navPlanBtn">学習計画</button>
      <button class="theme-btn" id="themeBtn">テーマ</button>
    </div>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">0/12 講義 読了</div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBarFill" style="width:0%"></div></div>
  </div>
</header>

<main>
  <div id="listView">
    <div class="lecture-list" id="lectureList"></div>
  </div>

  <div id="detailView" class="hidden">
    <button class="back-btn" id="backBtn">‹ 一覧へ戻る</button>
    <div class="detail-header">
      <h2 class="detail-title" id="detailTitle"></h2>
      <p class="detail-lecturer" id="detailLecturer"></p>
      <div class="badge-row" id="badgeRow"></div>
    </div>
    <div class="exam-points">
      <h3>試験ポイント</h3>
      <ul id="examPointsList"></ul>
    </div>
    <div id="sectionsContainer"></div>
    <button class="toggle-read-btn" id="toggleReadBtn"></button>
    <button class="back-btn" id="backBtn2">‹ 一覧へ戻る</button>
  </div>

  <div id="planView" class="hidden"></div>
</main>

<script>
const LECTURES = [{"no": 1, "title": "\u80ba\u764c\u306e\u75ab\u5b66\u3068\u57fa\u672c", "lecturer": "\u6e05\u5bb6(\u65e5\u672c\u533b\u79d1\u5927\u5b66)", "sections": [{"heading": "\u80ba\u764c\u306e\u75ab\u5b66\u30fb\u6b7b\u4ea1\u7d71\u8a08", "summary": "\u65e5\u672c\u4eba\u306e\u764c\u6b7b\u4ea1\u7387\u306f\u6226\u5f8c\u4e00\u8cab\u3057\u3066\u5897\u52a0\u3057\u3066\u304a\u308a\u30012024\u5e74\u306e\u764c\u6b7b\u4ea1\u7387\u306f\u4eba\u53e310\u4e07\u4eba\u5bfe311.3\u3067\u7dcf\u6b7b\u4ea1\u306e23.9%\u3092\u5360\u3081\u308b\u3002\u80ba\u764c\u306f2024\u5e74\u306b75,569\u4eba\u304c\u6b7b\u4ea1\u3057\u3001\u764c\u6b7b\u4ea1\u5168\u4f53\u306e23.6%\u3092\u5360\u3081\u3066\u7537\u5973\u5408\u8a08\u3067\u764c\u6b7b\u56e0\u306e\u7b2c1\u4f4d\u3067\u3042\u308b\u3002", "keyPoints": ["2024\u5e74\u764c\u6b7b\u4ea1\u6570384,111\u4eba\u4e2d\u3001\u80ba\u764c\u6b7b\u4ea175,569\u4eba\uff08\u764c\u6b7b\u4ea1\u306e23.6%\uff09", "\u7537\u6027\u306e\u80ba\u764c\u6b7b\u4ea1\u306f52,333\u4eba\u3067\u764c\u6b7b\u56e0\u7b2c1\u4f4d", "\u5973\u6027\u306e\u80ba\u764c\u6b7b\u4ea1\u306f23,236\u4eba\u3067\u5927\u8178\u764c\u306b\u6b21\u3050\u7b2c2\u4f4d", "\u7537\u5973\u5408\u8a08\u3067\u306f\u80ba\u764c\u304c\u65e5\u672c\u306e\u764c\u6b7b\u56e0\u7b2c1\u4f4d", "\u7537\u6027\u306f70\u6b73\u53f0\u5f8c\u534a\u301c80\u6b73\u4ee3\u524d\u534a\u3067\u6b7b\u4ea1\u7387\u304c\u3084\u3084\u6e1b\u5c11\u50be\u5411\uff08\u751f\u6daf\u55ab\u7159\u7387\u4f4e\u4e0b\u306e\u5f71\u97ff\uff09", "\u5973\u6027\u306f75\u6b73\u4ee5\u4e0a\u9ad8\u9f62\u5c64\u3067\u6b7b\u4ea1\u7387\u304c\u5897\u52a0\uff08\u9ad8\u9f62\u5316\u306e\u5f71\u97ff\uff09"]}, {"heading": "\u7d44\u7e54\u578b\u5206\u985e\u3068\u305d\u306e\u7279\u5fb4", "summary": "\u80ba\u764c\u306f\u975e\u5c0f\u7d30\u80de\u80ba\u764c\uff08\u817a\u764c\u30fb\u6241\u5e73\u4e0a\u76ae\u764c\u30fb\u5927\u7d30\u80de\u764c\uff09\u3068\u5c0f\u7d30\u80de\u764c\u306b\u5927\u5225\u3055\u308c\u308b\u3002\u7d44\u7e54\u578b\u3054\u3068\u306b\u597d\u767a\u90e8\u4f4d\u30fb\u5371\u967a\u56e0\u5b50\u30fb\u907a\u4f1d\u5b50\u5909\u7570\u30fb\u816b\u760d\u30de\u30fc\u30ab\u30fc\u304c\u7570\u306a\u308a\u3001\u6cbb\u7642\u9078\u629e\u306f\u6241\u5e73\u4e0a\u76ae\u764c\u3068\u975e\u6241\u5e73\u4e0a\u76ae\u764c\uff08\u817a\u764c\u30fb\u5927\u7d30\u80de\u764c\u3092\u542b\u3080\uff09\u3067\u5206\u3051\u308b\u306e\u304c\u4e00\u822c\u7684\u3002", "keyPoints": ["\u817a\u764c\uff1a\u5168\u4f53\u306e\u7d0450%\u3001\u80ba\u91ce\u672b\u68a2\u578b\u3001\u975e\u55ab\u7159\u8005\u30fb\u5973\u6027\u306b\u3082\u591a\u3044\u3001EGFR/ALK\u7b49\u306e\u30c9\u30e9\u30a4\u30d0\u30fc\u5909\u7570\u304c\u591a\u3044\u3001\u816b\u760d\u30de\u30fc\u30ab\u30fc\u306fCEA", "\u6241\u5e73\u4e0a\u76ae\u764c\uff1a\u5168\u4f53\u306e\u7d0430%\u3001\u80ba\u9580\u90e8\u4e2d\u5fc3\u578b\u3001\u55ab\u7159\u3068\u306e\u95a2\u9023\u5f37\u3001\u7a7a\u6d1e\u5f62\u6210\u3057\u5580\u8840\u306e\u539f\u56e0\u306b\u306a\u308a\u3046\u308b\u3001\u816b\u760d\u30de\u30fc\u30ab\u30fc\u306fCYFRA\u30fbSCC", "\u5927\u7d30\u80de\u764c\uff1a\u5168\u4f53\u306e\u7d045%\u3001\u80ba\u91ce\u672b\u68a2\u578b\u3001\u9664\u5916\u8a3a\u65ad\uff08\u672a\u5206\u5316\u764c\uff09\u3001\u6025\u901f\u5897\u5927\u30fb\u8ee2\u79fb\u3057\u3084\u3059\u3044", "\u5c0f\u7d30\u80de\u764c\uff1a\u5168\u4f53\u306e\u7d0415%\u3001\u80ba\u9580\u90e8\u3001\u55ab\u7159\u3068\u306e\u95a2\u9023\u304c\u975e\u5e38\u306b\u5f37\u3044\u3001\u5897\u6b96\u901f\u5ea6\u304c\u901f\u304f\u65e9\u671f\u8ee2\u79fb\u3001\u5316\u5b66\u653e\u5c04\u7dda\u7642\u6cd5\u611f\u53d7\u6027\u306f\u9ad8\u3044\u304c\u518d\u767a\u3057\u3084\u3059\u3044\u3001\u816b\u760d\u30de\u30fc\u30ab\u30fc\u306fNSE\u30fbProGRP", "\u6cbb\u7642\u9078\u629e\u4e0a\u306f\u6241\u5e73\u4e0a\u76ae\u764c vs \u975e\u6241\u5e73\u4e0a\u76ae\u764c\uff08\u817a\u764c\uff0b\u5927\u7d30\u80de\u764c\uff09\u3067\u85ac\u5264\u9078\u629e\u304c\u7570\u306a\u308b"]}, {"heading": "\u81e8\u5e8a\u75c7\u72b6\u3068\u816b\u760d\u968f\u4f34\u75c7\u5019\u7fa4", "summary": "\u80ba\u764c\u306b\u306f\u7279\u5fb4\u7684\u306a\u521d\u671f\u75c7\u72b6\u304c\u306a\u304f\u3001\u7121\u75c7\u72b6\u306e\u307e\u307e\u5065\u8a3a\u306e\u80f8\u90e8X\u7dda\u30fbCT\u3067\u767a\u898b\u3055\u308c\u308b\u3053\u3068\u304c\u591a\u3044\u3002\u9032\u884c\u3059\u308b\u3068\u5c40\u6240\u6d78\u6f64\u75c7\u72b6\u3084\u816b\u760d\u968f\u4f34\u75c7\u5019\u7fa4\u304c\u51fa\u73fe\u3059\u308b\u3002", "keyPoints": ["\u75c7\u72b6\uff1a\u54b3\u55fd\u3001\u5580\u75f0\u3001\u8840\u75f0\u3001\u80f8\u75db\u3001\u547c\u5438\u56f0\u96e3\u3001\u767a\u71b1\u306a\u3069\u975e\u7279\u7570\u7684", "\u4e0a\u5927\u9759\u8108\u75c7\u5019\u7fa4\uff08SVC\u75c7\u5019\u7fa4\uff09\uff1a\u7e26\u9694\u816b\u760d\u306b\u3088\u308bSVC\u5727\u8feb\u3067\u9854\u9762\u30fb\u4e0a\u80a2\u6d6e\u816b\u3001\u9838\u9759\u8108\u6012\u5f35", "\u53cd\u56de\u795e\u7d4c\u9ebb\u75fa\uff1a\u7e26\u9694\u6d78\u6f64\u306b\u3088\u308b\u55c4\u58f0", "\u9ad8\u30ab\u30eb\u30b7\u30a6\u30e0\u8840\u75c7\uff1aPTHrP\u7523\u751f\u3001\u6241\u5e73\u4e0a\u76ae\u764c\u306b\u591a\u3044", "SIADH\uff08\u4f4eNa\u8840\u75c7\uff09\u3068Lambert-Eaton\u75c7\u5019\u7fa4\uff1a\u5c0f\u7d30\u80de\u764c\u306b\u591a\u3044"]}, {"heading": "\u5371\u967a\u56e0\u5b50", "summary": "\u6700\u5927\u306e\u5371\u967a\u56e0\u5b50\u306f\u55ab\u7159\u3067\u3042\u308a\u3001\u958b\u59cb\u5e74\u9f62\u304c\u82e5\u3044\u307b\u3069\u30fb\u55ab\u7159\u91cf\u304c\u591a\u3044\u307b\u3069\u30ea\u30b9\u30af\u304c\u98db\u8e8d\u7684\u306b\u4e0a\u6607\u3059\u308b\u3002\u30a2\u30b9\u30d9\u30b9\u30c8\u66dd\u9732\u3001\u9593\u8cea\u6027\u80ba\u708e\u30fbCOPD\u306a\u3069\u306e\u57fa\u790e\u75be\u60a3\u3001\u52a0\u9f62\u3082\u30ea\u30b9\u30af\u56e0\u5b50\u3068\u306a\u308b\u3002", "keyPoints": ["\u73fe\u55ab\u7159\u8005\u306e\u80ba\u764c\u30ea\u30b9\u30af\u306f\u975e\u55ab\u7159\u8005\u6bd4\u3067\u7537\u60274.4\u500d\u3001\u5973\u60272.8\u500d", "\u7d44\u7e54\u578b\u5225\u76f8\u5bfe\u5371\u967a\u5ea6\uff08\u6241\u5e73\u4e0a\u76ae\u764c\u30fb\u5c0f\u7d30\u80de\u764c\uff09\uff1a\u7537\u602712.7\u500d\u3001\u597 805\u76ee\u3068\u3057\u3066\u8a18\u8f09", "\u817a\u6241\u5e73\u4e0a\u76ae\u764c: \u817a\u764c\u30fb\u6241\u5e73\u4e0a\u76ae\u4e21\u6210\u5206\u304c\u305d\u308c\u305e\u308c10%\u4ee5\u4e0a\u3092\u5360\u3081\u308b\u816b\u760d"]}, {"heading": "\u305d\u306e\u4ed6\u306e\u975e\u5c0f\u7d30\u80de\u764c\u7d44\u7e54\u578b", "summary": "\u5927\u7d30\u80de\u764c\u306f\u5c0f\u7d30\u80de\u764c\u30fb\u817a\u764c\u30fb\u6241\u5e73\u4e0a\u76ae\u764c\u30fb\u8089\u816b\u69d8\u764c\u7b49\u306e\u7279\u5fb4\u3092\u6b20\u304f\u672a\u5206\u5316\u975e\u5c0f\u7d30\u80de\u764c\u3067\u6458\u51fa\u691c\u4f53\u3067\u306e\u5341\u5206\u306a\u691c\u7d22\u3092\u8981\u3059\u308b\u3002\u8089\u816b\u69d8\u764c\uff08\u591a\u5f62\u764c\u30fb\u7d21\u9318\u7d30\u80de\u764c\u30fb\u5de8\u7d30\u80de\u764c\u30fb\u80ba\u82bd\u816b\u30fb\u764c\u8089\u816b\uff09\u306f\u8089\u816b\u6210\u5206\u309210%\u4ee5\u4e0a\u542b\u3080\u4f4e\u5206\u5316\u975e\u5c0f\u7d30\u80de\u764c\u3002NUT\u764c\u306fNUTM1\u907a\u4f1d\u5b50\u518d\u69cb\u6210\u306b\u3088\u308b\u4f4e\u5206\u5316\u764c\u3067\u82e5\u5e74\u30fb\u4f53\u5e79\u6b63\u4e2d\u597d\u767a\u3001abrupt keratinization\u3068NUT\u30bf\u30f3\u30d1\u30af\u967d\u6027\u304c\u7279\u5fb4\u3002", "keyPoints": ["\u5927\u7d30\u80de\u764c: \u8a3a\u65ad\u306f\u9664\u5916\u8a3a\u65ad\u3001\u6458\u51fa\u691c\u4f53\u3067\u306e\u5341\u5206\u306a\u691c\u7d22\u5fc5\u9808", "\u591a\u5f62\u764c: \u7d21\u9318\u7d30\u80de\u764c/\u5de8\u7d30\u80de\u764c\u6210\u5206\u304c10%\u4ee5\u4e0a\u3092\u5360\u3081\u308b\u975e\u5c0f\u7d30\u80de\u764c\u7b49", "NUT\u764c: NUTM1\u518d\u69cb\u6210\u3001\u82e5\u5e74\u3001\u4f53\u5e79\u6b63\u4e2d\u597d\u767a\u3001abrupt keratinization\u3001NUT\u30bf\u30f3\u30d1\u30af\u967d\u6027", "\u553e\u6db2\u817a\u578b\u816b\u760d\u3068\u3057\u3066\u7c98\u6db2\u8868\u76ae\u764c\u3001\u817a\u69d8\u56ca\u80de\u764c\u304c\u3042\u308b"]}, {"heading": "\u795e\u7d4c\u5185\u5206\u6ccc\u816b\u760d\u30fb\u795e\u7d4c\u5185\u5206\u6ccc\u764c", "summary": "\u7b2c9\u7248\u3067\u306f\u80ba\u795e\u7d4c\u5185\u5206\u6ccc\u7cfb\u65b0\u751f\u7269\u3068\u3057\u3066\u3001\u795e\u7d4c\u5185\u5206\u6ccc\u816b\u760d\uff08\u5b9a\u578b\u30ab\u30eb\u30b7\u30ce\u30a4\u30c9\u30fb\u7570\u578b\u30ab\u30eb\u30b7\u30ce\u30a4\u30c9\uff09\u3068\u795e\u7d4c\u5185\u5206\u6ccc\u764c\uff08\u5c0f\u7d30\u80de\u764c\u30fb\u5927\u7d30\u80de\u795e\u7d4c\u5185\u5206\u6ccc\u764c\uff09\u306b\u5206\u985e\u3055\u308c\u308b\u3002\u30ab\u30eb\u30b7\u30ce\u30a4\u30c9\u306f\u6838\u5206\u88c2\u6570\u3068\u58ca\u6b7b\u306e\u6709\u7121\u3067\u9451\u5225\u3057\u3001\u5c0f\u7d30\u80de\u764c\u30fb\u5927\u7d30\u80de\u795e\u7d4c\u5185\u5206\u6ccc\u764c\u306f\u6838\u5206\u88c2\u50cf2mm\u00b2\u3042\u305f\u308a10\u500b\u8d85\u304c\u5b9a\u7fa9\u306b\u542b\u307e\u308c\u308b\u3002\u514d\u75ab\u67d3\u8272\u306fSynaptophysin\u3001Chromogranin A\u3001CD56\u3001INSM1\u3092\u7528\u3044\u308b\u3002", "keyPoints": ["\u5b9a\u578b\u30ab\u30eb\u30b7\u30ce\u30a4\u30c9: \u6838\u5206\u88c22mm\u00b2\u3042\u305f\u308a2\u500b\u4ee5\u4e0b\u3001\u58ca\u6b7b\u306a\u3057", "\u7570\u578b\u30ab\u30eb\u30b7\u30ce\u30a4\u30c9: \u6838\u5206\u88c22mm\u00b2\u3042\u305f\u308a2\u301c10\u500b\u3001\u307e\u305f\u306f\u58ca\u6b7b\u3042\u308a", "\u5c0f\u7d30\u80de\u764c\u30fb\u5927\u7d30\u80de\u795e\u7d4c\u5185\u5206\u6ccc\u764c: \u6838\u5206\u88c22mm\u00b2\u3042\u305f\u308a10\u500b\u8d85", "\u795e\u7d4c\u5185\u5206\u6ccc\u30de\u30fc\u30ab\u30fc: Synaptophysin\u3001Chromogranin A\u3001CD56\u3001INSM1", "\u5c0f\u7d30\u80de\u764c\u306f\u55ab\u7159\u95a2\u9023\u304c\u5f37\u304f\u7537\u6027\u512a\u4f4d\u3001\u65e9\u671f\u304b\u3089\u30ea\u30f3\u30d1\u7bc0\u30fb\u9060\u9694\u8ee2\u79fb\u3092\u304d\u305f\u3059"]}, {"heading": "\u80ba\u306e\u826f\u6027\u816b\u760d\u3068\u8ee2\u79fb\u6027\u80ba\u816b\u760d", "summary": "\u7d30\u6c17\u7ba1\u652f\u817a\u816b\uff08\u7dda\u6bdb\u6027\u7c98\u6db2\u7d50\u7bc0\u6027\u4e73\u982d\u72b6\u816b\u760d\uff09\u306fBRAF V600E\u5909\u7570\u3092\u4f34\u3046\u3053\u3068\u304c\u3042\u308a\u6d78\u6f64\u6027\u7c98\u6db2\u6027\u817a\u764c\u3068\u306e\u9451\u5225\u3092\u8981\u3059\u308b\u3002\u786c\u5316\u6027\u80ba\u80de\u4e0a\u76ae\u816b\u306f\u5145\u5b9f\u6027\u30fb\u4e73\u982d\u72b6\u30fb\u786c\u5316\u6027\u30fb\u51fa\u8840\u6027\u30d1\u30bf\u30fc\u30f3\u304c\u6df7\u5728\u3059\u308b\u817a\u816b\u76f8\u5f53\u75c5\u5909\u3067\u4e2d\u5e74\u5973\u6027\u306b\u597d\u767a\u3059\u308b\u3002\u8ee2\u79fb\u6027\u80ba\u816b\u760d\u306f\u81e8\u5e8a\u7d4c\u904e\u3068\u514d\u75ab\u67d3\u8272\uff08\u4f8b: \u30b5\u30a4\u30c8\u30b1\u30e9\u30c1\u30f37/20\u30d1\u30bf\u30fc\u30f3\uff09\u3067\u539f\u767a\u5de3\u3068\u306e\u6bd4\u8f03\u3092\u884c\u3046\u3002", "keyPoints": ["\u7d30\u6c17\u7ba1\u652f\u817a\u816b: \u4e8c\u76f8\u6027\u3001BRAF V600E\u5909\u7570\u4f8b\u3042\u308a", "\u786c\u5316\u6027\u80ba\u80de\u4e0a\u76ae\u816b: \u5973\u6027\u300140\u6b73\u4ee3\u597d\u767a\u30014\u30d1\u30bf\u30fc\u30f3\u6df7\u5728", "\u5927\u8178\u764c\u80ba\u8ee2\u79fb\u306fCK7\u9670\u6027/CK20\u967d\u6027\u304c\u5178\u578b\uff08\u80ba\u817a\u764c\u306f\u591a\u304f\u304cCK7\u967d\u6027/CK20\u9670\u6027\uff09"]}, {"heading": "\u30c9\u30e9\u30a4\u30d0\u30fc\u907a\u4f1d\u5b50\u3068\u30d0\u30a4\u30aa\u30de\u30fc\u30ab\u30fc\u691c\u67fb", "summary": "IV\u671f\u975e\u5c0f\u7d30\u80de\u80ba\u764c\u3067\u306f\u30c9\u30e9\u30a4\u30d0\u30fc\u907a\u4f1d\u5b50\u7570\u5e38\u306e\u6709\u7121\u3067\u6cbb\u7642\u65b9\u91dd\u304c\u5927\u304d\u304f\u7570\u306a\u308b\u3002\u30c9\u30e9\u30a4\u30d0\u30fc\u907a\u4f1d\u5b50\u9670\u6027\u4f8b\u3067\u306fPD-L1\u767a\u73fe\u7387\uff0850%\u4ee5\u4e0a\uff0f1\u301c49%\uff0f1%\u672a\u6e80\uff09\u30673\u7fa4\u306b\u5206\u3051\u3066\u6cbb\u7642\u65b9\u91dd\u3092\u6c7a\u5b9a\u3059\u308b\u3002\u672c\u90a6\u3067\u306e\u983b\u5ea6\u306fEGFR\uff1eKRAS\uff1eALK\u306e\u9806\u3067\u3001\u78ba\u7acb\u3055\u308c\u305f\u5206\u5b50\u6a19\u7684\u6cbb\u7642\u5bfe\u8c61\u3068\u3057\u3066EGFR\u30fbALK\u30fbROS1\u30fbBRAF\u304c\u3042\u308b\u3002", "keyPoints": ["PD-L1\u767a\u73fe\u7387\u306e3\u533a\u5206: 50%\u4ee5\u4e0a\u30011\u301c49%\u30011%\u672a\u6e80", "\u672c\u90a6\u306e\u30c9\u30e9\u30a4\u30d0\u30fc\u907a\u4f1d\u5b50\u983b\u5ea6: EGFR\uff1eKRAS\uff1eALK\uff1e\u305d\u306e\u4ed6\u5e0c\u5c11", "\u5206\u5b50\u6a19\u7684\u6cbb\u7642\u78ba\u7acb\u4f8b: EGFR\u3001ALK\u3001ROS1\u3001BRAF"]}, {"heading": "\u30de\u30eb\u30c1\u30d7\u30ec\u30c3\u30af\u30b9\u907a\u4f1d\u5b50\u691c\u67fb\uff08CDx\uff09", "summary": "2019\u5e74\u306bOncomine DX Target Test\u304c\u764c\u907a\u4f1d\u5b50\u30d1\u30cd\u30eb\u691c\u67fb\u3068\u3057\u3066\u4fdd\u967a\u53ce\u8f09\u3055\u308c\u3066\u4ee5\u6765\u3001\u30b7\u30f3\u30b0\u30eb\u30d7\u30ec\u30c3\u30af\u30b9\u691c\u67fb\u304b\u3089\u30de\u30eb\u30c1\u30d7\u30ec\u30c3\u30af\u30b9\u691c\u67fb\u3078\u4e3b\u6d41\u304c\u79fb\u884c\u3057\u305f\u3002\u73fe\u5728\u627f\u8a8d\u3055\u308c\u3066\u3044\u308b\u30de\u30eb\u30c1\u30d7\u30ec\u30c3\u30af\u30b9CDx\u306fOncomine DX Target Test\u3001AmoyDx\u3001Oncomine\u30b3\u30f3\u30d1\u30af\u30c8\u30d1\u30cd\u30eb\u3001GenMineTOP\uff08\u65e7MINtS\uff09\u306e4\u7a2e\u3067\u3001\u5404\u691c\u67fb\u306f\u6e2c\u5b9a\u6cd5\u30fb\u89e3\u6790\u53ef\u80fd\u691c\u4f53\u30fb\u63a8\u5968\u816b\u760d\u7d30\u80de\u542b\u6709\u5272\u5408\u30fb\u6700\u5c0f\u691c\u51fa\u611f\u5ea6\u304c\u7570\u306a\u308b\u3002", "keyPoints": ["Oncomine DX Target Test: NGS\u6cd5\u3001\u816b\u760d\u7d30\u80de\u542b\u6709\u5272\u540830%\u4ee5\u4e0a\u63a8\u5968\u3001\u611f\u5ea64\u301c7%", "AmoyDx: \u30ea\u30a2\u30eb\u30bf\u30a4\u30e0PCR\u6cd5\u3001\u816b\u760d\u7d30\u80de\u542b\u6709\u5272\u540820%\u4ee5\u4e0a\u63a8\u5968\u3001\u611f\u5ea6\u7d041%", "Oncomine\u30b3\u30f3\u30d1\u30af\u30c8\u30d1\u30cd\u30eb\u30fbGenMineTOP: NGS\u6cd5\u3001\u816b\u760d\u7d30\u80de\u542b\u6709\u5272\u540810%\u4ee5\u4e0a\u63a8\u5968\u3001\u611f\u5ea60.1\u301c0.5%", "\u30b3\u30f3\u30d1\u30cb\u30aa\u30f3\u8a3a\u65ad\u5bfe\u8c61\u306f\u691c\u67fb\u3054\u3068\u306b\u7570\u306a\u308b\uff08\u4f8b: KRAS G12C\u306fAmoyDx\u30fb\u30b3\u30f3\u30d1\u30af\u30c8\u30d1\u30cd\u30eb\u306e\u307f\u5bfe\u5fdc\u3001Oncomine\u306f\u53c2\u8003\u60c5\u5831\uff09", "\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\u63a8\u5968: \u691c\u67fb\u9805\u76ee\u306b\u512a\u5148\u9806\u4f4d\u3092\u3064\u3051\u305a\u540c\u6642\u306b\u65bd\u884c\u3059\u308b\u3053\u3068\u3092\u5f37\u304f\u63a8\u5968\uff08\u63a8\u5968\u5ea61\u3001\u30a8\u30d3\u30c7\u30f3\u30b9C\uff09", "GenMineTOP(\u65e7MINtS)\u306f2024\u5e7411\u6708\u627f\u8a8d\u306e\u305f\u30812024\u5e74\u7248\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\u306b\u306f\u672a\u63b2\u8f09"]}, {"heading": "\u75c5\u7406\u691c\u4f53\u306e\u53d6\u308a\u6271\u3044\u3068\u907a\u4f1d\u5b50\u691c\u67fb\u306e\u8cea\u4fdd\u8a3c", "summary": "\u907a\u4f1d\u5b50\u691c\u67fb\u306e\u6210\u529f\u306b\u306f\u9069\u5207\u306a\u30db\u30eb\u30de\u30ea\u30f3\u56fa\u5b9a\u3068\u5341\u5206\u306a\u816b\u760d\u7d30\u80de\u91cf\u306e\u78ba\u4fdd\u304c\u4e0d\u53ef\u6b20\u3067\u3042\u308b\u3002\u691c\u4f53\u63a1\u53d6\u304b\u3089\u56fa\u5b9a\u958b\u59cb\u307e\u3067\u306e\u865a\u8840\u6642\u9593\uff08\u51b7\u5374\u8840\u6642\u9593\uff09\u3092\u77ed\u7e2e\u3057\u300110%\u4e2d\u6027\u7de9\u885d\u30db\u30eb\u30de\u30ea\u30f3\u3067\u7d44\u7e54\u91cf\u306e10\u500d\u91cf\u4ee5\u4e0a\u3092\u7528\u3044\u3066\u56fa\u5b9a\u3059\u308b\u3002\u56fa\u5b9a\u6642\u9593\u306f\u751f\u691c\u691c\u4f536\u301c24\u6642\u9593\u3001\u624b\u8853\u691c\u4f5324\u301c48\u6642\u9593\u304c\u76ee\u5b89\u3068\u3055\u308c\u308b\u3002", "keyPoints": ["\u63a1\u53d6\u304b\u3089\u56fa\u5b9a\u958b\u59cb\u307e\u30671\u6642\u9593\u4ee5\u5185\u3001\u9045\u304f\u3068\u30823\u6642\u9593\u4ee5\u5185\u304c\u671b\u307e\u3057\u3044", "\u5ba4\u6e29\u653e\u7f6e\u306f30\u5206\u4ee5\u5185", "10%\u4e2d\u6027\u7de9\u885d\u30db\u30eb\u30de\u30ea\u30f3\u3001\u7d44\u7e54\u91cf\u306e10\u500d\u91cf\u4ee5\u4e0a\u3092\u4f7f\u7528", "\u56fa\u5b9a\u6642\u9593: \u751f\u691c\u691c\u4f536\u301c24\u6642\u9593\u3001\u624b\u8853\u691c\u4f5324\u301c48\u6642\u9593", "\u786c\u7d44\u7e54\u30fb\u77f3\u7070\u5316\u7d44\u7e54\u306f\u9178\u8131\u7070\u3092\u907f\u3051EDTA\u8131\u7070\u3092\u884c\u3046", "FFPE\u30d6\u30ed\u30c3\u30af\u306f\u63a1\u53d6\u5f8c3\u5e74\u4ee5\u5185\u306e\u3082\u306e\u3092\u539f\u5247\u4f7f\u7528\u3001\u3067\u304d\u308b\u3060\u3051\u65b0\u3057\u3044\u691c\u4f53\u3092\u9078\u629e", "\u907a\u4f1d\u5b50\u89e3\u6790\u7528DNA/RNA\u62bd\u51fa\u306b\u306f\u7d042,000\u500b\u306e\u816b\u760d\u7d30\u80de\u304c\u5fc5\u8981\u3068\u3055\u308c\u308b"]}], "examPoints": ["\u80ba\u764c\u53d6\u6271\u898f\u7d04\u7b2c9\u7248\u3067\u306f\u4e0a\u76ae\u5185\u817a\u764c\u304c\u6d78\u6f64\u6027\u817a\u764c\u306e\u5bfe\u6982\u5ff5\u3068\u3057\u3066\u72ec\u7acb\u5206\u985e\u3055\u308c\u305f", "\u6d78\u6f64\u6027\u975e\u7c98\u6db2\u6027\u817a\u764c\u306e\u30b0\u30ec\u30fc\u30c9\u5206\u985e: \u9ad8\u60aa\u6027\u5ea6\u6210\u5206(\u5145\u5b9f\u578b\u30fb\u5fae\u5c0f\u4e73\u982d\u578b\u30fb\u8907\u96d1\u817a\u5f62\u6210\u578b)\u304c20%\u4ee5\u4e0a\u3067G3", "\u817a\u764c\u30de\u30fc\u30ab\u30fc: TTF-1\u30fb\u30ca\u30d7\u30b7\u30f3A\u3001\u6241\u5e73\u4e0a\u76ae\u30de\u30fc\u30ab\u30fc: P40\u30fbCK5/6", "\u5b9a\u578b/\u7570\u578b\u30ab\u30eb\u30b7\u30ce\u30a4\u30c9\u306e\u9451\u5225\u306f\u6838\u5206\u88c2\u6570(2\u500b\u4ee5\u4e0b vs 2\u301c10\u500b)\u3068\u58ca\u6b7b\u306e\u6709\u7121", "\u5c0f\u7d30\u80de\u764c\u30fb\u5927\u7d30\u80de\u795e\u7d4c\u5185\u5206\u6ccc\u764c\u306f\u6838\u5206\u88c22mm\u00b2\u3042\u305f\u308a10\u500b\u8d85", "NUT\u764c\u306fNUTM1\u518d\u69cb\u6210\u3001abrupt keratinization\u3001NUT\u30bf\u30f3\u30d1\u30af\u967d\u6027", "IV\u671f\u975e\u5c0f\u7d30\u80de\u80ba\u764c\u3067\u306fPD-L1\u767a\u73fe\u738750%\u4ee5\u4e0a/1\u301c49%/1%\u672a\u6e80\u30673\u7fa4\u306b\u5206\u3051\u3066\u6cbb\u7642\u65b9\u91dd\u6c7a\u5b9a", "\u30de\u30eb\u30c1\u30d7\u30ec\u30c3\u30af\u30b9CDx\u691c\u67fb\u306f\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\u3067\u512a\u5148\u9806\u4f4d\u3092\u3064\u3051\u305a\u540c\u6642\u65bd\u884c\u304c\u5f37\u304f\u63a8\u5968(\u63a8\u5968\u5ea61\u3001\u30a8\u30d3\u30c7\u30f3\u30b9C)", "\u691c\u4f53\u63a1\u53d6\u304b\u3089\u56fa\u5b9a\u958b\u59cb\u307e\u30671\u6642\u9593\u4ee5\u5185(\u9045\u304f\u3068\u30823\u6642\u9593\u4ee5\u5185)\u300110%\u4e2d\u6027\u7de9\u885d\u30db\u30eb\u30de\u30ea\u30f3\u306710\u500d\u91cf\u4ee5\u4e0a\u56fa\u5b9a", "\u907a\u4f1d\u5b50\u691c\u67fb\u306b\u306f\u63a8\u5968\u816b\u760d\u7d30\u80de\u542b\u6709\u5272\u5408(\u691c\u67fb\u3054\u3068\u306b10\u301c30%)\u3068\u5341\u5206\u306a\u816b\u760d\u7d30\u80de\u7d76\u5bfe\u6570\u304c\u5fc5\u8981"], "linkedCurriculumNos": [17, 18, 19, 20, 33]}, {"no": 4, "title": "\u80ba\u764c\u5916\u79d1\u306e\u57fa\u672c", "lecturer": "\u6751\u5ddd(\u95a2\u897f\u533b\u79d1\u5927\u5b66\u547c\u5438\u5668\u5916\u79d1)", "sections": [{"heading": "\u624b\u8853\u9069\u5fdc\u306e\u8a55\u4fa1\uff08\u547c\u5438\u6a5f\u80fd\u30fb\u5faa\u74b0\u6a5f\u80fd\uff09", "summary": "\u624b\u8853\u9069\u5fdc\u306f\u547c\u5438\u6a5f\u80fd\u30fb\u5faa\u74b0\u6a5f\u80fd\u8a55\u4fa1\u3001\u5b89\u9759\u6642\u5fc3\u96fb\u56f3\u3001\u8840\u6db2\u751f\u5316\u5b66\u6240\u898b\u3001\u5e74\u9f62\u306a\u3069\u3092\u7dcf\u5408\u7684\u306b\u691c\u8a0e\u3057\u3066\u6c7a\u5b9a\u3059\u308b\u3053\u3068\u304c\u5f37\u304f\u63a8\u5968\u3055\u308c\u308b\u3002\u547c\u5438\u6a5f\u80fd\u8a55\u4fa1\u306f\u30b9\u30d1\u30a4\u30ed\u30e1\u30c8\u30ea\u30fc\u3068\u80ba\u8840\u6d41\u30b7\u30f3\u30c1\u30b0\u30e9\u30d5\u30a3\u306b\u3088\u308b\u80ba\u533a\u57df\u6570\u3092\u7528\u3044\u305f\u4e88\u6e2c\u8853\u5f8c\u80ba\u6a5f\u80fd\u304c\u8853\u5f8c\u5b9f\u6e2c\u5024\u3068\u826f\u597d\u306a\u76f8\u95a2\u3092\u793a\u3059\u3002", "keyPoints": ["CQ1\uff1a\u624b\u8853\u9069\u5fdc\u306f\u547c\u5438\u6a5f\u80fd\u30fb\u5faa\u74b0\u6a5f\u80fd\u30fb\u5b89\u9759\u6642\u5fc3\u96fb\u56f3\u30fb\u8840\u6db2\u751f\u5316\u5b66\u6240\u898b\u30fb\u5e74\u9f62\u3092\u7dcf\u5408\u8a55\u4fa1\uff08\u5f37\u304f\u63a8\u5968\uff09", "\u547c\u5438\u6a5f\u80fd\u691c\u67fb\uff1a\u30b9\u30d1\u30a4\u30ed\u30e1\u30c8\u30ea\u30fc\u3001\u80ba\u8840\u6d41\u30b7\u30f3\u30c1\u30b0\u30e9\u30d5\u30a3", "\u5faa\u74b0\u6a5f\u80fd\u691c\u67fb\uff1a\u5b89\u9759\u6642\u5fc3\u96fb\u56f3\u3001\u5fc5\u8981\u306b\u5fdc\u3058\u8ca0\u8377\u8a66\u9a13\u30fb\u5fc3\u30a8\u30b3\u30fc", "\u4e88\u6e2c\u8853\u5f8c%1\u79d2\u91cf \uff1d \u8853\u524d%1\u79d2\u91cf \u00d7\uff08\u5168\u533a\u57df\u6570\uff0d\u5207\u9664\u533a\u57df\u6570\uff09\uff0f\u5168\u533a\u57df\u6570", "\u80ba\u533a\u57df\u6570\u3092\u7528\u3044\u305f\u4e88\u6e2c\u8853\u5f8c\u80ba\u6a5f\u80fd\u306f\u8853\u5f8c\u5b9f\u6e2c\u5024\u3068\u826f\u597d\u306a\u76f8\u95a2\u3092\u793a\u3059"]}, {"heading": "\u8853\u5f0f\u306e\u5206\u985e\uff08\u80ba\u764c\u53d6\u6271\u3044\u898f\u7d04\uff09", "summary": "\u80ba\u764c\u306e\u8853\u5f0f\u306f\u80ba\u5168\u6458\u30fb\u80ba\u8449\u5207\u9664\u30fb\u533a\u57df\u5207\u9664\u30fb\u90e8\u5206\u5207\u9664\u306b\u5927\u5225\u3055\u308c\u3001\u533a\u57df\u5207\u9664\u4ee5\u4e0a\u3092\u89e3\u5256\u5b66\u7684\u5207\u9664\u3001\u90e8\u5206\u5207\u9664\u3092\u975e\u89e3\u5256\u5b66\u7684\u5207\u9664\u3068\u547c\u3076\u3002\u5c40\u6240\u9032\u884c\u4f8b\u3067\u306f\u80ba\u5168\u6458\u3001\u5c0f\u578b\u80ba\u764c\u3067\u306f\u6a5f\u80fd\u6e29\u5b58\u3092\u76ee\u6307\u3057\u305f\u7e2e\u5c0f\u624b\u8853\uff08sublobar resection\uff1a\u533a\u57df\u5207\u9664\u30fb\u6954\u72b6\u90e8\u5206\u5207\u9664\uff09\u304c\u9078\u629e\u3055\u308c\u308b\u3002", "keyPoints": ["\u57fa\u672c\u8853\u5f0f\uff1a\u80ba\u5168\u6458\u3001\u80ba\u8449\u5207\u9664\u3001\u533a\u57df\u5207\u9664\u3001\u90e8\u5206\u5207\u9664\u3001\u6b8b\u80ba\u5168\u6458\u3001\u6b8b\u80ba\u8449\u5207\u9664\u3001\u6c17\u7ba1\u652f\u5f62\u6210\u8853", "\u533a\u57df\u5207\u9664\u4ee5\u4e0a\uff1d\u89e3\u5256\u5b66\u7684\u5207\u9664\u3001\u90e8\u5206\u5207\u9664\uff1d\u975e\u89e3\u5256\u5b66\u7684\u5207\u9664", "\u8ca0\u8377\u8853\u5f0f\uff1a\u96a3\u63a5\u81d3\u5668\u5408\u4f75\u5207\u9664\u3001\u80f8\u819c\u80ba\u5168\u6458\u3001\u6c17\u7ba1\u6c17\u7ba1\u652f\u5f62\u6210\u3001\u8840\u7ba1\u5f62\u6210\u306a\u3069", "\u305d\u306e\u4ed6\uff1a\u8a66\u9a13\u958b\u80f8\u3001\u8a66\u9a13\u5207\u9664\u3001\u80f8\u8154\u93e1\u30fb\u7e26\u9694\u93e1\u691c\u67fb\u306a\u3069", "\u5c40\u6240\u9032\u884c\u80ba\u764c\u306b\u306f\u80ba\u5168\u6458\u3001\u5c0f\u578b\u80ba\u764c\u306b\u306f\u7e2e\u5c0f\u624b\u8853\uff08sublobar resection\uff09\u304c\u691c\u8a0e\u3055\u308c\u308b"]}, {"heading": "\u53d6\u6271\u3044\u898f\u7d04\u306e\u8a18\u8f09\u9805\u76ee\uff08PL\u30fbD\u30fbE\u30fbPM\u30fbN\u30fbR\uff09", "summary": "\u53d6\u6271\u3044\u898f\u7d04\u3067\u306f\u80f8\u819c\u6d78\u6f64\uff08PL0\u301c3\uff09\u3001\u80f8\u819c\u64ad\u7a2e\uff08D0\u301c1\uff09\u3001\u80f8\u6c34\uff08E0\u301c1\uff09\u3001\u80f8\u8154\u6d17\u6d44\u7d30\u80de\u8a3a\uff08PLC\uff09\u3001\u80ba\u5185\u8ee2\u79fb\uff08PM0\u301c3\uff09\u3001\u30ea\u30f3\u30d1\u7bc0\u8ee2\u79fb\uff08N0\u301c3\u3001N2\u306fN2a/N2b\u306b\u7d30\u5206\uff09\u3001\u6839\u6cbb\u5ea6\uff08R0\u301c2\u3001RX\uff09\u306a\u3069\u3092\u8a18\u8f09\u3059\u308b\u3002PL1\u301c2\u306f\u816b\u760d\u5f843cm\u4ee5\u4e0b\u3067\u3082T2a\u3001PL3\u306f\u6d78\u6f64\u81d3\u5668\u306b\u3088\u308aT3\u307e\u305f\u306fT4\u3068\u306a\u308b\u3002", "keyPoints": ["PL0\u301c3\uff1a\u80f8\u819c\u6d78\u6f64\u306e\u7a0b\u5ea6\u3002PL1\u301c2\u306f\u816b\u760d\u5f84\u306b\u304b\u304b\u308f\u3089\u305aT2a\u3001PL3\u306f\u6d78\u6f64\u81d3\u5668\u306b\u3088\u308aT3/T4", "\u8449\u9593PL3\uff1a\u304c\u3093\u7d44\u7e54\u304c\u8089\u773c\u7684\u306b\u80ba\u8449\u3092\u8d85\u3048\u3066\u96a3\u63a5\u80ba\u8449\u306b\u53ca\u3076\u5834\u5408\uff08\u4ed6\u81d3\u5668\u6d78\u6f64\u306a\u3057\u306e\u5834\u5408\u306f\u5404T\u898f\u5b9a\u306b\u5f93\u3046\uff09", "D0\u301c1\uff1a\u80f8\u819c\u64ad\u7a2e\u3001E0\u301c1\uff1a\u80f8\u6c34\uff08\u91cf\u30fb\u6027\u72b6\u3082\u8a18\u8f09\uff09\u3001PLC\u306f\u958b\u80f8\u6642\u30fb\u9589\u80f8\u6642\u306b\u8a18\u8f09", "PM0\u301c3\uff1a\u80ba\u5185\u8ee2\u79fb\u3002PM1\uff1d\u540c\u4e00\u80ba\u8449\u3001PM2\uff1d\u540c\u5074\u591a\u80ba\u8449\u3001PM 3\u7a4d\u30d2\u30b9\u30c8\u30b0\u30e9\u30e0(DVH)\u3068V20", "summary": "\u653e\u5c04\u7dda\u80ba\u81d3\u708e\u306e\u4e88\u6e2c\u306b\u306fDVH\u89e3\u6790\u304c\u7528\u3044\u3089\u308c\u300120Gy\u4ee5\u4e0a\u7167\u5c04\u3055\u308c\u308b\u6b63\u5e38\u80ba\u4f53\u7a4d\u306e\u5272\u5408\uff08V20\uff09\u304c\u30b0\u30ec\u30fc\u30c92\u4ee5\u4e0a\u306e\u80ba\u81d3\u708e\u767a\u75c7\u3068\u76f8\u95a2\u3059\u308b\u3002V20\u306f\u901a\u5e3835%\u3092\u8d85\u3048\u306a\u3044\u3088\u3046\u6cbb\u7642\u8a08\u753b\u3092\u884c\u3046\u304c\u3001\u53ef\u80fd\u306a\u9650\u308a25\u301c30%\u4ee5\u4e0b\u307e\u3067\u8efd\u6e1b\u3059\u308b\u3053\u3068\u304c\u671b\u307e\u3057\u3044\u3002V5\u3084\u5e73\u5747\u80ba\u7dda\u91cf\u3082\u30d0\u30e9\u30f3\u30b9\u3088\u304f\u4f4e\u6e1b\u3059\u308b\u3053\u3068\u304c\u6c42\u3081\u3089\u308c\u308b\u3002", "keyPoints": ["V20\uff0820Gy\u4ee5\u4e0a\u7167\u5c04\u3055\u308c\u308b\u80ba\u4f53\u7a4d\u5272\u5408\uff09\u304c\u30b0\u30ec\u30fc\u30c92\u4ee5\u4e0a\u80ba\u81d3\u708e\u767a\u75c7\u3068\u76f8\u95a2", "V20\u306f35%\u3092\u8d85\u3048\u306a\u3044\u3088\u3046\u306b\u8a08\u753b\u3001\u5408\u7406\u7684\u306b\u9054\u6210\u53ef\u80fd\u306a\u308925\u301c30%\u4ee5\u4e0b\u304c\u671b\u307e\u3057\u3044", "V5\u30fb\u5e73\u5747\u80ba\u7dda\u91cf\u3082\u4f4e\u6e1b\u304c\u6c42\u3081\u3089\u308c\u308b"]}, {"heading": "\u9ad8\u7cbe\u5ea6\u653e\u5c04\u7dda\u6cbb\u7642(IMRT)\u3068\u5fc3\u81d3\u6709\u5bb3\u4e8b\u8c61", "summary": "IMRT\u306f\u80ba\u764c\u9818\u57df\u3067\u3082\u8fd1\u5e74\u5229\u7528\u304c\u5897\u52a0\u3057\u3066\u304a\u308a\u3001RTOG0617\u306e\u30dd\u30b9\u30c8\u30db\u30c3\u30af\u89e3\u6790\u3067\u306fIMRT\u7fa4\u306e\u30b0\u30ec\u30fc\u30c93\u4ee5\u4e0a\u80ba\u81d3\u708e\u767a\u751f\u7387\u304c3DCRT\u7fa4\u3088\u308a\u6709\u610f\u306b\u4f4e\u304b\u3063\u305f\uff083DCRT 7.9% vs IMRT 3.5%\uff09\u3002\u307e\u305f\u5fc3\u81d3\u5e73\u5747\u7dda\u91cf20Gy\u4ee5\u4e0a\u3067\u5fc3\u30a4\u30d9\u30f3\u30c8\u767a\u751f\u304c\u6709\u610f\u306b\u5897\u52a0\u3057\u3001\u5fc3\u81d3\u7dda\u91cf(V5\u3001V30\u7b49)\u306e\u5897\u52a0\u304c\u5168\u751f\u5b58\u4f4e\u4e0b\u3068\u95a2\u9023\u3059\u308b\u3053\u3068\u304c\u793a\u3055\u308c\u3001\u8fd1\u5e74\u306eIII\u671f\u8a66\u9a13\u30d7\u30ed\u30c8\u30b3\u30fc\u30eb\u3067\u306f\u5fc3\u81d3\u306e\u7dda\u91cf\u5236\u7d04\u3082\u898f\u5b9a\u3055\u308c\u308b\u3088\u3046\u306b\u306a\u3063\u3066\u3044\u308b\u3002", "keyPoints": ["RTOG0617\u30dd\u30b9\u30c8\u30db\u30c3\u30af: \u30b0\u30ec\u30fc\u30c93\u4ee5\u4e0a\u80ba\u81d3\u708e\u306f3DCRT 7.9%\u3001IMRT 3.5%", "\u5fc3\u81d3\u5e73\u5747\u7dda\u91cf20Gy\u4ee5\u4e0a\u3067\u5fc3\u30a4\u30d9\u30f3\u30c8\u767a\u751f\u7387\u304c\u6709\u610f\u306b\u4e0a\u6607", "\u5fc3\u81d3\u306eV5\u30fbV30\u4e0a\u6607\u304cOS\u4f4e\u4e0b\u3068\u95a2\u9023", "III\u671f\u8a66\u9a13\u306e\u6700\u8fd1\u306e\u30d7\u30ed\u30c8\u30b3\u30fc\u30eb\u3067\u306f\u5fc3\u81d3\u306e\u7dda\u91cf\u5236\u7d04\u3082\u898f\u5b9a"]}, {"heading": "\u8133\u3078\u306e\u653e\u5c04\u7dda\u6cbb\u7642\uff08\u5168\u8133\u7167\u5c04\u3068\u5b9a\u4f4d\u653e\u5c04\u7dda\u6cbb\u7642\u306e\u4f7f\u3044\u5206\u3051\uff09", "summary": "\u8133\u7167\u5c04\u306b\u306f\u5168\u8133\u7167\u5c04(WBRT)\u3068\u30d4\u30f3\u30dd\u30a4\u30f3\u30c8\u7167\u5c04\u306e\u5b9a\u4f4d\u653e\u5c04\u7dda\u6cbb\u7642(SRT/SRS)\u304c\u3042\u308b\u30024\u500b\u307e\u3067\u306e\u8133\u8ee2\u79fb\u3092\u5bfe\u8c61\u3068\u3057\u305f\u6bd4\u8f03\u8a66\u9a13\u3067\u306f\u3001SRS\u5358\u72ec\u7fa4\u306fMMSE\u3067\u8a55\u4fa1\u3057\u305f\u8a8d\u77e5\u6a5f\u80fd\u304c2\u5e74\u7d4c\u904e\u6642\u70b9\u3067\u30d7\u30e9\u30c8\u30fc\u3068\u306a\u308b\u4e00\u65b9\u3001WBRT\u4f75\u7528\u7fa4\u3067\u306f2\u5e74\u4ee5\u964d\u306bMMSE\u4f4e\u4e0b\u304c\u76ee\u7acb\u3061\u3001WBRT\u306e\u6669\u671f\u8a8d\u77e5\u6a5f\u80fd\u969c\u5bb3\uff08\u767d\u8cea\u8133\u75c7\u3092\u542b\u3080\uff09\u304c\u793a\u5506\u3055\u308c\u308b\u3002", "keyPoints": ["\u5168\u8133\u7167\u5c04\u306e\u6669\u671f\u526f\u4f5c\u7528: \u8a8d\u77e5\u6a5f\u80fd\u4f4e\u4e0b\uff08MMSE\u4f4e\u4e0b\uff09\u3001\u767d\u8cea\u8133\u75c7", "4\u500b\u307e\u3067\u306e\u8133\u8ee2\u79fb\u3092\u5bfe\u8c61\u3068\u3057\u305f\u6bd4\u8f03\u8a66\u9a13\u3067SRS\u5358\u72ec\u306fWBRT\u4f75\u7528\u3088\u308a2\u5e74\u4ee5\u964d\u306e\u8a8d\u77e5\u6a5f\u80fd\u6e29\u5b58\u306b\u512a\u308c\u308b", "\u767d\u8cea\u5909\u5316\u306f\u6570\u5e74\u5358\u4f4d\u3067\u7de9\u5f90\u306b\u9032\u884c"]}, {"heading": "\u653e\u5c04\u7dda\u6cbb\u7642\u306e\u54c1\u8cea\u7ba1\u7406(QA)", "summary": "2000\u5e74\u4ee3\u524d\u534a\u306b\u5404\u75c5\u9662\u3067\u653e\u5c04\u7dda\u6cbb\u7642\u95a2\u9023\u306e\u533b\u7642\u4e8b\u6545\u304c\u5831\u544a\u3055\u308c\u3001\u88c5\u7f6e\u306e\u54c1\u8cea\u7ba1\u7406\u30fb\u6cbb\u7642\u8a08\u753b\u306e\u76f8\u4e92\u30ec\u30d3\u30e5\u30fc\u30fb\u4eba\u54e1\u914d\u7f6e\u30fb\u624b\u9806\u66f8\u6574\u5099\u306a\u3069\u306e\u54c1\u8cea\u4fdd\u8a3c\u4f53\u5236\u306e\u6574\u5099\u304c\u91cd\u8981\u8996\u3055\u308c\u308b\u3088\u3046\u306b\u306a\u3063\u305f\u3002\u54c1\u8cea\u7ba1\u7406\u306f\u6839\u6cbb\u7167\u5c04\u30fb\u7de9\u548c\u7167\u5c04\u3092\u554f\u308f\u305a\u5168\u3066\u306e\u6cbb\u7642\u304c\u5bfe\u8c61\u3068\u306a\u308b\u3002III\u671f\u975e\u5c0f\u7d30\u80de\u80ba\u764c\u306e\u81e8\u5e8a\u8a66\u9a13\u89e3\u6790\u3067\u306f\u3001\u91cd\u5927\u306a\u9038\u8131(\u30e1\u30b8\u30e3\u30fc\u30d0\u30a4\u30aa\u30ec\u30fc\u30b7\u30e7\u30f3)\u304c2\u56de\u4ee5\u4e0a\u3042\u3063\u305f\u65bd\u8a2d\u3067PFS\u30fbOS\u3068\u3082\u306b\u4f4e\u4e0b\u3059\u308b\u3053\u3068\u304c\u5831\u544a\u3055\u308c\u3066\u304a\u308a\u3001\u54c1\u8cea\u7ba1\u7406\u306f\u5b89\u5168\u6027\u306e\u307f\u306a\u3089\u305a\u6cbb\u7642\u52b9\u679c\u306b\u3082\u5f71\u97ff\u3059\u308b\u3002", "keyPoints": ["\u54c1\u8cea\u7ba1\u7406\u9805\u76ee: \u88c5\u7f6e\u7ba1\u7406\u3001\u6cbb\u7642\u8a08\u753b\u306e\u76f8\u4e92\u30ec\u30d3\u30e5\u30fc\u3001\u4eba\u54e1\u914d\u7f6e\u3001\u624b\u9806\u30fb\u30de\u30cb\u30e5\u30a2\u30eb\u6574\u5099", "\u6839\u6cbb\u7167\u5c04\u30fb\u7de9\u548c\u7167\u5c04\u3092\u554f\u308f\u305a\u5168\u6cbb\u7642\u304c\u54c1\u8cea\u7ba1\u7406\u306e\u5bfe\u8c61", "\u30e1\u30b8\u30e3\u30fc\u30d0\u30a4\u30aa\u30ec\u30fc\u30b7\u30e7\u30f32\u56de\u4ee5\u4e0a\u306e\u65bd\u8a2d\u3067\u306fPFS\u30fbOS\u3068\u3082\u306b\u4f4e\u4e0b\uff08III\u671f\u8a66\u9a13\u306e\u89e3\u6790\uff09"]}], "examPoints": ["I\u301cIIA\u671f\u306e\u6a19\u6e96\u6cbb\u7642\u306f\u624b\u8853\u3001\u624b\u8853\u4e0d\u80fd\u4f8b\u3067\u306fSBRT\uff08\u4f53\u5e79\u90e8\u5b9a\u4f4d\u653e\u5c04\u7dda\u6cbb\u7642\uff09\u304c\u7b2c\u4e00\u9078\u629e", "SBRT\u306f\u901a\u5e38\u7167\u5c04\u306b\u6bd4\u3079\u5c40\u6240\u5236\u5fa1HR0.32\u3001\u5168\u751f\u5b58HR0.53\u3067\u512a\u308c\u308b", "III\u671f\u975e\u5c0f\u7d30\u80de\u80ba\u764c\u306e\u6a19\u6e96\u7684\u653e\u5c04\u7dda\u7dda\u91cf\u306f60Gy\uff08RTOG\u306e\u7dda\u91cf\u6bd4\u8f03\u8a66\u9a13\u3001RTOG0617\u306774Gy\u306f\u5426\u5b9a\uff09", "\u6839\u6cbb\u7167\u5c04\u53ef\u80fd\u4f8b\uff1d\u539f\u767a\u5de3\u30fb\u30ea\u30f3\u30d1\u7bc0\u8ee2\u79fb\u5168\u3066\u306b\u6839\u6cbb\u7dda\u91cf\u7167\u5c04\u53ef\u80fd\u304b\u3064\u6b63\u5e38\u7d44\u7e54\u969c\u5bb3\u3092\u6700\u5c0f\u9650\u306b\u3067\u304d\u308b\u75c7\u4f8b", "V20\uff0820Gy\u4ee5\u4e0a\u7167\u5c04\u3055\u308c\u308b\u80ba\u4f53\u7a4d\u5272\u5408\uff09\u306f35%\u4ee5\u4e0b\u3001\u53ef\u80fd\u306a\u308925\u301c30%\u4ee5\u4e0b\u3092\u76ee\u6a19", "\u4e2d\u67a2\u578b\u75c5\u5909\u3078\u306e\u9ad8\u7dda\u91cfSBRT\u306f\u6c17\u7ba1\u652f\u58ca\u6b7b\u7b49\u306e\u91cd\u7be4\u5408\u4f75\u75c7\u30ea\u30b9\u30af\u304c\u3042\u308a\u5206\u5272\u6cd5\u3092\u5de5\u592b", "IMRT\u306f\u30b0\u30ec\u30fc\u30c93\u4ee5\u4e0a\u80ba\u81d3\u708e\u30923DCRT\u306e7.9%\u304b\u30893.5%\u306b\u4f4e\u6e1b", "\u5fc3\u81d3\u5e73\u5747\u7dda\u91cf20Gy\u4ee5\u4e0a\u3067\u5fc3\u30a4\u30d9\u30f3\u30c8\u5897\u52a0\u3001\u5fc3\u81d3\u7dda\u91cf\u5236\u7d04\u3082III\u671f\u8a66\u9a13\u3067\u898f\u5b9a\u3055\u308c\u3064\u3064\u3042\u308b", "\u5168\u8133\u7167\u5c04\u306e\u6669\u  "ED\uff1a\u9060\u9694\u8ee2\u79fb\uff08\u8133\u30fb\u809d\u30fb\u9aa8\u8ee2\u79fb\u3001\u60aa\u6027\u80f8\u6c34\u30fb\u5fc3\u56a2\u6c34\uff09\u3092\u6709\u3059\u308b"]}, {"heading": "\u9650\u5c40\u578b\u5c0f\u7d30\u80de\u80ba\u304c\u3093(LD-SCLC)\u306e\u6a19\u6e96\u6cbb\u7642", "summary": "\u81e8\u5e8a\u75c5\u671f1\u301c2a\u671f\u304b\u3064N0\u3067\u624b\u8853\u53ef\u80fd\u306a\u3089\u80ba\u8449\u5207\u9664\u4ee5\u4e0a\u306e\u5916\u79d1\u6cbb\u7642\uff0b\u8853\u5f8c\u85ac\u7269\u7642\u6cd5\uff08\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3+\u30a8\u30c8\u30dd\u30b7\u30c9\u3001\u307e\u305f\u306f\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3+\u30a4\u30ea\u30ce\u30c6\u30ab\u30f3\uff09\u3092\u884c\u3046\u3002\u305d\u308c\u3092\u8d85\u3048\u308b\u9032\u884c\u4f8b\u3067\u306fPS0-2\u3067\u5316\u5b66\u653e\u5c04\u7dda\u7642\u6cd5\uff08\u540c\u6642\u4f75\u7528\u65e9\u671f\u3001\u52a0\u901f\u904e\u5206\u5272\u7167\u5c0445Gy/30\u56de/3\u9031\u9593\u304c\u63a8\u5968\uff09\u304c\u6a19\u6e96\u3067\u3001CQ7\u3067\u306f\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3+\u30a8\u30c8\u30dd\u30b7\u30c9\u3068\u653e\u5c04\u7dda\u306e\u540c\u6642\u4f75\u7528\u304c\u7b2c\u4e00\u9078\u629e\u3001\u814e\u6a5f\u80fd\u4f4e\u4e0b\u30fb\u9ad8\u9f62\u8005\u3067\u306f\u30ab\u30eb\u30dc\u30d7\u30e9\u30c1\u30f3+\u30a8\u30c8\u30dd\u30b7\u30c9\u304c\u9078\u629e\u80a2\u3068\u306a\u308b\u3002", "keyPoints": ["\u80ba\u8449\u5207\u9664\u4ee5\u4e0a\u304c\u90e8\u5206\u5207\u9664\u3088\u308a\u751f\u5b58\u826f\u597d\uff08CQ1\uff09", "\u5b8c\u5168\u5207\u9664\u4f8b\u8853\u5f8c\u85ac\u7269\u7642\u6cd5\uff1a\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3+\u30a8\u30c8\u30dd\u30b7\u30c9 or \u30b7\u30b9\u30d7\u30e9\u30c1\u30f3+\u30a4\u30ea\u30ce\u30c6\u30ab\u30f3\uff08JCOG9101\u3001JCOG1205/06\uff09", "\u5316\u5b66\u653e\u5c04\u7dda\u7642\u6cd5\u306f\u540c\u6642\u4f75\u7528\uff08\u65e9\u671f\u30011\u30b5\u30a4\u30af\u30eb\u76ee\u304b\u3089\u653e\u5c04\u7dda\u958b\u59cb\uff09\u304c\u6700\u3082\u63a8\u5968", "\u653e\u5c04\u7dda\u306f\u52a0\u901f\u904e\u5206\u5 \u79d1\u7684\u4ecb\u5165", "\u6709\u75c7\u72b6\u9aa8\u8ee2\u79fb\u306b\u306f\u653e\u5c04\u7dda\u6cbb\u7642\u3092\u5f37\u304f\u63a8\u5968\u3001\u75bc\u75db\u6539\u5584\u738750\u301c80%", "\u9aa8\u4fee\u98fe\u85ac\uff08\u85ac\u7269\u7642\u6cd5\uff09\uff1d\u30be\u30ec\u30c9\u30ed\u30f3\u9178\u3001\u30c7\u30ce\u30b9\u30de\u30d6", "\u75c5\u7684\u9aa8\u6298\u30ea\u30b9\u30af\u304c\u9ad8\u3044\u75c5\u5909\u30fb\u810a\u9ac4\u5727\u8feb\u3092\u4f34\u3046\u810a\u690e\u8ee2\u79fb\u3082\u653e\u5c04\u7dda\u6cbb\u7642\u306e\u91cd\u8981\u306a\u9069\u5fdc"]}, {"heading": "\u9aa8\u8ee2\u79fb\u3078\u306e\u7167\u5c04\u6cd5", "summary": "\u6709\u75c7\u72b6\u9aa8\u8ee2\u79fb\u306b\u306f20Gy/5\u56de\u300130Gy/10\u56de\u30018Gy\u5358\u56de\u306a\u3069\u306e\u901a\u5e38\u7167\u5c04\u304c\u5e83\u304f\u884c\u308f\u308c\u3001\u75bc\u75db\u7de9\u548c\u52b9\u679c\u306f\u5206\u5272\u7167\u5c04\u3068\u5358\u56de\u7167\u5c04\u3067\u5dee\u304c\u306a\u3044\u304c\u3001\u5358\u56de\u7167\u5c04\u306f\u518d\u7167\u5c04\u7387\u304c\u9ad8\u3044\u3002\u8fd1\u5e74\u306f\u810a\u690e\u8ee2\u79fb\u30fb\u30aa\u30ea\u30b4\u8ee2\u79fb\u306b\u5bfe\u3059\u308b\u5b9a\u4f4d\u653e\u5c04\u7dda\u6cbb\u7642\uff08\u4f53\u5e79\u90e8\u5b9a\u4f4d\u653e\u5c04\u7dda\u6cbb\u7642\uff09\u3082\u666e\u53ca\u3057\u3066\u3044\u308b\u304c\u3001\u901a\u5e38\u7167\u5c04\u306b\u5bfe\u3059\u308b\u75bc\u75db\u7de9\u548c\u52b9\u679c\u306e\u512a\u8d8a\u6027\u306e\u30a8\u30d3\u30c7\u30f3\u30b9\u306f\u9650\u5b9a\u7684\u3067\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\u3067\u306f\u5f31\u3044\u63a8\u5968\u306b\u3068\u3069\u307e\u308b\u3002", "keyPoints": ["\u901a\u5e38\u7167\u5c04\u306e\u4ee3\u8868\u4f8b: 20Gy/5\u56de\u300130Gy/10\u56de\u30018Gy\u5358\u56de", "\u75bc\u75db\u7de9\u548c\u52b9\u679c\u306f\u5206\u5272\u30fb\u5358\u56de\u3067\u5dee\u306f\u306a\u3044\u304c\u5358\u56de\u306f\u518d\u7167\u5c04\u7387\u304c\u9ad8\u3044", "\u5b9a\u4f4d\u653e\u5c04\u7dda\u6cbb\u7642(\u9aa8\u30fb\u30aa\u30ea\u30b4\u8ee2\u79fb)\u306f\u75bc\u75db\u7de9\u548c\u3067\u901a\u5e38\u7167\u5c04\u306b\u512a\u8d8a\u3059\u308b\u30a8\u30d3\u30c7\u30f3\u30b9\u306f\u9650\u5b9a\u7684\u3001\u30ac\u30a4\u30c9\u30e9\u30a4\u30f3\u3067\u5f31\u3044\u63a8\u5968"]}, {"heading": "\u9aa8\u8ee2\u79fb\uff1a\u4e88\u9632\u7684\u4ecb\u5165\u3068\u30ea\u30b9\u30af\u8a55\u4fa1\u30b9\u30b3\u30a2", "summary": "\u810a\u9ac4\u5727\u8feb\u3092\u4f34\u3046\u810a\u690e\u8ee2\u79fb\u3067\u306f\u6b69\u884c\u53ef\u80fd\u306a\u6bb5\u968e\u3067\u306e\u6cbb\u7642\u304c\u6b69\u884c\u6a5f\u80fd\u7dad\u6301\u306b\u91cd\u8981\u3067\u3042\u308a\u3001\u5b8c\u5168\u9ebb\u75fa\u5f8c\u306e\u6a5f\u80fd\u56de\u5fa9\u306f\u56f0\u96e3\u3067\u3042\u308b\u3002\u75c5\u7684\u9aa8\u6298\u30ea\u30b9\u30af\u8a55\u4fa1\u306b\u306fMirels\u30b9\u30b3\u30a2\uff08\u90e8\u4f4d\u30fb\u75db\u307f\u30fb\u9aa8\u8ee2\u79fb\u306e\u6027\u72b6\u30fb\u75c5\u5909\u30b5\u30a4\u30ba\uff09\u3001\u810a\u690e\u4e0d\u5b89\u5b9a\u6027\u8a55\u4fa1\u306b\u306fSINS(Spinal Instability Neoplastic Score)\u304c\u7528\u3044\u3089\u308c\u3001\u9ad8\u5024\u3067\u306f\u5916\u79d1\u30b3\u30f3\u30b5\u30eb\u30c8\u3092\u8003\u616e\u3059\u308b\u3002", "keyPoints": ["\u810a\u9ac4\u5727\u8feb\u306f\u9ebb\u75fa\u5b8c\u6210\u524d\uff08\u6b69\u884c\u53ef\u80fd\u306a\u6bb5\u968e\uff09\u306e\u4ecb\u5165\u304c\u6a5f\u80fd\u7dad\u6301\u306b\u91cd\u8981", "\u75c5\u7684\u9aa8\u6298\u30ea\u30b9\u30af\u8a55\u4fa1: Mirels\u30b9\u30b3\u30a2", "\u810a\u690e\u4e0d\u5b89\u5b9a\u6027\u8a55\u4fa1: SINS\uff08\u9ad8\u5024\u3067\u5916\u79d1\u30b3\u30f3\u30b5\u30eb\u30c8\u8003\u616e\uff09", "\u75c5\u7684\u9aa8\u6298\u30ea\u30b9\u30af\u56e0\u5b50: \u9aa8\u76ae\u8cea50%\u4ee5\u4e0a\u306e\u7834\u58ca\u3001\u75c5\u5909\u5f84\u5927\u3001\u75bc\u75db\u6027\u72b6(\u6a5f\u80fd\u7684\u75bc\u75db)\u3001\u8377\u91cd\u9aa8(\u7279\u306b\u5927\u817f\u9aa8\u8fd1\u4f4d\u90e8)"]}, {"heading": "\u8133\u8ee2\u79fb\uff1a\u6cbb\u7642\u65b9\u91dd\u6c7a\u5b9a\u306e\u30d5\u30ed\u30fc", "summary": "\u8133\u8ee2\u79fb\u306e\u6cbb\u7642\u65b9\u91dd\u306f\u75c7\u72b6\u306e\u6709\u7121\u306b\u52a0\u3048\u3001\u5358\u767a\u304b\u3064\u982d\u84cb\u5916\u75c5\u5909\u304c\u5236\u5fa1\u3055\u308c\u3066\u3044\u308b\u30aa\u30ea\u30b4\u8ee2\u79fb\u306e\u75c5\u614b\u304b\u3069\u3046\u304b\u3067\u5224\u65ad\u3055\u308c\u308b\u3002\u5358\u767a\u3067\u30aa\u30ea\u30b4\u8ee2\u79fb\u306e\u5834\u5408\u306f\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u307e\u305f\u306f\u816b\u760d\u6458\u51fa\u8853\u304c\u63a8\u5968\u3055\u308c\u308b\u3002\u6709\u75c7\u72b6\u306e\u8133\u8ee2\u79fb\u306f\u5358\u767a\u30fb\u591a\u767a\u3092\u554f\u308f\u305a\u653e\u5c04\u7dda\u6cbb\u7642\u304c\u91cd\u8981\u3067\u3042\u308a\u3001\u7121\u75c7\u72b6\u306e\u8133\u8ee2\u79fb\u3067\u306f\u5206\u5b50\u6a19\u7684\u85ac\u30fb\u514d\u75ab\u7642\u6cd5\u306e\u9032\u6b69\u306b\u3088\u308a\u85ac\u7269\u7642\u6cd5\u5148\u884c\u304c\u9078\u629e\u80a2\u3068\u3057\u3066\u5897\u3048\u3066\u3044\u308b\u3002", "keyPoints": ["\u5358\u767a\u8133\u8ee2\u79fb\u304b\u3064\u982d\u84cb\u5916\u75c5\u5909\u5236\u5fa1\u4f8b\uff1d\u30aa\u30ea\u30b4\u8ee2\u79fb\u3068\u3057\u3066\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04/\u816b\u760d\u6458\u51fa\u8853\u3092\u63a8\u5968", "\u6709\u75c7\u72b6\u8133\u8ee2\u79fb\uff08\u5358\u767a\u30fb\u591a\u767a\u3068\u3082\uff09\u306f\u653e\u5c04\u7dda\u6cbb\u7642\u304c\u91cd\u8981", "\u7121\u75c7\u72b6\u8133\u8ee2\u79fb\u306f\u85ac\u7269\u7642\u6cd5\u5148\u884c\u304c\u9078\u629e\u80a2\u3068\u3057\u3066\u5897\u52a0\uff08\u5206\u5b50\u6a19\u7684\u85ac\u30fb\u514d\u75ab\u7642\u6cd5\u306e\u9032\u6b69\uff09", "\u85ac\u7269\u7642\u6cd5\u3068\u653e\u5c04\u7dda\u6cbb\u7642\u306e\u5148\u884c\u9078\u629e\u306f\u30b5\u30a4\u30ba\u30fb\u500b\u6570\u30fb\u90e8\u4f4d\u30fb\u81e8\u5e8a\u72b6\u6cc1\u3067\u5224\u65ad"]}, {"heading": "\u8133\u8ee2\u79fb\u3078\u306e\u7167\u5c04\u6cd5\uff1aSRS/SRT\u3068\u5168\u8133\u7167\u5c04\u306e\u4f7f\u3044\u5206\u3051", "summary": "\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u306b\u306f1\u56de\u7167\u5c04\u306eSRS(\u5b9a\u4f4d\u624b\u8853\u7684\u7167\u5c04)\u3068\u5206\u5272\u7167\u5c04\u306eSRT\u304c\u3042\u308a\u3001\u6982\u306d3cm\u7a0b\u5ea6\u307e\u3067\u306e\u5c0f\u75c5\u5909\u306b\u306fSRS\u3001\u5927\u304d\u3081\u306e\u75c5\u5909\u3084\u8133\u5e79\u8fd1\u508d\u306b\u306fSRT\u304c\u9078\u629e\u3055\u308c\u308b\u3002\u975e\u5c0f\u7d30\u80de\u80ba\u764c\u3067\u306f4\u500b\u4ee5\u4e0b\u304b\u3064\u6bd4\u8f03\u7684\u5c0f\u3055\u3044\u75c5\u5909\u3067\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u304c\u5f37\u304f\u63a8\u5968\u3055\u308c\u30015\u301c10\u500b\u3067\u3082\u9078\u629e\u3055\u308c\u3046\u308b\u3002\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u5358\u72ec\u306f\u982d\u84cb\u5185\u518d\u767a\u7387\u304c\u9ad8\u304f\u3001\u53b3\u91cd\u306aMRI\u30d5\u30a9\u30ed\u30fc\u3068\u6551\u6e08\u6cbb\u7642\u3092\u524d\u63d0\u306b\u9069\u7528\u3059\u308b\u5fc5\u8981\u304c\u3042\u308b\u3002", "keyPoints": ["SRS: 1\u56de\u7167\u5c04\u30013cm\u7a0b\u5ea6\u307e\u3067\u306e\u5c0f\u75c5\u5909\u304c\u76ee\u5b89", "SRT: \u5206\u5272\u7167\u5c04\u3001\u5927\u304d\u3081\u306e\u75c5\u5909\u3084\u8133\u5e79\u8fd1\u508d\u3067\u9078\u629e", "\u975e\u5c0f\u7d30\u80de\u80ba\u764c\u306e\u8133\u8ee2\u79fb: 4\u500b\u4ee5\u4e0b\uff08\u304b\u3064\u5c0f\u75c5\u5909\uff09\u3067\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u3092\u5f37\u304f\u63a8\u5968\u30015\u301c10\u500b\u3067\u3082\u9078\u629e\u3055\u308c\u3046\u308b", "\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u5358\u72ec\u306f\u982d\u84cb\u5185\u518d\u767a\u7387\u304c\u9ad8\u304f\u3001MRI\u30d5\u30a9\u30ed\u30fc\u30a2\u30c3\u30d7\u3068\u6551\u6e08\u6cbb\u7642\u304c\u524d\u63d0"]}, {"heading": "\u5c0f\u7d30\u80de\u80ba\u764c\u306e\u8133\u8ee2\u79fb\u3068\u5168\u8133\u7167\u5c04", "summary": "\u5c0f\u7d30\u80de\u80ba\u764c\u306e\u8133\u8ee2\u79fb\u983b\u5ea6\u306f\u9ad8\u304f\u3001\u5168\u8133\u7167\u5c04\u304c\u73fe\u5728\u3082\u6a19\u6e96\u6cbb\u7642\u3067\u3042\u308b\u3002\u8fd1\u5e74\u306f\u5c11\u6570\u500b\u8ee2\u79fb\u306b\u5bfe\u3059\u308b\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u3082\u884c\u308f\u308c\u3064\u3064\u3042\u308a\u3001\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u306f\u5168\u8133\u7167\u5c04\u3068\u6bd4\u8f03\u3057\u982d\u84cb\u5185\u518d\u767a\u306f\u591a\u3044\u304c\u5168\u751f\u5b58\u306b\u5927\u304d\u306a\u5dee\u306f\u306a\u3044\u3068\u3059\u308b\u5831\u544a\u304c\u3042\u308b\u3002\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u5f8c\u306f\u982d\u84cb\u5185\u518d\u767a\u7387\u304c\u9ad8\u3044\u305f\u3081\u7d99\u7d9a\u7684\u306aMRI\u30d5\u30a9\u30ed\u30fc\u3068\u6551\u6e08\u7167\u5c04\u304c\u524d\u63d0\u3068\u306a\u308b\u3002", "keyPoints": ["\u5c0f\u7d30\u80de\u80ba\u764c\u306e\u8133\u8ee2\u79fb\u306f\u5168\u8133\u7167\u5c04\u304c\u73fe\u5728\u3082\u6a19\u6e96\u6cbb\u7642", "\u5c11\u6570\u500b\u8ee2\u79fb\u3067\u306f\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u3082\u9078\u629e\u80a2\u306b\u306a\u308a\u3064\u3064\u3042\u308b", "\u5b9a\u4f4d\u653e\u5c04\u7dda\u7167\u5c04\u306f\u982d\u84cb\u5185\u518d\u767a\u306f\u591a\u3044\u304c\u5168\u751f\u5b58\u306f\u5168\u8133\u7167\u5c04\u3068\u5927\u5dee\u306a\u3044\u3068\u306e\u5831\u544a\u3042\u308a"]}, {"heading": "\u8133\u8ee2\u79fb\u306b\u5bfe\u3059\u308b\u5916\u79d1\u6cbb\u7642\u3068\u4e88\u5f8c\u4e88\u6e2c\uff08DS-GPA\uff09", "summary": "\u5168\u6458\u51fa\u53ef\u80fd\u306a\u5358\u767a\u8133\u8ee2\u79fb\u3067Performance Status\u304c\u826f\u597d\u3001\u6a5f\u80fd\u4e88\u5f8c\u6539\u5584\u304c\u671f\u5f85\u3055\u308c\u308b\u60a3\u8005\u306b\u306f\u816b\u760d\u6458\u51fa\u8853\u306b\u653e\u5c04\u7dda\u6cbb\u7642\u3092\u4f75\u7528\u3059\u308b\u3053\u3068\u304c\u63a8\u5968\u3055\u308c\u308b\uff08\u5358\u767a\u4f8b\u3067\u7279\u306b\u63a8\u5968\u5ea6\u304c\u9ad8\u3044\uff09\u3002\u4e88\u5f8c\u4e88\u6e2c\u306b\u306fDS-GPA\uff08\u8a3a\u65ad\u7279\u7570\u7684Graded Prognostic Assessment\uff09\u304c\u7528\u3044\u3089\u308c\u3001\u80ba\u764c\u3067\u306f\u817a\u764c\uff0f\u817a\u764c\u4ee5\u5916\u306b\u5206\u3051\u3066KPS\u30fb\u5e74\u9f62\u30fb\u8133\u8ee2\u79fb\u500b\u6570\u30fb\u982d\u84cb\u5916\u75c5\u5909\u306e\u6709\u7121\u30fb\u907a\u4f1d\u5b50\u5909\u7570\u306e\u6709\u7121\u3067\u8a55\u4fa1\u3059\u308b\u3002", "keyPoints": ["\u5168\u6458\u51fa\u53ef\u80fd\u306a\u5358\u767a\u8133\u8ee2\u79fb\u3001\u826f\u597dPS\u4f8b\u3067\u306f\u6458\u51fa\u8853\uff0b\u653e\u5c04\u7dda\u6cbb\u7642\u3092\u63a8\u5968\uff08\u5358\u767a\u3067\u63a8\u5968\u5ea6\u9ad8\u3044\uff09", "DS-GPA: \u80ba\u764c\u306f\u817a\u764c/\u817a\u764c\u4ee5\u5916\u306e2\u7fa4\u3001KPS\u30fb\u5e74\u9f62\u30fb\u8ee2\u79fb\u500b\u6570\u30fb\u982d\u84cb\u5916\u75c5\u5909\u6709\u7121\u30fb\u907a\u4f1d\u5b50\u5909\u7570\u6709\u7121\u3067\u8a55\u4fa1", "DS-GPA\u306f\u5c40\u6240\u6cbb\u7642\u306e\u30e1\u30ea\u30c3\u30c8\u8a55\u4fa1\u30fb\u4e88\u5f8c\u4e88\u6e2c\u306e\u53c2\u8003\u6307\u6a19"]}], "examPoints": ["\u8ee2\u79fb\u6cbb\u7642\u65b9\u91dd\u306e\u57fa\u672c: \u6709\u75c7\u72b6/\u30ea\u30b9\u30af\u9ad8\u2192\u5c40\u6240\u6cbb\u7642\u512a\u5148\u3001\u7121\u75c7\u72b6\u2192\u5168\u8eab\u85ac\u7269\u7642\u6cd5\u512a\u5148", "SRE(\u9aa8\u95a2\u9023\u4e8b\u8c61)\uff1d\u75c5\u7684\u9aa8\u6298\u3001\u810a\u9ac4\u5727\u8feb\u3001\u9aa8\u3078\u306e\u653e\u5c04\u7dda\u6cbb\u7642\u3001\u5916\u79d1\u7684\u4ecb\u5165", "\u6709\u75c7\u72b6\u9aa8\u8ee2\u79fb\u306b\u306f\u653e\u5c04\u7dda\u6cbb\u7642\u3092\u5f37\u304f\u63a8\u5968\u3001\u75bc\u75db\u6539\u5584\u738750\u301c80%", "\u9aa8\u8ee2\u79fb\u901a\u5e38\u7167\u5c04\u306e\u4ee3\u8868\u7684\u5206\u5272: 20Gy/5\u56de\u300130Gy/10\u56de\u30018Gy\u5358\u56de\uff08\u75bc\u75db\u7de9\u548c\u52b9\u679c\u306f\u540c\u7b49\u3001\u5358\u56de\u306f\u518d\u7167\u5c04\u7387\u304c\u9ad8\u3044\uff09", "\u75c5\u7684\u9aa8\u6298\u30ea\u30b9\u30af\u8a55\u4fa1: Mirels\u30b9\u30b3\u30a2\u3001\u810a\u690e\u4e0d\u5b89\u5b9a\u6027\u8a55\u4fa1: SINS", "\u810a\u9ac4\u5727\u8feb\u306f\u9ebb\u75fa\u5b8c\u6210\u524d\uff08\u6b69\u884c\u53ef\u80fd\u6642\uff09\u306e\u4ecb\u5165\u304c\u6a5f\u80fd\u4e88\u5f8c\u3092\u5de6\u53f3\u3059\u308b", "\u5358\u767a\u8133\u8ee2\u79fb\u304b\u3064\u982d\u84cb\u591 u4e2d\u76ae\u816b\u306e\u78ba\u5b9a\u8a3a\u65ad\u306f\u8840\u6e05\u30fb\u80f8\u6c34\u30de\u30fc\u30ab\u30fc\u5358\u72ec\u3067\u306f\u884c\u308f\u305a\u5fc5\u305a\u75c5\u7406\u8a3a\u65ad\u3067\u884c\u3046", "\u514d\u75ab\u67d3\u8272\u306f\u967d\u6027\u30de\u30fc\u30ab\u30fc2\u3064\u4ee5\u4e0a\uff0b\u9670\u6027\u30de\u30fc\u30ab\u30fc2\u3064\u4ee5\u4e0a\u306e\u7d44\u307f\u5408\u308f\u305b\u304c\u5fc5\u8981", "BAP1/MTAP\u6b20\u640d\u306f\u53cd\u5fdc\u6027\u4e2d\u76ae\u5897\u751f\u3068\u306e\u9451\u5225\u306b\u7279\u7570\u5ea6100%", "\u4e2d\u76ae\u816b\u306e\u5916\u79d1\u7b2c\u4e00\u9078\u629e\u306fP/D\uff08\u80f8\u819c\u5207\u9664\u80ba\u5265\u76ae\u8853\uff09\u3001EPP\u306f\u5f31\u3044\u63a8\u5968", "\u4e2d\u76ae\u816b1\u6b21\u6cbb\u7642\u306f\u30cb\u30dc\u30eb\u30de\u30d6+\u30a4\u30d4\u30ea\u30e0\u30de\u30d6\uff08CheckMate743\uff09", "\u80f8\u817a\u816b\u306e3\u5927\u81ea\u5df1\u514d\u75ab\u5408\u4f75\u75c7\uff1a\u91cd\u75c7\u7b4b\u7121\u529b\u75c7\u30fb\u8d64\u82bd\u7403\u7646\u30fb\u4f4e\u03b3\u30b0\u30ed\u30d6\u30ea\u30f3\u8840\u75c7", "Masaoka\u75c5\u671f\u5206\u985e\u306e\u30b9\u30c6\u30fc\u30b8\u3054\u3068\u306e5\u5e74\u751f\u5b58\u7387\uff081\u671f96%\u301c4B\u671f20%\uff09", "\u80f8\u817a\u816b\u306b\u306fICI\u4f7f\u7528\u3057\u306a\u3044\u3001\u80f8\u817a\u764c\u306b\u306f\u30d7\u30e9\u30c1\u30ca\u88fd\u5264\u30fb\u30ec\u30f3\u30d0\u30c1\u30cb\u30d6\u3092\u7528\u3044\u308b"], "linkedCurriculumNos": [122, 132]}, {"no": 11, "title": "\u80ba\u304c\u3093\u85ac\u7269\u7642\u6cd5\u306e\u526f\u4f5c\u7528\u5bfe\u7b56", "lecturer": "\u4e09\u6d66\uff08\u4e09\u6d66\u30af\u30ea\u30cb\u30c3\u30af\uff09", "sections": [{"heading": "EGFR-TKI\u306e\u526f\u4f5c\u7528", "summary": "EGFR\u306f\u4e0a\u76ae\u306b\u767a\u73fe\u3059\u308b\u305f\u3081\u3001\u76ae\u819a\u6bd2\u6027\uff08\u76ae\u75b9\u30fb\u722a\u708e\uff09\u3001\u4e0b\u75e2\u3001\u53e3\u5185\u708e\u30fb\u7c98\u819c\u708e\u306a\u3069\u4e0a\u76ae\u95a2\u9023\u306e\u6709\u5bb3\u4e8b\u8c61\u304c\u591a\u3044\u3002\u85ac\u5264\u6027\u80ba\u969c\u5bb3\uff08ILD\uff09\u306f\u56fd\u5185\u767a\u751f\u983b\u5ea62\u301c5%\u3001\u81f4\u6b7b\u7387\u7d0430%\u3068\u91cd\u7be4\u3067\u3001\u30ea\u30b9\u30af\u56e0\u5b50\u306f\u7537\u6027\u30fb\u55ab\u7159\u6b74\u30fb\u65e2\u5b58\u9593\u8cea\u6027\u80ba\u708e\u30fbPS\u4e0d\u826f\u3002\u30aa\u30b7\u30e1\u30eb\u30c1\u30cb\u30d6\u3067\u306f\u4e00\u904e\u6027\u753b\u50cf\u7570\u5e38(TAPO)\u3068\u3044\u3046\u6bd4\u8f03\u7684\u4e88\u5f8c\u826f\u597d\u306a\u75c5\u614b\u3082\u3042\u308b\u3002\u30aa\u30b7\u30e1\u30eb\u30c1\u30cb\u30d6\u306f\u9577\u671f\u6295\u4e0e\u3067\u5fc3\u6bd2\u6027\u306e\u30c1\u30a7\u30c3\u30af\u3082\u5fc5\u8981\u3002", "keyPoints": ["\u76ae\u819a\u6bd2\u6027\u30fb\u4e0b\u75e2\u30fb\u53e3\u5185\u708e\u306f\u4fdd\u6e7f\u5264/\u30b9\u30c6\u30ed\u30a4\u30c9\u5916\u7528\u3001\u30c6\u30c8\u30e9\u30b5\u30a4\u30af\u30ea\u30f3\u7cfb\u6297\u83cc\u85ac\u4e88\u9632\u6295\u4e0e\u3001\u6574\u8178\u5264\u7b49\u3067\u5bfe\u5fdc", "\u4e0b\u75e2\u91cd\u75c7\u4f8b\u306f\u4f11\u85ac\u30fb\u6e1b\u91cf\u304c\u57fa\u672c\u3001\u30ed\u30da\u30e9\u30df\u30c9\u306b\u3088\u308b\u4e88\u9632\u52b9\u679c\u306f\u4e4f\u3057\u3044", "\u85ac\u5264\u6027ILD\uff1a\u56fd\u5185\u767a\u75c7\u73872\u301c5%\u3001\u81f4\u6b7b\u7387\u7d0430%\u3001\u30ea\u30b9\u30af\u56e0\u5b50\u306f\u7537\u6027\u30fb\u55ab\u7159\u30fb\u65e2\u5b58\u9593\u8cea\u6027\u80ba\u708e\u30fbPS\u4e0d\u826f", "\u30aa\u30b7\u30e1\u30eb\u30c1\u30cb\u30d6\u306eTAPO\uff08\u4e00\u904e\u6027\u753b\u50cf\u7570\u5e38\uff09\u306f\u6bd4\u8f03\u7684\u4e88\u5f8c\u826f\u597d", "ILD\u306e\u30d1\u30bf\u30fc\u30f3\uff1aOP\u3001NSIP\u3001DAD\u3001HP\u7b49\u3001DAD\u30d1\u30bf\u30fc\u30f3\u3068\u65e2\u5b58\u9593\u8cea\u6027\u80ba\u708e\u5408\u4f75\u4f8b\u306f\u4e88\u5f8c\u4e0d\u826f", "\u30aa\u30b7\u30e1\u30eb\u30c1\u30cb\u30d6\u9577\u671f\u6295\u4e0e\u3067\u306f\u5fc3\u6bd2\u6027\u30c1\u30a7\u30c3\u30af\u304c\u5fc5\u8981"]}, {"heading": "ALK/ROS1\u963b\u5bb3\u85ac\u306e\u526f\u4f5c\u7528", "summary": "ALK\u963b\u5bb3\u85ac\u306f\u30af\u30ea\u30be\u30c1\u30cb\u30d6\u3001\u30bb\u30ec\u30c1\u30cb\u30d6\u3001\u30a2\u30ec\u30af\u30c1\u30cb\u30d6\u3001\u30d6\u30ea\u30ac\u30c1\u30cb\u30d6\u3001\u30ed\u30e9\u30c1\u30cb\u30d6\u306e5\u5264\u304c\u3042\u308a\u5168\u4f53\u3068\u3057\u3066ILD\u306b\u6ce8\u610f\u3002\u30a2\u30ec\u30af\u30c1\u30cb\u30d6\u306f\u5fcd\u5bb9\u6027\u304c\u9ad8\u3044\u304c\u8853\u5f8c\u88dc\u52a9\u7642\u6cd5\u3067\u306f\u500d\u91cf\u4f7f\u7528\u306e\u305f\u3081\u809d\u969c\u5bb3\u30fbCPK\u4e0a\u6607\u306b\u6ce8\u610f\u3002\u30d6\u30ea\u30ac\u30c1\u30cb\u30d6\u306f\u9ad8\u8840\u5727\u30fbCPK\u4e0a\u6607\u30fb\u6295\u4e0e\u65e9\u671f\u306e\u4e00\u904e\u6027\u80ba\u969c\u5bb3(EOPE)\u3001\u30ed\u30e9\u30c1\u30cb\u30d6\u306f\u9ad8\u8102\u8840\u75c7\u30fb\u6d6e\u816b\u30fb\u4f53\u91cd\u5897\u52a0\u30fb\u4e2d\u67a2\u795e\u7d4c\u7cfb\u6bd2\u6027\uff08\u6291\u3046\u3064\u30fb\u8a8d\u77e5\u969c\u5bb3\uff09\u306b\u6ce8\u610f\u3057\u4f11\u85ac\u30fb\u6e1b\u91cf\u3067\u5bfe\u5fdc\u3059\u308b\u3002ROS1\u963b\u5bb3\u85ac\u306fTRK\u963b\u5bb3\u4f5c\u7528\u306e\u5f37\u5f31\u306b\u3088\u308a\u795e\u7d4c\u969c\u5bb3\uff08\u3081\u307e\u3044\u30fb\u5473\u899a\u7570\u5e38\u30fb\u77e5\u899a\u7570\u5e38\uff09\u306e\u983b\u5ea6\u304c\u7570\u306a\u308b\u3002", "keyPoints": ["ALK\u963b\u5bb3\u85ac\u5168\u4f53\u3067ILD\u306b\u6ce8\u610f", "\u30a2\u30ec\u30af\u30c1\u30cb\u30d6\uff1a\u9032\u884c\u671f\u306f\u8efd\u5ea6\uff08\u4fbf\u79d8\u7a0b\u5ea6\uff09\u3060\u304c\u8853\u5f8c\u88dc\u52a9\u7642\u6cd5\uff08\u500d\u91cf\uff09\u3067\u306f\u809d\u969c\u5bb3\u30fb\u6d88\u5316\u5668\u969c\u5bb3\u30fbCPK\u4e0a\u6607\u306b\u6ce8\u610f", "\u30d6\u30ea\u30ac\u30c1\u30cb\u30d6\uff1a\u9ad8\u8840\u5727\u3001CPK\u4e0a\u6607\u3001\u7b4b\u8089\u75db\u3001\u6295\u4e0e\u65e9\u671f\u306e\u4e00\u904e\u6027\u80ba\u969c\u5bb3(EOPE)", "\u30ed\u30e9\u30c1\u30cb\u30d6\uff1a\u9ad8\u8102\u8840\u75c7\u3001\u6d6e\u816b\u3001\u4f53\u91cd\u5897\u52a0\u3001\u4e2d\u67a2\u795e\u7d4c\u7cfb\u6bd2\u6027\uff08\u6291\u3046\u3064\u30fb\u8a8d\u77e5\u969c\u5bb3\uff09\u2192\u4f11\u85ac\u30fb\u6e1b\u91cf\u3067\u5bfe\u5fdc", "ROS1\u963b\u5bb3\u85ac\uff08\u30af\u30ea\u30be\u30c1\u30cb\u30d6\u3001\u30a8\u30f3\u30c8\u30ec\u30af\u30c1\u30cb\u30d6\u3001\u30ec\u30dd\u30c8\u30ec\u30af\u30c1\u30cb\u30d6\u3001\u30bf\u30ec\u30c8\u30ec\u30af\u30c1\u30cb\u30d6\uff09\u306fTRK\u963b\u5bb3\u4f5c\u7528\u306e\u5f37\u5f31\u3067\u795e\u7d4c\u969c\u5bb3\u306e\u983b\u5ea6\u304c\u5909\u5316\u3001\u30bf\u30ec\u30c8\u30ec\u30af\u30c1\u30cb\u30d6\u306f\u809d\u969c\u5bb3\u306b\u6ce8\u610f"]}, {"heading": "BRAF/MEK\u963b\u5bb3\u85ac\u30fbMET\u963b\u5bb3\u85ac\u306e\u526f\u4f5c\u7528", "summary": "BRAF\u963b\u5bb3\u85ac\uff08\u30c0\u30d6\u30e9\u30d5\u30a7\u30cb\u30d6\uff09+MEK\u963b\u5bb3\u85ac\uff08\u30c8\u30e9\u30e1\u30c1\u30cb\u30d6\uff09\u4f75\u7528\u7642\u6cd5\u306f\u7d04\u534a\u6570\u306b\u6295\u4e0e\u958b\u59cb1\u30f6\u6708\u4ee5\u5185\u306e\u767a\u71b1\u3092\u304d\u305f\u3057\u5bfe\u75c7\u7642\u6cd5\uff08\u30a2\u30bb\u30c8\u30a2\u30df\u30ce\u30d5\u30a7\u30f3\u3001\u96e3\u6cbb\u4f8b\u306f\u30b9\u30c6\u30ed\u30a4\u30c9\uff09\u3067\u5bfe\u5fdc\u3059\u308b\u3002BRAF\u5358\u5264\u3067\u306f\u30d0\u30a4\u30d1\u30b9\u7d4c\u8def\u6d3b\u6027\u5316\u306b\u3088\u308a\u76ae\u819a\u6709\u68d8\u7d30\u80de\u764c\u306a\u3069\u306e\u767a\u304c\u3093\u30ea\u30b9\u30af\u304c\u4e0a\u6607\u3059\u308b\u305f\u3081MEK\u963b\u5bb3\u85ac\u4f75\u7528\u304c\u5fc5\u9808\u3002MET\u963b\u5bb3\u85ac\uff08\u30c6\u30dd\u30c1\u30cb\u30d6\u3001\u30ab\u30d7\u30de\u30c1\u30cb\u30d6\u3001\u30b0\u30de\u30ed\u30f3\u30c1\u30cb\u30d6\uff09\u306f\u672b\u68a2\u6027\u6d6e\u816b\u3001\u8840\u6e05\u30af\u30ec\u30a2\u30c1\u30cb\u30f3\u4e0a\u6607\uff08\u5c3f\u7d30\u7ba1\u5206\u6ccc\u963b\u5bb3\u306b\u3088\u308b\u898b\u304b\u3051\u4e0a\u306e\u4e0a\u6607\uff09\u3001\u4f4e\u30a2\u30eb\u30d6\u30df\u30f3\u8840\u75c7\u304c\u7279\u5fb4\u7684\u3067\u5bfe\u75c7\u7642\u6cd5\u30fb\u4f11\u85ac\u6e1b\u91cf\u3067\u5bfe\u5fdc\u3059\u308b\u3002", "keyPoints": ["BRAF+MEK\u963b\u5bb3\u85ac\u4f75\u7528\uff1a\u767a\u71b1\u304c\u7d04\u534a\u6570\u3001\u6295\u4e0e\u958b\u59cb1\u30f6\u6708\u4ee5\u5185\u304c\u591a\u3044\u3001\u30a2\u30bb\u30c8\u30a2\u30df\u30ce\u30d5\u30a7\u30f3\u2192\u96e3\u6cbb\u4f8b\u30b9\u30c6\u30ed\u30a4\u30c9", "BRAF\u963b\u5bb3\u85ac\u5358\u5264\u306f\u30d0\u30a4\u30d1\u30b9\u7d4c\u8def\u6d3b\u6027\u5316\u306b\u3088\u308a\u4e8c\u6b21\u767a\u304c\u3093\uff08\u76ae\u819a\u6709\u68d8\u7d30\u80de\u764c\u7b49\uff09\u30ea\u30b9\u30af\u4e0a\u6607\u2192MEK\u963b\u5bb3\u85ac\u4f75\u7528\u5fc5\u9808", "MET\u963b\u5bb3\u85ac\uff1a\u672b\u68a2\u6027\u6d6e\u816b\uff08\u5229\u5c3f\u85ac\u7121\u52b9\u3001\u5f3e\u6027\u30b9\u30c8\u30c3\u30ad\u30f3\u30b0\u30fb\u7406\u5b66\u7642\u6cd5\u3067\u5bfe\u5fdc\uff09", "MET\u963b\u5bb3\u85ac\uff1a\u8840\u6e05\u30af\u30ec\u30a2\u30c1\u30cb\u30f3\u4e0a\u6607\u306f\u5c3f\u7d30\u7ba1\u5206\u6ccc\u963b\u5bb3\u306b\u3088\u308b\u898b\u304b\u3051\u4e0a\u306e\u4e0a\u6607\uff08\u5b9f\u814e\u6a5f\u80fd\u3068\u4e56\u96e2\uff09", "MET\u963b\u5bb3\u85ac\uff1a\u4f4e\u30a2\u30eb\u30d6\u30df\u30f3\u8840\u75c7\u306f\u809d\u7d30\u80de\u30a2\u30eb\u30d6\u30df\u30f3\u5408\u6210\u4f4e\u4e0b\u306b\u3088\u308b\u3001\u4f11\u85ac\u30fb\u6e1b\u91cf\u3067\u5bfe\u5fdc"]}, {"heading": "\u4e8c\u91cd\u7279\u7570\u6027\u6297\u4f53\uff08\u30a2\u30df\u30d0\u30f3\u30bf\u30de\u30d6\uff09\u30fbRET/KRAS G12C/HER2\u963b\u5bb3\u85ac\u306e\u526f\u4f5c\u7528", "summary": "\u30a2\u30df\u30d0\u30f3\u30bf\u30de\u30d6\uff08EGFR-MET\u4e8c\u91cd\u7279\u7570\u6027\u6297\u4f53\uff09\u306f\u30a4\u30f3\u30d5\u30e5\u30fc\u30b8\u30e7\u30f3\u30ea\u30a2\u30af\u30b7\u30e7\u30f3\uff08\u76ae\u4e0b\u6ce8\u5c04\u88fd\u5264\u3067\u983b\u5ea6\u4f4e\u4e0b\uff09\u3068\u9759\u8108\u8840\u6813\u585e\u6813\u75c7\uff08\u30a2\u30d4\u30ad\u30b5\u30d0\u30f34\u30f6\u6708\u9593\u4e88\u9632\u6295\u4e0e\u63a8\u5968\uff09\u306b\u6ce8\u610f\u3002RET\u963b\u5bb3\u85ac\u30bb\u30eb\u30da\u30eb\u30ab\u30c1\u30cb\u30d6\u306f\u809d\u969c\u5bb3\u30fb\u9ad8\u8840\u5727\u30fb\u904e\u654f\u53cd\ 8b\u304c\u5b8c\u5168\u306a\u6539\u5584\u306f\u96e3\u3057\u304f\u4f11\u85ac\u30fb\u6e1b\u91cf\u3067\u5bfe\u5fdc\u3059\u308b\u3002\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3\u306b\u3088\u308b\u814e\u969c\u5bb3\u4e88\u9632\u306f\u30b7\u30e7\u30fc\u30c8\u30cf\u30a4\u30c9\u30ec\u30fc\u30b7\u30e7\u30f3\u6cd5\uff08\u8f38\u6db2\u91cf\u524a\u6e1b\u3001\u5916\u6765\u6cbb\u7642\u53ef\u80fd\uff09\u304c\u4e3b\u6d41\u3068\u306a\u3063\u3066\u3044\u308b\u3002", "keyPoints": ["\u30a4\u30ea\u30ce\u30c6\u30ab\u30f3\u4e0b\u75e2\uff1a\u767a\u75c7\u5f8c\u306f\u30ed\u30da\u30e9\u30df\u30c9\u7d99\u7d9a\u5185\u670d\u3001\u91cd\u75c7\u306f\u5165\u9662\u30fb\u7d76\u98df\u30fb\u8f38\u6db2", "\u30e8\u30fc\u30b0\u30eb\u30c8\u7b49\u4e73\u9178\u83cc\u88fd\u5264\uff08\u8178\u7ba1\u9178\u6027\u5316\uff09\u306f\u30a4\u30ea\u30ce\u30c6\u30ab\u30f3\u4e0b\u75e2\u4e88\u9632\u3067\u306f\u63a7\u3048\u308b\u65b9\u304c\u671b\u307e\u3057\u3044", "CIPN\uff1a\u30d1\u30af\u30ea\u30bf\u30ad\u30bb\u30eb\u3001\u30c9\u30bb\u30bf\u30ad\u30bb\u30eb\u3001\u30d3\u30ce\u30ec\u30eb\u30d3\u30f3\u3001\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3\u3067\u591a\u3044\u3001\u30c7\u30e5\u30ed\u30ad\u30bb\u30c1\u30f3\u30fb\u30d7\u30ec\u30ac\u30d0\u30ea\u30f3\u3067\u5bfe\u75c7", "\u30b7\u30b9\u30d7\u30e9\u30c1\u30f3\u814e\u969c\u5bb3\u4e88\u9632\uff1a\u30b7\u30e7\u30fc\u30c8\u30cf\u30a4\u30c9\u30ec\u30fc\u30b7\u30e7\u30f3\u6cd5\uff08\u30de\u30b0\u30cd\u30b7\u30a6\u30e0+\u30de\u30f3\u30cb\u30c8\u30fc\u30eb/\u30d5\u30ed\u30bb\u30df\u30c9\u5f37\u5236\u5229\u5c3f\u3001\u5916\u6765\u5bfe\u5fdc\u53ef\uff09"]}, {"heading": "\u8840\u7ba1\u65b0\u751f\u963b\u5bb3\u85ac\uff08\u30d9\u30d0\u30b7\u30ba\u30de\u30d6\u30fb\u30e9\u30e0\u30b7\u30eb\u30de\u30d6\uff09\u306e\u526f\u4f5c\u7528", "summary": "\u6297VEGF\u6297\u4f53\u30d9\u30d0\u30b7\u30ba\u30de\u30d6\u3001\u6297VEGFR2\u6297\u4f53\u30e9\u30e0\u30b7\u30eb\u30de\u30d6\u306f\u51fa\u8840\u6027\u4e8b\u8c61\u3001\u52d5\u8108\u8840\u6813\u75c7\u3001\u9ad8\u8840\u5727\u3001\u86cb\u767d\u5c3f\u304c\u7279\u5fb4\u7684\u306a\u526f\u4f5c\u7528\u3002\u9ad8\u8840\u5727\u306fNO\u7523\u751f\u963b\u5bb3\u306b\u3088\u308b\u8840\u7ba1\u62e1\u5f35\u969c\u5bb3\u304c\u6a5f\u5e8f\u3067\u964d\u5727\u85ac\u7ba1\u7406\u3001\u86cb\u767d\u5c3f\u306f\u7cf8\u7403\u4f53\u6ffe\u904e\u819c\u6a5f\u80fd\u4f4e\u4e0b\u304c\u6a5f\u5e8f\u3067\u6295\u4e0e\u524d\u306b\u5c3f\u86cb\u767d\u3092\u30c1\u30a7\u30c3\u30af\u30572+\u4ee5\u4e0a\u3067\u5b9a\u91cf\u691c\u67fb\u307e\u305f\u306f\u4f11\u85ac\u3092\u691c\u8a0e\u3059\u308b\u3002", "keyPoints": ["VEGF\u963b\u5bb3\u85ac\u306e\u4ee3\u8868\u7684\u526f\u4f5c\u7528\uff1a\u51fa\u8840\u6027\u4e8b\u8c61\u3001\u52d5\u8108\u8840\u6813\u75c7\u3001\u9ad8\u8840\u5727\u3001\u86cb\u767d\u5c3f", "\u9ad8\u8840\u5727\uff1aNO\u7523\u751f\u963b\u5bb3\u306b\u3088\u308b\u8840\u7ba1\u62e1\u5f35\u969c\u5bb3\u304c\u6a5f\u5e8f\u3001\u964d\u5727\u85ac\u3067\u7ba1\u7406", "\u86cb\u767d\u5c3f\uff1a\u6295\u4e0e\u524d\u306b\u5c3f\u86cb\u767d\u30c1\u30a7\u30c3\u30af\u30012+\u4ee5\u4e0a\u3067\u5b9a\u91cf\u691c\u67fb\u307e\u305f\u306fUPC\u6bd4\u8a55\u4fa1\uff082g/\u65e5\u672a\u6e80\u306a\u3089\u6295\u4e0e\u53ef\uff09"]}, {"heading": "\u514d\u75ab\u95a2\u9023\u6709\u5bb3\u4e8b\u8c61(irAE)\u306e\u7dcf\u8ad6", "summary": "irAE\u306fT\u7d30\u80de\u76f4\u63a5\u653b\u6483\uff08\u5fc3\u7b4b\u708e\uff09\u3001B\u7d30\u80de\u6d3b\u6027\u5316\u306b\u3088\u308b\u81ea\u5df1\u6297\u4f53\u7523\u751f\u5897\u52a0\uff08\u7532\u72b6\u817a\u708e\uff09\u3001\u708e\u75c7\u6027\u30b5\u30a4\u30c8\u30ab\u30a4\u30f3\u4e0a\u6607\uff08\u5927\u8178\u708e\uff09\u3001\u6b63\u5e38\u7d44\u7e54\u306eCTLA-4\u3078\u306e\u76f4\u63a5\u969c\u5bb3\uff08\u4e0b\u5782\u4f53\u708e\u3001\u7279\u306bCTLA-4\u6297\u4f53\u3067\u983b\u5ea6\u9ad8\u3044\uff09\u306a\u3069\u591a\u5f69\u306a\u6a5f\u5e8f\u3067\u767a\u75c7\u3059\u308b\u3002PD-1/PD-L1\u963b\u5bb3\u85ac\u306f\u6295\u4e0e\u65e9\u671f\u306b\u76ae\u819a\u969c\u5bb3\u3092\u4e2d\u5fc3\u306b\u51fa\u73fe\u3057\u3084\u3059\u304f\u91cd\u75c7\u5316\u306f\u6bd4\u8f03\u7684\u5c11\u306a\u3044\u304c\u3001CTLA-4\u6297\u4f53\u4f75\u7528\u306f\u5168\u4f53\u306e\u983b\u5ea6\u30fb\u65e9\u671f\u767a\u73fe\u304c\u3068\u3082\u306b\u5897\u52a0\u3059\u308b\u3002irAE\u767a\u75c7\u4f8b\u306f\u3080\u3057\u308d\u4e88\u5f8c\u826f\u597d\u3067\u3042\u308b\u3053\u3068\u304c\u8907\u6570\u306e\u7814\u7a76\u3067\u793a\u3055\u308c\u3066\u3044\u308b\u3002", "keyPoints": ["irAE\u6a5f\u5e8f\uff1aT\u7d30\u80de\u76f4\u63a5\u653b\u6483\uff08\u5fc3\u7b4b\u708e\uff09\u3001B\u7d30\u80de\u6297\u4f53\u7523\u751f\u5897\u52a0\uff08\u7532\u72b6\u817a\u708e\uff09\u3001\u30b5\u30a4\u30c8\u30ab\u30a4\u30f3\u4e0a\u6607\uff08\u5927\u8178\u708e\uff09\u3001CTLA-4\u76f4\u63a5\u969c\u5bb3\uff08\u4e0b\u5782\u4f53\u708e\uff09", "CTLA-4\u6297\u4f53\u306f\u4e0b\u5782\u4f53\u708e\u306e\u983b\u5ea6\u304cPD-1/PD-L1\u963b\u5bb3\u85ac\u3088\u308a\u9ad8\u3044", "CTLA-4\u6297\u4f53\u4f75\u7528\u3067irAE\u5168\u4f53\u306e\u983b\u5ea6\u30fb\u65e9\u671f\u767a\u73fe\u304c\u3068\u3082\u306b\u5897\u52a0", "irAE\u767a\u75c7\u4f8b\uff08\u76ae\u819a\u969c\u5bb3\u3001\u7532\u72b6\u817a\u6a5f\u80fd\u969c\u5bb3\u7b49\uff09\u306f\u4e88\u5f8c\u826f\u597d\u3067\u3042\u308b\u3053\u3068\u304c\u30e9\u30f3\u30c9\u30de\u30fc\u30af\u89e3\u6790\u7b49\u3067\u5831\u544a\u3055\u308c\u3066\u3044\u308b", "ICI\u6cbb\u7642\u4e2d\u60a3\u8005\u306e\u60c5\u5831\u3092\u30ab\u30eb\u30c6\u7b49\u306b\u660e\u8a18\u3057\u6551\u6025\u5bfe\u5fdc\u306b\u5099\u3048\u308b\u4f53\u5236\u6574\u5099\u304c\u91cd\u8981"]}, {"heading": "irAE\u306e\u81d3\u5668\u5225\u5bfe\u5fdc\uff08\u5185\u5206\u6ccc\u30fb\u5927\u8178\u708e\u30fb\u80ba\u969c\u5bb3\u30fb\u5fc3\u7b4b\u708e\uff09", "summary": "\u6cbb\u7642\u306e\u57fa\u672c\u306f\u526f\u814e\u76ae\u8cea\u30b9\u30c6\u30ed\u30a4\u30c9\u3001\u7121\u52b9\u306a\u3089\u81d3\u5668\u5225\u306b\u514d\u75ab\u6291\u5236\u85ac\uff08\u809d\u969c\u5bb3\u306b\u30df\u30b3\u30d5\u30a7\u30ce\u30fc\u30eb\u9178\u30e2\u30d5\u30a7\u30c1\u30eb\u3001\u5927\u8178\u708e\u306b\u30a4\u30f3\u30d5\u30ea\u30ad\u30b7\u30de\u30d6\u3001\u5fc3\u7b4b f\u3002", "keyPoints": ["\u30d2\u30dd\u30af\u30e9\u30c6\u30b9\u306e\u8a93\u3044\uff1a\u533b\u5e2b\u306e\u8077\u696d\u502b\u7406\u3068\u3057\u3066\u6b74\u53f2\u4e0a\u6700\u53e4", "\u30b8\u30e5\u30cd\u30fc\u30d6\u5ba3\u8a00\uff081948\u5e74\uff09\uff1a\u30d2\u30dd\u30af\u30e9\u30c6\u30b9\u306e\u8a93\u3044\u306e\u5f71\u97ff\u3092\u53d7\u3051\u30012017\u5e74\u30b7\u30ab\u30b4\u6539\u5b9a\u3067\u60a3\u8005\u306e\u81ea\u5f8b\u6027\u5c0a\u91cd\u7b49\u304c\u8ffd\u52a0", "\u30ea\u30b9\u30dc\u30f3\u5ba3\u8a00\uff081981\u5e74\uff09\uff1a\u60a3\u8005\u306e\u81ea\u5df1\u6c7a\u5b9a\u6a29\u30fb\u8aac\u660e\u3092\u53d7\u3051\u308b\u6a29\u5229\u30fb\u540c\u610f\u62d2\u5426\u6a29\u3092\u5ba3\u8a00\u3001\u610f\u8b58\u306e\u306a\u3044\u60a3\u8005\u306b\u306f\u63a8\u5b9a\u540c\u610f\u3067\u533b\u7642\u53ef\u80fd", "\u533b\u306e\u502b\u7406\u7db1\u9818\uff082000\u5e74\u3001\u65e5\u672c\u533b\u5e2b\u4f1a\uff09"]}, {"heading": "\u81e8\u5e8a\u7814\u7a76\u6cd5\uff08\u5e73\u621030\u5e74\u65bd\u884c\uff09", "summary": "\u81e8\u5e8a\u7814\u7a76\u6cd5\u306f\u81e8\u5e8a\u7814\u7a76\u306e\u5b9f\u65bd\u624b\u7d9a\u304d\u3068\u8a8d\u5b9a\u81e8\u5e8a\u7814\u7a76\u5be9\u67fb\u59d4\u54e1\u4f1a\u306b\u3088\u308b\u5be9\u67fb\u3092\u5b9a\u3081\u3001\u81e8\u5e8a\u7814\u7a76\u3078\u306e\u56fd\u6c11\u306e\u4fe1\u983c\u78ba\u4fdd\u3092\u76ee\u7684\u3068\u3059\u308b\u3002\u7279\u5b9a\u81e8\u5e8a\u7814\u7a76\u3092\u5b9f\u65bd\u3059\u308b\u8005\u306b\u306f\u30e2\u30cb\u30bf\u30ea\u30f3\u30b0\u30fb\u76e3\u67fb\u3001\u5229\u76ca\u76f8\u53cd\u7ba1\u7406\u3001\u30a4\u30f3\u30d5\u30a9\u30fc\u30e0\u30c9\u30b3\u30f3\u30bb\u30f3\u30c8\u53d6\u5f97\u306a\u3069\u306e\u7fa9\u52d9\u304c\u8ab2\u3055\u308c\u308b\u3002", "keyPoints": ["\u76ee\u7684\uff1a\u81e8\u5e8a\u7814\u7a76\u306e\u5b9f\u65bd\u624b\u7d9a\u304d\u3068\u8a8d\u5b9a\u81e8\u5e8a\u7814\u7a76\u5be9\u67fb\u59d4\u54e1\u4f1a\u306b\u3088\u308b\u5be9\u67fb\u610f\u898b\u696d\u52d9\u3092\u5b9a\u3081\u3001\u56fd\u6c11\u306e\u4fe1\u983c\u78ba\u4fdd\u3092\u56f3\u308b", "\u7279 const THEME_KEY = 'haigan_theme';
const PROGRESS_KEY = 'haigan_lecture_progress';

function loadTheme(){
  const t = localStorage.getItem(THEME_KEY);
  if(t === 'dark' || t === 'light'){
    document.documentElement.setAttribute('data-theme', t);
  }
}
function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') ||
    (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem(THEME_KEY, next);
}
loadTheme();
document.getElementById('themeBtn').addEventListener('click', toggleTheme);

function loadProgress(){
  try{
    const raw = localStorage.getItem(PROGRESS_KEY);
    return raw ? JSON.parse(raw) : {};
  }catch(e){
    return {};
  }
}
function saveProgress(p){
  localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
}
let progress = loadProgress();

function updateHeaderProgress(){
  const total = LECTURES.length;
  const done = LECTURES.filter(l => progress[String(l.no)]).length;
  document.getElementById('progressLabel').textContent = done + '/' + total + ' 講義 読了';
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progressBarFill').style.width = pct + '%';
}

function renderList(){
  const container = document.getElementById('lectureList');
  container.innerHTML = '';
  LECTURES.forEach(l => {
    const card = document.createElement('div');
    card.className = 'lecture-card';
    const done = !!progress[String(l.no)];
    const noStr = String(l.no).padStart(2, '0');
    card.innerHTML =
      '<div class="lecture-no">' + noStr + '</div>' +
      '<div class="lecture-meta">' +
        '<p class="lecture-title">' + escapeHtml(l.title) + '</p>' +
        '<p class="lecture-sub">' + escapeHtml(l.lecturer) + ' ・ ' + l.sections.length + '節</p>' +
      '</div>' +
      '<div class="lecture-check">' + (done ? '✓' : '') + '</div>';
    card.addEventListener('click', () => showDetail(l.no));
    container.appendChild(card);
  });

  // 09番 未収載カード
  const missing = document.createElement('div');
  missing.className = 'lecture-card disabled';
  missing.innerHTML =
    '<div class="lecture-no">09</div>' +
    '<div class="lecture-meta">' +
      '<p class="lecture-title">支持療法・緩和ケア（e-セミナー字幕未収載）</p>' +
      '<p class="lecture-sub">—</p>' +
    '</div>' +
    '<div class="lecture-check"></div>';
  container.appendChild(missing);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

let currentLectureNo = null;

function showDetail(no){
  const l = LECTURES.find(x => x.no === no);
  if(!l) return;
  currentLectureNo = no;

  document.getElementById('detailTitle').textContent =
    String(no).padStart(2, '0') + '. ' + l.title;
  document.getElementById('detailLecturer').textContent = l.lecturer;

  const badgeRow = document.getElementById('badgeRow');
  badgeRow.innerHTML = '';
  if(l.linkedCurriculumNos && l.linkedCurriculumNos.length){
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = 'カリキュラム項目: ' + l.linkedCurriculumNos.join(', ');
    badgeRow.appendChild(badge);
  }

  const examList = document.getElementById('examPointsList');
  examList.innerHTML = '';
  (l.examPoints || []).forEach(p => {
    const li = document.createElement('li');
    li.textContent = p;
    examList.appendChild(li);
  });

  const sectionsContainer = document.getElementById('sectionsContainer');
  sectionsContainer.innerHTML = '';
  (l.sections || []).forEach(sec => {
    const block = document.createElement('div');
    block.className = 'section-block';
    let html = '<h3 class="section-heading">' + escapeHtml(sec.heading) + '</h3>';
    html += '<p class="section-summary">' + escapeHtml(sec.summary) + '</p>';
    if(sec.keyPoints && sec.keyPoints.length){
      html += '<ul>' + sec.keyPoints.map(kp => '<li>' + escapeHtml(kp) + '</li>').join('') + '</ul>';
    }
    block.innerHTML = html;
    sectionsContainer.appendChild(block);
  });

  updateToggleButton();

  document.getElementById('listView').classList.add('hidden');
  document.getElementById('detailView').classList.remove('hidden');
  window.scrollTo(0, 0);
}

function updateToggleButton(){
  const btn = document.getElementById('toggleReadBtn');
  const done = !!progress[String(currentLectureNo)];
  btn.textContent = done ? '✓ 読了済み（解除する）' : '読了にする';
  btn.classList.toggle('done', done);
}

document.getElementById('toggleReadBtn').addEventListener('click', () => {
  const key = String(currentLectureNo);
  progress[key] = !progress[key];
  saveProgress(progress);
  updateToggleButton();
  updateHeaderProgress();
});

function showList(){
  document.getElementById('detailView').classList.add('hidden');
  document.getElementById('listView').classList.remove('hidden');
  renderList();
  window.scrollTo(0, 0);
}

document.getElementById('backBtn').addEventListener('click', showList);
document.getElementById('backBtn2').addEventListener('click', showList);

function setActiveNav(view){
  document.getElementById('navListBtn').classList.toggle('active', view === 'list');

}

function showListView(){
  document.getElementById('planView').classList.add('hidden');

  renderList();
  window.scrollTo(0, 0);
}

function renderPlanTable(headers, rows){
  let html = '<div class="table-scroll"><table class="plan-table"><thead><tr>';
  headers.forEach(h => { html += '<th>' + escapeHtml(h) + '</th>'; });
  html += '</tr></thead><tbody>';
  rows.forEach(row => {
    html += '<tr>';
    row.forEach((cell, i) => {
      const label = i > 0 ? ' data-label="' + escapeHtml(headers[i]) + '"' : '';
      html += '<td' + label + '>' + cell + '</td>';
    });
    html += '</tr>';
  });
  html += '</tbody></table></div>';
  return html;
}
